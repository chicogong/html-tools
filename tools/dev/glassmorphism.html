      :root {

        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      :root {
        --preview-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --glass-bg: rgba(255, 255, 255, 0.25);
        --glass-blur: 10px;
        --glass-border: rgba(255, 255, 255, 0.18);
        --glass-border-width: 1px;
        --glass-radius: 16px;
        --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      header h1 {
        margin: 0;
        font-size: 1.75rem;
      }

      .theme-toggle {
        background: none;
        border: 2px solid var(--pico-primary);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }

      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      @media (max-width: 900px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Preview Section */
      .preview-section {
        position: sticky;
        top: 20px;
      }

      .preview-container {
        background: var(--preview-bg);
        border-radius: 12px;
        padding: 60px 40px;
        min-height: 400px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .preview-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
      }

      .shape-1 {
        width: 150px;
        height: 150px;
        background: rgba(255, 255, 255, 0.4);
        top: 10%;
        left: 10%;
      }

      .shape-2 {
        width: 100px;
        height: 100px;
        background: rgba(255, 255, 255, 0.3);
        bottom: 20%;
        right: 15%;
      }

      .shape-3 {
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.25);
        top: 50%;
        right: 30%;
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border-radius: var(--glass-radius);
        border: var(--glass-border-width) solid var(--glass-border);
        box-shadow: var(--glass-shadow);
        padding: 40px;
        width: 280px;
        text-align: center;
        color: white;
        position: relative;
        z-index: 1;
      }

      .glass-card h3 {
        margin: 0 0 10px;
        font-size: 1.5rem;
        color: white;
      }

      .glass-card p {
        margin: 0;
        opacity: 0.9;
        font-size: 0.95rem;
      }

      /* Controls Section */
      .controls-section article {
        margin-bottom: 1rem;
      }

      .control-group {
        margin-bottom: 1.5rem;
      }

      .control-group label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .control-group label span {
        font-weight: normal;
        opacity: 0.8;
        font-size: 0.9rem;
      }

      input[type="range"] {
        width: 100%;
      }

      input[type="color"] {
        width: 60px;
        height: 40px;
        padding: 2px;
        border-radius: 8px;
        cursor: pointer;
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .color-row input[type="text"] {
        flex: 1;
        margin: 0;
      }

      /* Background Presets */
      .bg-presets {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
        margin-top: 0.5rem;
      }

      .bg-preset {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 8px;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
      }

      .bg-preset:hover {
        transform: scale(1.1);
      }

      .bg-preset.active {
        border-color: var(--pico-primary);
        box-shadow: 0 0 0 2px var(--pico-primary);
      }

      /* Code Output */
      .code-output {
        position: relative;
      }

      .code-output pre {
        background: var(--pico-code-background-color);
        border-radius: 8px;
        padding: 1rem;
        overflow-x: auto;
        font-size: 0.85rem;
        line-height: 1.5;
        margin: 0;
      }

      .code-output code {
        white-space: pre-wrap;
        word-break: break-all;
      }

      .copy-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 6px 12px;
        font-size: 0.8rem;
      }

      /* Toggle Switches */
      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0;
      }

      .toggle-switch {
        position: relative;
        width: 50px;
        height: 26px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.3s;
        border-radius: 26px;
      }

      .toggle-slider::before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }

      .toggle-switch input:checked + .toggle-slider {
        background-color: var(--pico-primary);
      }

      .toggle-switch input:checked + .toggle-slider::before {
        transform: translateX(24px);
      }

      /* Responsive */
      @media (max-width: 600px) {
        .bg-presets {
          grid-template-columns: repeat(4, 1fr);
        }

        .glass-card {
          width: 220px;
          padding: 30px;
        }
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
</style>

<main class="container">
      <header>
        <h1>🪟 Glassmorphism 生成器</h1>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
          🌓
        </button>
      </header>

      <div class="main-grid">
        <!-- Preview Section -->
        <div class="preview-section">
          <article>
            <h4>实时预览</h4>
            <div class="preview-container" id="previewContainer">
              <div class="preview-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
              </div>
              <div class="glass-card" id="glassCard">
                <h3>毛玻璃卡片</h3>
                <p>Glassmorphism 效果展示，调整右侧参数查看变化</p>
              </div>
            </div>
          </article>

          <!-- Code Output -->
          <article>
            <h4>CSS 代码</h4>
            <div class="code-output">
              <button class="copy-btn" onclick="copyCode()" aria-label="复制">复制</button>
              <pre><code id="codeOutput"></code></pre>
            </div>
          </article>
        </div>

        <!-- Controls Section -->
        <div class="controls-section">
          <!-- Background -->
          <article>
            <h4>背景设置</h4>
            <div class="control-group">
              <label>预设渐变</label>
              <div class="bg-presets" id="bgPresets"></div>
            </div>
          </article>

          <!-- Glass Effect -->
          <article>
            <h4>毛玻璃效果</h4>

            <div class="control-group">
              <label>
                模糊程度
                <span id="blurValue">10px</span>
              </label>
              <input type="range" id="blurRange" min="0" max="30" value="10" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>
                透明度
                <span id="opacityValue">0.25</span>
              </label>
              <input type="range" id="opacityRange" min="0" max="100" value="25" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>背景颜色</label>
              <div class="color-row">
                <input type="color" id="bgColor" value="#ffffff" oninput="updateGlass()" aria-label="颜色选择器">
                <input type="text" id="bgColorText" value="#ffffff" oninput="syncBgColor()" aria-label="文本输入框" placeholder="请输入文本输入框">
              </div>
            </div>
          </article>

          <!-- Border -->
          <article>
            <h4>边框设置</h4>

            <div class="control-group">
              <label>
                边框宽度
                <span id="borderWidthValue">1px</span>
              </label>
              <input type="range" id="borderWidthRange" min="0" max="5" value="1" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>
                边框透明度
                <span id="borderOpacityValue">0.18</span>
              </label>
              <input type="range" id="borderOpacityRange" min="0" max="100" value="18" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>边框颜色</label>
              <div class="color-row">
                <input type="color" id="borderColor" value="#ffffff" oninput="updateGlass()" aria-label="颜色选择器">
                <input type="text" id="borderColorText" value="#ffffff" oninput="syncBorderColor()" aria-label="文本输入框" placeholder="请输入文本输入框">
              </div>
            </div>

            <div class="control-group">
              <label>
                圆角
                <span id="radiusValue">16px</span>
              </label>
              <input type="range" id="radiusRange" min="0" max="50" value="16" oninput="updateGlass()">
            </div>
          </article>

          <!-- Shadow -->
          <article>
            <h4>阴影设置</h4>

            <div class="toggle-row">
              <span>启用阴影</span>
              <label class="toggle-switch">
                <input type="checkbox" id="shadowToggle" checked="" onchange="updateGlass()">
                <span class="toggle-slider"></span>
              </label>
            </div>

            <div class="control-group">
              <label>
                水平偏移
                <span id="shadowXValue">0px</span>
              </label>
              <input type="range" id="shadowXRange" min="-30" max="30" value="0" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>
                垂直偏移
                <span id="shadowYValue">8px</span>
              </label>
              <input type="range" id="shadowYRange" min="-30" max="30" value="8" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>
                阴影模糊
                <span id="shadowBlurValue">32px</span>
              </label>
              <input type="range" id="shadowBlurRange" min="0" max="100" value="32" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>
                阴影扩展
                <span id="shadowSpreadValue">0px</span>
              </label>
              <input type="range" id="shadowSpreadRange" min="-20" max="20" value="0" oninput="updateGlass()">
            </div>

            <div class="control-group">
              <label>
                阴影透明度
                <span id="shadowOpacityValue">0.37</span>
              </label>
              <input type="range" id="shadowOpacityRange" min="0" max="100" value="37" oninput="updateGlass()">
            </div>
          </article>

          <!-- Actions -->
          <article>
            <button onclick="resetToDefault()" class="secondary outline" style="width: 100%">
              重置为默认值
            </button>
          </article>
        </div>
      </div>
    </main>
