    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;

    <script>
      /* global L */

      // ── Colour palette for multiple tracks ──────────────────────────────
      var TRACK_COLORS = [
        "#00f5d4",
        "#f72585",
        "#4cc9f0",
        "#fbbf24",
        "#10b981",
        "#8b5cf6",
        "#ff9f1c",
        "#f43f5e"
      ];

      // ── State ────────────────────────────────────────────────────────────
      var map = null;
      var trackLayers = [];
      var waypointMarkers = [];
      var allTracks = []; // parsed track objects

      // ── DOM refs ─────────────────────────────────────────────────────────
      var dropZoneEl = document.getElementById("dropZone");
      var fileInputEl = document.getElementById("fileInput");
      var mapContainerEl = document.getElementById("mapContainer");
      var statusEl = document.getElementById("status");
      var statsGridEl = document.getElementById("statsGrid");
      var elevationSectionEl = document.getElementById("elevationSection");
      var elevationCanvasEl = document.getElementById("elevationCanvas");
      var waypointsSectionEl = document.getElementById("waypointsSection");
      var waypointsListEl = document.getElementById("waypointsList");
      var trackSelectorEl = document.getElementById("trackSelector");

      // ── Leaflet init (lazy) ──────────────────────────────────────────────
      function ensureMap() {
        if (map) return;
        map = L.map("map").setView([30, 110], 4);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap contributors",
          maxZoom: 19
        }).addTo(map);
      }

      // ── Distance helpers (Haversine) ─────────────────────────────────────
      function toRad(deg) {
        return (deg * Math.PI) / 180;
      }
      function haversine(lat1, lon1, lat2, lon2) {
        var R = 6371000; // metres
        var dLat = toRad(lat2 - lat1);
        var dLon = toRad(lon2 - lon1);
        var a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      // ── GPX Parser ───────────────────────────────────────────────────────
      function parseGpx(xmlText) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(xmlText, "application/xml");

        var result = {
          name: "",
          tracks: [],
          routes: [],
          waypoints: []
        };

        // metadata name
        var metaName = doc.querySelector("metadata > name");
        if (metaName) result.name = metaName.textContent.trim();

        // Waypoints
        var wpts = doc.querySelectorAll("wpt");
        wpts.forEach(function (wpt) {
          var lat = parseFloat(wpt.getAttribute("lat"));
          var lon = parseFloat(wpt.getAttribute("lon"));
          var nameEl = wpt.querySelector("name");
          var symEl = wpt.querySelector("sym");
          var eleEl = wpt.querySelector("ele");
          result.waypoints.push({
            lat: lat,
            lon: lon,
            name: nameEl ? nameEl.textContent.trim() : "",
            sym: symEl ? symEl.textContent.trim() : "",
            ele: eleEl ? parseFloat(eleEl.textContent) : null
          });
        });

        // Helper: parse trkpts / rtepts
        function parsePoints(ptElements) {
          var pts = [];
          ptElements.forEach(function (pt) {
            var lat = parseFloat(pt.getAttribute("lat"));
            var lon = parseFloat(pt.getAttribute("lon"));
            var eleEl = pt.querySelector("ele");
            var timeEl = pt.querySelector("time");
            pts.push({
              lat: lat,
              lon: lon,
              ele: eleEl ? parseFloat(eleEl.textContent) : null,
              time: timeEl ? new Date(timeEl.textContent) : null
            });
          });
          return pts;
        }

        // Tracks (trk > trkseg > trkpt)
        var trks = doc.querySelectorAll("trk");
        trks.forEach(function (trk) {
          var nameEl = trk.querySelector("name");
          var trkName = nameEl ? nameEl.textContent.trim() : "轨迹";
          var segments = [];
          var segs = trk.querySelectorAll("trkseg");
          segs.forEach(function (seg) {
            var pts = parsePoints(seg.querySelectorAll("trkpt"));
            if (pts.length) segments.push(pts);
          });
          if (segments.length) {
            result.tracks.push({ name: trkName, segments: segments, type: "track" });
          }
        });

        // Routes (rte > rtept)
        var rtes = doc.querySelectorAll("rte");
        rtes.forEach(function (rte) {
          var nameEl = rte.querySelector("name");
          var rteName = nameEl ? nameEl.textContent.trim() : "路线";
          var pts = parsePoints(rte.querySelectorAll("rtept"));
          if (pts.length) {
            result.routes.push({ name: rteName, segments: [pts], type: "route" });
          }
        });

        return result;
      }

      // ── Statistics ───────────────────────────────────────────────────────
      function calcTrackStats(segments) {
        var totalDist = 0;
        var totalEleGain = 0;
        var totalEleLoss = 0;
        var minEle = Infinity;
        var maxEle = -Infinity;
        var firstTime = null;
        var lastTime = null;
        var allPts = [];

        segments.forEach(function (pts) {
          for (var i = 0; i < pts.length; i++) {
            allPts.push(pts[i]);
            var pt = pts[i];
            if (i > 0) {
              totalDist += haversine(pts[i - 1].lat, pts[i - 1].lon, pt.lat, pt.lon);
              if (pt.ele !== null && pts[i - 1].ele !== null) {
                var diff = pt.ele - pts[i - 1].ele;
                if (diff > 0) totalEleGain += diff;
                else totalEleLoss += -diff;
              }
            }
            if (pt.ele !== null) {
              if (pt.ele < minEle) minEle = pt.ele;
              if (pt.ele > maxEle) maxEle = pt.ele;
            }
            if (pt.time) {
              if (!firstTime) firstTime = pt.time;
              lastTime = pt.time;
            }
          }
        });

        var durationSec = firstTime && lastTime ? (lastTime - firstTime) / 1000 : null;
        var avgSpeedKmh =
          durationSec && durationSec > 0
            ? (totalDist / 1000 / (durationSec / 3600)).toFixed(1)
            : null;

        return {
          distKm: (totalDist / 1000).toFixed(2),
          eleGainM: Math.round(totalEleGain),
          eleLossM: Math.round(totalEleLoss),
          minEleM: minEle === Infinity ? null : Math.round(minEle),
          maxEleM: maxEle === -Infinity ? null : Math.round(maxEle),
          durationSec: durationSec,
          avgSpeedKmh: avgSpeedKmh,
          points: allPts.length,
          allPts: allPts
        };
      }

      function fmtDuration(sec) {
        if (sec === null) return "—";
        var h = Math.floor(sec / 3600);
        var m = Math.floor((sec % 3600) / 60);
        var s = Math.floor(sec % 60);
        return (h > 0 ? h + "h " : "") + (m > 0 || h > 0 ? m + "m " : "") + s + "s";
      }

      // ── Elevation canvas draw ────────────────────────────────────────────
      function drawElevation(allPts) {
        var canvas = elevationCanvasEl;
        var W = canvas.offsetWidth || 800;
        var H = canvas.offsetHeight || 140;
        canvas.width = W;
        canvas.height = H;
        var ctx = canvas.getContext("2d");

        var eles = allPts.map(function (p) {
          return p.ele;
        });
        var hasEle = eles.some(function (e) {
          return e !== null;
        });
        if (!hasEle) {
          ctx.fillStyle = getComputedStyle(document.documentElement)
            .getPropertyValue("--text-muted")
            .trim();
          ctx.font = "13px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("无海拔数据", W / 2, H / 2);
          return;
        }

        var validEles = eles.filter(function (e) {
          return e !== null;
        });
        var minE = Math.min.apply(null, validEles);
        var maxE = Math.max.apply(null, validEles);
        var rangeE = maxE - minE || 1;
        var pad = 24;

        // gradient fill
        var grad = ctx.createLinearGradient(0, pad, 0, H - pad);
        grad.addColorStop(0, "rgba(0,245,212,0.6)");
        grad.addColorStop(1, "rgba(0,245,212,0.05)");

        ctx.beginPath();
        var step = (W - pad * 2) / (allPts.length - 1);
        var firstValid = true;
        allPts.forEach(function (pt, i) {
          if (pt.ele === null) return;
          var x = pad + i * step;
          var y = pad + ((maxE - pt.ele) / rangeE) * (H - pad * 2);
          if (firstValid) {
            ctx.moveTo(x, H - pad);
            ctx.lineTo(x, y);
            firstValid = false;
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.lineTo(pad + (allPts.length - 1) * step, H - pad);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // line
        ctx.beginPath();
        firstValid = true;
        allPts.forEach(function (pt, i) {
          if (pt.ele === null) return;
          var x = pad + i * step;
          var y = pad + ((maxE - pt.ele) / rangeE) * (H - pad * 2);
          if (firstValid) {
            ctx.moveTo(x, y);
            firstValid = false;
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.strokeStyle = "#00f5d4";
        ctx.lineWidth = 2;
        ctx.stroke();

        // labels
        ctx.fillStyle = "#8888a0";
        ctx.font = "11px 'JetBrains Mono', monospace";
        ctx.textAlign = "left";
        ctx.fillText(Math.round(maxE) + " m", 2, pad + 4);
        ctx.fillText(Math.round(minE) + " m", 2, H - pad - 2);
      }

      // ── Render stats cards ───────────────────────────────────────────────
      function renderStats(stats, name) {
        var items = [
          {
            v: stats.distKm + " km",
            l: "总距离"
          },
          {
            v: stats.eleGainM !== null ? "+" + stats.eleGainM + " m" : "—",
            l: "爬升"
          },
          {
            v: stats.eleLossM !== null ? "-" + stats.eleLossM + " m" : "—",
            l: "下降"
          },
          {
            v: stats.minEleM !== null ? stats.minEleM + " m" : "—",
            l: "最低海拔"
          },
          {
            v: stats.maxEleM !== null ? stats.maxEleM + " m" : "—",
            l: "最高海拔"
          },
          {
            v: fmtDuration(stats.durationSec),
            l: "时长"
          },
          {
            v: stats.avgSpeedKmh !== null ? stats.avgSpeedKmh + " km/h" : "—",
            l: "平均速度"
          },
          {
            v: stats.points.toString(),
            l: "轨迹点"
          }
        ];

        var html = "";
        if (name) {
          html +=
            '<div style="grid-column:1/-1;font-size:0.8125rem;font-weight:600;color:var(--color-text-secondary);margin-bottom:4px;">' +
            escHtml(name) +
            "</div>";
        }
        items.forEach(function (item) {
          html +=
            '<div class="stat-card"><div class="stat-card-value">' +
            escHtml(item.v) +
            '</div><div class="stat-card-label">' +
            escHtml(item.l) +
            "</div></div>";
        });
        statsGridEl.innerHTML = html;
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ── Render waypoints list ────────────────────────────────────────────
      function renderWaypoints(waypoints) {
        if (!waypoints.length) {
          waypointsSectionEl.style.display = "none";
          return;
        }
        waypointsSectionEl.style.display = "flex";
        waypointsListEl.innerHTML = "";
        waypoints.forEach(function (wpt, idx) {
          var div = document.createElement("div");
          div.className = "waypoint-item";
          div.dataset.idx = idx;
          div.innerHTML =
            '<span class="waypoint-sym">' +
            (wpt.sym ? "📍" : "📍") +
            "</span>" +
            '<span class="waypoint-name">' +
            escHtml(wpt.name || "Waypoint " + (idx + 1)) +
            "</span>" +
            '<span class="waypoint-coords">' +
            wpt.lat.toFixed(5) +
            ", " +
            wpt.lon.toFixed(5) +
            "</span>";
          div.addEventListener("click", function () {
            if (map && waypointMarkers[idx]) {
              map.setView([wpt.lat, wpt.lon], 14);
              waypointMarkers[idx].openPopup();
            }
          });
          waypointsListEl.appendChild(div);
        });
      }

      // ── Main render ──────────────────────────────────────────────────────
      function renderGpxData(gpxData) {
        ensureMap();

        // Clear previous
        trackLayers.forEach(function (l) {
          map.removeLayer(l);
        });
        waypointMarkers.forEach(function (m) {
          map.removeLayer(m);
        });
        trackLayers = [];
        waypointMarkers = [];
        trackSelectorEl.innerHTML = "";
        trackSelectorEl.style.display = "none";

        var combined = gpxData.tracks.concat(gpxData.routes);
        var bounds = [];

        // Draw tracks / routes
        combined.forEach(function (trk, colorIdx) {
          var color = TRACK_COLORS[colorIdx % TRACK_COLORS.length];
          var allLatLons = [];

          trk.segments.forEach(function (seg) {
            var latlngs = seg.map(function (p) {
              return [p.lat, p.lon];
            });
            allLatLons = allLatLons.concat(latlngs);
            var poly = L.polyline(latlngs, {
              color: color,
              weight: 3,
              opacity: 0.9
            }).addTo(map);
            trackLayers.push(poly);
            bounds = bounds.concat(latlngs);
          });

          // Start / end markers
          if (allLatLons.length > 0) {
            var startPt = allLatLons[0];
            var endPt = allLatLons[allLatLons.length - 1];

            var startMarker = L.circleMarker(startPt, {
              radius: 7,
              fillColor: color,
              color: "#fff",
              weight: 2,
              fillOpacity: 1
            })
              .addTo(map)
              .bindPopup(
                "<b>起点</b><br>" +
                  escHtml(trk.name) +
                  "<br>" +
                  startPt[0].toFixed(5) +
                  ", " +
                  startPt[1].toFixed(5)
              );
            trackLayers.push(startMarker);

            if (startPt[0] !== endPt[0] || startPt[1] !== endPt[1]) {
              var endMarker = L.circleMarker(endPt, {
                radius: 7,
                fillColor: "#f72585",
                color: "#fff",
                weight: 2,
                fillOpacity: 1
              })
                .addTo(map)
                .bindPopup(
                  "<b>终点</b><br>" +
                    escHtml(trk.name) +
                    "<br>" +
                    endPt[0].toFixed(5) +
                    ", " +
                    endPt[1].toFixed(5)
                );
              trackLayers.push(endMarker);
            }
          }
        });

        // Draw waypoints
        gpxData.waypoints.forEach(function (wpt) {
          var marker = L.circleMarker([wpt.lat, wpt.lon], {
            radius: 6,
            fillColor: "#fbbf24",
            color: "#fff",
            weight: 2,
            fillOpacity: 1
          })
            .addTo(map)
            .bindPopup(
              "<b>" +
                escHtml(wpt.name || "Waypoint") +
                "</b>" +
                (wpt.ele !== null ? "<br>海拔: " + Math.round(wpt.ele) + " m" : "") +
                "<br>" +
                wpt.lat.toFixed(5) +
                ", " +
                wpt.lon.toFixed(5)
            );
          waypointMarkers.push(marker);
          bounds.push([wpt.lat, wpt.lon]);
        });

        // Fit map
        if (bounds.length) {
          map.fitBounds(bounds, { padding: [30, 30] });
        }

        // Stats: merge all tracks for summary
        var allSegments = [];
        combined.forEach(function (trk) {
          trk.segments.forEach(function (s) {
            allSegments.push(s);
          });
        });

        var trkName =
          combined.length === 1
            ? combined[0].name
            : combined.length > 1
              ? combined.length + " 个轨迹"
              : "";

        if (allSegments.length) {
          var stats = calcTrackStats(allSegments);
          renderStats(stats, trkName);

          // Elevation chart
          var collectPts = [];
          allSegments.forEach(function (seg) {
            collectPts = collectPts.concat(seg);
          });
          // Downsample if too many
          var MAX_CHART_PTS = 1000;
          if (collectPts.length > MAX_CHART_PTS) {
            var step = Math.ceil(collectPts.length / MAX_CHART_PTS);
            var sampled = [];
            for (var i = 0; i < collectPts.length; i += step) {
              sampled.push(collectPts[i]);
            }
            collectPts = sampled;
          }
          elevationSectionEl.style.display = "flex";
          requestAnimationFrame(function () {
            drawElevation(collectPts);
          });
        }

        // Track selector (multiple tracks)
        if (combined.length > 1) {
          trackSelectorEl.style.display = "flex";
          combined.forEach(function (trk, colorIdx) {
            var color = TRACK_COLORS[colorIdx % TRACK_COLORS.length];
            var span = document.createElement("span");
            span.style.display = "flex";
            span.style.alignItems = "center";
            span.style.gap = "6px";
            span.style.fontSize = "0.8125rem";
            span.style.color = "var(--color-text-secondary)";
            span.innerHTML =
              '<span class="track-color-dot" style="background:' +
              color +
              '"></span>' +
              escHtml(trk.name);
            trackSelectorEl.appendChild(span);
          });
        }

        // Waypoints
        renderWaypoints(gpxData.waypoints);

        // Show map
        mapContainerEl.classList.add("visible");
        dropZoneEl.style.display = "none";

        // Invalidate map size after display
        setTimeout(function () {
          map.invalidateSize();
          if (bounds.length) {
            map.fitBounds(bounds, { padding: [30, 30] });
          }
        }, 100);
      }

      // ── File handling ────────────────────────────────────────────────────
      function handleFile(file) {
        if (!file.name.toLowerCase().endsWith(".gpx") && file.type !== "application/gpx+xml") {
          showStatus("请选择 .gpx 格式的文件", "error");
          return;
        }
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            var gpxData = parseGpx(e.target.result);
            var total = gpxData.tracks.length + gpxData.routes.length + gpxData.waypoints.length;
            if (total === 0) {
              showStatus("文件中未找到轨迹或航点数据", "error");
              return;
            }
            allTracks = gpxData;
            renderGpxData(gpxData);
            showStatus(
              "已加载: " +
                (gpxData.tracks.length + gpxData.routes.length) +
                " 条轨迹, " +
                gpxData.waypoints.length +
                " 个航点",
              "success"
            );
          } catch (err) {
            showStatus("解析失败: " + err.message, "error");
          }
        };
        reader.readAsText(file, "utf-8");
      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      // ── Events ───────────────────────────────────────────────────────────
      dropZoneEl.addEventListener("click", function () {
        fileInputEl.click();
      });
      fileInputEl.addEventListener("change", function () {
        if (fileInputEl.files.length) {
          handleFile(fileInputEl.files[0]);
        }
      });
      dropZoneEl.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropZoneEl.classList.add("drag-over");
      });
      dropZoneEl.addEventListener("dragleave", function () {
        dropZoneEl.classList.remove("drag-over");
      });
      dropZoneEl.addEventListener("drop", function (e) {
        e.preventDefault();
        dropZoneEl.classList.remove("drag-over");
        var files = e.dataTransfer.files;
        if (files.length) handleFile(files[0]);
      });

      document.getElementById("btnFit").addEventListener("click", function () {
        if (!map || !trackLayers.length) return;
        var allBounds = [];
        trackLayers.forEach(function (l) {
          if (l.getLatLng) {
            allBounds.push([l.getLatLng().lat, l.getLatLng().lng]);
          } else if (l.getLatLngs) {
            var coords = l.getLatLngs();
            if (Array.isArray(coords[0])) {
              coords.forEach(function (sub) {
                sub.forEach(function (ll) {
                  allBounds.push([ll.lat, ll.lng]);
                });
              });
            } else {
              coords.forEach(function (ll) {
                allBounds.push([ll.lat, ll.lng]);
              });
            }
          }
        });
        if (allBounds.length) map.fitBounds(allBounds, { padding: [30, 30] });
      });

      document.getElementById("btnClear").addEventListener("click", function () {
        if (map) {
          trackLayers.forEach(function (l) {
            map.removeLayer(l);
          });
          waypointMarkers.forEach(function (m) {
            map.removeLayer(m);
          });
        }
        trackLayers = [];
        waypointMarkers = [];
        allTracks = [];
        statsGridEl.innerHTML = "";
        waypointsListEl.innerHTML = "";
        trackSelectorEl.innerHTML = "";
        trackSelectorEl.style.display = "none";
        elevationSectionEl.style.display = "none";
        waypointsSectionEl.style.display = "none";
        mapContainerEl.classList.remove("visible");
        dropZoneEl.style.display = "";
        fileInputEl.value = "";
        showStatus("已清除", "");
      });

      document.getElementById("btnDownload").addEventListener("click", function () {
        if (!allTracks || !allTracks.tracks) {
          showStatus("无数据可导出", "error");
          return;
        }
        var combined = allTracks.tracks.concat(allTracks.routes);
        var rows = [
          "轨迹名称,距离(km),爬升(m),下降(m),最低海拔(m),最高海拔(m),时长,平均速度(km/h),轨迹点数"
        ];
        combined.forEach(function (trk) {
          var stats = calcTrackStats(trk.segments);
          rows.push(
            [
              trk.name,
              stats.distKm,
              stats.eleGainM,
              stats.eleLossM,
              stats.minEleM !== null ? stats.minEleM : "",
              stats.maxEleM !== null ? stats.maxEleM : "",
              fmtDuration(stats.durationSec),
              stats.avgSpeedKmh !== null ? stats.avgSpeedKmh : "",
              stats.points
            ]
              .map(function (v) {
                return '"' + String(v).replace(/"/g, '""') + '"';
              })
              .join(",")
          );
        });
        var csv = "﻿" + rows.join("\r\n");
        var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "gpx-stats.csv";
        a.click();
        URL.revokeObjectURL(url);
        showStatus("CSV 已下载", "success");
      });

      // ── Theme ────────────────────────────────────────────────────────────
      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
