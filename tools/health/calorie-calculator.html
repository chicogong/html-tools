<style>
/* ============================================
         Design System - CSS Variables
         ============================================ */

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* Light Theme */

      /* ============================================
         Base Styles
         ============================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      /* Subtle background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      /* ============================================
         Navigation Bar
         ============================================ */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      /* Back Button */
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      /* Nav Title */
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Nav Actions */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      /* Theme Toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      /* ============================================
         Main Content
         ============================================ */
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      /* ============================================
         Card Styles
         ============================================ */
      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      /* ============================================
         Form Elements
         ============================================ */
      .input-group {
        margin-bottom: var(--space-4);
      }

      .input-group label {
        display: block;
        font-weight: 500;
        margin-bottom: var(--space-2);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      /* Radio Group */
      .radio-group {
        display: flex;
        gap: var(--space-3);
        flex-wrap: wrap;
      }

      .radio-btn {
        flex: 1;
        min-width: 100px;
        padding: var(--space-3) var(--space-4);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        cursor: pointer;
        text-align: center;
        font-size: 0.9375rem;
        font-weight: 500;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      .radio-btn:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
      }

      .radio-btn.active {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }

      /* Buttons */
      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      /* ============================================
         Result Display
         ============================================ */
      .result-hero {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        text-align: center;
        box-shadow: var(--shadow-md);
        margin-bottom: var(--space-5);
      }

      .result-hero .label {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: var(--space-2);
        font-weight: 500;
      }

      .result-hero .big {
        font-size: 2.5rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-accent-primary);
        letter-spacing: -0.02em;
      }

      .result-hero .unit {
        font-size: 1rem;
        color: var(--color-text-secondary);
        margin-left: var(--space-2);
      }

      .result-hero .sub {
        margin-top: var(--space-2);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
        font-family: var(--font-mono);
      }

      /* Goals Grid */
      .goals {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .goal {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 2px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        text-align: center;
        cursor: pointer;
        transition: all var(--transition-fast);
        box-shadow: var(--shadow-md);
      }

      .goal:hover {
        transform: translateY(-2px);
        border-color: var(--color-accent-primary);
      }

      .goal.active {
        border-color: var(--color-accent-primary);
        background: var(--glass-bg);
        box-shadow: var(--shadow-glow);
      }

      .goal .name {
        font-weight: 600;
        margin-bottom: var(--space-1);
        color: var(--color-text-primary);
      }

      .goal .calories {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-accent-primary);
        font-family: var(--font-mono);
        margin-bottom: var(--space-1);
      }

      .goal .desc {
        font-size: 0.8125rem;
        color: var(--text-muted);
      }

      /* Macro Chart */
      .macro-chart {
        display: flex;
        height: 24px;
        border-radius: var(--radius-md);
        overflow: hidden;
        margin: var(--space-4) 0;
        box-shadow: var(--shadow-sm);
      }

      .macro-segment {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: white;
        font-weight: 500;
        transition: flex var(--transition-fast);
      }

      .macro-legend {
        display: flex;
        justify-content: space-around;
        gap: var(--space-3);
        margin-top: var(--space-3);
      }

      .macro-item {
        text-align: center;
        flex: 1;
      }

      .macro-dot {
        width: 12px;
        height: 12px;
        border-radius: var(--radius-sm);
        display: inline-block;
        margin-right: var(--space-1);
      }

      .macro-value {
        font-size: 1rem;
        font-weight: 600;
        display: block;
        color: var(--color-text-primary);
        font-family: var(--font-mono);
      }

      .macro-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }

      /* Result Row */
      .result-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: var(--space-3) var(--space-4);
        background: var(--color-bg-input);
        border-radius: var(--radius-md);
        margin-bottom: var(--space-2);
        border: 1px solid var(--color-border-subtle);
      }

      .result-row .label {
        color: var(--color-text-secondary);
        font-weight: 500;
      }

      .result-row .value {
        font-weight: 600;
        color: var(--color-accent-primary);
        font-family: var(--font-mono);
      }

      /* Meal Plan */
      .meal-plan {
        margin-top: var(--space-4);
      }

      .meal {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: var(--space-3) var(--space-4);
        background: var(--color-bg-input);
        border-radius: var(--radius-md);
        margin-bottom: var(--space-2);
        border: 1px solid var(--color-border-subtle);
        transition: all var(--transition-fast);
      }

      .meal:hover {
        border-color: var(--color-accent-primary);
      }

      .meal-name {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        flex: 1;
      }

      .meal-icon {
        font-size: 1.25rem;
      }

      .meal-info {
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }

      .meal-title {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      .food-examples {
        font-size: 0.8125rem;
        color: var(--text-muted);
      }

      .meal-calories {
        font-weight: 600;
        color: var(--color-accent-primary);
        font-family: var(--font-mono);
      }

      /* Note */
      .note {
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        line-height: 1.6;
      }

      /* Grid Layout */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
      }

      /* ============================================
         Mobile Responsive
         ============================================ */
      @media (max-width: 768px) {
        :root {
          --nav-height: 52px;
        }

        .nav-content {
          padding: 0 var(--space-4);
        }

        .nav-back-text {
          display: none;
        }

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .goals {
          grid-template-columns: 1fr;
        }

        .result-hero .big {
          font-size: 2rem;
        }

        .card {
          padding: var(--space-4);
        }

        .radio-group {
          flex-direction: column;
        }

        .radio-btn {
          width: 100%;
        }
      }

      @media (max-width: 480px) {
        :root {
          --space-6: 16px;
        }

        .nav-title {
          font-size: 0.9375rem;
        }

        .result-hero {
          padding: var(--space-4);
        }

        .result-hero .big {
          font-size: 1.75rem;
        }

        .macro-legend {
          flex-wrap: wrap;
        }

        .macro-item {
          min-width: 80px;
        }
      }

      /* Desktop */
      @media (min-width: 1024px) {
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-8));
        }
      }

      /* ============================================
         Accessibility
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }

      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible),
      .radio-btn:focus:not(:focus-visible),
      .goal:focus:not(:focus-visible) {
        outline: none;
      }

      .radio-btn:focus-visible,
      .goal:focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }
</style>

<main class="main-content">
      <div class="container">
        <div class="grid">
          <!-- Input Card -->
          <div class="card">
            <h2 class="card-title">基本信息</h2>

            <div class="input-group">
              <label>性别</label>
              <div class="radio-group">
                <button class="radio-btn active" data-value="male" onclick="setGender('male')" aria-label="选择男性">
                  男性
                </button>
                <button class="radio-btn" data-value="female" onclick="setGender('female')" aria-label="选择女性">
                  女性
                </button>
              </div>
            </div>

            <div class="input-group">
              <label>年龄 (岁)</label>
              <input type="number" id="age" value="25" min="10" max="100" oninput="calculate()" aria-label="输入年龄">
            </div>

            <div class="input-group">
              <label>身高 (cm)</label>
              <input type="number" id="height" value="170" min="100" max="250" oninput="calculate()" aria-label="输入身高">
            </div>

            <div class="input-group">
              <label>体重 (kg)</label>
              <input type="number" id="weight" value="65" min="30" max="200" oninput="calculate()" aria-label="输入体重">
            </div>

            <div class="input-group">
              <label>活动水平</label>
              <select id="activity" onchange="calculate()" aria-label="选择活动水平">
                <option value="1.2">久坐（几乎不运动）</option>
                <option value="1.375">轻度活动（每周1-3天）</option>
                <option value="1.55" selected="">中度活动（每周3-5天）</option>
                <option value="1.725">高度活动（每周6-7天）</option>
                <option value="1.9">专业运动员</option>
              </select>
            </div>

            <div class="input-group">
              <label>体脂率 (%, 可选 - 更精确计算)</label>
              <input type="number" id="bodyFat" placeholder="留空使用标准公式" min="3" max="50" oninput="calculate()" aria-label="输入体脂率">
            </div>
          </div>

          <!-- Results Card -->
          <div>
            <!-- TDEE Display -->
            <div class="result-hero">
              <div class="label">每日总能量消耗</div>
              <div>
                <span class="big" id="tdee">0</span>
                <span class="unit">千卡</span>
              </div>
              <div class="sub" id="bmrNote">基础代谢率: 0 千卡</div>
            </div>

            <!-- Goals -->
            <div class="goals">
              <button class="goal" onclick="setGoal('lose')" aria-label="选择减脂目标" aria-pressed="false">
                <div class="name">减脂</div>
                <div class="calories" id="loseCalories">0</div>
                <div class="desc">每周减0.5kg</div>
              </button>
              <button class="goal active" onclick="setGoal('maintain')" aria-label="选择维持目标" aria-pressed="true">
                <div class="name">维持</div>
                <div class="calories" id="maintainCalories">0</div>
                <div class="desc">保持体重</div>
              </button>
              <button class="goal" onclick="setGoal('gain')" aria-label="选择增肌目标" aria-pressed="false">
                <div class="name">增肌</div>
                <div class="calories" id="gainCalories">0</div>
                <div class="desc">每周增0.25kg</div>
              </button>
            </div>

            <!-- Macro Chart -->
            <div class="card">
              <h3 class="card-title">宏量营养素配比</h3>
              <div class="macro-chart" id="macroChart"></div>
              <div class="macro-legend" id="macroLegend"></div>
            </div>

            <!-- Macro Recommendations -->
            <div class="card">
              <h3 class="card-title">每日摄入建议</h3>
              <div class="result-row">
                <span class="label">目标热量</span>
                <span class="value" id="targetCalories">0 千卡</span>
              </div>
              <div class="result-row">
                <span class="label">蛋白质</span>
                <span class="value" id="proteinGrams">0g</span>
              </div>
              <div class="result-row">
                <span class="label">碳水化合物</span>
                <span class="value" id="carbGrams">0g</span>
              </div>
              <div class="result-row">
                <span class="label">脂肪</span>
                <span class="value" id="fatGrams">0g</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Meal Plan -->
        <div class="card">
          <h2 class="card-title">建议餐食分配</h2>
          <div class="meal-plan" id="mealPlan"></div>
        </div>

        <!-- Note -->
        <div class="note">
          以上计算基于 Mifflin-St Jeor
          公式，仅供参考。实际需求可能因个体差异而不同。减脂时每周减重不宜超过体重的1%，增肌时需配合力量训练。
        </div>
      </div>
    </main>
