      :root {

        --font-mono: "JetBrains Mono", "Courier New", monospace;
      }
      * {

        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        padding: 2rem;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;

      h1 {
        text-align: center;

      }
      .card {
        background: var(--color-bg-card);
        padding: 1.5rem;
        border-radius: 10px;
        margin-bottom: 1rem;
      }
      button {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: 6px;
        background: var(--color-accent-cyan);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;

      .time {

  <body>
    <div class="tool-main" role="main">
      <div class="container">
        <h1>🍖 宠物喂食提醒</h1>
        <div class="card">
          <div class="time" id="lastFed">未喂食</div>
          <button onclick="markFed()">✅ 已喂食</button>
        </div>
        <div class="card">
          <div id="schedule"></div>
        </div>
      </div>
    </div>

    <script>
      const STORAGE = "pet_feeding_v1";
      function markFed() {
        const now = new Date();
        localStorage.setItem(STORAGE, now.toISOString());
        render();
      }
      function render() {
        const last = localStorage.getItem(STORAGE);
        if (last) {
          const date = new Date(last);
          document.getElementById("lastFed").textContent = date.toLocaleString("zh-CN");
        }
      }
      render();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
