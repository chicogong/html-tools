    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);

        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);

        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;

    <div class="tool-main" role="main">
      <main class="main-content">
        <div class="tool-card">

            </div>
          </div>

          <!-- 输入区 -->
          <div class="form-grid">
            <div class="form-group">
              <label for="petWeight">宠物体重</label>
              <input
                type="number"

                placeholder="例如：5"
                min="0.1"
                max="200"
                step="0.1"
              />
            </div>
            <div class="form-group">
              <label for="weightUnit">体重单位</label>
              <select id="weightUnit">
                <option value="kg">千克（kg）</option>
                <option value="lb">磅（lb）</option>
              </select>
            </div>
            <div class="form-group">
              <label for="petType">宠物类型</label>
              <select id="petType">
                <option value="dog">狗（犬）</option>
                <option value="cat">猫（猫科）</option>
              </select>
            </div>
            <div class="form-group">
              <label for="customDoseMin">自定义剂量范围 mg/kg（可选）</label>
              <div class="custom-dose-row">
                <input type="number" id="customDoseMin" placeholder="最小值" min="0" step="0.01" />
                <input type="number" id="customDoseMax" placeholder="最大值" min="0" step="0.01" />
              </div>
            </div>
          </div>

          <!-- 药物预设 -->
          <div class="drug-presets">
            <span class="drug-presets-label">常用药物快速选择</span>
            <div class="drug-preset-list" id="drugPresetList"></div>
          </div>

          <!-- 操作按钮 -->
          <div class="toolbar">
            <div class="btn-group">
              <button id="btnCalculate" class="btn btn-primary">计算剂量</button>
              <button id="btnReset" class="btn">重置</button>
            </div>
          </div>

          <!-- 结果区 -->
          <div id="resultSection" class="result-section hidden">
            <div class="result-card highlight">
              <div class="result-card-title">推荐剂量</div>
              <div class="result-dose-row">
                <span class="result-dose-value" id="doseMid">--</span>
                <span class="result-dose-unit">mg</span>
                <span class="result-dose-range" id="doseRange"></span>
              </div>
              <div class="result-grid">
                <div class="result-item">
                  <span class="result-item-label">体重（换算后）</span>
                  <span class="result-item-value" id="weightKg">--</span>
                </div>
                <div class="result-item">
                  <span class="result-item-label">剂量范围（mg/kg）</span>
                  <span class="result-item-value" id="dosePerKg">--</span>
                </div>
                <div class="result-item">
                  <span class="result-item-label">给药频率参考</span>
                  <span class="result-item-value" id="doseFreq">--</span>
                </div>
                <div class="result-item">
                  <span class="result-item-label">药物分类</span>
                  <span class="result-item-value" id="drugCategory">--</span>
                </div>
              </div>
            </div>

            <div id="drugInfoBox" class="drug-info-box hidden">
              <div class="drug-info-title" id="drugInfoTitle"></div>
              <div class="drug-info-text" id="drugInfoText"></div>
            </div>

            <div class="warning-box">
              <span class="warning-box-icon">⚠️</span>
              <span class="warning-box-text">
                以上数据仅供参考，
                <strong>不能替代兽医诊断和处方</strong>
                。用药前请务必咨询执照兽医，不同品牌药品浓度和适应症可能有差异，请严格按照药品说明书使用。
              </span>
            </div>
          </div>

          <div class="status-bar">
            <div id="status" class="status"></div>
          </div>
        </div>
        <footer class="footer">
          <p>
            <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
              GitHub
            </a>
            <span>·</span>
            <span>纯前端 · 无服务器</span>
            <span>·</span>
            <a href="../../index.html">WebUtils</a>
          </p>
        </footer>
      </main>
    </div>

        ]
      };

      var selectedDrug = null;

      function buildPresets() {
        var petType = document.getElementById("petType").value;
        var list = document.getElementById("drugPresetList");
        list.innerHTML = "";
        selectedDrug = null;
        var drugs = DRUG_DB[petType] || [];
        drugs.forEach(function (drug) {
          var btn = document.createElement("button");
          btn.className = "drug-preset-btn";
          btn.textContent = drug.name;
          btn.dataset.id = drug.id;
          btn.addEventListener("click", function () {
            document.querySelectorAll(".drug-preset-btn").forEach(function (b) {
              b.classList.remove("active");
            });
            btn.classList.add("active");
            selectedDrug = drug;
            document.getElementById("customDoseMin").value = "";
            document.getElementById("customDoseMax").value = "";
            showStatus("已选择：" + drug.name, "");
          });
          list.appendChild(btn);
        });
      }

      function getWeightKg() {
        var raw = parseFloat(document.getElementById("petWeight").value);
        var unit = document.getElementById("weightUnit").value;
        if (isNaN(raw) || raw <= 0) return null;
        return unit === "lb" ? raw * 0.453592 : raw;
      }

      function calculate() {
        var weightKg = getWeightKg();
        if (!weightKg) {
          showStatus("请输入有效的宠物体重", "error");
          return;
        }

        var customMinVal = parseFloat(document.getElementById("customDoseMin").value);
        var customMaxVal = parseFloat(document.getElementById("customDoseMax").value);
        var hasCustom = !isNaN(customMinVal) && customMinVal > 0;

        var doseMin, doseMax, drugName, freq, info, category;

        if (hasCustom) {
          doseMin = customMinVal;
          doseMax =
            !isNaN(customMaxVal) && customMaxVal >= customMinVal ? customMaxVal : customMinVal;
          drugName = "自定义剂量";
          freq = "请遵医嘱";
          info = null;
          category = "自定义";
          selectedDrug = null;
          document.querySelectorAll(".drug-preset-btn").forEach(function (b) {
            b.classList.remove("active");
          });
        } else if (selectedDrug) {
          doseMin = selectedDrug.doseMin;
          doseMax = selectedDrug.doseMax;
          drugName = selectedDrug.name;
          freq = selectedDrug.freq;
          info = selectedDrug.info;
          category = selectedDrug.category;
        } else {
          showStatus("请选择药物预设或输入自定义剂量范围", "error");
          return;
        }

        var totalMin = doseMin * weightKg;
        var totalMax = doseMax * weightKg;
        var totalMid = (totalMin + totalMax) / 2;

        document.getElementById("doseMid").textContent = totalMid.toFixed(2);
        if (doseMin === doseMax) {
          document.getElementById("doseRange").textContent = "（" + totalMin.toFixed(2) + " mg）";
        } else {
          document.getElementById("doseRange").textContent =
            "范围：" + totalMin.toFixed(2) + " – " + totalMax.toFixed(2) + " mg";
        }

        var unitLabel = document.getElementById("weightUnit").value === "lb" ? "lb" : "kg";
        var rawWeight = parseFloat(document.getElementById("petWeight").value);
        document.getElementById("weightKg").textContent =
          rawWeight + " " + unitLabel + " = " + weightKg.toFixed(2) + " kg";
        document.getElementById("dosePerKg").textContent =
          doseMin === doseMax ? doseMin + " mg/kg" : doseMin + " – " + doseMax + " mg/kg";
        document.getElementById("doseFreq").textContent = freq;
        document.getElementById("drugCategory").textContent = category;

        var infoBox = document.getElementById("drugInfoBox");
        if (info) {
          document.getElementById("drugInfoTitle").textContent = drugName + " — 简介";
          document.getElementById("drugInfoText").textContent = info;
          infoBox.classList.remove("hidden");
        } else {
          infoBox.classList.add("hidden");
        }

        document.getElementById("resultSection").classList.remove("hidden");
        showStatus("计算完成：" + drugName, "success");
      }

      function showStatus(msg, type) {
        var el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      function reset() {
        document.getElementById("petWeight").value = "";
        document.getElementById("customDoseMin").value = "";
        document.getElementById("customDoseMax").value = "";
        document.getElementById("weightUnit").value = "kg";
        document.getElementById("petType").value = "dog";
        selectedDrug = null;
        buildPresets();
        document.getElementById("resultSection").classList.add("hidden");
        showStatus("", "");
      }

      document.getElementById("btnCalculate").addEventListener("click", calculate);
      document.getElementById("btnReset").addEventListener("click", reset);
      document.getElementById("petType").addEventListener("change", function () {
        buildPresets();
        document.getElementById("resultSection").classList.add("hidden");
        showStatus("", "");
      });

      // 初始化预设列表
      buildPresets();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
