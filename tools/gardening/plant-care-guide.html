<style>

    --color-bg-deep: #0a0a0f;
    --color-bg-card: #1a1a24;

    --font-sans: "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;

    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

      <br />
      温度：5-35°C

  </div>
  <div class="plant">
    <div class="plant-name">🌺 多肉</div>
    <div class="plant-info">
      浇水：每周1次
      <br />
      光照：明亮散射光
      <br />
      温度：10-30°C
