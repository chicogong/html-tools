    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {

    <script>
      /* ───────────── PO file parser / serializer ───────────── */

      function parsePo(text) {
        var lines = text.split(/\r?\n/);
        var entries = [];
        var current = null;
        var currentKey = null;
        var i = 0;

        function flush() {
          if (current) entries.push(current);
          current = null;
          currentKey = null;
        }

        function newEntry() {
          flush();
          current = {
            comments: [],
            flags: [],
            msgid: "",
            msgidPlural: null,
            msgstr: "",
            msgstrPlural: []
          };
        }

        while (i < lines.length) {
          var line = lines[i];
          var trimmed = line.trim();

          if (trimmed === "") {
            flush();
            i++;
            continue;
          }

          if (/^#\s/.test(line) || line === "#") {
            if (!current) newEntry();
            current.comments.push(line);
            currentKey = null;
            i++;
            continue;
          }
          if (/^#[.:,|~]/.test(line)) {
            if (!current) newEntry();
            current.comments.push(line);
            if (/^#,/.test(line)) {
              var flagStr = line.slice(2).trim();
              current.flags = flagStr.split(/\s*,\s*/).map(function (f) {
                return f.trim();
              });
            }
            currentKey = null;
            i++;
            continue;
          }

          var msgidMatch = line.match(/^msgid\s+"(.*)"$/);
          if (msgidMatch) {
            if (!current) newEntry();
            current.msgid = unescapePo(msgidMatch[1]);
            currentKey = "msgid";
            i++;
            continue;
          }
          var msgidPluralMatch = line.match(/^msgid_plural\s+"(.*)"$/);
          if (msgidPluralMatch) {
            if (!current) newEntry();
            current.msgidPlural = unescapePo(msgidPluralMatch[1]);
            currentKey = "msgidPlural";
            i++;
            continue;
          }
          var msgstrMatch = line.match(/^msgstr\s+"(.*)"$/);
          if (msgstrMatch) {
            if (!current) newEntry();
            current.msgstr = unescapePo(msgstrMatch[1]);
            currentKey = "msgstr";
            i++;
            continue;
          }
          var msgstrPluralMatch = line.match(/^msgstr\[(\d+)\]\s+"(.*)"$/);
          if (msgstrPluralMatch) {
            if (!current) newEntry();
            var pidx = parseInt(msgstrPluralMatch[1], 10);
            current.msgstrPlural[pidx] = unescapePo(msgstrPluralMatch[2]);
            currentKey = "msgstrPlural:" + pidx;
            i++;
            continue;
          }
          var contMatch = line.match(/^"(.*)"$/);
          if (contMatch && current && currentKey) {
            var cont = unescapePo(contMatch[1]);
            if (currentKey === "msgid") {
              current.msgid += cont;
            } else if (currentKey === "msgidPlural") {
              current.msgidPlural += cont;
            } else if (currentKey === "msgstr") {
              current.msgstr += cont;
            } else if (currentKey && currentKey.indexOf("msgstrPlural:") === 0) {
              var pIdx = parseInt(currentKey.split(":")[1], 10);
              current.msgstrPlural[pIdx] = (current.msgstrPlural[pIdx] || "") + cont;
            }
            i++;
            continue;
          }

          i++;
        }
        flush();
        return entries;
      }

      function unescapePo(s) {
        return s
          .replace(/\\n/g, "\n")
          .replace(/\\t/g, "\t")
          .replace(/\\r/g, "\r")
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, "\\");
      }

      function escapePo(s) {
        return s
          .replace(/\\/g, "\\\\")
          .replace(/"/g, '\\"')
          .replace(/\r/g, "\\r")
          .replace(/\n/g, "\\n")
          .replace(/\t/g, "\\t");
      }

      function serializePoString(label, value) {
        var escaped = escapePo(value);
        if (value.indexOf("\n") !== -1) {
          var parts = escaped.split("\\n");
          var out = label + ' ""\n';
          for (var k = 0; k < parts.length; k++) {
            var seg = parts[k] + (k < parts.length - 1 ? "\\n" : "");
            if (seg !== "" || k < parts.length - 1) {
              out += '"' + seg + '"\n';
            }
          }
          return out;
        }
        return label + ' "' + escaped + '"\n';
      }

      function serializeEntry(entry) {
        var out = "";
        if (entry.comments && entry.comments.length) {
          out += entry.comments.join("\n") + "\n";
        }
        out += serializePoString("msgid", entry.msgid);
        if (entry.msgidPlural !== null && entry.msgidPlural !== undefined) {
          out += serializePoString("msgid_plural", entry.msgidPlural);
          for (var j = 0; j < entry.msgstrPlural.length; j++) {
            out += serializePoString("msgstr[" + j + "]", entry.msgstrPlural[j] || "");
          }
        } else {
          out += serializePoString("msgstr", entry.msgstr);
        }
        return out;
      }

      function serializePo(entries) {
        return entries.map(serializeEntry).join("\n");
      }

      /* ───────────── App state ───────────── */
      var allEntries = [];
      var fileName = "translated.po";
      var filterMode = "all";
      var searchQ = "";
      var unsaved = false;

      /* ───────────── DOM refs ───────────── */
      var dropZone = document.getElementById("dropZone");
      var fileInput = document.getElementById("fileInput");
      var editorToolbar = document.getElementById("editorToolbar");
      var statsBar = document.getElementById("statsBar");
      var tableWrap = document.getElementById("tableWrap");
      var poTbody = document.getElementById("poTbody");
      var emptyState = document.getElementById("emptyState");
      var statusEl = document.getElementById("statusEl");
      var statTotal = document.getElementById("statTotal");
      var statDone = document.getElementById("statDone");
      var statLeft = document.getElementById("statLeft");
      var statPct = document.getElementById("statPct");

      /* ───────────── File loading ───────────── */
      dropZone.onclick = function () {
        fileInput.click();
      };
      dropZone.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("drag-over");
      });
      dropZone.addEventListener("drop", function (e) {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        var files = e.dataTransfer.files;
        if (files.length) loadFile(files[0]);
      });
      fileInput.addEventListener("change", function () {
        if (fileInput.files.length) loadFile(fileInput.files[0]);
      });

      function loadFile(file) {
        if (!file.name.match(/\.(po|pot)$/i)) {
          showStatus("请选择 .po 或 .pot 文件", "error");
          return;
        }
        fileName = file.name.replace(/\.pot$/i, ".po");
        var reader = new FileReader();
        reader.onload = function (ev) {
          try {
            allEntries = parsePo(ev.target.result);
            showEditor();
            renderTable();
            showStatus("已加载 " + file.name, "success");
          } catch (err) {
            showStatus("解析失败: " + err.message, "error");
          }
        };
        reader.readAsText(file, "utf-8");
      }

      function showEditor() {
        dropZone.style.display = "none";
        editorToolbar.style.display = "";
        statsBar.style.display = "";
        tableWrap.style.display = "";
      }

      /* ───────────── Table rendering ───────────── */
      function isTranslated(entry) {
        if (entry.msgid === "") return true;
        if (entry.msgidPlural !== null && entry.msgidPlural !== undefined) {
          return entry.msgstrPlural.some(function (s) {
            return s && s.trim() !== "";
          });
        }
        return entry.msgstr.trim() !== "";
      }

      function getVisibleEntries() {
        var q = searchQ.toLowerCase();
        return allEntries.filter(function (entry) {
          if (entry.msgid === "") return false;
          var done = isTranslated(entry);
          if (filterMode === "untranslated" && done) return false;
          if (filterMode === "translated" && !done) return false;
          if (q) {
            var inId = entry.msgid.toLowerCase().indexOf(q) !== -1;
            var inStr = entry.msgstr.toLowerCase().indexOf(q) !== -1;
            var inPlural = entry.msgstrPlural.some(function (s) {
              return s && s.toLowerCase().indexOf(q) !== -1;
            });
            if (!inId && !inStr && !inPlural) return false;
          }
          return true;
        });
      }

      function updateStats() {
        var nonHeader = allEntries.filter(function (e) {
          return e.msgid !== "";
        });
        var total = nonHeader.length;
        var done = nonHeader.filter(isTranslated).length;
        var left = total - done;
        var pct = total ? Math.round((done / total) * 100) : 0;
        statTotal.textContent = total;
        statDone.textContent = done;
        statLeft.textContent = left;
        statPct.textContent = pct + "%";
      }

      function buildMsgstrInputSingular(entry, tr, dot) {
        var ta = document.createElement("textarea");
        ta.className = "po-msgstr-input" + (entry.msgstr.trim() !== "" ? " filled" : "");
        ta.value = entry.msgstr;
        ta.rows = 3;
        ta.spellcheck = true;
        ta.placeholder = "输入译文…";
        ta.addEventListener("input", function () {
          entry.msgstr = ta.value;
          var filled = ta.value.trim() !== "";
          ta.classList.toggle("filled", filled);
          dot.classList.toggle("done", filled);
          tr.classList.toggle("untranslated", !filled);
          updateStats();
          setUnsaved();
        });
        return ta;
      }

      function buildMsgstrPluralInput(entry, pi) {
        var ta = document.createElement("textarea");
        var val = entry.msgstrPlural[pi] || "";
        ta.className = "po-msgstr-input" + (val.trim() !== "" ? " filled" : "");
        ta.value = val;
        ta.rows = 2;
        ta.spellcheck = true;
        ta.placeholder = "plural[" + pi + "]…";
        (function (index) {
          ta.addEventListener("input", function () {
            entry.msgstrPlural[index] = ta.value;
            ta.classList.toggle("filled", ta.value.trim() !== "");
            updateStats();
            setUnsaved();
          });
        })(pi);
        return ta;
      }

      function renderTable() {
        updateStats();
        var visible = getVisibleEntries();
        poTbody.innerHTML = "";

        if (visible.length === 0) {
          emptyState.style.display = "";
          return;
        }
        emptyState.style.display = "none";

        visible.forEach(function (entry, idx) {
          var done = isTranslated(entry);
          var tr = document.createElement("tr");
          if (!done) tr.classList.add("untranslated");

          var tdNum = document.createElement("td");
          tdNum.className = "col-num";
          tdNum.textContent = idx + 1;
          tr.appendChild(tdNum);

          var tdStatus = document.createElement("td");
          tdStatus.className = "col-status";
          var dot = document.createElement("span");
          dot.className = "status-dot" + (done ? " done" : "");
          dot.title = done ? "已翻译" : "未翻译";
          tdStatus.appendChild(dot);
          tr.appendChild(tdStatus);

          var tdId = document.createElement("td");
          tdId.className = "col-msgid";
          var idDiv = document.createElement("div");
          idDiv.className = "po-msgid-text";
          idDiv.textContent = entry.msgid;
          tdId.appendChild(idDiv);
          tr.appendChild(tdId);

          var tdStr = document.createElement("td");
          tdStr.className = "col-msgstr";

          if (entry.msgidPlural !== null && entry.msgidPlural !== undefined) {
            var numForms = Math.max(2, entry.msgstrPlural.length);
            for (var pi = 0; pi < numForms; pi++) {
              tdStr.appendChild(buildMsgstrPluralInput(entry, pi));
            }
          } else {
            tdStr.appendChild(buildMsgstrInputSingular(entry, tr, dot));
          }
          tr.appendChild(tdStr);

          var tdCmt = document.createElement("td");
          tdCmt.className = "col-comment";
          var cmt = document.createElement("div");
          cmt.className = "po-comment-text";
          var commentLines = (entry.comments || []).filter(function (c) {
            return /^#\s/.test(c) || c === "#";
          });
          cmt.textContent = commentLines
            .map(function (c) {
              return c.replace(/^#\s?/, "");
            })
            .join("\n");
          tdCmt.appendChild(cmt);
          tr.appendChild(tdCmt);

          poTbody.appendChild(tr);
        });
      }

      function setUnsaved() {
        if (!unsaved) {
          unsaved = true;
          showStatus("有未保存的修改", "");
        }
      }

      /* ───────────── Filters ───────────── */
      document.getElementById("btnShowAll").onclick = function () {
        filterMode = "all";
        updateFilterButtons();
        renderTable();
      };
      document.getElementById("btnShowUntranslated").onclick = function () {
        filterMode = "untranslated";
        updateFilterButtons();
        renderTable();
      };
      document.getElementById("btnShowTranslated").onclick = function () {
        filterMode = "translated";
        updateFilterButtons();
        renderTable();
      };

      function updateFilterButtons() {
        document.getElementById("btnShowAll").classList.toggle("btn-primary", filterMode === "all");
        document
          .getElementById("btnShowUntranslated")
          .classList.toggle("btn-primary", filterMode === "untranslated");
        document
          .getElementById("btnShowTranslated")
          .classList.toggle("btn-primary", filterMode === "translated");
      }

      var searchTimer = null;
      document.getElementById("searchInput").addEventListener("input", function () {
        clearTimeout(searchTimer);
        var val = this.value;
        searchTimer = setTimeout(function () {
          searchQ = val.trim();
          renderTable();
        }, 200);
      });

      /* ───────────── Download ───────────── */
      document.getElementById("btnDownload").onclick = function () {
        var content = serializePo(allEntries);
        var blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        unsaved = false;
        showStatus("已下载 " + fileName, "success");
      };

      /* ───────────── Reset ───────────── */
      document.getElementById("btnReset").onclick = function () {
        allEntries = [];
        filterMode = "all";
        searchQ = "";
        unsaved = false;
        document.getElementById("searchInput").value = "";
        updateFilterButtons();
        dropZone.style.display = "";
        editorToolbar.style.display = "none";
        statsBar.style.display = "none";
        tableWrap.style.display = "none";
        fileInput.value = "";
        showStatus("", "");
      };

      /* ───────────── Status helper ───────────── */
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      /* ───────────── Theme ───────────── */
      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
