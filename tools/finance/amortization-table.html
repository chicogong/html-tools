    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

  :root {
    --bg-deep: #0a0a0f;
    --bg-surface: #12121a;
    --bg-card: #1a1a24;
    --bg-input: #0e0e14;
    --text-primary: #e8e8ed;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --border-subtle: #2a2a3a;
    --border-strong: #3a3a4a;
    --accent-cyan: #00f5d4;
    --accent-magenta: #f72585;
    --accent-green: #10b981;
    --accent-red: #f43f5e;
    --accent-yellow: #fbbf24;
    --accent-blue: #4cc9f0;
    --accent-purple: #7b2cbf;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
    --font-mono: "JetBrains Mono", "Courier New", monospace;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  [data-theme="light"] {
    --bg-deep: #fafafa;
    --bg-surface: #fff;
    --bg-card: #fff;
    --bg-input: #f5f5f5;
    --text-primary: #1a1a1a;
    --text-secondary: #666;
    --text-muted: #999;
    --border-subtle: #e5e5e5;
    --border-strong: #d5d5d5;
    --accent-cyan: #00d4b8;
    --accent-magenta: #e63975;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  }

  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    font-family: var(--font-sans);
    background: var(--color-bg-deep);
    color: var(--color-text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    line-height: 1.5;
    transition:
      background-color var(--transition-normal),
      color var(--transition-normal);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
  }
  [data-theme="light"] body::before {
    background:
      radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
  }
  .nav-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    height: calc(var(--nav-height) + var(--safe-area-top));
    padding-top: var(--safe-area-top);
    background: var(--glass-bg);
    backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
    -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition-normal);
  }
  .nav-content {
    width: 100%;
    max-width: var(--container-max);
    height: var(--nav-height);
    padding: 0 var(--space-6);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: var(--space-4);
  }
  .nav-back {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    color: var(--color-accent-primary);
    text-decoration: none;
    font-size: 0.9375rem;
    font-weight: 500;
    padding: var(--space-2) var(--space-1);
    margin-left: calc(var(--space-2) * -1);
    border-radius: var(--radius-sm);
    transition: all var(--transition-fast);
    justify-self: start;
  }
  .nav-back:hover {
    background: var(--color-border-subtle);
  }
  .nav-back-icon {
    width: 20px;
    height: 20px;
    stroke-width: 2.5;
  }
  .nav-back-text {
    display: inline;
  }
  .nav-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-text-primary);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-actions {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    justify-self: end;
  }
  .theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: var(--radius-full);
    background: var(--color-bg-subtle);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .theme-toggle:hover {
    background: var(--color-border-strong);
    color: var(--color-text-primary);
    transform: scale(1.05);
  }
  .theme-toggle svg {
    width: 18px;
    height: 18px;
  }
  .theme-icon-dark,
  .theme-icon-light {
    display: none;
  }
  [data-theme="dark"] .theme-icon-light,
  :root:not([data-theme]) .theme-icon-light {
    display: block;
  }
  [data-theme="light"] .theme-icon-dark {
    display: block;
  }
  .main-content {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
    padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
    padding-left: var(--space-6);
    padding-right: var(--space-6);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .tool-card {
    width: 100%;
    max-width: var(--container-max);
    background: var(--glass-bg);
    backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
    -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    box-shadow: var(--shadow-lg);
    flex: 1;
    display: flex;
    flex-direction: column;
    transition: all var(--transition-normal);
    animation: fade-in-up 0.4s ease-out;
  }
  @keyframes fade-in-up {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .tool-header {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
    padding-bottom: var(--space-5);
    border-bottom: 1px solid var(--color-border-subtle);
  }
  .tool-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-tertiary));
    border-radius: var(--radius-md);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-bg-deep);
    box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
    font-family: var(--font-mono);
  }
  .tool-info h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-text-primary);
  }
  .tool-info .desc {
    font-size: 0.875rem;
    color: var(--text-muted);
    margin-top: var(--space-1);
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    margin-bottom: var(--space-5);
  }
  .btn-group {
    display: flex;
    gap: 2px;
    background: var(--color-bg-subtle);
    border-radius: var(--radius-sm);
    padding: 2px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    height: 36px;
    padding: 0 var(--space-4);
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--color-text-secondary);
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
  }
  .btn:hover {
    background: var(--color-bg-surface);
    color: var(--color-text-primary);
  }
  .btn-primary {
    background: var(--color-accent-primary);
    color: var(--color-bg-deep);
  }
  .btn-primary:hover {
    background: #00b894;
    box-shadow: var(--shadow-glow);
  }
  .options-bar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-5);
    align-items: center;
    margin-bottom: var(--space-5);
    font-size: 0.875rem;
  }
  .option-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    color: var(--color-text-secondary);
  }
  .option-item select {
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    padding: var(--space-2) var(--space-3);
    background: var(--color-bg-subtle);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-sm);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .option-item select:focus {
    outline: none;
    border-color: var(--color-accent-primary);
  }
  .option-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--color-accent-primary);
    cursor: pointer;
  }
  .option-item label {
    cursor: pointer;
  }
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-5);
    flex: 1;
    min-height: 400px;
  }
  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-3);
  }
  .panel-label {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .panel-textarea {
    flex: 1;
    width: 100%;
    min-height: 350px;
    padding: var(--space-4);
    font-family: var(--font-mono);
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--color-text-primary);
    background: var(--color-bg-input);
    border: 2px solid var(--color-border-default);
    border-radius: var(--radius-md);
    resize: vertical;
    tab-size: 2;
    transition: all var(--transition-fast);
  }
  .panel-textarea::placeholder {
    color: var(--text-muted);
  }
  .panel-textarea:hover {
    border-color: var(--color-border-strong);
  }
  .panel-textarea:focus {
    outline: none;
    border-color: var(--color-accent-primary);
    box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
  }
  .panel-textarea.error {
    border-color: var(--color-error);
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
  }
  .panel-textarea[readonly] {
    background: var(--color-bg-subtle);
  }
  .error-detail {
    display: none;
    margin-top: var(--space-4);
    padding: var(--space-4);
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--color-error);
    border-radius: var(--radius-md);
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    color: var(--color-error);
  }
  .error-detail.show {
    display: block;
  }
  .error-detail p {
    margin-bottom: var(--space-2);
  }
  .error-detail p:last-child {
    margin-bottom: 0;
  }
  .error-detail code {
    background: rgba(239, 68, 68, 0.15);
    padding: 2px var(--space-2);
    border-radius: var(--radius-sm);
  }
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: var(--space-4);
    margin-top: var(--space-5);
    padding-top: var(--space-5);
    border-top: 1px solid var(--color-border-subtle);
  }
  .status {
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .status.success {
    color: var(--color-success);
  }
  .status.success::before {
    content: "✓";
  }
  .status.error {

<script>
  var amortRows = [];

  function fmt(n) {
    return n.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function showStatus(msg, type) {
    var el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + (type || "");
  }

  function getInputs() {
    var amount = parseFloat(document.getElementById("loanAmount").value);
    var rate = parseFloat(document.getElementById("annualRate").value);
    var term = parseInt(document.getElementById("termMonths").value, 10);

    document.getElementById("loanAmount").classList.remove("input-error");
    document.getElementById("annualRate").classList.remove("input-error");
    document.getElementById("termMonths").classList.remove("input-error");

    if (!amount || amount <= 0) {
      document.getElementById("loanAmount").classList.add("input-error");
      showStatus("请输入有效的贷款金额", "error");
      return null;
    }
    if (!rate || rate <= 0 || rate > 100) {
      document.getElementById("annualRate").classList.add("input-error");
      showStatus("请输入有效的年利率（0.01 ~ 100）", "error");
      return null;
    }
    if (!term || term < 1 || term > 600) {
      document.getElementById("termMonths").classList.add("input-error");
      showStatus("还款期数须在 1 ~ 600 之间", "error");
      return null;
    }
    return { amount: amount, rate: rate, term: term };
  }

  function calcMonthlyPayment(principal, monthlyRate, term) {
    if (monthlyRate === 0) return principal / term;
    var factor = Math.pow(1 + monthlyRate, term);
    return (principal * monthlyRate * factor) / (factor - 1);
  }

  function buildRows(params, extraPayment, extraStart) {
    var monthlyRate = params.rate / 100 / 12;
    var basePayment = calcMonthlyPayment(params.amount, monthlyRate, params.term);
    var startDateVal = document.getElementById("startDate").value;

    var rows = [];
    var balance = params.amount;
    var period = 0;

    while (balance > 0.005 && period < params.term) {
      period++;
      var interest = balance * monthlyRate;
      var principal = Math.min(basePayment - interest, balance);
      var extra = period >= extraStart ? Math.min(extraPayment, balance - principal) : 0;
      if (extra < 0) extra = 0;

      balance = balance - principal - extra;
      if (balance < 0.005) balance = 0;

      var dateLabel = "";
      if (startDateVal) {
        var d = new Date(startDateVal + "-01");
        d.setMonth(d.getMonth() + period - 1);
        dateLabel = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
      }

      rows.push({
        period: period,
        date: dateLabel,
        payment: principal + interest + extra,
        principal: principal,
        interest: interest,
        extra: extra,
        balance: balance
      });
    }
    return { rows: rows, basePayment: basePayment };
  }

  function sumRows(rows) {
    var totalInterest = 0;
    rows.forEach(function (r) {
      totalInterest += r.interest;
    });
    return { totalInterest: totalInterest };
  }

  function renderSummary(params, rows, basePayment) {
    var totals = sumRows(rows);
    var extraPayment = Math.max(0, parseFloat(document.getElementById("extraPayment").value) || 0);
    var saved = 0;
    if (extraPayment > 0) {
      var baseResult = buildRows(params, 0, 1);
      var baseTotals = sumRows(baseResult.rows);
      saved = baseTotals.totalInterest - totals.totalInterest;
    }

    var cards = [
      { label: "标准月供", value: fmt(basePayment), cls: "" },
      {
        label: "总还款额",
        value: fmt(params.amount + totals.totalInterest),
        cls: ""
      },
      {
        label: "总利息",
        value: fmt(totals.totalInterest),
        cls: totals.totalInterest > params.amount ? "value-danger" : "value-warn"
      },
      { label: "实际期数", value: rows.length + " 期", cls: "" },
      {
        label: "利息/本金比",
        value: ((totals.totalInterest / params.amount) * 100).toFixed(1) + "%",
        cls: ""
      }
    ];
    if (saved > 0.01) {
      cards.push({ label: "额外还款省利息", value: fmt(saved), cls: "" });
    }

    var wrap = document.getElementById("summaryCards");
    wrap.innerHTML = "";
    cards.forEach(function (c) {
      var div = document.createElement("div");
      div.className = "summary-card";
      var lbl = document.createElement("div");
      lbl.className = "summary-card-label";
      lbl.textContent = c.label;
      var val = document.createElement("div");
      val.className = "summary-card-value" + (c.cls ? " " + c.cls : "");
      val.textContent = c.value;
      div.appendChild(lbl);
      div.appendChild(val);
      wrap.appendChild(div);
    });
    wrap.style.display = "";
  }

  function renderTable(rows) {
    var hasDate = rows.length > 0 && rows[0].date !== "";
    var hasExtra = rows.some(function (r) {
      return r.extra > 0.005;
    });

    var thead = document.getElementById("tableHead");
    var tbody = document.getElementById("tableBody");
    var tfoot = document.getElementById("tableFoot");

    var headRow = document.createElement("tr");
    var cols = ["期数"];
    if (hasDate) cols.push("日期");
    cols.push("月供(元)", "本金(元)", "利息(元)");
    if (hasExtra) cols.push("额外还款(元)");
    cols.push("剩余余额(元)");

    cols.forEach(function (c, i) {
      var th = document.createElement("th");
      th.textContent = c;
      if (i === 0) th.style.textAlign = "center";
      headRow.appendChild(th);
    });
    thead.innerHTML = "";
    thead.appendChild(headRow);

    tbody.innerHTML = "";
    var totPay = 0;
    var totPrin = 0;
    var totInt = 0;
    var totExtra = 0;

    rows.forEach(function (r) {
      var tr = document.createElement("tr");
      var cells = [{ text: r.period, cls: "" }];
      if (hasDate) cells.push({ text: r.date, cls: "" });
      cells.push(
        { text: fmt(r.payment), cls: "" },
        { text: fmt(r.principal), cls: "col-principal" },
        { text: fmt(r.interest), cls: "col-interest" }
      );
      if (hasExtra) cells.push({ text: fmt(r.extra), cls: "col-extra" });
      cells.push({ text: fmt(r.balance), cls: "" });

      cells.forEach(function (c, i) {
        var td = document.createElement("td");
        td.textContent = c.text;
        if (c.cls) td.className = c.cls;
        if (i === 0) td.style.textAlign = "center";
        tr.appendChild(td);
      });
      tbody.appendChild(tr);

      totPay += r.payment;
      totPrin += r.principal;
      totInt += r.interest;
      totExtra += r.extra;
    });

    tfoot.innerHTML = "";
    var footRow = document.createElement("tr");
    var footCells = [{ text: "合计", cls: "" }];
    if (hasDate) footCells.push({ text: "" });
    footCells.push(
      { text: fmt(totPay), cls: "" },
      { text: fmt(totPrin), cls: "col-principal" },
      { text: fmt(totInt), cls: "col-interest" }
    );
    if (hasExtra) footCells.push({ text: fmt(totExtra), cls: "col-extra" });
    footCells.push({ text: "0.00", cls: "" });

    footCells.forEach(function (c, i) {
      var td = document.createElement("td");
      td.textContent = c.text;
      if (c.cls) td.className = c.cls;
      if (i === 0) td.style.textAlign = "center";
      footRow.appendChild(td);
    });
    tfoot.appendChild(footRow);
  }

  function calculate() {
    var params = getInputs();
    if (!params) return;

    var extraPayment = Math.max(0, parseFloat(document.getElementById("extraPayment").value) || 0);
    var extraStart = Math.max(1, parseInt(document.getElementById("extraStart").value, 10) || 1);

    var result = buildRows(params, extraPayment, extraStart);
    amortRows = result.rows;

    renderSummary(params, amortRows, result.basePayment);
    renderTable(amortRows);

    document.getElementById("tableWrap").style.display = "";
    document.getElementById("emptyState").style.display = "none";

    var statsEl = document.getElementById("stats");
    var totals = sumRows(amortRows);
    document.getElementById("statMonthly").textContent = fmt(result.basePayment);
    document.getElementById("statTotalInterest").textContent = fmt(totals.totalInterest);
    document.getElementById("statActualTerm").textContent = amortRows.length;
    statsEl.classList.add("show");

    showStatus("已生成 " + amortRows.length + " 期还款明细", "success");
  }

  function reset() {
    document.getElementById("loanAmount").value = "1000000";
    document.getElementById("annualRate").value = "4.5";
    document.getElementById("termMonths").value = "360";
    document.getElementById("startDate").value = "";
    document.getElementById("extraPayment").value = "0";
    document.getElementById("extraStart").value = "1";
    ["loanAmount", "annualRate", "termMonths"].forEach(function (id) {
      document.getElementById(id).classList.remove("input-error");
    });
    document.getElementById("summaryCards").style.display = "none";
    document.getElementById("tableWrap").style.display = "none";
    document.getElementById("emptyState").style.display = "";
    document.getElementById("stats").classList.remove("show");
    document.getElementById("status").textContent = "";
    document.getElementById("status").className = "status";
    amortRows = [];
  }

  function buildCsvLines() {
    var hasDate = amortRows[0].date !== "";
    var hasExtra = amortRows.some(function (r) {
      return r.extra > 0.005;
    });
    var header = ["期数"];
    if (hasDate) header.push("日期");
    header.push("月供(元)", "本金(元)", "利息(元)");
    if (hasExtra) header.push("额外还款(元)");
    header.push("剩余余额(元)");

    var lines = [header.join(",")];
    amortRows.forEach(function (r) {
      var row = [r.period];
      if (hasDate) row.push(r.date);
      row.push(r.payment.toFixed(2), r.principal.toFixed(2), r.interest.toFixed(2));
      if (hasExtra) row.push(r.extra.toFixed(2));
      row.push(r.balance.toFixed(2));
      lines.push(row.join(","));
    });
    return lines;
  }

  function exportCsv() {
    if (!amortRows.length) {
      showStatus("请先计算", "error");
      return;
    }
    var lines = buildCsvLines();
    var bom = "﻿";
    var blob = new Blob([bom + lines.join("\r\n")], {
      type: "text/csv;charset=utf-8;"
    });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "amortization-table.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus("CSV 已下载", "success");
  }

  function copyTable() {
    if (!amortRows.length) {
      showStatus("请先计算", "error");
      return;
    }
    var hasDate = amortRows[0].date !== "";
    var hasExtra = amortRows.some(function (r) {
      return r.extra > 0.005;
    });
    var header = ["期数"];
    if (hasDate) header.push("日期");
    header.push("月供(元)", "本金(元)", "利息(元)");
    if (hasExtra) header.push("额外还款(元)");
    header.push("剩余余额(元)");

    var lines = [header.join("\t")];
    amortRows.forEach(function (r) {
      var row = [r.period];
      if (hasDate) row.push(r.date);
      row.push(r.payment.toFixed(2), r.principal.toFixed(2), r.interest.toFixed(2));
      if (hasExtra) row.push(r.extra.toFixed(2));
      row.push(r.balance.toFixed(2));
      lines.push(row.join("\t"));
    });

    navigator.clipboard
      .writeText(lines.join("\n"))
      .then(function () {
        showStatus("表格已复制（可粘贴到 Excel）", "success");
      })
      .catch(function () {
        showStatus("复制失败", "error");
      });
  }

  document.getElementById("btnCalc").onclick = calculate;
  document.getElementById("btnReset").onclick = reset;
  document.getElementById("btnExportCsv").onclick = exportCsv;
  document.getElementById("btnCopyTable").onclick = copyTable;

  document.addEventListener("keydown", function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
      e.preventDefault();
      calculate();
    }
  });

  window.toggleTheme = function () {
    var html = document.documentElement;
    var currentTheme = html.getAttribute("data-theme") || "dark";
    var newTheme = currentTheme === "light" ? "dark" : "light";
    html.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
  };
  function initTheme() {
    var savedTheme = localStorage.getItem("theme");
    var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    var theme = savedTheme || (prefersDark ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  }
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
    if (!localStorage.getItem("theme"))
      document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
  });

  initTheme();
</script>
