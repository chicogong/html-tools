<style>
:root {
        --color-bg-deep: #0a0a0f;
        --color-bg-surface: #1a1a22;
        --color-bg-subtle: #242430;
        --color-bg-input: #0e0e14;
        --color-text-primary: #f5f5f7;
        --color-text-secondary: #a1a1aa;
        --color-text-muted: #71717a;
        --color-border-default: rgba(255, 255, 255, 0.08);
        --color-border-subtle: rgba(255, 255, 255, 0.04);
        --color-border-strong: rgba(255, 255, 255, 0.12);
        --color-accent-primary: #00d4aa;
        --color-accent-secondary: #8b5cf6;
        --color-success: #22c55e;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --glass-bg: rgba(26, 26, 34, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 20px rgba(0, 212, 170, 0.15);
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-full: 9999px;
        --font-sans: "Inter", -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --transition-fast: 150ms ease;
        --nav-height: 56px;
        --container-max: 900px;
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      }

      [data-theme="light"] {
        --color-bg-deep: #f8fafc;
        --color-bg-surface: #fff;
        --color-bg-subtle: #f1f5f9;
        --color-bg-input: #f8fafc;
        --color-text-primary: #0f172a;
        --color-text-secondary: #475569;
        --color-text-muted: #94a3b8;
        --color-border-default: rgba(0, 0, 0, 0.08);
        --color-border-subtle: rgba(0, 0, 0, 0.04);
        --color-border-strong: rgba(0, 0, 0, 0.12);
        --color-accent-primary: #00b894;
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.5;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
      }
      .nav-actions {
        display: flex;
        gap: var(--space-2);
        justify-self: end;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
      }

      .location-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
      }

      .location-box {
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-5);
      }

      .location-box h3 {
        font-size: 0.9375rem;
        font-weight: 600;
        margin-bottom: var(--space-4);
        color: var(--color-accent-primary);
      }

      .input-group {
        margin-bottom: var(--space-4);
      }
      .input-group:last-child {
        margin-bottom: 0;
      }
      .input-group label {
        display: block;
        font-weight: 500;
        margin-bottom: var(--space-2);
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }

      input,
      select {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      .coord-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-3);
      }

      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }
      button:hover {
        border-color: var(--color-accent-primary);
      }
      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }
      button.primary:hover {
        background: #00c299;
        box-shadow: var(--shadow-glow);
      }

      .btn-row {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-5);
        justify-content: center;
      }

      .result-display {
        background: var(--color-bg-subtle);
        border-radius: var(--radius-md);
        padding: var(--space-6);
        margin-top: var(--space-5);
        text-align: center;
      }

      .result-distance {
        font-size: 2.5rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-accent-primary);
        margin-bottom: var(--space-2);
      }

      .result-miles {
        font-size: 1.25rem;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-4);
      }

      .result-details {
        font-size: 0.875rem;
        color: var(--color-text-muted);
        padding-top: var(--space-4);
        border-top: 1px solid var(--color-border-subtle);
      }

      .city-presets {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-4);
      }

      .preset-chip {
        padding: var(--space-2) var(--space-3);
        font-size: 0.8125rem;
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-full);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .preset-chip:hover {
        border-color: var(--color-accent-primary);
      }

      @media (max-width: 640px) {
        .location-grid {
          grid-template-columns: 1fr;
        }
        .result-distance {
          font-size: 2rem;
        }
      }

      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }
        .nav-content {
          padding: 0 var(--space-4);
        }
        .nav-back-text {
          display: none;
        }
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }
        .card {
          padding: var(--space-4);
        }
        .coord-row {
          grid-template-columns: 1fr;
        }
      }
</style>

<main class="main-content">
      <div class="container">
        <div class="card">
          <h2 class="card-title">计算两地距离</h2>

          <div class="location-grid">
            <div class="location-box">
              <h3>起点</h3>
              <div class="input-group">
                <label>选择城市</label>
                <select id="city1" onchange="selectCity(1)">
                  <option value="">选择城市或输入坐标...</option>
                </select>
              </div>
              <div class="coord-row">
                <div class="input-group">
                  <label>纬度</label>
                  <input type="number" id="lat1" step="0.0001" placeholder="39.9042">
                </div>
                <div class="input-group">
                  <label>经度</label>
                  <input type="number" id="lon1" step="0.0001" placeholder="116.4074">
                </div>
              </div>
            </div>

            <div class="location-box">
              <h3>终点</h3>
              <div class="input-group">
                <label>选择城市</label>
                <select id="city2" onchange="selectCity(2)">
                  <option value="">选择城市或输入坐标...</option>
                </select>
              </div>
              <div class="coord-row">
                <div class="input-group">
                  <label>纬度</label>
                  <input type="number" id="lat2" step="0.0001" placeholder="31.2304">
                </div>
                <div class="input-group">
                  <label>经度</label>
                  <input type="number" id="lon2" step="0.0001" placeholder="121.4737">
                </div>
              </div>
            </div>
          </div>

          <div class="btn-row">
            <button onclick="clearInputs()">清除</button>
            <button class="primary" onclick="calculate()">计算距离</button>
          </div>

          <div class="result-display" id="resultDisplay" style="display: none">
            <div class="result-distance" id="resultKm">0 km</div>
            <div class="result-miles" id="resultMiles">0 miles</div>
            <div class="result-details" id="resultDetails"></div>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">常用路线</h2>
          <div class="city-presets" id="presets"></div>
        </div>
      </div>
    </main>
