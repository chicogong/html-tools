          </div>
          <div class="type-card" data-type="random">
            <div class="icon">🎲</div>

            <div class="desc">字母数字混合</div>
          </div>
        </div>

              <option value="words">单词/词语</option>
              <option value="characters">字符</option>

              <option value="html-div">HTML Div</option>
            </select>
          </div>

          </button>
