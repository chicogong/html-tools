      .stat.changed {

        color: var(--changed-color);
      }

        font-size: 13px;

      }
      .diff-item {
        padding: 4px 8px;
        border-radius: 4px;
        margin: 2px 0;
      }
      .diff-item.added {
        background: var(--added-bg);
        color: var(--added-color);
      }
      .diff-item.removed {
        background: var(--removed-bg);
        color: var(--removed-color);
      }
      .diff-item.changed {
        background: var(--changed-bg);
        color: var(--changed-color);
      }
      .diff-key {
        font-weight: 600;
      }
      .diff-value {
        margin-left: 5px;
      }
      .diff-arrow {
        color: var(--color-text-secondary);
        margin: 0 8px;
      }
      .no-diff {
        text-align: center;
        padding: 40px;
        color: var(--color-text-secondary);
      }
      .error-msg {
        padding: 15px;
        background: var(--removed-bg);
        color: var(--removed-color);
        border-radius: 8px;
        margin: 10px 15px;
      }
      .legend {

        gap: 20px;
        justify-content: center;
        margin-top: 15px;
        font-size: 0.85rem;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }
      .legend-dot.added {
        background: var(--added-bg);
        border: 1px solid var(--added-color);
      }
      .legend-dot.removed {
        background: var(--removed-bg);
        border: 1px solid var(--removed-color);
      }
      .legend-dot.changed {
        background: var(--changed-bg);
        border: 1px solid var(--changed-color);
      }
      @media (max-width: 768px) {
        .editors {
          grid-template-columns: 1fr;
        }
        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }
      }

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);

      }
      .breadcrumb a {
        color: #667eea;
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;

</style>

<div class="container">
      <div class="header">
        <h1>🔍 JSON 比较器</h1>
        <p>比较两个 JSON 对象，高亮显示差异</p>
      </div>

      <div class="toolbar">
        <button class="btn btn-primary" onclick="compare()">🔎 比较差异</button>
        <button class="btn" onclick="formatBoth()">📐 格式化</button>
        <button class="btn" onclick="swapInputs()">🔄 交换</button>
        <button class="btn" onclick="loadExample()">📝 示例</button>
        <button class="btn" onclick="clearAll()">🗑️ 清空</button>
        <button class="btn" onclick="toggleTheme()">🌓</button>
      </div>

      <div class="editors">
        <div class="editor-panel">
          <div class="editor-header">
            <h3>📄 原始 JSON (A)</h3>
            <div class="editor-actions">
              <button onclick="formatJson('left')">格式化</button>
              <button onclick="pasteJson('left')">粘贴</button>
            </div>
          </div>
          <textarea class="json-input" id="leftJson" placeholder="输入或粘贴 JSON..." spellcheck="false"></textarea>
        </div>
        <div class="editor-panel">
          <div class="editor-header">
            <h3>📄 比较 JSON (B)</h3>
            <div class="editor-actions">
              <button onclick="formatJson('right')">格式化</button>
              <button onclick="pasteJson('right')">粘贴</button>
            </div>
          </div>
          <textarea class="json-input" id="rightJson" placeholder="输入或粘贴 JSON..." spellcheck="false"></textarea>
        </div>
      </div>

      <div class="result-section">
        <div class="result-header">
          <h3>📊 比较结果</h3>
          <div class="stats" id="stats"></div>
        </div>
        <div class="diff-container" id="diffContainer">
          <div class="no-diff">输入两个 JSON 并点击"比较差异"查看结果</div>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot added"></span>
          新增 (B 中有)
        </div>
        <div class="legend-item">
          <span class="legend-dot removed"></span>
          删除 (A 中有)
        </div>
        <div class="legend-item">
          <span class="legend-dot changed"></span>
          修改 (值不同)
        </div>
      </div>
    </div>
