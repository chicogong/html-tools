    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);

    <script>
      var numInput = document.getElementById("numInput");
      var statusEl = document.getElementById("status");
      var statsEl = document.getElementById("stats");
      var resultSection = document.getElementById("resultSection");
      var displayModeEl = document.getElementById("displayMode");
      var showTreeEl = document.getElementById("showTree");
      var showDivisorsEl = document.getElementById("showDivisors");

      /* ── BigInt 工具 ── */
      function isPrimeBig(n) {
        if (n < 2n) return false;
        if (n === 2n || n === 3n) return true;
        if (n % 2n === 0n || n % 3n === 0n) return false;
        for (var i = 5n; i * i <= n; i += 6n) {
          if (n % i === 0n || n % (i + 2n) === 0n) return false;
        }
        return true;
      }

      function factorize(n) {
        /* Returns array of { prime: BigInt, exp: Number } */
        var factors = [];
        if (n <= 1n) return factors;
        var d = 2n;
        while (d * d <= n) {
          if (n % d === 0n) {
            var exp = 0;
            while (n % d === 0n) {
              n /= d;
              exp++;
            }
            factors.push({ prime: d, exp: exp });
          }
          d += d === 2n ? 1n : 2n;
        }
        if (n > 1n) {
          factors.push({ prime: n, exp: 1 });
        }
        return factors;
      }

      function getAllDivisors(factors) {
        /* Generate all divisors from prime factorization */
        var divs = [1n];
        for (var fi = 0; fi < factors.length; fi++) {
          var p = factors[fi].prime;
          var e = factors[fi].exp;
          var len = divs.length;
          var pe = 1n;
          for (var ei = 0; ei < e; ei++) {
            pe *= p;
            for (var di = 0; di < len; di++) {
              divs.push(divs[di] * pe);
            }
          }
        }
        divs.sort(function (a, b) {
          return a < b ? -1 : a > b ? 1 : 0;
        });
        return divs;
      }

      function countDivisors(factors) {
        var count = 1;
        for (var i = 0; i < factors.length; i++) {
          count *= factors[i].exp + 1;
        }
        return count;
      }

      /* ── 渲染公式 ── */
      function renderFormula(factors, mode) {
        /* Returns HTML string */
        if (factors.length === 0) return "";

        function expForm() {
          return factors
            .map(function (f) {
              var s = '<span class="prime-badge">' + f.prime.toString() + "</span>";
              if (f.exp > 1) s += '<sup class="exp">' + f.exp + "</sup>";
              return s;
            })
            .join('<span class="op">×</span>');
        }

        function expandedForm() {
          var parts = [];
          factors.forEach(function (f) {
            for (var i = 0; i < f.exp; i++) {
              parts.push('<span class="prime-badge">' + f.prime.toString() + "</span>");
            }
          });
          return parts.join('<span class="op">×</span>');
        }

        if (mode === "exponent") return expForm();
        if (mode === "expanded") return expandedForm();
        /* both */
        if (factors.length === 1 && factors[0].exp === 1) return expForm();
        return expForm() + '<br><span class="op">= </span>' + expandedForm();
      }

      /* ── 因数树 SVG ── */
      var NODE_R = 22;
      var V_GAP = 64;
      var H_GAP = 52;

      function buildTreeData(n, factors) {
        /* Build a simple two-layer factor tree: n splits into prime × cofactor */
        if (isPrimeBig(n) || n === 1n) {
          return { val: n, prime: isPrimeBig(n) || n === 1n, children: [] };
        }
        /* find smallest prime factor */
        var p = factors[0].prime;
        var rest = n / p;
        var leftChild = { val: p, prime: true, children: [] };
        var rightChild =
          rest === 1n
            ? null
            : isPrimeBig(rest)
              ? { val: rest, prime: true, children: [] }
              : buildTreeData(rest, factorize(rest));
        var ch = rightChild ? [leftChild, rightChild] : [leftChild];
        return { val: n, prime: false, children: ch };
      }

      function measureTree(node) {
        if (!node) return node;
        if (node.children.length === 0) {
          node.w = NODE_R * 2;
          node.h = NODE_R * 2;
          return node;
        }
        var childW = 0;
        var maxChildH = 0;
        node.children.forEach(function (c) {
          measureTree(c);
          childW += c.w + H_GAP;
          if (c.h > maxChildH) maxChildH = c.h;
        });
        childW -= H_GAP;
        node.w = Math.max(NODE_R * 2, childW);
        node.h = NODE_R * 2 + V_GAP + maxChildH;
        return node;
      }

      function positionTree(node, x, y) {
        node.x = x;
        node.y = y;
        if (node.children.length === 0) return;
        var totalW = 0;
        node.children.forEach(function (c) {
          totalW += c.w;
        });
        totalW += H_GAP * (node.children.length - 1);
        var cx = x - totalW / 2;
        node.children.forEach(function (c) {
          positionTree(c, cx + c.w / 2, y + V_GAP);
          cx += c.w + H_GAP;
        });
      }

      function collectNodes(node, nodes, edges) {
        nodes.push(node);
        node.children.forEach(function (c) {
          edges.push({ x1: node.x, y1: node.y, x2: c.x, y2: c.y });
          collectNodes(c, nodes, edges);
        });
      }

      function renderTreeSvg(n, factors) {
        /* Limit tree display to numbers that won't produce huge trees */
        var TREE_LIMIT = 10000n;
        if (n > TREE_LIMIT) {
          return (
            '<div class="result-block-title">因数树</div>' +
            '<p style="color:var(--text-muted);font-size:0.875rem;">数值较大，因数树仅支持 ≤ 10000 的整数。</p>'
          );
        }
        var root = buildTreeData(n, factors);
        measureTree(root);
        var PAD = NODE_R + 8;
        positionTree(root, root.w / 2 + PAD, NODE_R + PAD);

        var nodes = [];
        var edges = [];
        collectNodes(root, nodes, edges);

        var maxX = 0;
        var maxY = 0;
        nodes.forEach(function (nd) {
          if (nd.x + NODE_R + PAD > maxX) maxX = nd.x + NODE_R + PAD;
          if (nd.y + NODE_R + PAD > maxY) maxY = nd.y + NODE_R + PAD;
        });

        var svgW = Math.max(maxX, 120);
        var svgH = Math.max(maxY, 80);

        var edgeSvg = edges
          .map(function (e) {
            return (
              '<line class="tree-edge" x1="' +
              e.x1 +
              '" y1="' +
              e.y1 +
              '" x2="' +
              e.x2 +
              '" y2="' +
              e.y2 +
              '"/>'
            );
          })
          .join("");

        var nodeSvg = nodes
          .map(function (nd) {
            var cls = "tree-node" + (nd.prime ? " prime-node" : "");
            return (
              '<g class="' +
              cls +
              '">' +
              '<circle cx="' +
              nd.x +
              '" cy="' +
              nd.y +
              '" r="' +
              NODE_R +
              '"/>' +
              '<text x="' +
              nd.x +
              '" y="' +
              nd.y +
              '">' +
              nd.val.toString() +
              "</text>" +
              "</g>"
            );
          })
          .join("");

        return (
          '<div class="result-block-title">因数树</div>' +
          '<div class="factor-tree-svg">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="' +
          svgW +
          '" height="' +
          svgH +
          '" viewBox="0 0 ' +
          svgW +
          " " +
          svgH +
          '">' +
          edgeSvg +
          nodeSvg +
          "</svg>" +
          "</div>"
        );
      }

      /* ── 主逻辑 ── */
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function showEmptyState() {
        resultSection.innerHTML =
          '<div class="empty-state">' +
          '<div class="empty-state-icon">🔢</div>' +
          "<div>输入一个正整数，点击「分解」查看结果</div>" +
          "</div>";
      }

      function doFactorize() {
        var raw = numInput.value.trim();
        if (!raw) {
          showStatus("请输入正整数", "error");
          numInput.classList.add("error");
          return;
        }
        /* Validate: digits only */
        if (!/^\d+$/.test(raw)) {
          showStatus("仅支持正整数（不含小数点或负号）", "error");
          numInput.classList.add("error");
          return;
        }
        numInput.classList.remove("error");

        var n;
        try {
          n = BigInt(raw);
        } catch (e) {
          showStatus("无法解析该数值", "error");
          return;
        }

        if (n < 1n) {
          showStatus("请输入大于 0 的正整数", "error");
          numInput.classList.add("error");
          return;
        }

        /* Guard against absurdly large inputs that would freeze the page */
        if (raw.length > 15) {
          showStatus("支持最多 15 位整数（避免页面卡顿）", "error");
          numInput.classList.add("error");
          return;
        }

        var factors = factorize(n);
        var isPrime = isPrimeBig(n);
        var mode = displayModeEl.value;

        /* Stats */
        var uniquePrimeCount = factors.length;
        var divisorCount = countDivisors(factors);
        document.getElementById("statFactors").textContent = uniquePrimeCount;
        document.getElementById("statDivisors").textContent = divisorCount;
        document.getElementById("statIsPrime").textContent = isPrime ? "是" : n === 1n ? "—" : "否";
        statsEl.classList.add("show");

        /* Build HTML */
        var html = "";

        /* Formula block */
        html += '<div class="result-block">';
        html += '<div class="result-block-title">质因数分解</div>';
        html += '<div class="formula-display">';
        html +=
          '<span style="color:var(--color-text-secondary);margin-right:8px;">' + raw + " =</span>";
        if (n === 1n) {
          html += '<span class="prime-badge">1</span>';
        } else if (isPrime) {
          html +=
            '<span class="prime-badge">' +
            raw +
            "</span>" +
            ' <span style="color:var(--text-muted);font-size:0.875rem;">（本身是质数）</span>';
        } else {
          html += renderFormula(factors, mode);
        }
        html += "</div></div>";

        /* Factor tree */
        if (showTreeEl.checked && n > 1n) {
          html += '<div class="result-block">';
          html += renderTreeSvg(n, factors);
          html += "</div>";
        }

        /* Divisors */
        if (showDivisorsEl.checked) {
          html += '<div class="result-block">';
          html += '<div class="result-block-title">所有因数（共 ' + divisorCount + " 个）</div>";
          if (divisorCount > 1000) {
            html +=
              '<p style="color:var(--text-muted);font-size:0.875rem;">因数过多（' +
              divisorCount +
              " 个），仅显示前 1000 个。</p>";
          }
          html += '<div class="divisors-list">';
          var divs = getAllDivisors(factors);
          var limit = Math.min(divs.length, 1000);
          for (var i = 0; i < limit; i++) {
            var dv = divs[i];
            var dvIsPrime = isPrimeBig(dv);
            html +=
              '<span class="divisor-chip' +
              (dvIsPrime ? " is-prime" : "") +
              '">' +
              dv.toString() +
              "</span>";
          }
          html += "</div></div>";
        }

        resultSection.innerHTML = html;
        showStatus("分解完成", "success");
        saveToUrl();
      }

      /* ── 事件绑定 ── */
      document.getElementById("btnFactorize").onclick = doFactorize;

      document.getElementById("btnRandom").onclick = function () {
        var samples = [
          "12",
          "100",
          "360",
          "1024",
          "9999",
          "123456",
          "720720",
          "1000000",
          "9699690",
          "999999937"
        ];
        numInput.value = samples[Math.floor(Math.random() * samples.length)];
        numInput.classList.remove("error");
        doFactorize();
      };

      document.getElementById("btnClear").onclick = function () {
        numInput.value = "";
        numInput.classList.remove("error");
        statusEl.textContent = "";
        statusEl.className = "status";
        statsEl.classList.remove("show");
        showEmptyState();
        history.replaceState(null, "", location.pathname);
      };

      numInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") doFactorize();
      });

      numInput.addEventListener("input", function () {
        numInput.classList.remove("error");
      });

      displayModeEl.addEventListener("change", function () {
        if (numInput.value.trim()) doFactorize();
      });

      showTreeEl.addEventListener("change", function () {
        if (numInput.value.trim()) doFactorize();
      });

      showDivisorsEl.addEventListener("change", function () {
        if (numInput.value.trim()) doFactorize();
      });

      /* ── URL hash 持久化 ── */
      function saveToUrl() {
        var v = numInput.value.trim();
        if (!v) return;
        try {
          history.replaceState(null, "", "#" + btoa(encodeURIComponent(v)));
        } catch (e) {
          /* ignore */
        }
      }

      function loadFromUrl() {
        var hash = location.hash.slice(1);
        if (!hash) return false;
        try {
          numInput.value = decodeURIComponent(atob(hash));
          return true;
        } catch (e) {
          return false;
        }
      }

      /* ── 初始化 ── */
      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
      if (loadFromUrl()) doFactorize();
    </script>
  </body>
</html>
