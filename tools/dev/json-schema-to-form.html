    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;

      .panels {

        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";

      .footer {
        text-align: center;
        margin-top: var(--space-5);

      .footer p {

      }
      .footer a:hover {
        color: var(--color-text-primary);
      }

      /* ── Tool-specific styles ── */
      .form-preview-panel {
        flex: 1;
        overflow-y: auto;
        background: var(--color-bg-input);
        border: 2px solid var(--color-border-default);

      /* Generated form styles */

      .sf-label {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        display: flex;
        align-items: center;
        gap: var(--space-2);

        color: var(--color-error);
        font-size: 0.75rem;
      }
      .sf-label .sf-type-badge {
        font-family: var(--font-mono);
        font-size: 0.625rem;
        padding: 1px 5px;

        background: var(--color-bg-subtle);
        color: var(--color-accent-primary);
        border: 1px solid var(--color-border-default);
      }
      .sf-input,
      .sf-select,
      .sf-textarea {
        width: 100%;
        padding: var(--space-2) var(--space-3);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        color: var(--color-text-primary);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);

      .sf-select:focus,

      .sf-input.invalid,

      .sf-input.valid,
      .sf-select.valid,
      .sf-textarea.valid {
        border-color: var(--color-success);
      }
      .sf-textarea {
        resize: vertical;

      }

      }
      .sf-field-hint {

        color: var(--text-muted);
        font-family: var(--font-mono);

        align-items: center;

      }
      .sf-checkbox-group input[type="checkbox"] {

        border: 1px solid var(--color-border-subtle);

      .sf-object-legend {
        font-size: 0.75rem;

        color: var(--color-accent-primary);
        font-family: var(--font-mono);

      }
      .sf-array-group {
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }
      .sf-array-legend {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--color-accent-secondary);
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;

      .sf-array-item {
        display: flex;
        gap: var(--space-2);

      .sf-array-item > .sf-field {
        flex: 1;
      }
      .sf-array-remove {
        height: 34px;
        width: 34px;
        flex-shrink: 0;
        background: rgba(244, 63, 94, 0.1);
        border: 1px solid var(--color-error);
        border-radius: var(--radius-sm);

        display: flex;

        border-radius: var(--radius-sm);

      /* output panel */

                placeholder='粘贴 JSON Schema，例如：
{

      {
        "@context": "https://schema.org",

          },

            "name": "开发工具",

          },

    <script>
      var schemaInputEl = document.getElementById("schemaInput");
      var formPreviewEl = document.getElementById("formPreview");
      var outputJsonEl = document.getElementById("outputJson");
      var statusEl = document.getElementById("status");
      var errorDetailEl = document.getElementById("errorDetail");
      var validationBadgeEl = document.getElementById("validationBadge");

      var LS_KEY = "json_schema_to_form_v1";
      var currentSchema = null;

      var EXAMPLE_SCHEMA = JSON.stringify(
        {
          title: "用户注册",
          description: "请填写以下信息完成注册",
          type: "object",
          required: ["username", "email", "age", "role"],
          properties: {
            username: {
              type: "string",
              title: "用户名",
              minLength: 3,
              maxLength: 20,
              description: "3~20 个字符"
            },
            email: {
              type: "string",
              title: "邮箱",
              format: "email"
            },
            age: {
              type: "integer",
              title: "年龄",
              minimum: 1,
              maximum: 120
            },
            role: {
              type: "string",
              title: "角色",
              enum: ["admin", "editor", "viewer"]
            },
            bio: {
              type: "string",
              title: "个人简介",
              maxLength: 200
            },
            newsletter: {
              type: "boolean",
              title: "订阅新闻邮件"
            },
            tags: {
              type: "array",
              title: "标签",
              items: {
                type: "string",
                title: "标签"
              }
            },
            address: {
              type: "object",
              title: "地址",
              properties: {
                city: { type: "string", title: "城市" },
                zip: { type: "string", title: "邮编", pattern: "^[0-9]{6}$" }
              }
            }
          }
        },
        null,
        2
      );

      /* ── Utility ── */
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function showError(msg) {
        errorDetailEl.textContent = msg;
        errorDetailEl.classList.add("show");
      }

      function hideError() {
        errorDetailEl.classList.remove("show");
        errorDetailEl.textContent = "";
      }

      /* ── Schema → Form renderer ── */
      var fieldIdCounter = 0;

      function nextId(prefix) {
        fieldIdCounter++;
        return (prefix || "sf") + "_" + fieldIdCounter;
      }

      function getRequired(schema) {
        return Array.isArray(schema.required) ? schema.required : [];
      }

      function buildField(schema, fieldName, required, depth) {
        depth = depth || 0;
        var container = document.createElement("div");
        container.className = "sf-field";

        var title = schema.title || fieldName || "";
        var type = schema.type || "string";

        /* Resolve enum → select regardless of type */
        if (Array.isArray(schema.enum)) {
          return buildSelectField(schema, fieldName, required, title);
        }

        if (type === "object") {
          return buildObjectField(schema, fieldName, required, title, depth);
        }
        if (type === "array") {
          return buildArrayField(schema, fieldName, required, title, depth);
        }
        if (type === "boolean") {
          return buildBooleanField(schema, fieldName, required, title);
        }
        if (type === "integer" || type === "number") {
          return buildNumberField(schema, fieldName, required, title, type);
        }
        /* default: string */
        return buildStringField(schema, fieldName, required, title);
      }

      function makeLabel(title, type, required) {
        var label = document.createElement("label");
        label.className = "sf-label";
        label.textContent = title || "（无标题）";
        if (required) {
          var req = document.createElement("span");
          req.className = "sf-required";
          req.textContent = "*";
          label.appendChild(req);
        }
        var badge = document.createElement("span");
        badge.className = "sf-type-badge";
        badge.textContent = type;
        label.appendChild(badge);
        return label;
      }

      function makeHint(schema) {
        var parts = [];
        if (schema.description) parts.push(schema.description);
        if (schema.minLength !== undefined) parts.push("最少 " + schema.minLength + " 字符");
        if (schema.maxLength !== undefined) parts.push("最多 " + schema.maxLength + " 字符");
        if (schema.minimum !== undefined) parts.push("≥ " + schema.minimum);
        if (schema.maximum !== undefined) parts.push("≤ " + schema.maximum);
        if (schema.pattern) parts.push("格式: " + schema.pattern);
        if (schema.format) parts.push("格式: " + schema.format);
        if (!parts.length) return null;
        var hint = document.createElement("div");
        hint.className = "sf-field-hint";
        hint.textContent = parts.join(" · ");
        return hint;
      }

      function makeErrorDiv() {
        var div = document.createElement("div");
        div.className = "sf-field-error";
        return div;
      }

      function attachValidation(inputEl, schema, required, errorDiv) {
        function validate() {
          var val = inputEl.type === "checkbox" ? inputEl.checked : inputEl.value;
          var errors = validateValue(val, schema, required);
          if (errors.length) {
            inputEl.classList.add("invalid");
            inputEl.classList.remove("valid");
            errorDiv.textContent = errors[0];
            errorDiv.classList.add("show");
          } else {
            inputEl.classList.remove("invalid");
            if (String(val).length > 0 || inputEl.type === "checkbox") {
              inputEl.classList.add("valid");
            }
            errorDiv.classList.remove("show");
          }
          syncOutputJson();
        }
        inputEl.addEventListener("input", validate);
        inputEl.addEventListener("change", validate);
      }

      function buildStringField(schema, fieldName, required, title) {
        var container = document.createElement("div");
        container.className = "sf-field";
        var id = nextId("str");
        var label = makeLabel(title, schema.format || "string", required);
        label.htmlFor = id;
        container.appendChild(label);

        var input;
        var isMultiline =
          schema.maxLength > 100 ||
          (schema.description && schema.description.length > 30 && !schema.format);
        if (isMultiline) {
          input = document.createElement("textarea");
          input.className = "sf-textarea";
          input.rows = 3;
        } else {
          input = document.createElement("input");
          input.className = "sf-input";
          input.type =
            schema.format === "email" ? "email" : schema.format === "uri" ? "url" : "text";
        }
        input.id = id;
        input.name = fieldName || id;
        if (schema.minLength !== undefined) input.minLength = schema.minLength;
        if (schema.maxLength !== undefined) input.maxLength = schema.maxLength;
        if (schema.pattern) input.pattern = schema.pattern;
        if (required) input.required = true;
        if (schema.placeholder) input.placeholder = schema.placeholder;
        container.appendChild(input);

        var hint = makeHint(schema);
        if (hint) container.appendChild(hint);

        var errDiv = makeErrorDiv();
        container.appendChild(errDiv);
        attachValidation(input, schema, required, errDiv);
        return container;
      }

      function buildNumberField(schema, fieldName, required, title, type) {
        var container = document.createElement("div");
        container.className = "sf-field";
        var id = nextId("num");
        var label = makeLabel(title, type, required);
        label.htmlFor = id;
        container.appendChild(label);

        var input = document.createElement("input");
        input.className = "sf-input";
        input.type = "number";
        input.id = id;
        input.name = fieldName || id;
        if (schema.minimum !== undefined) input.min = schema.minimum;
        if (schema.maximum !== undefined) input.max = schema.maximum;
        if (type === "integer") input.step = 1;
        if (required) input.required = true;
        container.appendChild(input);

        var hint = makeHint(schema);
        if (hint) container.appendChild(hint);

        var errDiv = makeErrorDiv();
        container.appendChild(errDiv);
        attachValidation(input, schema, required, errDiv);
        return container;
      }

      function buildBooleanField(schema, fieldName, required, title) {
        var container = document.createElement("div");
        container.className = "sf-field";
        var id = nextId("bool");
        var group = document.createElement("div");
        group.className = "sf-checkbox-group";

        var input = document.createElement("input");
        input.type = "checkbox";
        input.id = id;
        input.name = fieldName || id;
        group.appendChild(input);

        var label = document.createElement("label");
        label.htmlFor = id;
        label.className = "sf-label";
        label.textContent = title || fieldName || "（布尔值）";
        var badge = document.createElement("span");
        badge.className = "sf-type-badge";
        badge.textContent = "boolean";
        label.appendChild(badge);
        group.appendChild(label);

        container.appendChild(group);

        var hint = makeHint(schema);
        if (hint) container.appendChild(hint);

        var errDiv = makeErrorDiv();
        container.appendChild(errDiv);
        input.addEventListener("change", syncOutputJson);
        return container;
      }

      function buildSelectField(schema, fieldName, required, title) {
        var container = document.createElement("div");
        container.className = "sf-field";
        var id = nextId("sel");
        var label = makeLabel(title, "enum", required);
        label.htmlFor = id;
        container.appendChild(label);

        var select = document.createElement("select");
        select.className = "sf-select";
        select.id = id;
        select.name = fieldName || id;
        if (required) select.required = true;

        var placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "— 请选择 —";
        placeholder.disabled = true;
        placeholder.selected = true;
        select.appendChild(placeholder);

        schema.enum.forEach(function (val) {
          var opt = document.createElement("option");
          opt.value = String(val);
          opt.textContent = String(val);
          select.appendChild(opt);
        });
        container.appendChild(select);

        var hint = makeHint(schema);
        if (hint) container.appendChild(hint);

        var errDiv = makeErrorDiv();
        container.appendChild(errDiv);
        attachValidation(select, schema, required, errDiv);
        return container;
      }

      function buildObjectField(schema, fieldName, required, title, depth) {
        var container = document.createElement("div");
        container.className = "sf-field";

        if (title && depth > 0) {
          var legend = document.createElement("div");
          legend.className = "sf-object-legend";
          legend.textContent = title + " (object)";
          container.appendChild(legend);
        }

        var group = document.createElement("div");
        group.className = "sf-object-group";
        container.appendChild(group);

        var props = schema.properties || {};
        var req = getRequired(schema);
        Object.keys(props).forEach(function (key) {
          var child = buildField(props[key], key, req.indexOf(key) !== -1, depth + 1);
          group.appendChild(child);
        });

        if (!Object.keys(props).length) {
          var empty = document.createElement("div");
          empty.className = "sf-field-hint";
          empty.textContent = "（此对象无定义的属性）";
          group.appendChild(empty);
        }

        return container;
      }

      function buildArrayField(schema, fieldName, required, title, depth) {
        var container = document.createElement("div");
        container.className = "sf-field";

        var legend = document.createElement("div");
        legend.className = "sf-array-legend";
        legend.textContent = (title || fieldName || "数组") + " (array)";
        container.appendChild(legend);

        var itemsWrapper = document.createElement("div");
        itemsWrapper.className = "sf-array-group";
        container.appendChild(itemsWrapper);

        var itemSchema = schema.items || { type: "string" };
        var itemsContainer = document.createElement("div");
        itemsContainer.dataset.arrayField = "1";
        itemsWrapper.appendChild(itemsContainer);

        var addBtn = document.createElement("button");
        addBtn.type = "button";
        addBtn.className = "sf-array-add";
        addBtn.textContent = "+ 添加项";
        itemsWrapper.appendChild(addBtn);

        function addItem() {
          var row = document.createElement("div");
          row.className = "sf-array-item";

          var fieldEl = buildField(itemSchema, null, false, depth + 1);
          row.appendChild(fieldEl);

          var removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "sf-array-remove";
          removeBtn.title = "删除";
          removeBtn.textContent = "×";
          removeBtn.onclick = function () {
            row.remove();
            syncOutputJson();
          };
          row.appendChild(removeBtn);
          itemsContainer.appendChild(row);
          syncOutputJson();
        }

        addBtn.onclick = addItem;
        /* Start with one empty item */
        addItem();

        return container;
      }

      /* ── Value collection ── */
      function collectFieldValue(fieldEl, schema) {
        if (!schema) return undefined;
        var type = schema.type;

        if (Array.isArray(schema.enum)) {
          var sel = fieldEl.querySelector("select.sf-select");
          return sel ? sel.value || null : null;
        }
        if (type === "boolean") {
          var cb = fieldEl.querySelector("input[type='checkbox']");
          return cb ? cb.checked : false;
        }
        if (type === "integer" || type === "number") {
          var numInput = fieldEl.querySelector("input[type='number']");
          if (!numInput || numInput.value === "") return null;
          return type === "integer" ? parseInt(numInput.value, 10) : parseFloat(numInput.value);
        }
        if (type === "object") {
          var props = schema.properties || {};
          var result = {};
          var keys = Object.keys(props);
          var children = fieldEl.querySelectorAll(":scope > .sf-object-group > .sf-field");
          keys.forEach(function (key, i) {
            var child = children[i];
            if (child) result[key] = collectFieldValue(child, props[key]);
          });
          return result;
        }
        if (type === "array") {
          var itemSchema = schema.items || { type: "string" };
          var rows = fieldEl.querySelectorAll(":scope .sf-array-item");
          var arr = [];
          rows.forEach(function (row) {
            var childField = row.querySelector(".sf-field");
            if (childField) arr.push(collectFieldValue(childField, itemSchema));
          });
          return arr;
        }
        /* string default */
        var strInput = fieldEl.querySelector("input.sf-input, textarea.sf-textarea");
        return strInput ? strInput.value : "";
      }

      function collectFormValues(schema) {
        if (!currentSchema || !schema) return {};
        if (schema.type !== "object") {
          /* Top-level non-object: collect root field */
          var rootField = formPreviewEl.querySelector(".sf-form > .sf-field");
          if (rootField) return collectFieldValue(rootField, schema);
          return null;
        }
        var props = schema.properties || {};
        var result = {};
        var keys = Object.keys(props);
        var topFields = formPreviewEl.querySelectorAll(".sf-form > .sf-field");
        /* Skip title/desc divs — they're not .sf-field */
        keys.forEach(function (key, i) {
          var child = topFields[i];
          if (child) result[key] = collectFieldValue(child, props[key]);
        });
        return result;
      }

      function syncOutputJson() {
        if (!currentSchema) return;
        try {
          var vals = collectFormValues(currentSchema);
          outputJsonEl.value = JSON.stringify(vals, null, 2);
          updateValidationBadge(vals, currentSchema);
        } catch (e) {
          outputJsonEl.value = "";
        }
      }

      /* ── Simple validation ── */
      function validateValue(val, schema, required) {
        var errors = [];
        var strVal = String(val === null || val === undefined ? "" : val);
        if (required && (val === null || val === undefined || strVal === "")) {
          errors.push("此字段必填");
          return errors;
        }
        if (!strVal && !required) return errors;

        var type = schema.type;
        if (type === "integer") {
          if (!/^-?\d+$/.test(strVal)) errors.push("请输入整数");
          else {
            var n = parseInt(strVal, 10);
            if (schema.minimum !== undefined && n < schema.minimum)
              errors.push("最小值为 " + schema.minimum);
            if (schema.maximum !== undefined && n > schema.maximum)
              errors.push("最大值为 " + schema.maximum);
          }
        } else if (type === "number") {
          if (isNaN(parseFloat(strVal))) errors.push("请输入数字");
          else {
            var nf = parseFloat(strVal);
            if (schema.minimum !== undefined && nf < schema.minimum)
              errors.push("最小值为 " + schema.minimum);
            if (schema.maximum !== undefined && nf > schema.maximum)
              errors.push("最大值为 " + schema.maximum);
          }
        } else if (type === "string" || !type) {
          if (schema.minLength !== undefined && strVal.length < schema.minLength)
            errors.push("最少 " + schema.minLength + " 个字符");
          if (schema.maxLength !== undefined && strVal.length > schema.maxLength)
            errors.push("最多 " + schema.maxLength + " 个字符");
          if (schema.pattern) {
            try {
              if (!new RegExp(schema.pattern).test(strVal))
                errors.push("格式不符: " + schema.pattern);
            } catch (_e) {}
          }
          if (schema.format === "email" && strVal) {
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(strVal)) errors.push("邮箱格式不正确");
          }
        }
        return errors;
      }

      function updateValidationBadge(vals, schema) {
        if (!schema || schema.type !== "object") {
          validationBadgeEl.textContent = "";
          return;
        }
        var req = getRequired(schema);
        var props = schema.properties || {};
        var allOk = true;
        req.forEach(function (key) {
          var v = vals[key];
          if (v === null || v === undefined || v === "") allOk = false;
        });
        Object.keys(props).forEach(function (key) {
          var isReq = req.indexOf(key) !== -1;
          var v = vals[key];
          var errs = validateValue(v, props[key], isReq);
          if (errs.length) allOk = false;
        });
        validationBadgeEl.textContent = allOk ? "✓ 验证通过" : "⚠ 存在错误";
        validationBadgeEl.style.color = allOk ? "var(--color-success)" : "var(--color-warning)";
      }

      /* ── Generate ── */
      function generateForm() {
        hideError();
        var raw = schemaInputEl.value.trim();
        if (!raw) {
          showStatus("请输入 JSON Schema", "error");
          return;
        }
        var schema;
        try {
          schema = JSON.parse(raw);
        } catch (e) {
          schemaInputEl.classList.add("error");
          showError("JSON 解析失败: " + e.message);
          showStatus("Schema 解析失败", "error");
          return;
        }
        schemaInputEl.classList.remove("error");
        currentSchema = schema;
        fieldIdCounter = 0;

        /* Clear form */
        formPreviewEl.innerHTML = "";
        formPreviewEl.classList.add("has-content");

        var form = document.createElement("div");
        form.className = "sf-form";

        if (schema.title) {
          var h = document.createElement("div");
          h.className = "sf-title";
          h.textContent = schema.title;
          form.appendChild(h);
        }
        if (schema.description) {
          var d = document.createElement("div");
          d.className = "sf-desc";
          d.textContent = schema.description;
          form.appendChild(d);
        }

        if (schema.type === "object") {
          var props = schema.properties || {};
          var req = getRequired(schema);
          Object.keys(props).forEach(function (key) {
            var child = buildField(props[key], key, req.indexOf(key) !== -1, 0);
            form.appendChild(child);
          });
        } else {
          form.appendChild(buildField(schema, "value", false, 0));
        }

        /* Submit / Reset row */
        var submitRow = document.createElement("div");
        submitRow.className = "sf-submit-row";

        var submitBtn = document.createElement("button");
        submitBtn.type = "button";
        submitBtn.className = "sf-submit";
        submitBtn.textContent = "提交（收集值）";
        submitBtn.onclick = function () {
          syncOutputJson();
          showStatus("表单值已收集到下方 JSON", "success");
        };
        submitRow.appendChild(submitBtn);

        var resetBtn = document.createElement("button");
        resetBtn.type = "button";
        resetBtn.className = "sf-reset";
        resetBtn.textContent = "重置";
        resetBtn.onclick = function () {
          generateForm();
        };
        submitRow.appendChild(resetBtn);
        form.appendChild(submitRow);

        formPreviewEl.appendChild(form);
        syncOutputJson();
        showStatus(
          "表单已生成 · " + Object.keys(schema.properties || {}).length + " 个字段",
          "success"
        );
        localStorage.setItem(LS_KEY, raw);
      }

      /* ── Button wiring ── */
      document.getElementById("btnGenerate").onclick = generateForm;

      document.getElementById("btnExample").onclick = function () {
        schemaInputEl.value = EXAMPLE_SCHEMA;
        schemaInputEl.classList.remove("error");
        generateForm();
      };

      document.getElementById("btnClear").onclick = function () {
        schemaInputEl.value = "";
        schemaInputEl.classList.remove("error");
        formPreviewEl.innerHTML = '<p class="empty-hint">← 输入 Schema 后点击「生成表单」</p>';
        formPreviewEl.classList.remove("has-content");
        outputJsonEl.value = "";
        validationBadgeEl.textContent = "";
        currentSchema = null;
        hideError();
        statusEl.textContent = "";
        statusEl.className = "status";
        localStorage.removeItem(LS_KEY);
      };

      document.getElementById("btnCopyJson").onclick = async function () {
        if (!outputJsonEl.value) {
          showStatus("没有内容可复制", "error");
          return;
        }
        try {
          await navigator.clipboard.writeText(outputJsonEl.value);
          showStatus("JSON 已复制", "success");
        } catch (_e) {
          showStatus("复制失败", "error");
        }
      };

      /* Ctrl/Cmd+Enter to generate */
      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          generateForm();
        }
      });

      /* Restore from localStorage */
      (function () {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) {
          schemaInputEl.value = saved;
        }
      })();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
