      .status-bar {

      .footer {

      :focus-visible {

    </style>
    <script src="../../assets/js/tool-chrome.js"></script>

  <body>
    <nav class="nav-bar">

    <main class="main-content">
      <div class="tool-card">
        <div class="tool-header">
          <div class="tool-icon">px</div>
          <div class="tool-info">
            <h1>px / rem / em 单位转换器</h1>
            <p class="desc">基于根字号在 px、rem、em、pt 之间互相换算，实时同步，纯本地处理</p>
          </div>
        </div>

        <!-- Settings row -->
        <div class="settings-row">
          <div class="settings-group">
            <label for="rootFontSize">根字号 (root):</label>
            <input
              id="rootFontSize"
              class="settings-input"
              type="number"
              value="16"
              min="1"
              max="100"
              step="1"
            />
            <span>px</span>
          </div>
          <div class="settings-group">
            <label for="parentFontSize">父元素字号 (parent):</label>
            <input
              id="parentFontSize"
              class="settings-input"
              type="number"
              value="16"
              min="1"
              max="100"
              step="1"
            />
            <span>px</span>
          </div>
          <div class="settings-group">
            <label for="decimalPlaces">小数位:</label>
            <select id="decimalPlaces">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>

        <!-- Converter inputs -->
        <div class="converter-grid">
          <div class="unit-block" id="blockPx">
            <div class="unit-label">px</div>
            <input
              id="inputPx"
              class="unit-input"
              type="number"
              placeholder="0"
              aria-label="像素值"
            />
            <div class="unit-sublabel">像素（绝对单位）</div>
          </div>
          <div class="unit-block" id="blockRem">
            <div class="unit-label">rem</div>
            <input
              id="inputRem"
              class="unit-input"
              type="number"
              placeholder="0"
              aria-label="rem 值"
            />
            <div class="unit-sublabel">相对根字号</div>
          </div>
          <div class="unit-block" id="blockEm">
            <div class="unit-label">em</div>
            <input
              id="inputEm"
              class="unit-input"
              type="number"
              placeholder="0"
              aria-label="em 值"
            />
            <div class="unit-sublabel">相对父元素字号</div>
          </div>
          <div class="unit-block" id="blockPt">
            <div class="unit-label">pt</div>
            <input
              id="inputPt"
              class="unit-input"
              type="number"
              placeholder="0"
              aria-label="pt 值"
            />
            <div class="unit-sublabel">磅（打印单位）</div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <div class="btn-group">
            <button id="btnCopy" class="btn btn-primary">复制 CSS</button>
            <button id="btnReset" class="btn">重置</button>
          </div>
        </div>

        <!-- Status -->
        <div class="status-bar">
          <div id="statusEl" class="status"></div>
        </div>

        <!-- Reference table -->
        <div class="ref-table-wrap">
          <div class="ref-table-title">常用尺寸速查（根字号 16px）— 点击行即填入</div>
          <table class="ref-table" id="refTable">
            <thead>
              <tr>
                <th>描述</th>
                <th class="val-px">px</th>
                <th class="val-rem">rem</th>
                <th class="val-em">em</th>
                <th class="val-pt">pt</th>
              </tr>
            </thead>
            <tbody id="refTableBody"></tbody>
          </table>
          <p class="copy-hint">点击表格中的行可快速填入转换器</p>
        </div>
      </div>
      <footer class="footer">

          <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub

          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>

    <script>
      var inputPx = document.getElementById("inputPx");
      var inputRem = document.getElementById("inputRem");
      var inputEm = document.getElementById("inputEm");
      var inputPt = document.getElementById("inputPt");
      var rootFontSizeEl = document.getElementById("rootFontSize");
      var parentFontSizeEl = document.getElementById("parentFontSize");
      var decimalPlacesEl = document.getElementById("decimalPlaces");
      var statusEl = document.getElementById("statusEl");

      // pt conversion: 1 inch = 72pt, 1 inch = 96px → 1px = 72/96 pt
      var PT_PER_PX = 72 / 96;

      function getRootPx() {
        return parseFloat(rootFontSizeEl.value) || 16;
      }
      function getParentPx() {
        return parseFloat(parentFontSizeEl.value) || 16;
      }
      function getDecimals() {
        return parseInt(decimalPlacesEl.value, 10) || 2;
      }
      function fmt(n) {
        var d = getDecimals();
        var s = parseFloat(n.toFixed(d));
        return String(s);
      }

      var activeSource = null;

      function clearHighlight() {
        ["blockPx", "blockRem", "blockEm", "blockPt"].forEach(function (id) {
          document.getElementById(id).classList.remove("active-source");
        });
      }

      function convertFrom(source, value) {
        var px;
        if (value === "" || value === null || isNaN(parseFloat(value))) {
          inputPx.value = "";
          inputRem.value = "";
          inputEm.value = "";
          inputPt.value = "";
          return;
        }
        var v = parseFloat(value);
        var root = getRootPx();
        var parent = getParentPx();

        if (source === "px") {
          px = v;
        } else if (source === "rem") {
          px = v * root;
        } else if (source === "em") {
          px = v * parent;
        } else if (source === "pt") {
          px = v / PT_PER_PX;
        }

        clearHighlight();
        document
          .getElementById("block" + source.charAt(0).toUpperCase() + source.slice(1))
          .classList.add("active-source");

        if (source !== "px") inputPx.value = fmt(px);
        if (source !== "rem") inputRem.value = fmt(px / root);
        if (source !== "em") inputEm.value = fmt(px / parent);
        if (source !== "pt") inputPt.value = fmt(px * PT_PER_PX);
      }

      inputPx.addEventListener("input", function () {
        activeSource = "px";
        convertFrom("px", inputPx.value);
      });
      inputRem.addEventListener("input", function () {
        activeSource = "rem";
        convertFrom("rem", inputRem.value);
      });
      inputEm.addEventListener("input", function () {
        activeSource = "em";
        convertFrom("em", inputEm.value);
      });
      inputPt.addEventListener("input", function () {
        activeSource = "pt";
        convertFrom("pt", inputPt.value);
      });

      // Re-convert when settings change
      function reConvert() {
        if (activeSource) {
          var el = document.getElementById(
            "input" + activeSource.charAt(0).toUpperCase() + activeSource.slice(1)
          );
          convertFrom(activeSource, el.value);
        }
        buildRefTable();
      }
      rootFontSizeEl.addEventListener("input", reConvert);
      parentFontSizeEl.addEventListener("input", reConvert);
      decimalPlacesEl.addEventListener("change", function () {
        reConvert();
      });

      // Copy CSS button
      document.getElementById("btnCopy").onclick = function () {
        var px = inputPx.value;
        var rem = inputRem.value;
        var em = inputEm.value;
        var pt = inputPt.value;
        if (!px && !rem && !em && !pt) {
          showStatus("请先输入一个值", "error");
          return;
        }
        var lines = [];
        if (px) lines.push("/* " + px + "px */");
        if (rem) lines.push("font-size: " + rem + "rem;");
        if (em) lines.push("font-size: " + em + "em;");
        if (pt) lines.push("/* " + pt + "pt */");
        var text = lines.join("\n");
        navigator.clipboard
          .writeText(text)
          .then(function () {
            showStatus("已复制 CSS 片段", "success");
          })
          .catch(function () {
            showStatus("复制失败", "error");
          });
      };

      // Reset button
      document.getElementById("btnReset").onclick = function () {
        inputPx.value = "";
        inputRem.value = "";
        inputEm.value = "";
        inputPt.value = "";
        activeSource = null;
        clearHighlight();
        statusEl.textContent = "";
        statusEl.className = "status";
      };

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      // Reference table
      var REF_SIZES = [
        { label: "1px 边框", px: 1 },
        { label: "xs (10px)", px: 10 },
        { label: "sm (12px)", px: 12 },
        { label: "base (14px)", px: 14 },
        { label: "base (16px)", px: 16 },
        { label: "lg (18px)", px: 18 },
        { label: "xl (20px)", px: 20 },
        { label: "2xl (24px)", px: 24 },
        { label: "3xl (30px)", px: 30 },
        { label: "4xl (36px)", px: 36 },
        { label: "5xl (48px)", px: 48 },
        { label: "6xl (60px)", px: 60 },
        { label: "7xl (72px)", px: 72 },
        { label: "icon-sm (16px)", px: 16 },
        { label: "icon-md (24px)", px: 24 },
        { label: "icon-lg (32px)", px: 32 },
        { label: "spacing-4 (16px)", px: 16 },
        { label: "spacing-8 (32px)", px: 32 },
        { label: "spacing-16 (64px)", px: 64 },
        { label: "spacing-32 (128px)", px: 128 }
      ];

      function buildRefTable() {
        var root = getRootPx();
        var parent = getParentPx();
        var tbody = document.getElementById("refTableBody");
        tbody.innerHTML = "";
        REF_SIZES.forEach(function (row) {
          var tr = document.createElement("tr");
          var pxVal = row.px;
          var remVal = fmt(pxVal / root);
          var emVal = fmt(pxVal / parent);
          var ptVal = fmt(pxVal * PT_PER_PX);
          var tdLabel = document.createElement("td");
          tdLabel.textContent = row.label;
          var tdPx = document.createElement("td");
          tdPx.className = "val-px";
          tdPx.textContent = pxVal + "px";
          var tdRem = document.createElement("td");
          tdRem.className = "val-rem";
          tdRem.textContent = remVal + "rem";
          var tdEm = document.createElement("td");
          tdEm.className = "val-em";
          tdEm.textContent = emVal + "em";
          var tdPt = document.createElement("td");
          tdPt.className = "val-pt";
          tdPt.textContent = ptVal + "pt";
          tr.appendChild(tdLabel);
          tr.appendChild(tdPx);
          tr.appendChild(tdRem);
          tr.appendChild(tdEm);
          tr.appendChild(tdPt);

          tr.addEventListener("click", function () {
            inputPx.value = String(pxVal);
            activeSource = "px";
            convertFrom("px", pxVal);
            showStatus("已填入 " + pxVal + "px", "success");
          });

          tbody.appendChild(tr);
        });
      }

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
      buildRefTable();
    </script>
