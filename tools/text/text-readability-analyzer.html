    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .panel-textarea {
        flex: 1;
        width: 100%;
        min-height: 350px;
        padding: var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        line-height: 1.6;
        color: var(--color-text-primary);
        background: var(--color-bg-input);
        border: 2px solid var(--color-border-default);
        border-radius: var(--radius-md);
        resize: vertical;
        tab-size: 2;
        transition: all var(--transition-fast);
      }
      .panel-textarea::placeholder {
        color: var(--text-muted);
      }
      .panel-textarea:hover {
        border-color: var(--color-border-strong);
      }
      .panel-textarea:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;

    <script>
      var inputTextEl = document.getElementById("inputText");
      var resultsPanelEl = document.getElementById("resultsPanel");
      var resultsPlaceholderEl = document.getElementById("resultsPlaceholder");
      var statusEl = document.getElementById("statusEl");
      var wordCountLabelEl = document.getElementById("wordCountLabel");
      var LS_KEY = "readability_input_v1";

      var SAMPLE_TEXT =
        "The quick brown fox jumps over the lazy dog. Reading is a complex cognitive process " +
        "that involves decoding symbols to derive meaning. Skilled readers can process text " +
        "automatically, allowing them to focus on comprehension rather than individual words. " +
        "Research shows that readability affects how easily readers understand and retain information. " +
        "Sentences with fewer syllables and shorter lengths tend to score higher on readability scales. " +
        "The Flesch Reading Ease score, developed by Rudolf Flesch in 1948, remains one of the most " +
        "widely used readability formulas today. It considers both average sentence length and the " +
        "average number of syllables per word. Higher scores indicate material that is easier to read. " +
        "A score of 70 or above is considered easy to read by most adults, while scores below 30 " +
        "indicate very difficult text suitable for university graduates and professionals.";

      function countSyllables(word) {
        word = word.toLowerCase().replace(/[^a-z]/g, "");
        if (!word) return 0;
        if (word.length <= 3) return 1;
        word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, "");
        word = word.replace(/^y/, "");
        var matches = word.match(/[aeiouy]{1,2}/g);
        return matches ? matches.length : 1;
      }

      function tokenize(text) {
        var sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
        sentences = sentences.filter(function (s) {
          return s.trim().length > 0;
        });
        var words = text.match(/\b[a-zA-Z'-]+\b/g) || [];
        words = words.filter(function (w) {
          return w.replace(/['-]/g, "").length > 0;
        });
        return { sentences: sentences, words: words };
      }

      function getPolysyllableCount(words) {
        return words.filter(function (w) {
          return countSyllables(w) >= 3;
        }).length;
      }

      function getTotalSyllables(words) {
        return words.reduce(function (sum, w) {
          return sum + countSyllables(w);
        }, 0);
      }

      function calcFleschReadingEase(asl, asw) {
        return 206.835 - 1.015 * asl - 84.6 * asw;
      }

      function calcFleschKincaidGrade(asl, asw) {
        return 0.39 * asl + 11.8 * asw - 15.59;
      }

      function calcGunningFog(asl, polyRatio) {
        return 0.4 * (asl + 100 * polyRatio);
      }

      function calcSMOG(polySyllableCount, sentenceCount) {
        if (sentenceCount < 3) return null;
        return 3.1291 + 1.043 * Math.sqrt(polySyllableCount * (30 / sentenceCount));
      }

      function calcColemanLiau(chars, words, sentences) {
        var L = (chars / words) * 100;
        var S = (sentences / words) * 100;
        return 0.0588 * L - 0.296 * S - 15.8;
      }

      function calcAutomatedReadability(chars, words, sentences) {
        return 4.71 * (chars / words) + 0.5 * (words / sentences) - 21.43;
      }

      function gradeLabel(grade) {
        if (grade === null || isNaN(grade)) return "N/A";
        grade = Math.max(1, Math.round(grade));
        if (grade <= 5) return "小学 (Grade " + grade + ")";
        if (grade <= 8) return "初中 (Grade " + grade + ")";
        if (grade <= 12) return "高中 (Grade " + grade + ")";
        if (grade <= 16) return "大学 (Grade " + grade + ")";
        return "研究生+ (Grade " + grade + ")";
      }

      function fleschLabel(score) {
        if (score >= 90) return "极易 (90-100)";
        if (score >= 80) return "很容易 (80-90)";
        if (score >= 70) return "容易 (70-80)";
        if (score >= 60) return "标准 (60-70)";
        if (score >= 50) return "稍难 (50-60)";
        if (score >= 30) return "难 (30-50)";
        return "极难 (<30)";
      }

      function scoreClass(grade) {
        if (grade === null || isNaN(grade)) return "";
        grade = parseFloat(grade);
        if (grade <= 8) return "good";
        if (grade <= 12) return "warn";
        return "bad";
      }

      function flescheScoreClass(score) {
        if (score >= 60) return "good";
        if (score >= 30) return "warn";
        return "bad";
      }

      function fmt(num, decimals) {
        if (num === null || num === undefined || isNaN(num)) return "N/A";
        return Number(num).toFixed(decimals === undefined ? 1 : decimals);
      }

      function makeGradeBar(label, pct, display) {
        return (
          '<div class="grade-bar-row">' +
          '<div class="grade-bar-label">' +
          label +
          "</div>" +
          '<div class="grade-bar-track">' +
          '<div class="grade-bar-fill" style="width:' +
          pct.toFixed(1) +
          '%"></div>' +
          "</div>" +
          '<div class="grade-bar-num">' +
          display +
          "</div>" +
          "</div>"
        );
      }

      function analyze() {
        var text = inputTextEl.value.trim();
        if (!text) {
          showStatus("请输入文本", "error");
          return;
        }

        var tokens = tokenize(text);
        var words = tokens.words;
        var sentences = tokens.sentences;

        if (words.length < 10) {
          showStatus("文本太短，建议至少 10 个单词", "error");
          return;
        }

        var wordCount = words.length;
        var sentenceCount = sentences.length;
        var charCount = text.replace(/[^a-zA-Z]/g, "").length;
        var syllableCount = getTotalSyllables(words);
        var polySyllableCount = getPolysyllableCount(words);

        var asl = wordCount / sentenceCount;
        var asw = syllableCount / wordCount;
        var polyRatio = polySyllableCount / wordCount;

        var fre = calcFleschReadingEase(asl, asw);
        var fk = calcFleschKincaidGrade(asl, asw);
        var fog = calcGunningFog(asl, polyRatio);
        var smog = calcSMOG(polySyllableCount, sentenceCount);
        var cli = calcColemanLiau(charCount, wordCount, sentenceCount);
        var ari = calcAutomatedReadability(charCount, wordCount, sentenceCount);

        var gradeValues = [fk, fog, cli, ari];
        if (smog !== null) gradeValues.push(smog);
        var avgGrade =
          gradeValues
            .filter(function (v) {
              return !isNaN(v);
            })
            .reduce(function (a, b) {
              return a + b;
            }, 0) /
          gradeValues.filter(function (v) {
            return !isNaN(v);
          }).length;

        resultsPlaceholderEl.style.display = "none";

        var scoreCardsHtml =
          '<div class="score-cards">' +
          '<div class="score-card ' +
          flescheScoreClass(fre) +
          '">' +
          '<div class="score-card-name">Flesch Reading Ease</div>' +
          '<div class="score-card-value">' +
          fmt(fre, 1) +
          "</div>" +
          '<div class="score-card-label">' +
          fleschLabel(fre) +
          "</div>" +
          "</div>" +
          '<div class="score-card ' +
          scoreClass(fk) +
          '">' +
          '<div class="score-card-name">Flesch-Kincaid Grade</div>' +
          '<div class="score-card-value">' +
          fmt(fk, 1) +
          "</div>" +
          '<div class="score-card-label">' +
          gradeLabel(fk) +
          "</div>" +
          "</div>" +
          '<div class="score-card ' +
          scoreClass(fog) +
          '">' +
          '<div class="score-card-name">Gunning Fog Index</div>' +
          '<div class="score-card-value">' +
          fmt(fog, 1) +
          "</div>" +
          '<div class="score-card-label">' +
          gradeLabel(fog) +
          "</div>" +
          "</div>" +
          '<div class="score-card ' +
          scoreClass(smog) +
          '">' +
          '<div class="score-card-name">SMOG Index</div>' +
          '<div class="score-card-value">' +
          (smog !== null ? fmt(smog, 1) : "N/A") +
          "</div>" +
          '<div class="score-card-label">' +
          (smog !== null ? gradeLabel(smog) : "需 3+ 句") +
          "</div>" +
          "</div>" +
          '<div class="score-card ' +
          scoreClass(cli) +
          '">' +
          '<div class="score-card-name">Coleman-Liau Index</div>' +
          '<div class="score-card-value">' +
          fmt(cli, 1) +
          "</div>" +
          '<div class="score-card-label">' +
          gradeLabel(cli) +
          "</div>" +
          "</div>" +
          '<div class="score-card ' +
          scoreClass(ari) +
          '">' +
          '<div class="score-card-name">Automated Readability</div>' +
          '<div class="score-card-value">' +
          fmt(ari, 1) +
          "</div>" +
          '<div class="score-card-label">' +
          gradeLabel(ari) +
          "</div>" +
          "</div>" +
          "</div>";

        var statsHtml =
          '<div class="stats-section">' +
          '<div class="stats-section-title">基础统计</div>' +
          '<div class="stats-grid">' +
          '<div class="stat-row"><div class="stat-row-value">' +
          wordCount +
          '</div><div class="stat-row-label">单词数</div></div>' +
          '<div class="stat-row"><div class="stat-row-value">' +
          sentenceCount +
          '</div><div class="stat-row-label">句子数</div></div>' +
          '<div class="stat-row"><div class="stat-row-value">' +
          syllableCount +
          '</div><div class="stat-row-label">音节数</div></div>' +
          '<div class="stat-row"><div class="stat-row-value">' +
          fmt(asl, 1) +
          '</div><div class="stat-row-label">平均句长(词)</div></div>' +
          '<div class="stat-row"><div class="stat-row-value">' +
          fmt(asw, 2) +
          '</div><div class="stat-row-label">平均音节/词</div></div>' +
          '<div class="stat-row"><div class="stat-row-value">' +
          polySyllableCount +
          '</div><div class="stat-row-label">多音节词</div></div>' +
          "</div>" +
          "</div>";

        var gradeBarHtml =
          '<div class="grade-bar-section">' +
          '<div class="grade-bar-title">各指标对比（年级/易读分）</div>' +
          makeGradeBar("Flesch Ease", Math.min(100, Math.max(0, fre)), fmt(fre, 1)) +
          makeGradeBar("FK Grade", Math.min(100, Math.max(0, fk) * 5), fmt(fk, 1)) +
          makeGradeBar("Gunning Fog", Math.min(100, Math.max(0, fog) * 5), fmt(fog, 1)) +
          makeGradeBar(
            "SMOG",
            smog !== null ? Math.min(100, Math.max(0, smog) * 5) : 0,
            smog !== null ? fmt(smog, 1) : "N/A"
          ) +
          makeGradeBar("Coleman-Liau", Math.min(100, Math.max(0, cli) * 5), fmt(cli, 1)) +
          makeGradeBar("ARI", Math.min(100, Math.max(0, ari) * 5), fmt(ari, 1)) +
          "</div>";

        var avgHtml =
          '<div class="stats-section">' +
          '<div class="stats-section-title">综合评估</div>' +
          '<div class="stats-grid">' +
          '<div class="stat-row"><div class="stat-row-value" style="color:var(--color-accent-primary)">' +
          fmt(avgGrade, 1) +
          '</div><div class="stat-row-label">平均年级水平</div></div>' +
          '<div class="stat-row"><div class="stat-row-value">' +
          gradeLabel(avgGrade) +
          '</div><div class="stat-row-label">阅读年级</div></div>' +
          '<div class="stat-row"><div class="stat-row-value">' +
          fmt(fre, 0) +
          "/100" +
          '</div><div class="stat-row-label">易读性评分</div></div>' +
          "</div>" +
          "</div>";

        resultsPanelEl.innerHTML = scoreCardsHtml + gradeBarHtml + statsHtml + avgHtml;

        showStatus(
          "分析完成 · " +
            wordCount +
            " 词 · " +
            sentenceCount +
            " 句 · 年级水平 " +
            fmt(avgGrade, 1),
          "success"
        );
        localStorage.setItem(LS_KEY, inputTextEl.value);
      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function updateWordCount() {
        var text = inputTextEl.value.trim();
        if (!text) {
          wordCountLabelEl.textContent = "";
          return;
        }
        var words = text.match(/\b[a-zA-Z'-]+\b/g) || [];
        wordCountLabelEl.textContent = words.length + " 词";
      }

      document.getElementById("btnPaste").onclick = async function () {
        try {
          var text = await navigator.clipboard.readText();
          inputTextEl.value = text;
          updateWordCount();
          showStatus("已粘贴", "success");
        } catch (e) {
          showStatus("无法访问剪贴板", "error");
        }
      };

      document.getElementById("btnAnalyze").onclick = analyze;

      document.getElementById("btnSample").onclick = function () {
        inputTextEl.value = SAMPLE_TEXT;
        updateWordCount();
        analyze();
      };

      document.getElementById("btnClear").onclick = function () {
        inputTextEl.value = "";
        resultsPanelEl.innerHTML = "";
        resultsPanelEl.appendChild(resultsPlaceholderEl);
        resultsPlaceholderEl.style.display = "";
        wordCountLabelEl.textContent = "";
        statusEl.textContent = "";
        statusEl.className = "status";
        localStorage.removeItem(LS_KEY);
      };

      document.getElementById("btnCopyReport").onclick = async function () {
        var text = inputTextEl.value.trim();
        if (!text) {
          showStatus("请先输入并分析文本", "error");
          return;
        }
        var tokens = tokenize(text);
        var words = tokens.words;
        var sentences = tokens.sentences;
        if (words.length < 10) {
          showStatus("文本太短", "error");
          return;
        }
        var wordCount = words.length;
        var sentenceCount = sentences.length;
        var syllableCount = getTotalSyllables(words);
        var polySyllableCount = getPolysyllableCount(words);
        var charCount = text.replace(/[^a-zA-Z]/g, "").length;
        var asl = wordCount / sentenceCount;
        var asw = syllableCount / wordCount;
        var polyRatio = polySyllableCount / wordCount;
        var fre = calcFleschReadingEase(asl, asw);
        var fk = calcFleschKincaidGrade(asl, asw);
        var fog = calcGunningFog(asl, polyRatio);
        var smog = calcSMOG(polySyllableCount, sentenceCount);
        var cli = calcColemanLiau(charCount, wordCount, sentenceCount);
        var ari = calcAutomatedReadability(charCount, wordCount, sentenceCount);

        var report =
          "=== Readability Report ===\n" +
          "Words: " +
          wordCount +
          "\n" +
          "Sentences: " +
          sentenceCount +
          "\n" +
          "Syllables: " +
          syllableCount +
          "\n" +
          "Avg Sentence Length: " +
          fmt(asl, 1) +
          " words\n" +
          "Avg Syllables/Word: " +
          fmt(asw, 2) +
          "\n" +
          "Polysyllable Words: " +
          polySyllableCount +
          "\n\n" +
          "Flesch Reading Ease: " +
          fmt(fre, 1) +
          " (" +
          fleschLabel(fre) +
          ")\n" +
          "Flesch-Kincaid Grade: " +
          fmt(fk, 1) +
          "\n" +
          "Gunning Fog Index: " +
          fmt(fog, 1) +
          "\n" +
          "SMOG Index: " +
          (smog !== null ? fmt(smog, 1) : "N/A") +
          "\n" +
          "Coleman-Liau Index: " +
          fmt(cli, 1) +
          "\n" +
          "Automated Readability: " +
          fmt(ari, 1) +
          "\n";

        try {
          await navigator.clipboard.writeText(report);
          showStatus("报告已复制", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      inputTextEl.addEventListener("input", function () {
        updateWordCount();
      });

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          analyze();
        }
      });

      (function () {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) {
          inputTextEl.value = saved;
          updateWordCount();
        }
      })();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
