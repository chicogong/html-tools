<style>
body {
        min-height: 100vh;
        background:
          radial-gradient(ellipse 70% 50% at 50% -10%, var(--glow-cyan), transparent),
          var(--bg-deep);
      }

      .tip-wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 56px 20px 140px;
      }

      .tip-head {
        text-align: center;
        margin-bottom: var(--space-8);
      }

      .tip-badge {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: 5px 12px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-cyan);
        background: var(--glow-cyan);
        border: 1px solid var(--tb-glass-border);
        border-radius: var(--radius-full);
      }

      .tip-head h1 {
        margin: var(--space-4) 0 var(--space-2);
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .tip-head p {
        margin: 0;
        color: var(--text-muted);
        font-size: 14px;
      }

      .tip-card {
        position: relative;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
      }

      .tip-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 3px;
        background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
      }

      .tip-body {
        padding: var(--space-8) var(--space-6) var(--space-6);
        display: flex;
        flex-direction: column;
        gap: var(--space-6);
      }

      .field-label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: var(--space-3);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text-secondary);
      }

      .field-hint {
        font-weight: 500;
        color: var(--text-muted);
      }

      .amount-box {
        display: flex;
        align-items: center;
        background: var(--bg-input);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-lg);
        padding: 0 var(--space-4);
        transition:
          border-color var(--transition-fast),
          box-shadow var(--transition-fast);
      }

      .amount-box:focus-within {
        border-color: var(--accent-cyan);
        box-shadow: 0 0 0 3px var(--glow-cyan);
      }

      .amount-box .sign {
        font-family: var(--font-mono);
        font-size: 22px;
        font-weight: 700;
        color: var(--text-muted);
      }

      .amount-box input {
        flex: 1;
        width: 100%;
        border: none;
        background: none;
        outline: none;
        padding: var(--space-4) var(--space-2);
        font-family: var(--font-mono);
        font-size: 28px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .amount-box input::placeholder {
        color: var(--border-strong);
      }

      .chips {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: var(--space-2);
      }

      .chip {
        padding: 11px 0;
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 700;
        color: var(--text-secondary);
        background: var(--bg-input);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .chip:hover {
        color: var(--text-primary);
        border-color: var(--accent-cyan);
      }

      .chip.active {
        color: #06121a;
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
      }

      .custom-row {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        margin-top: var(--space-3);
      }

      .custom-row input[type="range"] {
        flex: 1;
        accent-color: var(--accent-cyan);
      }

      .custom-pct {
        min-width: 56px;
        text-align: right;
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 700;
        color: var(--accent-cyan);
      }

      .stepper {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-input);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-lg);
        padding: var(--space-2);
      }

      .stepper button {
        width: 44px;
        height: 44px;
        font-size: 22px;
        font-weight: 700;
        color: var(--text-primary);
        background: var(--bg-card);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .stepper button:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }

      .stepper .count {
        font-family: var(--font-mono);
        font-size: 22px;
        font-weight: 700;
      }

      .stepper .count small {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
      }

      .round-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .switch {
        position: relative;
        width: 46px;
        height: 26px;
        flex-shrink: 0;
      }

      .switch input {
        position: absolute;
        opacity: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        cursor: pointer;
      }

      .switch .track {
        position: absolute;
        inset: 0;
        background: var(--bg-input);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-full);
        transition:
          background var(--transition-fast),
          border-color var(--transition-fast);
      }

      .switch .track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 18px;
        height: 18px;
        background: var(--text-muted);
        border-radius: 50%;
        transition:
          transform var(--transition-fast),
          background var(--transition-fast);
      }

      .switch input:checked + .track {
        background: var(--glow-cyan);
        border-color: var(--accent-cyan);
      }

      .switch input:checked + .track::after {
        transform: translateX(20px);
        background: var(--accent-cyan);
      }

      .result {
        background: linear-gradient(160deg, var(--bg-surface), var(--bg-input));
        border-top: 1px solid var(--border-subtle);
        padding: var(--space-6);
      }

      .result-hero {
        text-align: center;
        margin-bottom: var(--space-5);
      }

      .result-hero .cap {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--text-muted);
      }

      .result-hero .big {
        margin-top: var(--space-1);
        font-family: var(--font-mono);
        font-size: 46px;
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: -0.02em;
        background: linear-gradient(120deg, var(--accent-cyan), var(--accent-blue));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .breakdown {
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }

      .b-row {
        display: flex;
        justify-content: space-between;
        padding: var(--space-2) 0;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .b-row.total {
        margin-top: var(--space-1);
        padding-top: var(--space-3);
        border-top: 1px dashed var(--border-strong);
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .b-row .v {
        font-family: var(--font-mono);
        font-weight: 700;
        color: var(--text-primary);
      }

      .tip-foot {
        margin-top: var(--space-6);
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.7;
      }

      @media (max-width: 480px) {
        .tip-wrap {
          padding: 36px 14px 140px;
        }

        .tip-head h1 {
          font-size: 25px;
        }

        .result-hero .big {
          font-size: 38px;
        }
      }
</style>

<main class="tip-wrap">
      <header class="tip-head">
        <span class="tip-badge">计算工具</span>
        <h1>小费计算器</h1>
        <p>输入账单与小费比例，自动算出小费、总额并按人数 AA 分摊</p>
      </header>

      <section class="tip-card">
        <div class="tip-body">
          <div>
            <div class="field-label"><span>账单金额</span></div>
            <div class="amount-box">
              <span class="sign">¥</span>
              <input type="number" id="bill" inputmode="decimal" min="0" step="0.01" placeholder="0.00" aria-label="账单金额">
            </div>
          </div>

          <div>
            <div class="field-label">
              <span>小费比例</span>
              <span class="field-hint" id="pctEcho">15%</span>
            </div>
            <div class="chips" id="chips">
              <button class="chip" type="button" data-pct="10">10%</button>
              <button class="chip active" type="button" data-pct="15">15%</button>
              <button class="chip" type="button" data-pct="18">18%</button>
              <button class="chip" type="button" data-pct="20">20%</button>
              <button class="chip" type="button" data-pct="25">25%</button>
            </div>
            <div class="custom-row">
              <input type="range" id="pctRange" min="0" max="40" step="1" value="15">
              <span class="custom-pct" id="customPct">自定义</span>
            </div>
          </div>

          <div>
            <div class="field-label"><span>用餐人数</span></div>
            <div class="stepper">
              <button type="button" id="minus" aria-label="减少人数">−</button>
              <span class="count">
                <span id="people">1</span>
                <small>人</small>
              </span>
              <button type="button" id="plus" aria-label="增加人数">+</button>
            </div>
          </div>

          <label class="round-row" for="roundUp">
            <span>每人金额向上取整</span>
            <span class="switch">
              <input type="checkbox" id="roundUp">
              <span class="track"></span>
            </span>
          </label>
        </div>

        <div class="result">
          <div class="result-hero">
            <div class="cap">每人应付</div>
            <div class="big" id="perPerson">¥0.00</div>
          </div>
          <div class="breakdown">
            <div class="b-row">
              <span>账单金额</span>
              <span class="v" id="rBill">¥0.00</span>
            </div>
            <div class="b-row">
              <span>
                小费
                <span id="rPctTag">· 15%</span>
              </span>
              <span class="v" id="rTip">¥0.00</span>
            </div>
            <div class="b-row total">
              <span>合计支付</span>
              <span class="v" id="rTotal">¥0.00</span>
            </div>
          </div>
        </div>
      </section>

      <p class="tip-foot">
        全部计算在你的浏览器本地完成，不会上传任何数据。
        <br>
        参数实时保存在网址里，复制链接即可分享这笔账单。
      </p>
    </main>

<script>
{
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "首页",
            "item": "https://tools.realtime-ai.chat/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "计算工具",
            "item": "https://tools.realtime-ai.chat/#calculator"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "小费计算器",
            "item": "https://tools.realtime-ai.chat/tools/calculator/tip-calculator.html"
          }
        ]
      }

(function () {
        var state = { bill: 0, pct: 15, people: 1, round: false };

        var $ = function (id) {
          return document.getElementById(id);
        };
        var fmt = function (n) {
          return "¥" + (Math.round(n * 100) / 100).toFixed(2);
        };

        function render() {
          var tip = state.bill * (state.pct / 100);
          var total = state.bill + tip;
          var per = total / state.people;
          if (state.round) {
            per = Math.ceil(per);
            total = per * state.people;
            tip = total - state.bill;
          }
          $("perPerson").textContent = fmt(per);
          $("rBill").textContent = fmt(state.bill);
          $("rTip").textContent = fmt(tip);
          $("rTotal").textContent = fmt(total);
          $("rPctTag").textContent = " · " + state.pct + "%";
          $("pctEcho").textContent = state.pct + "%";
          syncHash();
        }

        function syncChips() {
          var matched = false;
          document.querySelectorAll(".chip").forEach(function (c) {
            var on = Number(c.dataset.pct) === state.pct;
            c.classList.toggle("active", on);
            if (on) matched = true;
          });
          $("customPct").textContent = matched ? "自定义" : state.pct + "%";
          $("pctRange").value = state.pct;
        }

        function syncHash() {
          var p = new URLSearchParams();
          if (state.bill) p.set("b", state.bill);
          p.set("p", state.pct);
          p.set("n", state.people);
          if (state.round) p.set("r", "1");
          history.replaceState(null, "", "#" + p.toString());
        }

        function loadHash() {
          var p = new URLSearchParams(location.hash.slice(1));
          if (p.has("b")) {
            state.bill = parseFloat(p.get("b")) || 0;
            $("bill").value = state.bill || "";
          }
          if (p.has("p")) state.pct = Math.min(40, Math.max(0, parseInt(p.get("p"), 10) || 15));
          if (p.has("n")) state.people = Math.max(1, parseInt(p.get("n"), 10) || 1);
          if (p.get("r") === "1") {
            state.round = true;
            $("roundUp").checked = true;
          }
          $("people").textContent = state.people;
        }

        $("bill").addEventListener("input", function () {
          state.bill = parseFloat(this.value) || 0;
          render();
        });

        $("chips").addEventListener("click", function (e) {
          var chip = e.target.closest(".chip");
          if (!chip) return;
          state.pct = Number(chip.dataset.pct);
          syncChips();
          render();
        });

        $("pctRange").addEventListener("input", function () {
          state.pct = Number(this.value);
          syncChips();
          render();
        });

        $("minus").addEventListener("click", function () {
          state.people = Math.max(1, state.people - 1);
          $("people").textContent = state.people;
          render();
        });

        $("plus").addEventListener("click", function () {
          state.people = Math.min(99, state.people + 1);
          $("people").textContent = state.people;
          render();
        });

        $("roundUp").addEventListener("change", function () {
          state.round = this.checked;
          render();
        });

        loadHash();
        syncChips();
        render();
      })();
</script>
