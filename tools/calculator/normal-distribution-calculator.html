    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);

    <script>
      // ── 正态分布核心数学 ──

      // 误差函数近似（Abramowitz & Stegun 7.1.26，精度 ≈ 1.5e-7）
      function erf(x) {
        var sign = x >= 0 ? 1 : -1;
        x = Math.abs(x);
        var t = 1 / (1 + 0.3275911 * x);
        var y =
          1 -
          ((((1.061405429 * t - 1.453152027) * t + 1.421413741) * t - 0.284496736) * t +
            0.254829592) *
            t *
            Math.exp(-x * x);
        return sign * y;
      }

      // 标准正态 CDF Φ(z)
      function stdNormCdf(z) {
        return 0.5 * (1 + erf(z / Math.SQRT2));
      }

      // 标准正态 PDF φ(z)
      function stdNormPdf(z) {
        return Math.exp(-0.5 * z * z) / Math.sqrt(2 * Math.PI);
      }

      // 一般正态 PDF f(x; μ, σ)
      function normPdf(x, mu, sigma) {
        var z = (x - mu) / sigma;
        return stdNormPdf(z) / sigma;
      }

      // 一般正态 CDF F(x; μ, σ)
      function normCdf(x, mu, sigma) {
        return stdNormCdf((x - mu) / sigma);
      }

      // 逆标准正态 CDF（Beasley-Springer-Moro 算法，精度 ≈ 4.5e-4）
      function invNormCdf(p) {
        if (p <= 0) return -Infinity;
        if (p >= 1) return Infinity;
        var a = [
          -3.969683028665376e1, 2.209460984245205e2, -2.759285104469687e2, 1.38357751867269e2,
          -3.066479806614716e1, 2.506628277459239
        ];
        var b = [
          -5.447609879822406e1, 1.615858368580409e2, -1.556989798598866e2, 6.680131188771972e1,
          -1.328068155288572e1
        ];
        var c = [
          -7.784894002430293e-3, -3.223964580411365e-1, -2.400758277161838, -2.549732539343734,
          4.374664141464968, 2.938163982698783
        ];
        var d = [7.784695709041462e-3, 3.224671290700398e-1, 2.445134137142996, 3.754408661907416];
        var pLow = 0.02425;
        var pHigh = 1 - pLow;
        var q, r;
        if (p < pLow) {
          q = Math.sqrt(-2 * Math.log(p));
          return (
            (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
            ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
          );
        } else if (p <= pHigh) {
          q = p - 0.5;
          r = q * q;
          return (
            ((((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q) /
            (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1)
          );
        } else {
          q = Math.sqrt(-2 * Math.log(1 - p));
          return (
            -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
            ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
          );
        }
      }

      // ── DOM 引用 ──
      var inputMuEl = document.getElementById("inputMu");
      var inputSigmaEl = document.getElementById("inputSigma");
      var inputXEl = document.getElementById("inputX");
      var inputAEl = document.getElementById("inputA");
      var inputBEl = document.getElementById("inputB");
      var inputZEl = document.getElementById("inputZ");
      var resultsEl = document.getElementById("resultsContainer");
      var statusEl = document.getElementById("statusMsg");
      var canvas = document.getElementById("bellCanvas");

      var panelMap = {
        point: document.getElementById("panelPoint"),
        interval: document.getElementById("panelInterval"),
        zscore: document.getElementById("panelZscore")

      // ── 数字格式化 ──
      function fmt(n, digits) {
        if (!isFinite(n)) return n > 0 ? "+∞" : "−∞";
        return n.toPrecision(digits || 7);
      }
      function fmtPct(p) {
        return (p * 100).toFixed(4) + "%";
      }

      // ── 结果渲染 ──
      function renderResults(rows) {
        resultsEl.innerHTML = "";
        rows.forEach(function (row) {
          var div = document.createElement("div");
          div.className = "nd-result-row";
          var lbl = document.createElement("span");
          lbl.className = "nd-result-label";

          div.appendChild(lbl);

      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      // ── 主计算函数 ──
      function calculate() {
        var mu = parseFloat(inputMuEl.value);
        var sigma = parseFloat(inputSigmaEl.value);

        if (isNaN(mu) || isNaN(sigma) || sigma <= 0) {
          showStatus("请输入有效的均值和正数标准差", "error");
          renderResults([{ label: "错误", value: "σ 必须 > 0" }]);
          return;
        }

        var mode = getMode();
        var rows = [];

        if (mode === "point") {
          var x = parseFloat(inputXEl.value);
          if (isNaN(x)) {
            showStatus("请输入有效的 x 值", "error");
            return;
          }
          var z = (x - mu) / sigma;
          var pdf = normPdf(x, mu, sigma);
          var cdf = normCdf(x, mu, sigma);
          rows = [
            { label: "Z-score", value: fmt(z) },
            { label: "PDF  f(x)", value: fmt(pdf) },
            { label: "CDF  P(X ≤ x)", value: fmt(cdf) + "  ≈ " + fmtPct(cdf) },
            { label: "P(X > x)", value: fmt(1 - cdf) + "  ≈ " + fmtPct(1 - cdf) },
            { label: "P(|X−μ| ≤ |x−μ|)", value: fmtPct(Math.abs(2 * cdf - 1)) }
          ];
          drawBell(mu, sigma, null, null, x, null);
        } else if (mode === "interval") {
          var a = parseFloat(inputAEl.value);
          var b = parseFloat(inputBEl.value);
          if (isNaN(a) || isNaN(b)) {
            showStatus("请输入有效的区间 [a, b]", "error");
            return;
          }
          if (a > b) {
            var tmp = a;
            a = b;
            b = tmp;
          }
          var pa = normCdf(a, mu, sigma);
          var pb = normCdf(b, mu, sigma);
          var pab = pb - pa;
          var za = (a - mu) / sigma;
          var zb = (b - mu) / sigma;
          rows = [
            { label: "P(a ≤ X ≤ b)", value: fmt(pab) + "  ≈ " + fmtPct(pab) },
            { label: "P(X < a)", value: fmtPct(pa) },
            { label: "P(X > b)", value: fmtPct(1 - pb) },
            { label: "Z(a)", value: fmt(za) },
            { label: "Z(b)", value: fmt(zb) }
          ];
          drawBell(mu, sigma, a, b, null, null);
        } else {
          var zVal = parseFloat(inputZEl.value);
          if (isNaN(zVal)) {
            showStatus("请输入有效的 Z 值", "error");
            return;
          }
          var xFromZ = mu + zVal * sigma;
          var cdfZ = stdNormCdf(zVal);
          var pdfZ = stdNormPdf(zVal);
          rows = [
            { label: "对应 x = μ + Z·σ", value: fmt(xFromZ) },
            { label: "Φ(Z)  =  P(X ≤ x)", value: fmt(cdfZ) + "  ≈ " + fmtPct(cdfZ) },
            { label: "1 − Φ(Z)", value: fmtPct(1 - cdfZ) },
            { label: "双侧  P(|X−μ| ≤ Z·σ)", value: fmtPct(Math.abs(2 * cdfZ - 1)) },
            { label: "φ(Z)  标准正态 PDF", value: fmt(pdfZ) }
          ];
          drawBell(mu, sigma, null, null, null, zVal);
        }

        renderResults(rows);
        showStatus("计算完成", "success");
      }

      // ── 钟形曲线绘制 ──
      function drawBell(mu, sigma, shadeLo, shadeHi, pointX, zVal) {
        var W = canvas.width;
        var H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        // 主题颜色
        var isDark = document.documentElement.getAttribute("data-theme") !== "light";
        var bgColor = isDark ? "#0e0e14" : "#f5f5f5";
        var axisColor = isDark ? "#2a2a3a" : "#d5d5d5";
        var curveColor = isDark ? "#00f5d4" : "#00d4b8";
        var shadeColor = isDark ? "rgba(0,245,212,0.25)" : "rgba(0,184,148,0.25)";
        var textColor = isDark ? "#8888a0" : "#666";
        var pointColor = isDark ? "#f72585" : "#e63975";
        var gridColor = isDark ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)";

        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, W, H);

        var pad = { top: 20, right: 24, bottom: 44, left: 16 };
        var cW = W - pad.left - pad.right;
        var cH = H - pad.top - pad.bottom;

        // x 范围：μ ± 4σ
        var xMin = mu - 4 * sigma;
        var xMax = mu + 4 * sigma;

        function toCanvasX(x) {
          return pad.left + ((x - xMin) / (xMax - xMin)) * cW;
        }
        function toCanvasY(y) {
          var maxPdf = normPdf(mu, mu, sigma);
          return pad.top + cH - (y / (maxPdf * 1.12)) * cH;
        }

        var steps = 400;
        var dx = (xMax - xMin) / steps;

        // 网格
        ctx.strokeStyle = gridColor;
        ctx.lineWidth = 1;
        for (var g = -4; g <= 4; g++) {
          var gx = toCanvasX(mu + g * sigma);
          ctx.beginPath();
          ctx.moveTo(gx, pad.top);
          ctx.lineTo(gx, pad.top + cH);
          ctx.stroke();
        }

        // 填色区域（区间 / 单点左侧 / Z-score 左侧）
        var fillLo = null;
        var fillHi = null;
        if (shadeLo !== null && shadeHi !== null) {
          fillLo = shadeLo;
          fillHi = shadeHi;
        } else if (pointX !== null) {
          fillLo = xMin;
          fillHi = pointX;
        } else if (zVal !== null) {
          fillLo = xMin;
          fillHi = mu + zVal * sigma;
        }

        if (fillLo !== null && fillHi !== null) {
          ctx.beginPath();
          var fStart = Math.max(fillLo, xMin);
          var fEnd = Math.min(fillHi, xMax);
          ctx.moveTo(toCanvasX(fStart), toCanvasY(0));
          for (var xi = fStart; xi <= fEnd + dx; xi += dx) {
            var xClamped = Math.min(xi, fEnd);
            ctx.lineTo(toCanvasX(xClamped), toCanvasY(normPdf(xClamped, mu, sigma)));
          }
          ctx.lineTo(toCanvasX(fEnd), toCanvasY(0));
          ctx.closePath();
          ctx.fillStyle = shadeColor;
          ctx.fill();
        }

        // 曲线
        ctx.beginPath();
        for (var i = 0; i <= steps; i++) {
          var xv = xMin + i * dx;
          var yv = normPdf(xv, mu, sigma);
          if (i === 0) {
            ctx.moveTo(toCanvasX(xv), toCanvasY(yv));
          } else {
            ctx.lineTo(toCanvasX(xv), toCanvasY(yv));
          }
        }
        ctx.strokeStyle = curveColor;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // 坐标轴
        ctx.strokeStyle = axisColor;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, pad.top + cH);
        ctx.lineTo(pad.left + cW, pad.top + cH);
        ctx.stroke();

        // 标注 μ ± σ 刻度
        ctx.fillStyle = textColor;
        ctx.font = "11px JetBrains Mono, monospace";
        ctx.textAlign = "center";
        var ticks = [-3, -2, -1, 0, 1, 2, 3];
        ticks.forEach(function (k) {
          var tx = toCanvasX(mu + k * sigma);
          var label =
            k === 0 ? "μ" : (k > 0 ? "μ+" : "μ") + (Math.abs(k) === 1 ? "" : Math.abs(k)) + "σ";
          ctx.fillText(label, tx, pad.top + cH + 16);
          ctx.beginPath();
          ctx.moveTo(tx, pad.top + cH);
          ctx.lineTo(tx, pad.top + cH + 5);
          ctx.strokeStyle = axisColor;
          ctx.stroke();
        });

        // 单点垂线
        if (pointX !== null && pointX >= xMin && pointX <= xMax) {
          var px = toCanvasX(pointX);
          var py = toCanvasY(normPdf(pointX, mu, sigma));
          ctx.beginPath();
          ctx.setLineDash([4, 4]);
          ctx.moveTo(px, pad.top + cH);
          ctx.lineTo(px, py);
          ctx.strokeStyle = pointColor;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.arc(px, py, 4, 0, 2 * Math.PI);
          ctx.fillStyle = pointColor;
          ctx.fill();
        }
      }

      // ── Z 表速查 ──
      var ztableData = [
        { z: "±1.00σ", p: "68.27%" },
        { z: "±1.28σ", p: "79.97%" },
        { z: "±1.645σ", p: "90.00%" },
        { z: "±1.96σ", p: "95.00%" },
        { z: "±2.00σ", p: "95.45%" },
        { z: "±2.326σ", p: "98.00%" },
        { z: "±2.576σ", p: "99.00%" },
        { z: "±3.00σ", p: "99.73%" },
        { z: "±3.291σ", p: "99.90%" },
        { z: "±3.891σ", p: "99.99%" },
        { z: "Z=0", p: "Φ=50.00%" },
        { z: "Z=1.282", p: "Φ=90.00%" },
        { z: "Z=1.645", p: "Φ=95.00%" },
        { z: "Z=1.960", p: "Φ=97.50%" },
        { z: "Z=2.326", p: "Φ=99.00%" },
        { z: "Z=2.576", p: "Φ=99.50%" },
        { z: "Z=3.090", p: "Φ=99.90%" },
        { z: "Z=−1.645", p: "Φ=5.00%" },
        { z: "Z=−1.960", p: "Φ=2.50%" },
        { z: "Z=−2.326", p: "Φ=1.00%" }
      ];
      var ztableGrid = document.getElementById("ztableGrid");
      ztableData.forEach(function (item) {
        var cell = document.createElement("div");
        cell.className = "nd-ztable-cell";
        var s1 = document.createElement("span");
        s1.textContent = item.z;
        var s2 = document.createElement("span");
        s2.textContent = item.p;
        cell.appendChild(s1);
        cell.appendChild(s2);
        ztableGrid.appendChild(cell);
      });

      // ── 事件绑定 ──
      document.getElementById("btnCalc").onclick = calculate;
      document.getElementById("btnReset").onclick = function () {
        inputMuEl.value = "0";
        inputSigmaEl.value = "1";
        inputXEl.value = "0";
        inputAEl.value = "-1";
        inputBEl.value = "1";
        inputZEl.value = "1.96";
        document.getElementById("modePoint").checked = true;
        Object.keys(panelMap).forEach(function (k) {
          panelMap[k].style.display = k === "point" ? "" : "none";
        });
        statusEl.textContent = "";
        statusEl.className = "status";
        calculate();
      };

      // 任意输入变化时自动重算
      [inputMuEl, inputSigmaEl, inputXEl, inputAEl, inputBEl, inputZEl].forEach(function (el) {
        el.addEventListener("input", calculate);
      });

      // ── 主题切换后重绘曲线 ──
      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        calculate();
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
      calculate();
    </script>
  </body>
</html>
