    --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
    --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);

    --bg-elevated: #fff;
    --bg-hover: #f1f5f9;
    --accent-light: rgba(0, 184, 148, 0.12);

  :root {
    --bg-deep: #0a0a0f;
    --bg-surface: #12121a;
    --bg-card: #1a1a24;
    --bg-input: #0e0e14;
    --text-primary: #e8e8ed;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --border-subtle: #2a2a3a;
    --border-strong: #3a3a4a;
    --accent-cyan: #00f5d4;
    --accent-magenta: #f72585;
    --accent-green: #10b981;
    --accent-red: #f43f5e;
    --accent-yellow: #fbbf24;
    --accent-blue: #4cc9f0;
    --accent-purple: #7b2cbf;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
    --font-mono: "JetBrains Mono", "Courier New", monospace;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  [data-theme="light"] {
    --bg-deep: #fafafa;
    --bg-surface: #fff;
    --bg-card: #fff;
    --bg-input: #f5f5f5;
    --text-primary: #1a1a1a;
    --text-secondary: #666;
    --text-muted: #999;
    --border-subtle: #e5e5e5;
    --border-strong: #d5d5d5;
    --accent-cyan: #00d4b8;
    --accent-magenta: #e63975;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  }

  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    font-family: var(--font-sans);
    background: var(--color-bg-deep);
    color: var(--color-text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    line-height: 1.5;
    transition:
      background-color var(--transition-normal),
      color var(--transition-normal);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
  }
  [data-theme="light"] body::before {
    background:
      radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
  }
  .nav-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    height: calc(var(--nav-height) + var(--safe-area-top));
    padding-top: var(--safe-area-top);
    background: var(--glass-bg);
    backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
    -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition-normal);
  }
  .nav-content {
    width: 100%;
    max-width: var(--container-max);
    height: var(--nav-height);
    padding: 0 var(--space-6);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: var(--space-4);
  }
  .nav-back {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    color: var(--color-accent-primary);
    text-decoration: none;
    font-size: 0.9375rem;
    font-weight: 500;
    padding: var(--space-2) var(--space-1);
    margin-left: calc(var(--space-2) * -1);
    border-radius: var(--radius-sm);
    transition: all var(--transition-fast);
    justify-self: start;
  }
  .nav-back:hover {
    background: var(--color-border-subtle);
  }
  .nav-back-icon {
    width: 20px;
    height: 20px;
    stroke-width: 2.5;
  }
  .nav-back-text {
    display: inline;
  }
  .nav-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-text-primary);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-actions {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    justify-self: end;
  }
  .theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: var(--radius-full);
    background: var(--color-bg-subtle);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .theme-toggle:hover {
    background: var(--color-border-strong);
    color: var(--color-text-primary);
    transform: scale(1.05);
  }
  .theme-toggle svg {
    width: 18px;
    height: 18px;
  }
  .theme-icon-dark,
  .theme-icon-light {
    display: none;
  }
  [data-theme="dark"] .theme-icon-light,
  :root:not([data-theme]) .theme-icon-light {
    display: block;
  }
  [data-theme="light"] .theme-icon-dark {
    display: block;
  }
  .main-content {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
    padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
    padding-left: var(--space-6);
    padding-right: var(--space-6);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .tool-card {
    width: 100%;
    max-width: var(--container-max);
    background: var(--glass-bg);
    backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
    -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    box-shadow: var(--shadow-lg);
    flex: 1;
    display: flex;
    flex-direction: column;
    transition: all var(--transition-normal);
    animation: fade-in-up 0.4s ease-out;
  }
  @keyframes fade-in-up {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .tool-header {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
    padding-bottom: var(--space-5);
    border-bottom: 1px solid var(--color-border-subtle);
  }
  .tool-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-tertiary));
    border-radius: var(--radius-md);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-bg-deep);
    box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
    font-family: var(--font-mono);
  }
  .tool-info h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--color-text-primary);
  }
  .tool-info .desc {
    font-size: 0.875rem;
    color: var(--text-muted);
    margin-top: var(--space-1);
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    margin-bottom: var(--space-5);
  }
  .btn-group {
    display: flex;
    gap: 2px;
    background: var(--color-bg-subtle);
    border-radius: var(--radius-sm);
    padding: 2px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    height: 36px;
    padding: 0 var(--space-4);
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--color-text-secondary);
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
  }
  .btn:hover {
    background: var(--color-bg-surface);
    color: var(--color-text-primary);
  }
  .btn-primary {
    background: var(--color-accent-primary);
    color: var(--color-bg-deep);
  }
  .btn-primary:hover {
    background: #00b894;
    box-shadow: var(--shadow-glow);
  }
  .options-bar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-5);
    align-items: center;
    margin-bottom: var(--space-5);
    font-size: 0.875rem;
  }
  .option-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    color: var(--color-text-secondary);
  }
  .option-item select {
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    padding: var(--space-2) var(--space-3);
    background: var(--color-bg-subtle);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-sm);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .option-item select:focus {
    outline: none;
    border-color: var(--color-accent-primary);
  }
  .option-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--color-accent-primary);
    cursor: pointer;
  }
  .option-item label {
    cursor: pointer;
  }
  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-label {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: var(--space-4);
    margin-top: var(--space-5);
    padding-top: var(--space-5);
    border-top: 1px solid var(--color-border-subtle);
  }
  .status {
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .status.success {
    color: var(--color-success);
  }
  .status.success::before {
    content: "✓";
  }
  .status.error {
    color: var(--color-error);
  }
  .status.error::before {
    content: "✗";
  }
  .stats {
    display: none;
    gap: var(--space-6);
    flex-wrap: wrap;
  }
  .stats.show {
    display: flex;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-accent-primary);
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .footer {
    text-align: center;
    margin-top: var(--space-5);
    padding-top: var(--space-4);
  }

    font-size: 0.75rem;

    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    flex-wrap: wrap;
  }
  .footer a {
    color: var(--color-accent-primary);
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .footer a:hover {
    color: var(--color-text-primary);
  }
  @media (max-width: 640px) {

      --nav-height: 52px;
    }
    .nav-content {
      padding: 0 var(--space-4);
    }

      display: none;
    }
    .main-content {
      padding: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4)) var(--space-4)
        calc(var(--space-5) + var(--safe-area-bottom));
    }
    .tool-card {
      padding: var(--space-4);
      border-radius: var(--radius-md);
    }
    .tool-header {
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-4);
    }
    .tool-icon {

    document.getElementById("yearRangeNote").textContent =
      "可用范围：" + rd.minYear + "–" + rd.maxYear;
    document.getElementById("fromYear").min = rd.minYear;

    document.getElementById("toYear").max = rd.maxYear;

  function getAccentColor() {
    var c = getComputedStyle(document.documentElement).getPropertyValue("--accent-cyan").trim();
    return c && c.length >= 4 ? c : "#00f5d4";
  }

  function drawChart(rd, fromYear, toYear) {
    var chartEl = document.getElementById("cpiChart");
    var startY = Math.min(fromYear, toYear);
    var endY = Math.max(fromYear, toYear);
    var years = [];
    var vals = [];
    for (var y = startY; y <= endY; y++) {
      if (rd.values[y] !== undefined) {
        years.push(y);
        vals.push(rd.values[y]);
      }
    }
    if (years.length < 2) {
      chartEl.innerHTML = "";
      return;
    }
    var minVal = Math.min.apply(null, vals);
    var maxVal = Math.max.apply(null, vals);
    var range = maxVal - minVal || 1;
    var w = 800;
    var h = 160;
    var padTop = 10;
    var padRight = 10;
    var padBottom = 20;
    var padLeft = 0;
    var innerW = w - padLeft - padRight;
    var innerH = h - padTop - padBottom;
    var points = years.map(function (yr, i) {
      return {
        x: padLeft + (i / (years.length - 1)) * innerW,
        y: padTop + innerH - ((vals[i] - minVal) / range) * innerH,
        yr: yr,
        val: vals[i]
      };
    });
    var pathD = points
      .map(function (p, i) {
        return (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1);
      })
      .join(" ");
    var lastPt = points[points.length - 1];
    var areaD =
      pathD +
      " L" +
      lastPt.x.toFixed(1) +
      "," +
      (padTop + innerH) +
      " L" +
      padLeft +
      "," +
      (padTop + innerH) +
      " Z";
    var fromPt = points[0];
    var toPt = points[points.length - 1];
    var accentColor = getAccentColor();
    chartEl.innerHTML =
      '<svg viewBox="0 0 ' +
      w +
      " " +
      h +
      '" xmlns="http://www.w3.org/2000/svg">' +
      "<defs>" +
      '<linearGradient id="cpiGrad" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="' +
      accentColor +
      '" stop-opacity="0.3"/>' +
      '<stop offset="100%" stop-color="' +
      accentColor +
      '" stop-opacity="0.02"/>' +
      "</linearGradient>" +
      "</defs>" +
      '<path d="' +
      areaD +
      '" fill="url(#cpiGrad)"/>' +
      '<path d="' +
      pathD +
      '" fill="none" stroke="' +
      accentColor +
      '" stroke-width="2"/>' +
      '<circle cx="' +
      fromPt.x.toFixed(1) +
      '" cy="' +
      fromPt.y.toFixed(1) +
      '" r="4" fill="' +
      accentColor +
      '"/>' +
      '<circle cx="' +
      toPt.x.toFixed(1) +
      '" cy="' +
      toPt.y.toFixed(1) +
      '" r="4" fill="' +
      accentColor +
      '"/>' +
      '<text x="' +
      (fromPt.x + 6).toFixed(1) +
      '" y="' +
      (fromPt.y - 6).toFixed(1) +
      '" fill="' +
      accentColor +
      '" font-size="11" font-family="monospace">' +
      fromPt.yr +
      "</text>" +
      '<text x="' +
      (toPt.x - 30).toFixed(1) +
      '" y="' +
      (toPt.y - 6).toFixed(1) +
      '" fill="' +
      accentColor +
      '" font-size="11" font-family="monospace">' +
      toPt.yr +
      "</text>" +
      "</svg>";

    var sourceMap = {
      us: "美国劳工统计局 BLS CPI-U",
      cn: "中国国家统计局 NBS",
      eu: "欧盟统计局 Eurostat HICP",
      uk: "英国国家统计局 ONS CPI",
      jp: "日本总务省统计局 CPI"
    };
    document.getElementById("chartNote").textContent =
      "数据来源：" + (sourceMap[currentRegion] || "") + "（内置历史数据，仅供参考）";
  }

  function calculate() {
    var rd = getRegionData();
    var amount = parseFloat(document.getElementById("amountInput").value);
    var fromYear = parseInt(document.getElementById("fromYear").value, 10);
    var toYear = parseInt(document.getElementById("toYear").value, 10);

    if (isNaN(amount) || amount <= 0) {
      showStatus("请输入有效金额（大于 0）", "error");
      return;
    }
    if (isNaN(fromYear) || isNaN(toYear)) {
      showStatus("请输入有效年份", "error");
      return;
    }
    if (fromYear < rd.minYear || fromYear > rd.maxYear) {
      showStatus("起始年份超出范围（" + rd.minYear + "–" + rd.maxYear + "）", "error");
      return;
    }
    if (toYear < rd.minYear || toYear > rd.maxYear) {
      showStatus("目标年份超出范围（" + rd.minYear + "–" + rd.maxYear + "）", "error");
      return;
    }

    var cpiFrom = rd.values[fromYear];
    var cpiTo = rd.values[toYear];
    if (cpiFrom === undefined || cpiTo === undefined) {
      showStatus("所选年份暂无 CPI 数据", "error");
      return;
    }

    var equivalent = (amount * cpiTo) / cpiFrom;
    var inflTotal = ((cpiTo - cpiFrom) / cpiFrom) * 100;
    var years = Math.abs(toYear - fromYear);
    var annualRate = years > 0 ? (Math.pow(cpiTo / cpiFrom, 1 / years) - 1) * 100 : 0;
    var powerChange = (cpiFrom / cpiTo - 1) * 100;

    var direction = toYear >= fromYear ? "等值于今日" : "等值于当年";
    document.getElementById("resultLabel").textContent =
      rd.symbol + fmt(amount) + " (" + fromYear + " 年) " + direction + " (" + toYear + " 年)：";
    document.getElementById("resultCurrencyPrefix").textContent = rd.symbol;
    document.getElementById("resultValue").textContent = fmt(equivalent);

    document.getElementById("metricCpiFrom").textContent = fmt(cpiFrom);
    document.getElementById("metricCpiFromLabel").textContent = fromYear + " 年 CPI";
    document.getElementById("metricCpiTo").textContent = fmt(cpiTo);
    document.getElementById("metricCpiToLabel").textContent = toYear + " 年 CPI";
    document.getElementById("metricInflTotal").textContent =
      (inflTotal >= 0 ? "+" : "") + fmt(inflTotal) + "%";
    document.getElementById("metricInflAnnual").textContent =
      years > 0 ? (annualRate >= 0 ? "+" : "") + fmt(annualRate) + "%/年" : "—";
    document.getElementById("metricPowerChange").textContent =
      (powerChange >= 0 ? "+" : "") + fmt(powerChange) + "%";
    document.getElementById("metricYears").textContent = years + " 年";

    document.getElementById("statFrom").textContent = rd.symbol + fmt(amount);
    document.getElementById("statTo").textContent = rd.symbol + fmt(equivalent);
    document.getElementById("statRate").textContent =
      years > 0 ? (annualRate >= 0 ? "+" : "") + fmt(annualRate) + "%/年" : "—";
    document.getElementById("stats").classList.add("show");

    drawChart(rd, fromYear, toYear);
    document.getElementById("resultBox").classList.add("show");
    showStatus("计算完成", "success");
  }

  document.getElementById("btnCalc").onclick = calculate;

  document.getElementById("btnSwap").onclick = function () {
    var fromEl = document.getElementById("fromYear");
    var toEl = document.getElementById("toYear");
    var tmp = fromEl.value;
    fromEl.value = toEl.value;
    toEl.value = tmp;
  };

  document.getElementById("btnReset").onclick = function () {
    var rd = getRegionData();
    document.getElementById("amountInput").value = "1000";
    document.getElementById("fromYear").value = rd.minYear < 2000 ? 2000 : rd.minYear;
    document.getElementById("toYear").value = rd.maxYear;
    document.getElementById("resultBox").classList.remove("show");
    document.getElementById("stats").classList.remove("show");
    var statusEl = document.getElementById("status");
    statusEl.textContent = "";
    statusEl.className = "status";
  };

  document.getElementById("regionSelect").addEventListener("change", function () {
    currentRegion = this.value;
    updateYearRangeNote();
    var rd = getRegionData();
    var fromEl = document.getElementById("fromYear");
    var toEl = document.getElementById("toYear");
    var fv = parseInt(fromEl.value, 10);
    var tv = parseInt(toEl.value, 10);
    if (isNaN(fv) || fv < rd.minYear) fromEl.value = rd.minYear;
    if (isNaN(fv) || fv > rd.maxYear) fromEl.value = rd.maxYear - 10;
    if (isNaN(tv) || tv < rd.minYear) toEl.value = rd.minYear + 1;
    if (isNaN(tv) || tv > rd.maxYear) toEl.value = rd.maxYear;
    document.getElementById("resultBox").classList.remove("show");
    document.getElementById("stats").classList.remove("show");
    var statusEl = document.getElementById("status");
    statusEl.textContent = "";
    statusEl.className = "status";
  });

  document.addEventListener("keydown", function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
      e.preventDefault();
      calculate();
    }
  });

  updateYearRangeNote();

  window.toggleTheme = function () {
    var html = document.documentElement;
    var currentTheme = html.getAttribute("data-theme") || "dark";
    var newTheme = currentTheme === "light" ? "dark" : "light";
    html.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
  };
  function initTheme() {
    var savedTheme = localStorage.getItem("theme");
    var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    var theme = savedTheme || (prefersDark ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  }
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
    if (!localStorage.getItem("theme"))
      document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
  });

  initTheme();
</script>
