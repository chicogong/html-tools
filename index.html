  <style>
    :root {
      --bg-deep: #0a0a0f;
      --bg-surface: #12121a;
      --bg-card: #1a1a24;
      --bg-card-hover: #22222e;
      --text-primary: #e8e8ed;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --border-subtle: #2a2a3a;
      --border-strong: #3a3a4a;
      --accent-cyan: #00f5d4;
      --accent-magenta: #f72585;
      --accent-yellow: #fee440;
      --accent-blue: #4cc9f0;
      --accent-purple: #7b2cbf;
      --accent-orange: #ff9f1c;
      --accent-red: #ff6b6b;
      --accent-green: #06d6a0;
      --glow-cyan: rgb(0 245 212 / 15%);
      --glow-magenta: rgb(247 37 133 / 15%);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    [data-theme="light"] {
      --bg-deep: #fafafa;
      --bg-surface: #fff;
      --bg-card: #fff;
      --bg-card-hover: #f5f5f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --text-muted: #999;
      --border-subtle: #e5e5e5;
      --border-strong: #d4d4d4;
      --accent-cyan: #00d4b8;
      --accent-magenta: #e63975;
      --accent-yellow: #f5c518;
      --accent-blue: #0ea5e9;
      --accent-purple: #9333ea;
      --glow-cyan: rgb(0 212 184 / 10%);
      --glow-magenta: rgb(230 57 117 / 10%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgb(0 245 212 / 3%) 1px, transparent 1px),
        linear-gradient(90deg, rgb(0 245 212 / 3%) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% -10%, var(--glow-cyan), transparent),
        radial-gradient(ellipse 60% 40% at 80% 110%, var(--glow-magenta), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      padding-top: 20px;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 0;
      width: 48px;
      height: 48px;
      background: var(--bg-surface);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      color: var(--text-primary);
    }

    .theme-toggle:hover {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px var(--glow-cyan);
      transform: rotate(-5deg);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      color: var(--bg-deep);
      transform: rotate(-3deg);
      box-shadow: 0 4px 20px var(--glow-cyan);
    }

    header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tagline span { display: inline-flex; align-items: center; gap: 6px; }
    .tagline .dot { width: 4px; height: 4px; background: var(--accent-cyan); border-radius: 50%; }

    .search-wrapper {
      max-width: 600px;
      margin: 0 auto 36px;
      position: relative;
    }

    .search-box { position: relative; }

    .search-box::before {
      content: '>';
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      color: var(--accent-cyan);
      font-weight: 600;
    }

    .search-box input {
      width: 100%;
      padding: 16px 20px 16px 44px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      background: var(--bg-surface);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s ease;
    }

    .search-box input::placeholder { color: var(--text-muted); }

    .search-box input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 4px var(--glow-cyan), 0 4px 20px var(--glow-cyan);
    }

    .search-results-count {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 12px;
      min-height: 20px;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .category-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 18px;
      background: var(--bg-surface);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .category-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .category-btn span { position: relative; z-index: 1; }
    .category-btn:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
    .category-btn.active { border-color: transparent; color: var(--bg-deep); }
    .category-btn.active::before { opacity: 1; }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .tool-card {
      position: relative;
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: visible;
      animation: fade-in-up 0.5s ease backwards;
    }

    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--card-accent, var(--accent-cyan)), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tool-card:hover {
      border-color: var(--card-accent, var(--accent-cyan));
      background: var(--bg-card-hover);
      transform: translateY(-4px);
      box-shadow: 0 10px 40px -10px rgb(0 0 0 / 50%), 0 0 20px var(--glow-cyan);
    }

    .tool-card:hover::before { opacity: 1; }

    .tool-card-header { display: flex; align-items: center; gap: 14px; }
    .tool-title-group { display: flex; align-items: flex-start; gap: 14px; flex: 1; }

    .tool-icon {
      width: 44px;
      height: 44px;
      background: var(--bg-surface);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: var(--card-accent, var(--accent-cyan));
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .tool-card:hover .tool-icon {
      background: var(--card-accent, var(--accent-cyan));
      border-color: var(--card-accent, var(--accent-cyan));
      color: var(--bg-deep);
      transform: rotate(-5deg) scale(1.05);
    }

    .tool-card h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
      line-height: 1.3;
    }

    .tool-card p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
      flex-grow: 1;
    }

    .tool-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .tool-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 4px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tool-arrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      color: var(--text-muted);
      transition: all 0.3s ease;
    }

    .tool-card:hover .tool-arrow {
      color: var(--card-accent, var(--accent-cyan));
      transform: translateX(4px);
    }

    .tool-card.hidden { display: none; }

    /* 分类颜色 */
    .tool-card[data-category="dev"] { --card-accent: var(--accent-cyan); }
    .tool-card[data-category="text"] { --card-accent: var(--accent-blue); }
    .tool-card[data-category="time"] { --card-accent: var(--accent-yellow); }
    .tool-card[data-category="generator"] { --card-accent: var(--accent-magenta); }
    .tool-card[data-category="privacy"] { --card-accent: var(--accent-purple); }
    .tool-card[data-category="media"] { --card-accent: var(--accent-red); }
    .tool-card[data-category="security"] { --card-accent: var(--accent-orange); }
    .tool-card[data-category="network"] { --card-accent: var(--accent-green); }
    .tool-card[data-category="calculator"] { --card-accent: #f97316; }
    .tool-card[data-category="converter"] { --card-accent: #a855f7; }
    .tool-card[data-category="extractor"] { --card-accent: #ec4899; }
    .tool-card[data-category="ai"] { --card-accent: #6366f1; }

    .favorite-btn {
      width: 40px;
      height: 40px;
      background: var(--bg-surface);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s ease;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-left: auto;
    }

    .favorite-btn:hover {
      border-color: var(--accent-yellow);
      background: var(--bg-card-hover);
      transform: scale(1.05) rotate(-5deg);
      box-shadow: 0 0 20px rgb(254 228 64 / 40%);
    }

    .favorite-btn.active {
      background: var(--accent-yellow);
      border-color: var(--accent-yellow);
      color: var(--bg-deep);
      box-shadow: 0 0 24px rgb(254 228 64 / 50%);

      { url: 'tools/ai/mcp-clients.html', category: 'ai', name: 'MCP 客户端大全', desc: '支持 MCP 的 AI 客户端、IDE 和开发工具汇总', icon: '🖥️', keywords: 'mcp 客户端 cherry studio cursor windsurf cline chatbox raycast openrouter ai ide' },
    ];

    // ==================== DOM 元素 ====================
    const searchInput = document.getElementById('search');
    const toolsGrid = document.getElementById('tools-grid');
    const categoriesContainer = document.getElementById('categories');
    const noResults = document.getElementById('no-results');
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = themeToggle.querySelector('.theme-icon');
    const htmlElement = document.documentElement;
    const searchResultsCount = document.getElementById('search-results-count');

    let currentCategory = 'all';
    let toolCards = [];

    // ==================== 主题管理 ====================
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      htmlElement.setAttribute('data-theme', 'light');
      themeIcon.textContent = '☀️';
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = htmlElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      if (newTheme === 'light') {
        htmlElement.setAttribute('data-theme', 'light');
        themeIcon.textContent = '☀️';
      } else {
        htmlElement.removeAttribute('data-theme');
        themeIcon.textContent = '🌙';
      }
      localStorage.setItem('theme', newTheme);
    });

    // ==================== 收藏管理 ====================
    const FAVORITES_KEY = 'html_tools_favorites_v1';
    let favorites = [];

    try {
      const stored = localStorage.getItem(FAVORITES_KEY);
      if (stored) {
        const parsed = JSON.parse(stored);
        favorites = Array.isArray(parsed) ? parsed : [];
      }
    } catch (e) {
      console.warn('Could not load favorites:', e);
      favorites = [];
    }

    function saveFavorites() {
      try {
        localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
      } catch (e) {
        console.warn('Could not save favorites:', e);
      }
    }

    function isFavorite(url) {
      return favorites.includes(url);
    }

    function toggleFavorite(url, btn, event) {
      event.preventDefault();
      event.stopPropagation();

      const index = favorites.indexOf(url);
      if (index > -1) {
        favorites.splice(index, 1);
        btn.classList.remove('active');
        btn.textContent = '☆';
      } else {
        favorites.push(url);
        btn.classList.add('active');
        btn.textContent = '★';
      }
      saveFavorites();

      if (currentCategory === 'favorites') {
        filterTools();
      }
    }

    // ==================== 渲染分类按钮 ====================
    function renderCategories() {
      const categoryCounts = {};
      TOOLS.forEach(tool => {
        categoryCounts[tool.category] = (categoryCounts[tool.category] || 0) + 1;
      });

      const activeCategories = CATEGORIES.filter(cat => 
        cat.id === 'all' || cat.id === 'favorites' || categoryCounts[cat.id]
      );

      activeCategories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn' + (cat.id === 'all' ? ' active' : '');
        btn.dataset.category = cat.id;
        const span = document.createElement('span');
        span.textContent = cat.name;
        btn.appendChild(span);
        btn.addEventListener('click', () => {
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = cat.id;
          filterTools();
        });
        categoriesContainer.appendChild(btn);
      });
    }

    // ==================== 渲染工具卡片 ====================
    function renderTools() {
      TOOLS.forEach((tool, index) => {
        const card = document.createElement('a');
        card.href = tool.url;
        card.className = 'tool-card';
        card.dataset.category = tool.category;
        card.dataset.keywords = tool.keywords;
        card.style.animationDelay = Math.min(index * 0.02, 0.4) + 's';

        const header = document.createElement('div');
        header.className = 'tool-card-header';

        const titleGroup = document.createElement('div');
        titleGroup.className = 'tool-title-group';

        const iconDiv = document.createElement('div');
        iconDiv.className = 'tool-icon';
        iconDiv.textContent = tool.icon;

        const h3 = document.createElement('h3');
        h3.textContent = tool.name;

        titleGroup.appendChild(iconDiv);
        titleGroup.appendChild(h3);

        const favBtn = document.createElement('button');
        favBtn.className = 'favorite-btn' + (isFavorite(tool.url) ? ' active' : '');
        favBtn.type = 'button';
        favBtn.setAttribute('aria-label', '收藏');
        favBtn.tabIndex = 0;
        favBtn.textContent = isFavorite(tool.url) ? '★' : '☆';
        favBtn.addEventListener('click', (e) => toggleFavorite(tool.url, favBtn, e));
        favBtn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            e.stopPropagation();
            toggleFavorite(tool.url, favBtn, e);
          }
        });

        header.appendChild(titleGroup);
        header.appendChild(favBtn);

        const desc = document.createElement('p');
        desc.textContent = tool.desc;

        const footer = document.createElement('div');
        footer.className = 'tool-card-footer';

        const tag = document.createElement('span');
        tag.className = 'tool-tag';
        tag.textContent = tool.category;

        const arrow = document.createElement('span');
        arrow.className = 'tool-arrow';
        arrow.textContent = '→';

        footer.appendChild(tag);
        footer.appendChild(arrow);

        card.appendChild(header);
        card.appendChild(desc);
        card.appendChild(footer);

        toolsGrid.appendChild(card);
      });

      toolCards = document.querySelectorAll('.tool-card');
    }

    // ==================== 过滤工具 ====================
    function filterTools() {
      const query = searchInput.value.toLowerCase().trim();
      let visibleCount = 0;

      toolCards.forEach((card, index) => {
        const tool = TOOLS[index];
        const matchesCategory = currentCategory === 'all' 
          || (currentCategory === 'favorites' && isFavorite(tool.url))
          || tool.category === currentCategory;

        const matchesSearch = !query ||
          tool.name.toLowerCase().includes(query) ||
          tool.desc.toLowerCase().includes(query) ||
          tool.keywords.toLowerCase().includes(query);

        if (matchesCategory && matchesSearch) {
          card.classList.remove('hidden');
          visibleCount++;
        } else {
          card.classList.add('hidden');
        }
      });

      const noResultsIcon = noResults.querySelector('.no-results-icon');
      const noResultsText = noResults.querySelector('p');

      if (visibleCount === 0) {
        if (currentCategory === 'favorites' && !query) {
          noResultsIcon.textContent = '⭐';
          noResultsText.textContent = '还没有收藏的工具';
        } else {
          noResultsIcon.textContent = '∅';
          noResultsText.textContent = '没有找到匹配的工具';
        }
        noResults.classList.add('show');
      } else {
        noResults.classList.remove('show');
      }

      if (query || currentCategory !== 'all') {
        searchResultsCount.textContent = visibleCount > 0 ? '找到 ' + visibleCount + ' 个工具' : '';
      } else {
        searchResultsCount.textContent = '';
      }
    }

    // ==================== 事件绑定 ====================
    searchInput.addEventListener('input', filterTools);

    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
      if (e.key === 'Escape' && document.activeElement === searchInput) {
        searchInput.blur();
      }
    });

    // ==================== 初始化 ====================
    renderCategories();
    renderTools();
  </script>
</body>
</html>
