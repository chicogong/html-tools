<style>
:root {
        --color-bg-deep: #0a0a0f;
        --color-bg-surface: #1a1a22;
        --color-bg-subtle: #242430;
        --color-bg-input: #0e0e14;
        --color-text-primary: #f5f5f7;
        --color-text-secondary: #a1a1aa;
        --color-text-muted: #71717a;
        --color-border-default: rgba(255, 255, 255, 0.08);
        --color-border-subtle: rgba(255, 255, 255, 0.04);
        --color-border-strong: rgba(255, 255, 255, 0.12);
        --color-accent-primary: #00d4aa;
        --color-accent-secondary: #8b5cf6;
        --color-success: #22c55e;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --glass-bg: rgba(26, 26, 34, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 20px rgba(0, 212, 170, 0.15);
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-full: 9999px;
        --font-sans: "Inter", -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --transition-fast: 150ms ease;
        --nav-height: 56px;
        --container-max: 900px;
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      }

      [data-theme="light"] {
        --color-bg-deep: #f8fafc;
        --color-bg-surface: #fff;
        --color-bg-subtle: #f1f5f9;
        --color-bg-input: #f8fafc;
        --color-text-primary: #0f172a;
        --color-text-secondary: #475569;
        --color-text-muted: #94a3b8;
        --color-border-default: rgba(0, 0, 0, 0.08);
        --color-border-subtle: rgba(0, 0, 0, 0.04);
        --color-border-strong: rgba(0, 0, 0, 0.12);
        --color-accent-primary: #00b894;
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.5;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
      }
      .nav-actions {
        display: flex;
        gap: var(--space-2);
        justify-self: end;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
      }

      .input-group {
        margin-bottom: var(--space-4);
      }
      .input-group:last-child {
        margin-bottom: 0;
      }
      .input-group label {
        display: block;
        font-weight: 500;
        margin-bottom: var(--space-2);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      input,
      select {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }
      button:hover {
        border-color: var(--color-accent-primary);
      }
      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }
      button.primary:hover {
        background: #00c299;
        box-shadow: var(--shadow-glow);
      }

      .tip-info {
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-5);
        margin-top: var(--space-5);
      }

      .tip-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--space-4);
        padding-bottom: var(--space-4);
        border-bottom: 1px solid var(--color-border-subtle);
      }

      .tip-country {
        font-size: 1.25rem;
        font-weight: 600;
      }
      .tip-expectation {
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-full);
        font-size: 0.8125rem;
        font-weight: 500;
      }
      .tip-expectation.expected {
        background: var(--color-success);
        color: #fff;
      }
      .tip-expectation.appreciated {
        background: var(--color-warning);
        color: #000;
      }
      .tip-expectation.not-expected {
        background: var(--color-text-muted);
        color: #fff;
      }

      .tip-details {
        display: grid;
        gap: var(--space-4);
      }

      .tip-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .tip-item-label {
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }
      .tip-item-value {
        font-size: 0.9375rem;
        font-weight: 500;
        text-align: right;
      }

      .tip-note {
        font-size: 0.8125rem;
        color: var(--color-text-muted);
        margin-top: var(--space-4);
        padding-top: var(--space-4);
        border-top: 1px solid var(--color-border-subtle);
      }

      /* Calculator */
      .calc-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
      }

      .tip-buttons {
        display: flex;
        gap: var(--space-2);
        margin-top: var(--space-3);
      }
      .tip-btn {
        flex: 1;
        padding: var(--space-2) var(--space-3);
        font-size: 0.875rem;
        background: var(--color-bg-subtle);
      }
      .tip-btn.active {
        background: var(--color-accent-primary);
        color: #fff;
        border-color: var(--color-accent-primary);
      }

      .calc-result {
        background: var(--color-bg-subtle);
        border-radius: var(--radius-md);
        padding: var(--space-5);
        margin-top: var(--space-5);
        text-align: center;
      }

      .result-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: var(--space-3) 0;
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .result-row:last-child {
        border-bottom: none;
      }
      .result-label {
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }
      .result-value {
        font-size: 1.125rem;
        font-weight: 600;
        font-family: var(--font-mono);
      }
      .result-total {
        color: var(--color-accent-primary);
        font-size: 1.5rem;
      }

      @media (max-width: 640px) {
        .calc-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }
        .nav-content {
          padding: 0 var(--space-4);
        }
        .nav-back-text {
          display: none;
        }
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }
        .card {
          padding: var(--space-4);
        }
        .tip-header {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-2);
        }
      }
</style>

<main class="main-content">
      <div class="container">
        <!-- Country Selection -->
        <div class="card">
          <h2 class="card-title">选择国家/地区</h2>
          <div class="input-group">
            <label>国家/地区</label>
            <select id="countrySelect" onchange="showTipInfo()"></select>
          </div>

          <div class="tip-info" id="tipInfo" style="display: none">
            <div class="tip-header">
              <span class="tip-country" id="tipCountry"></span>
              <span class="tip-expectation" id="tipExpectation"></span>
            </div>
            <div class="tip-details" id="tipDetails"></div>
            <div class="tip-note" id="tipNote"></div>
          </div>
        </div>

        <!-- Tip Calculator -->
        <div class="card">
          <h2 class="card-title">小费计算器</h2>
          <div class="calc-grid">
            <div class="input-group">
              <label>账单金额</label>
              <input type="number" id="billAmount" min="0" step="0.01" placeholder="100.00" oninput="calculateTip()">
            </div>
            <div class="input-group">
              <label>小费比例</label>
              <input type="number" id="tipPercent" min="0" max="100" step="1" value="15" oninput="calculateTip()">
              <div class="tip-buttons">
                <button class="tip-btn" onclick="setTipPercent(10)">10%</button>
                <button class="tip-btn active" onclick="setTipPercent(15)">15%</button>
                <button class="tip-btn" onclick="setTipPercent(18)">18%</button>
                <button class="tip-btn" onclick="setTipPercent(20)">20%</button>
              </div>
            </div>
          </div>

          <div class="calc-result" id="calcResult">
            <div class="result-row">
              <span class="result-label">账单金额</span>
              <span class="result-value" id="resultBill">0.00</span>
            </div>
            <div class="result-row">
              <span class="result-label">小费金额</span>
              <span class="result-value" id="resultTip">0.00</span>
            </div>
            <div class="result-row">
              <span class="result-label">合计</span>
              <span class="result-value result-total" id="resultTotal">0.00</span>
            </div>
          </div>
        </div>
      </div>
    </main>
