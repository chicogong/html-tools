<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宠物喂食提醒 - WebUtils</title>
    <meta name="description" content="宠物喂食时间提醒,记录喂食历史" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg-deep: #0a0a0f;
        --color-bg-card: #1a1a24;
        --color-text-primary: #e8e8ed;
        --color-accent-cyan: #00f5d4;
        --border-subtle: #2a2a36;

        /* 字体变量 */
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        padding: 2rem;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 2rem;
        color: var(--color-accent-cyan);
      }
      .card {
        background: var(--color-bg-card);
        padding: 1.5rem;
        border-radius: 10px;
        margin-bottom: 1rem;
      }
      button {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: 6px;
        background: var(--color-accent-cyan);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
      }
      .time {
        font-family: "JetBrains Mono";
        font-size: 2rem;
        text-align: center;
        color: var(--color-accent-cyan);
      }
    </style>
  </head>
  <body>
    <a
      href="../../index.html"
      style="
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #00f5d4;
        text-decoration: none;
        font-size: 0.9rem;
        z-index: 1000;
      "
    >
      ← 首页
    </a>
    <div class="container">
      <h1>🍖 宠物喂食提醒</h1>
      <div class="card">
        <div class="time" id="lastFed">未喂食</div>
        <button onclick="markFed()">✅ 已喂食</button>
      </div>
      <div class="card">
        <div id="schedule"></div>
      </div>
    </div>
    <script>
      const STORAGE = "pet_feeding_v1";
      function markFed() {
        const now = new Date();
        localStorage.setItem(STORAGE, now.toISOString());
        render();
      }
      function render() {
        const last = localStorage.getItem(STORAGE);
        if (last) {
          const date = new Date(last);
          document.getElementById("lastFed").textContent = date.toLocaleString("zh-CN");
        }
      }
      render();
    </script>
  </body>
</html>
