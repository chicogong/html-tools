    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }

          Math.floor((153 * m + 2) / 5) +
          365 * y +
          Math.floor(y / 4) -
          Math.floor(y / 100) +
          Math.floor(y / 400) -
          32045

          K2: 2 * h,
          K1: h + 90,
          O1: -2 * h + s - 90,
          P1: -h - 90,
          Q1: -2 * h + 2 * s - p - 90,
          Mf: 2 * s - 2 * N,
          Mm: s - p,
          Ssa: 2 * h
        };
      }

      /* --------- 核心计算 --------- */
      /**
       * 计算某日某时刻（小时，UTC）的潮高
       * @param {object} station  — 港口对象
       * @param {number} jd       — 该日 00:00 UTC 的 JD
       * @param {number} tHours   — 从当日 00:00 UTC 起的小时数
       * @returns {number} 潮高 (m)
       */
      function tideHeight(station, jd, tHours) {
        var V0 = computeV0(jd);
        var ht = station.Z0;
        var names = Object.keys(CONSTITUENTS);
        for (var i = 0; i < names.length; i++) {
          var name = names[i];
          var pair = station.constituents[name];
          if (!pair) continue;
          var A = pair[0];
          var g = pair[1];
          var omega = CONSTITUENTS[name];
          var v0 = V0[name] || 0;
          var phi = ((omega * tHours + v0 - g) * Math.PI) / 180;
          ht += A * Math.cos(phi);
        }
        return ht;
      }

      /**
       * 为某日采样 N 个点（UTC 起始），返回 [tHours, height] 数组
       */
      function sampleDay(station, jd, samples) {
        var pts = [];
        for (var i = 0; i <= samples; i++) {
          var tH = (i / samples) * 24;
          pts.push([tH, tideHeight(station, jd, tH)]);
        }
        return pts;
      }

      /**
       * 找极值点 (高潮/低潮)
       * 简单差分法：符号变化处为极值
       */
      function findExtremes(pts) {
        var extremes = [];
        for (var i = 1; i < pts.length - 1; i++) {
          var prev = pts[i - 1][1];
          var cur = pts[i][1];
          var nxt = pts[i + 1][1];
          if (cur >= prev && cur >= nxt && cur > prev + 0.001) {
            extremes.push({ t: pts[i][0], h: cur, type: "high" });
          } else if (cur <= prev && cur <= nxt && cur < prev - 0.001) {
            extremes.push({ t: pts[i][0], h: cur, type: "low" });
          }
        }
        return extremes;
      }

      /* --------- UI 辅助 --------- */
      function pad2(n) {
        return n < 10 ? "0" + n : "" + n;
      }

      function fmtHeight(h, unit) {
        if (unit === "ft") return (h * 3.28084).toFixed(2) + " ft";
        return h.toFixed(2) + " m";
      }

      /**
       * 将 UTC 小时转换为本地显示时间字符串
       * @param {number} tUTC   — UTC 小数小时
       * @param {number} tzOff  — 时区偏移 (小时)
       */
      function utcHrToLocal(tUTC, tzOff) {
        var local = tUTC + tzOff;
        /* 跨日处理 */
        local = ((local % 24) + 24) % 24;
        var hh = Math.floor(local);
        var mm = Math.round((local - hh) * 60);
        if (mm === 60) {
          hh += 1;
          mm = 0;
        }
        hh = hh % 24;
        return pad2(hh) + ":" + pad2(mm);
      }

      /* --------- 状态 --------- */
      var currentDate = new Date();

      /* --------- 初始化下拉菜单 --------- */
      function buildLocationSelect() {
        var sel = document.getElementById("locationSelect");
        Object.keys(STATIONS).forEach(function (key) {
          var opt = document.createElement("option");
          opt.value = key;
          opt.textContent = STATIONS[key].name;
          if (key === "shanghai") opt.selected = true;
          sel.appendChild(opt);
        });
      }

      /* --------- 绘图 --------- */
      function drawChart(pts, extremes, station, selectedDate) {
        var canvas = document.getElementById("tideCanvas");
        var dpr = window.devicePixelRatio || 1;
        var rect = canvas.getBoundingClientRect();
        var W = rect.width;
        var H = rect.height;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        var ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);

        var isDark = document.documentElement.getAttribute("data-theme") !== "light";
        var bg = isDark ? "#0e0e14" : "#f5f5f5";
        var gridColor = isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)";
        var labelColor = isDark ? "#55556a" : "#999";
        var highColor = "#4cc9f0";
        var lowColor = "#f72585";
        var nowColor = "#fbbf24";

        /* 边距 */
        var PAD_L = 52,
          PAD_R = 20,
          PAD_T = 20,
          PAD_B = 36;
        var cW = W - PAD_L - PAD_R;
        var cH = H - PAD_T - PAD_B;

        /* 高度范围 */
        var heights = pts.map(function (p) {
          return p[1];
        });
        var minH = Math.min.apply(null, heights);
        var maxH = Math.max.apply(null, heights);
        var rangeH = maxH - minH || 1;
        minH -= rangeH * 0.08;
        maxH += rangeH * 0.08;
        rangeH = maxH - minH;

        function xOf(t) {
          return PAD_L + (t / 24) * cW;
        }
        function yOf(h) {
          return PAD_T + (1 - (h - minH) / rangeH) * cH;
        }

        /* 背景 */
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        /* 格线 & Y 轴标签 */
        ctx.strokeStyle = gridColor;
        ctx.lineWidth = 1;
        ctx.fillStyle = labelColor;
        ctx.font = "11px JetBrains Mono, monospace";
        ctx.textAlign = "right";
        var yTicks = 5;
        for (var yi = 0; yi <= yTicks; yi++) {
          var hVal = minH + (rangeH * yi) / yTicks;
          var yy = yOf(hVal);
          ctx.beginPath();
          ctx.moveTo(PAD_L, yy);
          ctx.lineTo(W - PAD_R, yy);
          ctx.stroke();
          ctx.fillText(hVal.toFixed(1), PAD_L - 6, yy + 4);
        }

        /* X 轴标签 (本地时) */
        ctx.textAlign = "center";
        var tz = station.tz;
        for (var xi = 0; xi <= 24; xi += 4) {
          var xx = xOf(xi);
          ctx.beginPath();
          ctx.moveTo(xx, PAD_T);
          ctx.lineTo(xx, H - PAD_B);
          ctx.stroke();
          var localHr = (((xi + tz) % 24) + 24) % 24;
          ctx.fillText(pad2(localHr) + ":00", xx, H - PAD_B + 18);
        }

        /* 渐变填充 */
        var grad = ctx.createLinearGradient(0, PAD_T, 0, H - PAD_B);
        grad.addColorStop(0, "rgba(0,245,212,0.25)");
        grad.addColorStop(1, "rgba(0,245,212,0.02)");
        ctx.beginPath();
        ctx.moveTo(xOf(pts[0][0]), yOf(pts[0][1]));
        for (var pi = 1; pi < pts.length; pi++) {
          ctx.lineTo(xOf(pts[pi][0]), yOf(pts[pi][1]));
        }
        ctx.lineTo(xOf(pts[pts.length - 1][0]), H - PAD_B);
        ctx.lineTo(xOf(pts[0][0]), H - PAD_B);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        /* 主曲线 */
        ctx.beginPath();
        ctx.moveTo(xOf(pts[0][0]), yOf(pts[0][1]));
        for (var pj = 1; pj < pts.length; pj++) {
          ctx.lineTo(xOf(pts[pj][0]), yOf(pts[pj][1]));
        }
        ctx.strokeStyle = "#00f5d4";
        ctx.lineWidth = 2;
        ctx.stroke();

        /* 极值点 */
        extremes.forEach(function (ex) {
          var cx = xOf(ex.t);
          var cy = yOf(ex.h);
          ctx.beginPath();
          ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
          ctx.fillStyle = ex.type === "high" ? highColor : lowColor;
          ctx.fill();
        });

        /* 当前时刻线（仅当所选日期是今天） */
        var today = new Date();
        var isToday =
          selectedDate.getFullYear() === today.getFullYear() &&
          selectedDate.getMonth() === today.getMonth() &&
          selectedDate.getDate() === today.getDate();
        if (isToday) {
          /* 转为 UTC 小时（扣除时区，因为 pts 用 UTC 时间） */
          var nowUtcH =
            today.getUTCHours() + today.getUTCMinutes() / 60 + today.getUTCSeconds() / 3600;
          var nx = xOf(nowUtcH);
          ctx.beginPath();
          ctx.moveTo(nx, PAD_T);
          ctx.lineTo(nx, H - PAD_B);
          ctx.setLineDash([4, 4]);
          ctx.strokeStyle = nowColor;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      /* --------- 主渲染 --------- */
      function render() {
        var stationKey = document.getElementById("locationSelect").value;
        var station = STATIONS[stationKey];
        var unit = document.getElementById("unitSelect").value;
        var dateVal = document.getElementById("dateInput").value;
        var parts = dateVal.split("-");
        var year = parseInt(parts[0], 10);
        var month = parseInt(parts[1], 10);
        var day = parseInt(parts[2], 10);
        var selectedDate = new Date(year, month - 1, day);

        var jd = julianDay(year, month, day);
        var SAMPLES = 288; /* 5-min 分辨率 */
        var pts = sampleDay(station, jd, SAMPLES);
        var extremes = findExtremes(pts);

        /* 绘图 */
        drawChart(pts, extremes, station, selectedDate);

        /* 极值卡片 */
        var grid = document.getElementById("extremesGrid");
        grid.innerHTML = "";
        extremes.forEach(function (ex, idx) {
          var card = document.createElement("div");
          card.className = "extreme-card " + ex.type;
          var labelEl = document.createElement("span");
          labelEl.className = "extreme-label";
          labelEl.textContent = (ex.type === "high" ? "▲ 高潮" : "▼ 低潮") + " #" + (idx + 1);
          var timeEl = document.createElement("span");
          timeEl.className = "extreme-time";
          timeEl.textContent = utcHrToLocal(ex.t, station.tz);
          var hEl = document.createElement("span");
          hEl.className = "extreme-height";
          hEl.textContent = fmtHeight(ex.h, unit);
          card.appendChild(labelEl);
          card.appendChild(timeEl);
          card.appendChild(hEl);
          grid.appendChild(card);
        });

        /* 统计 */
        var allH = pts.map(function (p) {
          return p[1];
        });
        var maxH = Math.max.apply(null, allH);
        var minH = Math.min.apply(null, allH);
        document.getElementById("statMax").textContent = fmtHeight(maxH, unit);
        document.getElementById("statMin").textContent = fmtHeight(minH, unit);
        document.getElementById("statRange").textContent = fmtHeight(maxH - minH, unit);

        /* 当前潮位 */
        var today = new Date();
        var isToday =
          selectedDate.getFullYear() === today.getFullYear() &&
          selectedDate.getMonth() === today.getMonth() &&
          selectedDate.getDate() === today.getDate();
        var nowTextEl = document.getElementById("nowText");
        if (isToday) {
          var nowUtcH =
            today.getUTCHours() + today.getUTCMinutes() / 60 + today.getUTCSeconds() / 3600;
          var nowH = tideHeight(station, jd, nowUtcH);
          var trend = "";
          if (nowUtcH + 0.25 < 24) {
            var nextH = tideHeight(station, jd, nowUtcH + 0.25);
            trend = nextH > nowH ? "↑ 涨潮" : "↓ 退潮";
          }
          nowTextEl.innerHTML =
            "当前潮高 <strong>" +
            fmtHeight(nowH, unit) +
            "</strong>&nbsp;&nbsp;" +
            trend +
            "&nbsp;&nbsp;（" +
            station.name +
            " 本地时 " +
            utcHrToLocal(nowUtcH, station.tz) +
            "）";
        } else {
          nowTextEl.innerHTML =
            "查看日期：" +
            dateVal +
            "&nbsp;&nbsp;（" +
            station.name +
            "，UTC" +
            (station.tz >= 0 ? "+" : "") +
            station.tz +
            "）";
        }

        document.getElementById("status").textContent = "已计算 " + extremes.length + " 个高低潮";
        document.getElementById("status").className = "status success";
      }

      /* --------- 事件绑定 --------- */
      function offsetDate(d, days) {
        var nd = new Date(d);
        nd.setDate(nd.getDate() + days);
        return nd;
      }
      function dateToInputVal(d) {
        return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
      }

      buildLocationSelect();

      var dateInput = document.getElementById("dateInput");
      dateInput.value = dateToInputVal(currentDate);

      document.getElementById("locationSelect").onchange = render;
      document.getElementById("unitSelect").onchange = render;
      dateInput.onchange = function () {
        var parts = dateInput.value.split("-");
        currentDate = new Date(
          parseInt(parts[0], 10),
          parseInt(parts[1], 10) - 1,
          parseInt(parts[2], 10)
        );
        render();
      };

      document.getElementById("btnToday").onclick = function () {
        currentDate = new Date();
        dateInput.value = dateToInputVal(currentDate);
        render();
      };
      document.getElementById("btnPrev").onclick = function () {
        currentDate = offsetDate(currentDate, -1);
        dateInput.value = dateToInputVal(currentDate);
        render();
      };
      document.getElementById("btnNext").onclick = function () {
        currentDate = offsetDate(currentDate, 1);
        dateInput.value = dateToInputVal(currentDate);
        render();
      };

      document.getElementById("btnCopy").onclick = async function () {
        var stationKey = document.getElementById("locationSelect").value;
        var station = STATIONS[stationKey];
        var unit = document.getElementById("unitSelect").value;
        var dateVal = document.getElementById("dateInput").value;
        var parts = dateVal.split("-");
        var jd = julianDay(parseInt(parts[0], 10), parseInt(parts[1], 10), parseInt(parts[2], 10));
        var pts = sampleDay(station, jd, 288);
        var extremes = findExtremes(pts);

        var lines = ["潮汐预报 — " + station.name + " — " + dateVal, ""];
        extremes.forEach(function (ex) {
          lines.push(
            (ex.type === "high" ? "高潮" : "低潮") +
              "  " +
              utcHrToLocal(ex.t, station.tz) +
              "  " +
              fmtHeight(ex.h, unit)
          );
        });
        lines.push("");
        var allH = pts.map(function (p) {
          return p[1];
        });
        var maxH = Math.max.apply(null, allH);
        var minH = Math.min.apply(null, allH);
        lines.push("最高潮: " + fmtHeight(maxH, unit) + "  最低潮: " + fmtHeight(minH, unit));
        lines.push("潮差: " + fmtHeight(maxH - minH, unit));
        lines.push("");
        lines.push("由 WebUtils 潮汐工具生成（调和分析估算值，仅供参考）");
        try {
          await navigator.clipboard.writeText(lines.join("\n"));
          document.getElementById("status").textContent = "已复制到剪贴板";
          document.getElementById("status").className = "status success";
        } catch (_e) {
          document.getElementById("status").textContent = "复制失败，请手动复制";
          document.getElementById("status").className = "status error";
        }
      };

      /* 窗口大小变化时重绘 */
      window.addEventListener("resize", render);

      /* 初始渲染 */
      render();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        render();
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
