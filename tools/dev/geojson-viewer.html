<style>
/* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 500px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .panel-textarea {
        flex: 1;
        width: 100%;
        min-height: 350px;
        padding: var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        line-height: 1.6;
        color: var(--color-text-primary);
        background: var(--color-bg-input);
        border: 2px solid var(--color-border-default);
        border-radius: var(--radius-md);
        resize: vertical;
        tab-size: 2;
        transition: all var(--transition-fast);
      }
      .panel-textarea::placeholder {
        color: var(--text-muted);
      }
      .panel-textarea:hover {
        border-color: var(--color-border-strong);
      }
      .panel-textarea:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
      }
      .panel-textarea.error {
        border-color: var(--color-error);
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {
        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";
      }
      .footer {
        text-align: center;
        margin-top: var(--space-5);
        padding-top: var(--space-4);
      }
      .footer p {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        flex-wrap: wrap;
      }
      .footer a {
        color: var(--color-accent-primary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }
      .footer a:hover {
        color: var(--color-text-primary);
      }

      /* Map panel */
      .map-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #map {
        flex: 1;
        min-height: 450px;
        border-radius: var(--radius-md);
        border: 2px solid var(--color-border-default);
        overflow: hidden;
        z-index: 0;
      }

      /* Properties panel */
      .props-panel {
        margin-top: var(--space-4);
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-md);

        min-height: 80px;
        max-height: 200px;
        overflow-y: auto;

      .props-panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: var(--space-3);
      }
      .props-empty {
        color: var(--text-muted);
        font-size: 0.8125rem;
        font-family: var(--font-mono);
      }
      .props-table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--font-mono);
        font-size: 0.8125rem;
      }
      .props-table tr {
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .props-table tr:last-child {
        border-bottom: none;
      }
      .props-table td {
        padding: var(--space-1) var(--space-2);
        vertical-align: top;

      .props-table td:first-child {
        color: var(--color-accent-primary);

        width: 40%;
        word-break: break-all;
      }
      .props-table td:last-child {
        color: var(--color-text-primary);
        word-break: break-all;

      /* Stats row */

        display: flex;
        flex-wrap: wrap;
        gap: var(--space-6);

        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-accent-primary);
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      @media (max-width: 900px) {
        .panels {
          grid-template-columns: 1fr;
          gap: var(--space-4);
        }
        .panel-textarea {
          min-height: 250px;
        }
        #map {
          min-height: 300px;
        }
      }
      @media (max-width: 640px) {
        :root {
          --nav-height: 52px;
        }
        .nav-content {
          padding: 0 var(--space-4);
        }

          display: none;
        }
        .main-content {
          padding: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4)) var(--space-4)
            calc(var(--space-5) + var(--safe-area-bottom));
        }
        .tool-card {
          padding: var(--space-4);
          border-radius: var(--radius-md);
        }
        .tool-header {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
          margin-bottom: var(--space-4);
          padding-bottom: var(--space-4);
        }
        .tool-icon {
          width: 40px;
          height: 40px;
          font-size: 1rem;
        }
        .tool-info h1 {
          font-size: 1.125rem;
        }
        .toolbar {
          gap: var(--space-2);
          margin-bottom: var(--space-4);
        }
        .btn-group {
          flex-wrap: wrap;
        }
        .btn {
          height: 34px;
          padding: 0 var(--space-3);
          font-size: 0.75rem;
        }
        .options-bar {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
          margin-bottom: var(--space-4);
        }
        .panels {
          min-height: auto;
        }
        .status-bar {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }
      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),

        outline: none;

<main class="main-content">
      <div class="tool-card">
        <div class="tool-header">
          <div class="tool-icon">🗺</div>
          <div class="tool-info">
            <h1>GeoJSON 查看器 / 编辑器</h1>
            <p class="desc">
              在地图上渲染 GeoJSON，点击要素查看属性，编辑 JSON 实时刷新，纯本地处理
            </p>
          </div>
        </div>
        <div class="toolbar">
          <div class="btn-group">
            <button id="btnLoad" class="btn btn-primary">渲染地图</button>
            <button id="btnFit" class="btn">适应视图</button>
            <button id="btnFormat" class="btn">格式化 JSON</button>
          </div>
          <div class="btn-group">
            <button id="btnExample" class="btn">加载示例</button>
            <button id="btnUpload" class="btn">上传文件</button>
            <button id="btnClear" class="btn">清空</button>

          <input id="fileInput" type="file" accept=".geojson,.json" style="display: none">
        </div>
        <div class="options-bar">
          <div class="option-item">
            <span>底图:</span>
            <select id="tileSelect">
              <option value="osm">OpenStreetMap</option>
              <option value="topo">OpenTopoMap</option>
              <option value="dark">CartoDB Dark</option>
              <option value="light">CartoDB Light</option>

          </div>

            </div>
            <textarea id="jsonInput" class="panel-textarea" placeholder="在此粘贴 GeoJSON 数据，或点击「加载示例」..." spellcheck="false"></textarea>
          </div>
          <div class="map-panel">
            <div class="panel-header">
              <span class="panel-label">地图预览</span>
            </div>
            <div id="map"></div>
            <div class="props-panel">
              <div class="props-panel-label">要素属性（点击地图要素查看）</div>
              <div id="propsContent"><span class="props-empty">暂无选中要素</span></div>
            </div>
          </div>
        </div>
        <div class="status-bar">
          <div id="status" class="status"></div>
          <div class="stats-row" id="statsRow" style="display: none">
            <div class="stat-item">
              <span class="stat-value" id="statFeatures">0</span>
              <span class="stat-label">要素</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="statPoints">0</span>
              <span class="stat-label">点</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="statLines">0</span>
              <span class="stat-label">线</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="statPolygons">0</span>
              <span class="stat-label">面</span>
            </div>
          </div>

      </div>
      <footer class="footer">
        <p>
          <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub

          <span>·</span>
          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>

<script>
/* global L */

      var map = null;
      var geojsonLayer = null;
      var selectedLayer = null;
      var autoRenderTimer = null;

      var TILE_URLS = {
        osm: {
          url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
          attribution: "&copy; OpenStreetMap contributors",
          maxZoom: 19
        },
        topo: {
          url: "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
          attribution: "&copy; OpenTopoMap contributors",
          maxZoom: 17
        },
        dark: {
          url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
          attribution: "&copy; CartoDB",
          maxZoom: 19
        },
        light: {
          url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
          attribution: "&copy; CartoDB",
          maxZoom: 19
        }
      };

      var tileLayer = null;

      function initMap() {
        map = L.map("map", {
          center: [30, 110],
          zoom: 4,
          zoomControl: true
        });
        var cfg = TILE_URLS.osm;
        tileLayer = L.tileLayer(cfg.url, {
          attribution: cfg.attribution,
          maxZoom: cfg.maxZoom
        }).addTo(map);
      }

      function switchTile(key) {
        if (!map) return;
        var cfg = TILE_URLS[key] || TILE_URLS.osm;
        if (tileLayer) {
          map.removeLayer(tileLayer);
        }
        tileLayer = L.tileLayer(cfg.url, {
          attribution: cfg.attribution,
          maxZoom: cfg.maxZoom
        }).addTo(map);
      }

      function showStatus(msg, type) {
        var el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      function showProps(props) {
        var container = document.getElementById("propsContent");
        if (!props || Object.keys(props).length === 0) {
          container.innerHTML = '<span class="props-empty">该要素无属性数据</span>';
          return;
        }
        var table = document.createElement("table");
        table.className = "props-table";
        Object.keys(props).forEach(function (key) {
          var tr = document.createElement("tr");
          var tdKey = document.createElement("td");
          tdKey.textContent = key;
          var tdVal = document.createElement("td");
          var val = props[key];
          tdVal.textContent = val === null ? "null" : String(val);
          tr.appendChild(tdKey);
          tr.appendChild(tdVal);
          table.appendChild(tr);
        });
        container.innerHTML = "";
        container.appendChild(table);
      }

      function defaultStyle() {
        return {
          color: "#00f5d4",
          weight: 2,
          opacity: 0.9,
          fillColor: "#00f5d4",
          fillOpacity: 0.2
        };
      }

      function highlightStyle() {
        return {
          color: "#f72585",
          weight: 3,
          opacity: 1,
          fillColor: "#f72585",
          fillOpacity: 0.35
        };
      }

      function resetHighlight(layer) {
        if (!layer) return;
        if (typeof layer.setStyle === "function") {
          layer.setStyle(defaultStyle());
        }
      }

      function onFeatureClick(layer, props) {
        if (selectedLayer && selectedLayer !== layer) {
          resetHighlight(selectedLayer);
        }
        selectedLayer = layer;
        if (typeof layer.setStyle === "function") {
          layer.setStyle(highlightStyle());
        }
        showProps(props);
      }

      function countGeomTypes(geojson) {
        var counts = { features: 0, points: 0, lines: 0, polygons: 0 };
        var features = [];
        if (geojson.type === "FeatureCollection") {
          features = geojson.features || [];
        } else if (geojson.type === "Feature") {
          features = [geojson];
        } else {
          features = [{ type: "Feature", geometry: geojson, properties: {} }];
        }
        counts.features = features.length;
        features.forEach(function (f) {
          var gtype = f.geometry ? f.geometry.type : "";
          if (gtype === "Point" || gtype === "MultiPoint") {
            counts.points++;
          } else if (gtype === "LineString" || gtype === "MultiLineString") {
            counts.lines++;
          } else if (gtype === "Polygon" || gtype === "MultiPolygon") {
            counts.polygons++;
          } else if (gtype === "GeometryCollection") {
            (f.geometry.geometries || []).forEach(function (g) {
              if (g.type === "Point" || g.type === "MultiPoint") {
                counts.points++;
              } else if (g.type === "LineString" || g.type === "MultiLineString") {
                counts.lines++;
              } else if (g.type === "Polygon" || g.type === "MultiPolygon") {
                counts.polygons++;
              }
            });
          }
        });
        return counts;
      }

      function renderGeoJSON() {
        var text = document.getElementById("jsonInput").value.trim();
        if (!text) {
          showStatus("请先输入 GeoJSON 数据", "error");
          return;
        }
        var geojson;
        try {
          geojson = JSON.parse(text);
        } catch (e) {
          document.getElementById("jsonInput").classList.add("error");
          showStatus("JSON 解析失败: " + e.message, "error");
          return;
        }
        document.getElementById("jsonInput").classList.remove("error");

        if (geojsonLayer) {
          map.removeLayer(geojsonLayer);
          geojsonLayer = null;
        }
        selectedLayer = null;
        document.getElementById("propsContent").innerHTML =
          '<span class="props-empty">暂无选中要素</span>';

        try {
          geojsonLayer = L.geoJSON(geojson, {
            style: defaultStyle(),
            pointToLayer: function (feature, latlng) {
              return L.circleMarker(latlng, {
                radius: 7,
                fillColor: "#00f5d4",
                color: "#00b894",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
              });
            },
            onEachFeature: function (feature, layer) {
              var props = feature.properties || {};
              layer.on("click", function () {
                onFeatureClick(layer, props);
              });
            }
          }).addTo(map);
        } catch (e) {
          showStatus("GeoJSON 渲染失败: " + e.message, "error");
          return;
        }

        var counts = countGeomTypes(geojson);
        document.getElementById("statFeatures").textContent = counts.features;
        document.getElementById("statPoints").textContent = counts.points;
        document.getElementById("statLines").textContent = counts.lines;
        document.getElementById("statPolygons").textContent = counts.polygons;
        document.getElementById("statsRow").style.display = "flex";

        showStatus("渲染成功 — " + counts.features + " 个要素", "success");
      }

      function fitBounds() {
        if (!geojsonLayer) {
          showStatus("请先渲染 GeoJSON", "error");
          return;
        }
        try {
          var bounds = geojsonLayer.getBounds();
          if (bounds.isValid()) {
            map.fitBounds(bounds, { padding: [24, 24] });
          }
        } catch (e) {
          showStatus("无法计算边界", "error");
        }
      }

      function formatJSON() {
        var ta = document.getElementById("jsonInput");
        var text = ta.value.trim();
        if (!text) return;
        try {
          var obj = JSON.parse(text);
          ta.value = JSON.stringify(obj, null, 2);
          ta.classList.remove("error");
          showStatus("JSON 格式化完成", "success");
        } catch (e) {
          ta.classList.add("error");
          showStatus("JSON 解析失败: " + e.message, "error");
        }
      }

      var EXAMPLE_GEOJSON = {
        type: "FeatureCollection",
        features: [
          {
            type: "Feature",
            properties: { name: "北京", type: "首都", population: 21540000 },
            geometry: { type: "Point", coordinates: [116.4074, 39.9042] }
          },
          {
            type: "Feature",
            properties: { name: "上海", type: "直辖市", population: 24870000 },
            geometry: { type: "Point", coordinates: [121.4737, 31.2304] }
          },
          {
            type: "Feature",
            properties: { name: "广州", type: "省会城市", population: 18680000 },
            geometry: { type: "Point", coordinates: [113.2644, 23.1291] }
          },
          {
            type: "Feature",
            properties: { name: "京沪铁路", type: "铁路" },
            geometry: {
              type: "LineString",
              coordinates: [
                [116.4074, 39.9042],
                [117.2, 36.6],
                [120.1, 32.0],
                [121.4737, 31.2304]
              ]
            }
          },
          {
            type: "Feature",
            properties: { name: "示例区域", type: "多边形区域" },
            geometry: {
              type: "Polygon",
              coordinates: [
                [
                  [104.0, 30.5],
                  [108.0, 30.5],
                  [108.0, 34.0],
                  [104.0, 34.0],
                  [104.0, 30.5]
                ]
              ]
            }
          }
        ]
      };

      function loadExample() {
        document.getElementById("jsonInput").value = JSON.stringify(EXAMPLE_GEOJSON, null, 2);
        document.getElementById("jsonInput").classList.remove("error");
        renderGeoJSON();
        fitBounds();
      }

      function clearAll() {
        document.getElementById("jsonInput").value = "";
        document.getElementById("jsonInput").classList.remove("error");
        if (geojsonLayer) {
          map.removeLayer(geojsonLayer);
          geojsonLayer = null;
        }
        selectedLayer = null;
        document.getElementById("propsContent").innerHTML =
          '<span class="props-empty">暂无选中要素</span>';
        document.getElementById("statsRow").style.display = "none";
        document.getElementById("status").textContent = "";
        document.getElementById("status").className = "status";
      }

      document.getElementById("btnLoad").onclick = renderGeoJSON;
      document.getElementById("btnFit").onclick = fitBounds;
      document.getElementById("btnFormat").onclick = formatJSON;
      document.getElementById("btnExample").onclick = loadExample;
      document.getElementById("btnClear").onclick = clearAll;

      document.getElementById("tileSelect").onchange = function () {
        switchTile(this.value);
      };

      document.getElementById("btnUpload").onclick = function () {
        document.getElementById("fileInput").click();
      };

      document.getElementById("fileInput").onchange = function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
          document.getElementById("jsonInput").value = ev.target.result;
          document.getElementById("jsonInput").classList.remove("error");
          renderGeoJSON();
          fitBounds();
        };
        reader.readAsText(file);
        this.value = "";
      };

      document.getElementById("jsonInput").addEventListener("input", function () {
        if (!document.getElementById("autoRender").checked) return;
        clearTimeout(autoRenderTimer);
        autoRenderTimer = setTimeout(function () {
          var text = document.getElementById("jsonInput").value.trim();
          if (text.length < 10) return;
          renderGeoJSON();
        }, 800);
      });

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
      initMap();
</script>
