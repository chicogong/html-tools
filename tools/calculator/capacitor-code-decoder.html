    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,

          var(--color-accent-tertiary)

        border-radius: var(--radius-md);

        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;

      }

  <body>
    <div class="tool-main" role="main">
      <main class="main-content">
        <div class="tool-card">
          <div class="tool-header">

              <div id="decodeResult" class="result-grid" style="display: none">

                  <div class="result-unit">nF</div>

                <div class="result-cell" id="cellUf">

            <!-- 右：容值 → 代码 -->

              <div class="cap-section-title">容值 → 代码（编码）</div>
              <div class="input-row">
                <label for="valInput">容值</label>
                <input
                  id="valInput"
                  class="cap-input"
                  type="number"
                  step="any"
                  min="0"
                  placeholder="如 0.1、100、10000"

                <select id="valUnit" class="cap-unit-select">

              <div id="encodeResult" class="result-code-display" style="display: none">—</div>

    <script>
      // ── 常量 ────────────────────────────────────────────────
      /** 标准 3 位代码参考数据 [代码, pF值, 典型用途] */
      var REF_TABLE = [
        ["100", 10, "高频滤波"],
        ["101", 100, "去耦、滤波"],
        ["102", 1000, "旁路电容"],
        ["103", 10000, "旁路 / 耦合"],
        ["104", 100000, "电源滤波（0.1μF）"],
        ["105", 1000000, "大容量滤波（1μF）"],
        ["150", 15, "振荡电路"],
        ["220", 22, "高频用"],
        ["221", 220, "滤波"],
        ["222", 2200, "旁路"],
        ["223", 22000, "耦合 / 去耦"],
        ["224", 220000, "低频滤波（0.22μF）"],
        ["330", 33, "振荡"],
        ["331", 330, "滤波"],
        ["332", 3300, "旁路"],
        ["333", 33000, "去耦"],
        ["334", 330000, "低频（0.33μF）"],
        ["470", 47, "RF 滤波"],
        ["471", 470, "滤波"],
        ["472", 4700, "旁路（4.7nF）"],
        ["473", 47000, "去耦（47nF）"],
        ["474", 470000, "低频（0.47μF）"],
        ["680", 68, "RF"],
        ["681", 680, "滤波"],
        ["682", 6800, "旁路"],
        ["683", 68000, "去耦"],
        ["684", 680000, "低频（0.68μF）"]
      ];

      // ── 工具函数 ─────────────────────────────────────────────
      function fmtNum(n, sig) {
        if (n === 0) return "0";
        var v = parseFloat(n.toPrecision(sig === undefined ? 5 : sig));
        return v.toString();
      }

      function pfToAll(pf) {
        return {
          pf: fmtNum(pf, 5),
          nf: fmtNum(pf / 1000, 5),
          uf: fmtNum(pf / 1000000, 5)
        };
      }

      function decodeCode(code) {
        var s = code.trim();
        if (!/^\d{3}$/.test(s)) return null;
        var d1 = parseInt(s[0], 10);
        var d2 = parseInt(s[1], 10);
        var d3 = parseInt(s[2], 10);
        var digits = d1 * 10 + d2;
        var multiplier;
        if (d3 === 8) {
          multiplier = 0.01;
        } else if (d3 === 9) {
          multiplier = 0.1;
        } else {
          multiplier = Math.pow(10, d3);
        }
        return { pf: digits * multiplier, digits: digits, multiplier: multiplier, d3: d3 };
      }

      function encodeValue(pf) {
        if (pf <= 0 || !isFinite(pf)) return null;
        var d3, mult, raw, rounded;
        for (d3 = 0; d3 <= 9; d3++) {
          if (d3 === 8) {
            mult = 0.01;
          } else if (d3 === 9) {
            mult = 0.1;
          } else {
            mult = Math.pow(10, d3);
          }
          raw = pf / mult;
          rounded = Math.round(raw);
          if (rounded >= 10 && rounded <= 99 && Math.abs(rounded - raw) < 1e-9) {
            return { code: "" + rounded + d3, exact: true };
          }
        }
        var best = null;
        var bestErr = Infinity;
        for (d3 = 0; d3 <= 9; d3++) {
          if (d3 === 8) {
            mult = 0.01;
          } else if (d3 === 9) {
            mult = 0.1;
          } else {
            mult = Math.pow(10, d3);
          }
          raw = pf / mult;
          rounded = Math.round(raw);
          if (rounded >= 10 && rounded <= 99) {
            var approxPf = rounded * mult;
            var err = Math.abs(approxPf - pf) / pf;
            if (err < bestErr) {
              bestErr = err;
              best = {
                code: "" + rounded + d3,
                exact: false,
                approxPf: approxPf,
                errPct: err * 100
              };
            }
          }
        }
        return best;
      }

      // ── DOM 引用 ─────────────────────────────────────────────
      var codeInputEl = document.getElementById("codeInput");
      var decodeResultEl = document.getElementById("decodeResult");
      var decodeInfoEl = document.getElementById("decodeInfo");
      var decodeErrEl = document.getElementById("decodeErr");

      var valInputEl = document.getElementById("valInput");
      var valUnitEl = document.getElementById("valUnit");
      var encodeResultEl = document.getElementById("encodeResult");
      var encodeInfoEl = document.getElementById("encodeInfo");
      var encodeErrEl = document.getElementById("encodeErr");

      var statusEl = document.getElementById("statusEl");
      var statsEl = document.getElementById("statsEl");

      // ── 解码逻辑 ─────────────────────────────────────────────
      function runDecode() {
        var code = codeInputEl.value.trim();
        codeInputEl.classList.remove("has-error");
        decodeErrEl.style.display = "none";
        decodeResultEl.style.display = "none";
        decodeInfoEl.style.display = "none";
        statsEl.classList.remove("show");
        statusEl.textContent = "";
        statusEl.className = "status";

        if (!code) return;
        if (code.length < 3) return;

        var res = decodeCode(code);
        if (!res) {
          codeInputEl.classList.add("has-error");
          decodeErrEl.textContent = "代码无效：需要恰好 3 位数字（0-9），如 104、472";
          decodeErrEl.style.display = "block";
          statusEl.textContent = "格式错误";
          statusEl.className = "status error";
          return;
        }

        var vals = pfToAll(res.pf);
        document.getElementById("valPf").textContent = vals.pf;
        document.getElementById("valNf").textContent = vals.nf;
        document.getElementById("valUf").textContent = vals.uf;

        document.getElementById("cellPf").classList.remove("highlight");
        document.getElementById("cellNf").classList.remove("highlight");
        document.getElementById("cellUf").classList.remove("highlight");
        if (res.pf < 1000) {
          document.getElementById("cellPf").classList.add("highlight");
        } else if (res.pf < 1000000) {
          document.getElementById("cellNf").classList.add("highlight");
        } else {
          document.getElementById("cellUf").classList.add("highlight");
        }

        decodeResultEl.style.display = "grid";

        document.getElementById("infoDig").textContent = res.digits + " （代码前两位）";
        var multStr;
        if (res.d3 === 8) {
          multStr = "0.01 （第三位=8）";
        } else if (res.d3 === 9) {
          multStr = "0.1 （第三位=9）";
        } else {
          multStr = "10^" + res.d3 + " = " + res.multiplier;
        }
        document.getElementById("infoMult").textContent = multStr;
        document.getElementById("infoFormula").textContent =
          res.digits + " × " + res.multiplier + " = " + res.pf + " pF";

        decodeInfoEl.style.display = "block";

        document.getElementById("statPf").textContent = vals.pf;
        document.getElementById("statNf").textContent = vals.nf;
        document.getElementById("statUf").textContent = vals.uf;
        statsEl.classList.add("show");
        statusEl.textContent = "解码成功";
        statusEl.className = "status success";

        saveHash();
      }

      // ── 编码逻辑 ─────────────────────────────────────────────
      function runEncode() {
        var raw = valInputEl.value.trim();
        var unit = valUnitEl.value;
        encodeResultEl.style.display = "none";
        encodeInfoEl.style.display = "none";
        encodeErrEl.style.display = "none";
        valInputEl.classList.remove("has-error");

        if (!raw) return;

        var num = parseFloat(raw);
        if (isNaN(num) || num <= 0) {
          valInputEl.classList.add("has-error");
          encodeErrEl.textContent = "请输入有效的正数容值";
          encodeErrEl.style.display = "block";
          return;
        }

        var pf;
        if (unit === "pf") {
          pf = num;
        } else if (unit === "nf") {
          pf = num * 1000;
        } else {
          pf = num * 1000000;
        }

        if (pf < 0.01) {
          valInputEl.classList.add("has-error");
          encodeErrEl.textContent = "容值过小，超出 3 位代码表示范围";
          encodeErrEl.style.display = "block";
          return;
        }
        if (pf > 9.9e10) {
          valInputEl.classList.add("has-error");
          encodeErrEl.textContent = "容值过大，超出 3 位代码表示范围（最大 99×10^9 pF）";
          encodeErrEl.style.display = "block";
          return;
        }

        var enc = encodeValue(pf);
        if (!enc) {
          valInputEl.classList.add("has-error");
          encodeErrEl.textContent = "无法用标准 3 位代码精确或近似表示该容值";
          encodeErrEl.style.display = "block";
          return;
        }

        encodeResultEl.textContent = enc.code;
        encodeResultEl.style.display = "block";

        var vals = pfToAll(pf);
        document.getElementById("encPf").textContent = vals.pf + " pF";
        document.getElementById("encCode").textContent = enc.code;
        var note;
        if (enc.exact) {
          note = "精确匹配";
        } else {
          note =
            "近似代码（误差 " +
            enc.errPct.toFixed(2) +
            "%，约 " +
            fmtNum(enc.approxPf, 4) +
            " pF）";
        }
        document.getElementById("encNote").textContent = note;
        encodeInfoEl.style.display = "block";

        statusEl.textContent = "编码完成 — 代码 " + enc.code;
        statusEl.className = "status success";
      }

      // ── 参考表 ───────────────────────────────────────────────
      function buildRefTable() {
        var tbody = document.getElementById("refTableBody");
        REF_TABLE.forEach(function (row) {
          var code = row[0];
          var pf = row[1];
          var note = row[2];
          var vals = pfToAll(pf);
          var tr = document.createElement("tr");
          tr.title = "点击填入代码 " + code;

          var tdCode = document.createElement("td");
          tdCode.className = "code-col";
          tdCode.textContent = code;

          var tdPf = document.createElement("td");
          tdPf.textContent = vals.pf;

          var tdNf = document.createElement("td");
          tdNf.textContent = vals.nf;

          var tdUf = document.createElement("td");
          tdUf.textContent = vals.uf;

          var tdNote = document.createElement("td");
          tdNote.textContent = note;

          tr.appendChild(tdCode);
          tr.appendChild(tdPf);
          tr.appendChild(tdNf);
          tr.appendChild(tdUf);
          tr.appendChild(tdNote);

          tr.addEventListener(
            "click",
            (function (c) {
              return function () {
                codeInputEl.value = c;
                runDecode();
                codeInputEl.focus();
              };
            })(code)
          );

          tbody.appendChild(tr);
        });
      }

      // ── URL Hash 持久化 ──────────────────────────────────────
      function saveHash() {
        var code = codeInputEl.value.trim();
        if (/^\d{3}$/.test(code)) {
          history.replaceState(null, "", "#" + encodeURIComponent(code));
        } else {
          history.replaceState(null, "", location.pathname);
        }
      }

      function loadHash() {
        var hash = location.hash.slice(1);
        if (!hash) return;
        try {
          var code = decodeURIComponent(hash);
          if (/^\d{3}$/.test(code)) {
            codeInputEl.value = code;
            runDecode();
          }
        } catch (e) {
          // ignore malformed hash
        }
      }

      // ── 事件绑定 ─────────────────────────────────────────────
      codeInputEl.addEventListener("input", runDecode);
      valInputEl.addEventListener("input", runEncode);
      valUnitEl.addEventListener("change", runEncode);

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          if (document.activeElement === valInputEl || document.activeElement === valUnitEl) {
            runEncode();
          } else {
            runDecode();
          }
        }
      });

      // ── 初始化 ───────────────────────────────────────────────
      buildRefTable();
      loadHash();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
