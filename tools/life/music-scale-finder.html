<style>
/* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item label {
        cursor: pointer;
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {
        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";
      }
      .footer {
        text-align: center;
        margin-top: var(--space-5);
        padding-top: var(--space-4);
      }
      .footer p {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        flex-wrap: wrap;
      }
      .footer a {
        color: var(--color-accent-primary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }
      .footer a:hover {
        color: var(--color-text-primary);
      }
      @media (max-width: 640px) {
        :root {
          --nav-height: 52px;
        }
        .nav-content {
          padding: 0 var(--space-4);
        }
        .nav-back-text {
          display: none;
        }
        .main-content {
          padding: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4)) var(--space-4)
            calc(var(--space-5) + var(--safe-area-bottom));
        }
        .tool-card {
          padding: var(--space-4);
          border-radius: var(--radius-md);
        }
        .tool-header {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
          margin-bottom: var(--space-4);
          padding-bottom: var(--space-4);
        }
        .tool-icon {
          width: 40px;
          height: 40px;
          font-size: 1rem;
        }
        .tool-info h1 {
          font-size: 1.125rem;
        }
        .toolbar {
          gap: var(--space-2);
          margin-bottom: var(--space-4);
        }
        .btn-group {
          flex-wrap: wrap;
        }
        .btn {
          height: 34px;
          padding: 0 var(--space-3);
          font-size: 0.75rem;
        }
        .options-bar {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
          margin-bottom: var(--space-4);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }
      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible),
      select:focus:not(:focus-visible),
      textarea:focus:not(:focus-visible) {
        outline: none;
      }

      /* ===== Music Scale Finder 专用样式 ===== */
      .scale-notes-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-5);
      }
      .note-badge {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 52px;
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        border: 2px solid var(--color-border-default);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }
      .note-badge.root {
        border-color: var(--color-accent-primary);
        background: rgba(0, 245, 212, 0.1);
        box-shadow: 0 0 12px rgba(0, 245, 212, 0.2);
      }
      .note-badge .note-name {
        font-size: 1rem;
        font-weight: 700;
        color: var(--color-text-primary);
        line-height: 1;
      }
      .note-badge.root .note-name {
        color: var(--color-accent-primary);
      }
      .note-badge .note-degree {
        font-size: 0.6875rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: var(--space-3);
      }

      /* Piano keyboard */
      .piano-wrap {
        overflow-x: auto;
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-2);
      }
      .piano {
        display: flex;
        position: relative;
        height: 120px;
        user-select: none;
      }
      .piano-key {
        position: relative;
        border-radius: 0 0 var(--radius-sm) var(--radius-sm);
        border: 1px solid var(--color-border-strong);
        cursor: default;
        flex-shrink: 0;
      }
      .piano-key.white {
        width: 36px;
        height: 120px;
        background: var(--bg-surface);
        z-index: 1;
        margin-right: 1px;
      }
      [data-theme="light"] .piano-key.white {
        background: #fff;
        border-color: #bbb;
      }
      .piano-key.black {
        width: 22px;
        height: 74px;
        background: #1a1a1a;
        z-index: 2;
        margin-left: -11px;
        margin-right: -11px;
        border-color: #000;
      }
      [data-theme="light"] .piano-key.black {
        background: #222;
      }
      .piano-key.in-scale.white {
        background: rgba(0, 245, 212, 0.18);
        border-color: var(--color-accent-primary);
      }
      .piano-key.in-scale.black {
        background: rgba(0, 245, 212, 0.55);
        border-color: var(--color-accent-primary);
      }
      .piano-key.is-root.white {
        background: rgba(0, 245, 212, 0.55);
        border-color: var(--color-accent-primary);
      }
      .piano-key.is-root.black {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
      }
      .piano-key-label {
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--font-mono);
        font-size: 0.6rem;
        font-weight: 600;
        color: var(--color-accent-primary);
        white-space: nowrap;
        pointer-events: none;
      }
      .piano-key.black .piano-key-label {
        bottom: 4px;
        font-size: 0.55rem;
        color: #0a0a0f;
      }
      .piano-key.is-root .piano-key-label {
        color: #0a0a0f;
      }

      /* Guitar fretboard */
      .fretboard-wrap {
        overflow-x: auto;
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-2);
      }
      .fretboard {
        position: relative;
        min-width: 640px;
      }
      .fretboard-strings {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .fret-row {
        display: flex;
        align-items: center;
        height: 38px;
      }
      .string-label {
        width: 32px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--color-accent-primary);
        flex-shrink: 0;
      }
      .fret-cell {
        flex: 1;
        min-width: 52px;
        height: 38px;
        border-right: 2px solid var(--color-border-strong);
        border-bottom: 1px solid var(--color-border-default);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .fret-cell:first-of-type {
        border-left: 4px solid var(--color-border-strong);
      }
      .fret-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-size: 0.625rem;
        font-weight: 700;
      }
      .fret-dot.in-scale {
        background: rgba(0, 245, 212, 0.2);
        border: 2px solid var(--color-accent-primary);
        color: var(--color-accent-primary);
      }
      .fret-dot.is-root {
        background: var(--color-accent-primary);
        border: 2px solid var(--color-accent-primary);
        color: #0a0a0f;
      }
      .fret-numbers {
        display: flex;
        padding-left: 32px;
        margin-bottom: var(--space-2);
      }
      .fret-num {
        flex: 1;
        min-width: 52px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        color: var(--text-muted);
      }

      /* Chord degrees table */
      .chord-table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        margin-bottom: var(--space-5);
      }
      .chord-table th {
        text-align: left;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-input);
        color: var(--text-muted);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--color-border-default);
      }
      .chord-table td {
        padding: var(--space-2) var(--space-3);
        border-bottom: 1px solid var(--color-border-subtle);
        color: var(--color-text-primary);
      }
      .chord-table tr:last-child td {
        border-bottom: none;
      }
      .chord-table td:first-child {
        color: var(--color-accent-primary);
        font-weight: 600;
      }
      .chord-quality {
        color: var(--color-text-secondary);
        font-size: 0.75rem;
      }
      .chord-quality.major {
        color: var(--color-accent-tertiary);
      }
      .chord-quality.minor {
        color: var(--color-accent-purple);
      }
      .chord-quality.dim {
        color: var(--color-accent-secondary);
      }

      .view-tabs {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
        margin-bottom: var(--space-5);
        width: fit-content;
      }
      .view-tab {
        padding: var(--space-2) var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .view-tab.active {
        background: var(--color-bg-surface);
        color: var(--color-accent-primary);
      }
      .view-tab:hover:not(.active) {
        color: var(--color-text-primary);
      }

      .scale-view {
        display: none;
      }
      .scale-view.active {
        display: block;
      }

      .interval-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
      }
      .interval-badge {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        padding: 2px var(--space-3);
        border-radius: var(--radius-full);
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-default);
        color: var(--text-muted);
      }
      .interval-badge.whole {
        border-color: var(--color-accent-tertiary);
        color: var(--color-accent-tertiary);
      }
      .interval-badge.half {
        border-color: var(--color-accent-secondary);
        color: var(--color-accent-secondary);
      }

      .scale-formula {
        font-family: var(--font-mono);
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: var(--space-4);
        padding: var(--space-3) var(--space-4);
        background: var(--color-bg-input);
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border-subtle);
      }
      .scale-formula strong {
        color: var(--color-accent-primary);
      }
</style>

<main class="main-content">
      <div class="tool-card">
        <div class="tool-header">
          <div class="tool-icon">🎵</div>
          <div class="tool-info">
            <h1>音阶查找器</h1>
            <p class="desc">选择根音和调式，查看音阶音符、钢琴键盘、吉他指板及和弦级数</p>
          </div>
        </div>

        <div class="options-bar">
          <div class="option-item">
            <label for="rootNote">根音：</label>
            <select id="rootNote">
              <option value="C">C</option>
              <option value="C#">C# / D♭</option>
              <option value="D">D</option>
              <option value="D#">D# / E♭</option>
              <option value="E">E</option>
              <option value="F">F</option>
              <option value="F#">F# / G♭</option>
              <option value="G">G</option>
              <option value="G#">G# / A♭</option>
              <option value="A">A</option>
              <option value="A#">A# / B♭</option>
              <option value="B">B</option>
            </select>
          </div>
          <div class="option-item">
            <label for="scaleMode">调式：</label>
            <select id="scaleMode">
              <option value="major">大调 Major (Ionian)</option>
              <option value="minor">自然小调 Natural Minor (Aeolian)</option>
              <option value="harmonic_minor">和声小调 Harmonic Minor</option>
              <option value="melodic_minor">旋律小调 Melodic Minor</option>
              <option value="dorian">多利亚 Dorian</option>
              <option value="phrygian">弗里几亚 Phrygian</option>
              <option value="lydian">利底亚 Lydian</option>
              <option value="mixolydian">混合利底亚 Mixolydian</option>
              <option value="locrian">洛克里亚 Locrian</option>
              <option value="pentatonic_major">五声大调 Major Pentatonic</option>
              <option value="pentatonic_minor">五声小调 Minor Pentatonic</option>
              <option value="blues">布鲁斯 Blues</option>
              <option value="whole_tone">全音阶 Whole Tone</option>
              <option value="diminished">减音阶 Diminished (W-H)</option>
            </select>
          </div>
          <div class="option-item">
            <label for="noteDisplay">音名：</label>
            <select id="noteDisplay">
              <option value="sharp">升号 (#)</option>
              <option value="flat">降号 (♭)</option>
            </select>
          </div>
        </div>

        <div class="toolbar">
          <div class="btn-group">
            <button id="btnCopyNotes" class="btn">复制音符</button>
            <button id="btnCopyFormula" class="btn">复制公式</button>
          </div>
        </div>

        <div class="section-label">音阶音符</div>
        <div id="scaleNotesRow" class="scale-notes-row"></div>

        <div id="scaleFormula" class="scale-formula"></div>
        <div class="section-label">音程步进</div>
        <div id="intervalRow" class="interval-row"></div>

        <div class="view-tabs">
          <button id="tabPiano" class="view-tab active">🎹 钢琴</button>
          <button id="tabGuitar" class="view-tab">🎸 吉他指板</button>
          <button id="tabChords" class="view-tab">和弦级数</button>
        </div>

        <div id="viewPiano" class="scale-view active">
          <div class="section-label">钢琴键盘（两个八度）</div>
          <div class="piano-wrap">
            <div id="pianoEl" class="piano"></div>
          </div>
        </div>

        <div id="viewGuitar" class="scale-view">
          <div class="section-label">吉他指板（标准调弦，前 12 品）</div>
          <div class="fretboard-wrap">
            <div id="fretboardEl" class="fretboard">
              <div id="fretNumbers" class="fret-numbers"></div>
              <div id="fretStrings" class="fretboard-strings"></div>
            </div>
          </div>
        </div>

        <div id="viewChords" class="scale-view">
          <div class="section-label">自然和弦级数</div>
          <table class="chord-table">
            <thead>
              <tr>
                <th>级数</th>
                <th>罗马</th>
                <th>和弦名</th>
                <th>类型</th>
                <th>构成音</th>
              </tr>
            </thead>
            <tbody id="chordTableBody"></tbody>
          </table>
        </div>

        <div class="status-bar">
          <div id="status" class="status"></div>
        </div>
      </div>
      <footer class="footer">
        <p>
          <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub
          </a>
          <span>·</span>
          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>
