    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;

      // ─── DOM refs ────────────────────────────────────────────────────────────
      var statusEl = document.getElementById("status");

      var tailOptionEl = document.getElementById("tailOption");
      var lastResult = "";

      // ─── Tab switching ────────────────────────────────────────────────────────
      function switchTab(tab) {
        currentTab = tab;
        document.getElementById("panelOneSample").style.display = tab === "one" ? "grid" : "none";
        document.getElementById("panelTwoSample").style.display = tab === "two" ? "grid" : "none";
        document.getElementById("panelChiSquare").style.display = tab === "chi" ? "grid" : "none";

        document.getElementById("btnOneSample").className =
          "btn" + (tab === "one" ? " btn-primary" : "");
        document.getElementById("btnTwoSample").className =
          "btn" + (tab === "two" ? " btn-primary" : "");
        document.getElementById("btnChiSquare").className =
          "btn" + (tab === "chi" ? " btn-primary" : "");

        tailOptionEl.style.display = tab === "chi" ? "none" : "flex";
        clearStatus();
      }

      document.getElementById("btnOneSample").onclick = function () {
        switchTab("one");
      };
      document.getElementById("btnTwoSample").onclick = function () {
        switchTab("two");
      };
      document.getElementById("btnChiSquare").onclick = function () {
        switchTab("chi");
      };

      // ─── Utilities ────────────────────────────────────────────────────────────
      function parseNumbers(str) {
        var parts = str
          .replace(/[\n\r\t,;]+/g, " ")
          .trim()
          .split(/\s+/);
        var nums = [];
        for (var i = 0; i < parts.length; i++) {
          if (parts[i] === "") continue;
          var n = parseFloat(parts[i]);
          if (isNaN(n)) return null;
          nums.push(n);
        }
        return nums.length ? nums : null;
      }

      function arrMean(arr) {
        return (
          arr.reduce(function (a, b) {
            return a + b;
          }, 0) / arr.length
        );
      }

      function arrVariance(arr, ddof) {
        var m = arrMean(arr);
        var s = arr.reduce(function (acc, x) {
          return acc + (x - m) * (x - m);
        }, 0);
        return s / (arr.length - ddof);
      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function clearStatus() {
        statusEl.textContent = "";
        statusEl.className = "status";
      }

      function fmt(n, d) {
        if (d === undefined) d = 4;
        return Number(n).toFixed(d);
      }

      // ─── Lanczos lgamma ──────────────────────────────────────────────────────
      function lgamma(x) {
        var g = 7;
        var c = [
          0.99999999999980993, 676.5203681218851, -1259.1392167224028, 771.32342877765313,
          -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6,
          1.5056327351493116e-7
        ];
        if (x < 0.5) {
          return Math.log(Math.PI / Math.sin(Math.PI * x)) - lgamma(1 - x);
        }
        x -= 1;
        var ag = c[0];
        for (var i = 1; i < g + 2; i++) ag += c[i] / (x + i);
        var t = x + g + 0.5;
        return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(ag);
      }

      // ─── Regularized incomplete beta (for t-distribution CDF) ─────────────────
      function betacf(a, b, x) {
        var MAXIT = 200;
        var EPS = 3e-7;
        var FPMIN = 1e-30;
        var qab = a + b;
        var qap = a + 1;
        var qam = a - 1;
        var c = 1;
        var d = 1 - (qab * x) / qap;
        if (Math.abs(d) < FPMIN) d = FPMIN;
        d = 1 / d;
        var h = d;
        for (var m = 1; m <= MAXIT; m++) {
          var m2 = 2 * m;
          var aa = (m * (b - m) * x) / ((qam + m2) * (a + m2));
          d = 1 + aa * d;
          if (Math.abs(d) < FPMIN) d = FPMIN;
          c = 1 + aa / c;
          if (Math.abs(c) < FPMIN) c = FPMIN;
          d = 1 / d;
          h *= d * c;
          aa = (-(a + m) * (qab + m) * x) / ((a + m2) * (qap + m2));
          d = 1 + aa * d;
          if (Math.abs(d) < FPMIN) d = FPMIN;
          c = 1 + aa / c;
          if (Math.abs(c) < FPMIN) c = FPMIN;
          d = 1 / d;
          var del = d * c;
          h *= del;
          if (Math.abs(del - 1) < EPS) break;
        }
        return h;
      }

      function betai(a, b, x) {
        if (x < 0 || x > 1) return 0;
        if (x === 0) return 0;
        if (x === 1) return 1;
        var lbeta = lgamma(a + b) - lgamma(a) - lgamma(b);
        var bt = Math.exp(lbeta + a * Math.log(x) + b * Math.log(1 - x));
        if (x < (a + 1) / (a + b + 2)) {
          return (bt * betacf(a, b, x)) / a;
        }
        return 1 - (bt * betacf(b, a, 1 - x)) / b;
      }

      // Two-tailed p-value for t distribution
      function tPValue(tStat, df) {
        var x = df / (df + tStat * tStat);
        return betai(df / 2, 0.5, x);
      }

      // ─── Regularized incomplete gamma (for chi-square CDF) ────────────────────
      function gamser(a, x) {
        var ITMAX = 200;
        var EPS = 3e-7;
        var ap = a;
        var sum = 1 / a;
        var del = sum;
        for (var n = 1; n <= ITMAX; n++) {
          ap += 1;
          del *= x / ap;
          sum += del;
          if (Math.abs(del) < Math.abs(sum) * EPS) break;
        }
        return sum * Math.exp(-x + a * Math.log(x) - lgamma(a));
      }

      function gammcf(a, x) {
        var ITMAX = 200;
        var EPS = 3e-7;
        var FPMIN = 1e-30;
        var b = x + 1 - a;
        var c = 1 / FPMIN;
        var d = 1 / b;
        var h = d;
        for (var i = 1; i <= ITMAX; i++) {
          var an = -i * (i - a);
          b += 2;
          d = an * d + b;
          if (Math.abs(d) < FPMIN) d = FPMIN;
          c = b + an / c;
          if (Math.abs(c) < FPMIN) c = FPMIN;
          d = 1 / d;
          var del = d * c;
          h *= del;
          if (Math.abs(del - 1) < EPS) break;
        }
        return Math.exp(-x + a * Math.log(x) - lgamma(a)) * h;
      }

      function gammainc(a, x) {
        if (x < 0) return 0;
        if (x === 0) return 0;
        if (x < a + 1) return gamser(a, x);
        return 1 - gammcf(a, x);
      }

      function chiPValue(chiSq, df) {
        return 1 - gammainc(df / 2, chiSq / 2);
      }

      // ─── Render helpers ───────────────────────────────────────────────────────
      function renderResultItems(items) {
        var grid = document.createElement("div");
        grid.className = "result-grid";
        items.forEach(function (item) {
          var el = document.createElement("div");
          el.className = "result-item";
          var lbl = document.createElement("div");
          lbl.className = "result-item-label";
          lbl.textContent = item.label;
          var val = document.createElement("div");
          val.className = "result-item-value" + (item.cls ? " " + item.cls : "");
          val.textContent = item.value;
          el.appendChild(lbl);
          el.appendChild(val);
          grid.appendChild(el);
        });
        return grid;
      }

      function renderConclusion(reject, alpha, tail, testType) {
        var box = document.createElement("div");
        box.className = "conclusion-box " + (reject ? "reject" : "no-reject");
        var title = document.createElement("div");
        title.className = "conclusion-title";
        title.textContent = reject ? "拒绝 H₀（显著）" : "未能拒绝 H₀（不显著）";
        var body = document.createElement("div");
        if (testType === "chi") {
          body.textContent = reject
            ? "在 α=" + alpha + " 显著性水平下，观测频数与期望频数存在显著差异，拒绝零假设。"
            : "在 α=" + alpha + " 显著性水平下，观测频数与期望频数无显著差异，未能拒绝零假设。";
        } else {
          var tailDesc =
            tail === "two" ? "双侧检验" : tail === "left" ? "左侧单尾检验" : "右侧单尾检验";
          body.textContent = reject
            ? "在 α=" + alpha + "（" + tailDesc + "）显著性水平下，差异显著，拒绝零假设 H₀。"
            : "在 α=" + alpha + "（" + tailDesc + "）显著性水平下，差异不显著，未能拒绝零假设 H₀。";
        }
        box.appendChild(title);
        box.appendChild(body);
        return box;
      }

      function renderSteps(steps) {
        var box = document.createElement("div");
        box.className = "steps-box";
        var title = document.createElement("div");
        title.className = "steps-title";
        title.textContent = "计算步骤";
        box.appendChild(title);
        var ul = document.createElement("ul");
        ul.className = "steps-list";
        steps.forEach(function (s) {
          var li = document.createElement("li");
          li.textContent = s;
          ul.appendChild(li);
        });
        box.appendChild(ul);
        return box;
      }

      // ─── One-sample t-test ────────────────────────────────────────────────────
      function calcOneSample() {
        var raw = document.getElementById("oneSampleData").value;
        var mu0str = document.getElementById("oneMu").value;
        var data = parseNumbers(raw);
        if (!data || data.length < 2) {
          showStatus("请输入至少 2 个有效数值", "error");
          return;
        }
        var mu0 = parseFloat(mu0str);
        if (isNaN(mu0)) {
          showStatus("请输入假设总体均値 μ₀", "error");
          return;
        }
        var n = data.length;
        var xbar = arrMean(data);
        var s = Math.sqrt(arrVariance(data, 1));
        var se = s / Math.sqrt(n);
        var t = (xbar - mu0) / se;
        var df = n - 1;
        var alpha = parseFloat(alphaEl.value);
        var tail = tailEl.value;
        var pTwo = tPValue(Math.abs(t), df);
        var pVal, reject;
        if (tail === "two") {
          pVal = pTwo;
          reject = pVal < alpha;
        } else if (tail === "right") {
          pVal = t >= 0 ? pTwo / 2 : 1 - pTwo / 2;
          reject = pVal < alpha;
        } else {
          pVal = t <= 0 ? pTwo / 2 : 1 - pTwo / 2;
          reject = pVal < alpha;
        }

        var resultEl = document.getElementById("resultOne");
        resultEl.innerHTML = "";

        var items = [
          { label: "样本量 n", value: n },
          { label: "样本均値 x̄", value: fmt(xbar) },
          { label: "样本标准差 s", value: fmt(s) },
          { label: "标准误差 SE", value: fmt(se) },
          { label: "t 统计量", value: fmt(t) },
          { label: "自由度 df", value: df },
          {
            label: "p 値（" + (tail === "two" ? "双侧" : "单侧") + "）",
            value: pVal < 0.0001 ? pVal.toExponential(4) : fmt(pVal),
            cls: reject ? "highlight-red" : "highlight-green"
          },
          { label: "α 水平", value: alpha }
        ];
        resultEl.appendChild(renderResultItems(items));

        var h1op = tail === "two" ? "≠" : tail === "right" ? ">" : "<";
        var steps = [
          "H₀: μ = " + mu0 + "，H₁: μ " + h1op + " " + mu0,
          "计算样本均値 x̄ = " + fmt(xbar),
          "计算样本标准差 s = " + fmt(s),
          "SE = s / √n = " + fmt(s) + " / √" + n + " = " + fmt(se),
          "t = (x̄ - μ₀) / SE = (" + fmt(xbar) + " - " + mu0 + ") / " + fmt(se) + " = " + fmt(t),
          "df = n - 1 = " + df,
          "p 値 = " + (pVal < 0.0001 ? pVal.toExponential(4) : fmt(pVal)),
          "结论：p " + (reject ? "< " : "≥ ") + alpha + "，" + (reject ? "拒绝 H₀" : "未能拒绝 H₀")
        ];
        resultEl.appendChild(renderConclusion(reject, alpha, tail, "t"));
        resultEl.appendChild(renderSteps(steps));

        showStatus("计算完成", "success");
        lastResult =
          "单样本 t 检验结果\n样本量 n: " +
          n +
          "\n样本均値: " +
          fmt(xbar) +
          "\nt 统计量: " +
          fmt(t) +
          "\ndf: " +
          df +
          "\np 値: " +
          fmt(pVal) +
          "\n" +
          (reject ? "结论：拒绝 H₀（α=" + alpha + "）" : "结论：未能拒绝 H₀（α=" + alpha + "）");
      }

      // ─── Two-sample t-test ────────────────────────────────────────────────────
      function calcTwoSample() {
        var raw1 = document.getElementById("twoSampleData1").value;
        var raw2 = document.getElementById("twoSampleData2").value;
        var data1 = parseNumbers(raw1);
        var data2 = parseNumbers(raw2);
        if (!data1 || data1.length < 2) {
          showStatus("请输入样本 1 的至少 2 个有效数值", "error");
          return;
        }
        if (!data2 || data2.length < 2) {
          showStatus("请输入样本 2 的至少 2 个有效数值", "error");
          return;
        }
        var n1 = data1.length;
        var n2 = data2.length;
        var xbar1 = arrMean(data1);
        var xbar2 = arrMean(data2);
        var s1sq = arrVariance(data1, 1);
        var s2sq = arrVariance(data2, 1);
        var s1 = Math.sqrt(s1sq);
        var s2 = Math.sqrt(s2sq);
        var alpha = parseFloat(alphaEl.value);
        var tail = tailEl.value;
        var equalVar = document.getElementById("equalVariance").checked;
        var t, df, se, methodName;

        if (equalVar) {
          var sp2 = ((n1 - 1) * s1sq + (n2 - 1) * s2sq) / (n1 + n2 - 2);
          var sp = Math.sqrt(sp2);
          se = sp * Math.sqrt(1 / n1 + 1 / n2);
          t = (xbar1 - xbar2) / se;
          df = n1 + n2 - 2;
          methodName = "合并方差 t 检验（等方差）";
        } else {
          se = Math.sqrt(s1sq / n1 + s2sq / n2);
          t = (xbar1 - xbar2) / se;
          var num = Math.pow(s1sq / n1 + s2sq / n2, 2);
          var den = Math.pow(s1sq / n1, 2) / (n1 - 1) + Math.pow(s2sq / n2, 2) / (n2 - 1);
          df = Math.floor(num / den);
          methodName = "Welch t 检验（不等方差）";
        }

        var pTwo = tPValue(Math.abs(t), df);
        var pVal, reject;
        if (tail === "two") {
          pVal = pTwo;
          reject = pVal < alpha;
        } else if (tail === "right") {
          pVal = t >= 0 ? pTwo / 2 : 1 - pTwo / 2;
          reject = pVal < alpha;
        } else {
          pVal = t <= 0 ? pTwo / 2 : 1 - pTwo / 2;
          reject = pVal < alpha;
        }

        var resultEl = document.getElementById("resultTwo");
        resultEl.innerHTML = "";

        var items = [
          { label: "样本 1 均値 x̄₁", value: fmt(xbar1) },
          { label: "样本 2 均値 x̄₂", value: fmt(xbar2) },
          { label: "均値差 x̄₁ - x̄₂", value: fmt(xbar1 - xbar2) },
          { label: "样本 1 标准差 s₁", value: fmt(s1) },
          { label: "样本 2 标准差 s₂", value: fmt(s2) },
          { label: "标准误差 SE", value: fmt(se) },
          { label: "t 统计量", value: fmt(t) },
          { label: "自由度 df", value: df },
          {
            label: "p 値（" + (tail === "two" ? "双侧" : "单侧") + "）",
            value: pVal < 0.0001 ? pVal.toExponential(4) : fmt(pVal),
            cls: reject ? "highlight-red" : "highlight-green"
          },
          { label: "检验方法", value: methodName }
        ];
        resultEl.appendChild(renderResultItems(items));

        var h1desc = tail === "two" ? "μ₁ ≠ μ₂" : tail === "right" ? "μ₁ > μ₂" : "μ₁ < μ₂";
        var steps = [
          "H₀: μ₁ = μ₂，H₁: " + h1desc,
          "样本 1 均値 x̄₁ = " + fmt(xbar1) + "，n₁ = " + n1,
          "样本 2 均値 x̄₂ = " + fmt(xbar2) + "，n₂ = " + n2,
          "SE = " + fmt(se),
          "t = (x̄₁ - x̄₂) / SE = " + fmt(t),
          "df = " + df + "（" + methodName + "）",
          "p 値 = " + (pVal < 0.0001 ? pVal.toExponential(4) : fmt(pVal)),
          "结论：p " + (reject ? "< " : "≥ ") + alpha + "，" + (reject ? "拒绝 H₀" : "未能拒绝 H₀")
        ];
        resultEl.appendChild(renderConclusion(reject, alpha, tail, "t"));
        resultEl.appendChild(renderSteps(steps));

        showStatus("计算完成", "success");
        lastResult =
          "双样本 t 检验结果\n均値差: " +
          fmt(xbar1 - xbar2) +
          "\nt 统计量: " +
          fmt(t) +
          "\ndf: " +
          df +
          "\np 値: " +
          fmt(pVal) +
          "\n" +
          (reject ? "结论：拒绝 H₀（α=" + alpha + "）" : "结论：未能拒绝 H₀（α=" + alpha + "）");
      }

      // ─── Chi-square goodness-of-fit ───────────────────────────────────────────
      function calcChiSquare() {
        var rawO = document.getElementById("chiObserved").value;
        var rawE = document.getElementById("chiExpected").value;
        var observed = parseNumbers(rawO);
        if (!observed || observed.length < 2) {
          showStatus("请输入至少 2 个观测频数", "error");
          return;
        }
        for (var i = 0; i < observed.length; i++) {
          if (observed[i] < 0) {
            showStatus("观测频数不能为负数", "error");
            return;
          }
        }
        var k = observed.length;
        var N = observed.reduce(function (a, b) {
          return a + b;
        }, 0);
        var expected;
        if (rawE.trim() === "") {
          var eUniform = N / k;
          expected = observed.map(function () {
            return eUniform;
          });
        } else {
          expected = parseNumbers(rawE);
          if (!expected) {
            showStatus("期望频数格式有误，请检查输入", "error");
            return;
          }
          if (expected.length !== k) {
            showStatus(
              "期望频数个数（" + expected.length + "）与观测频数个数（" + k + "）不一致",
              "error"
            );
            return;
          }
          for (var j = 0; j < expected.length; j++) {
            if (expected[j] <= 0) {
              showStatus("期望频数必须大于 0", "error");
              return;
            }
          }
        }

        var chiSq = 0;
        for (var m = 0; m < k; m++) {
          chiSq += Math.pow(observed[m] - expected[m], 2) / expected[m];
        }
        var df = k - 1;
        var alpha = parseFloat(alphaEl.value);
        var pVal = chiPValue(chiSq, df);
        var reject = pVal < alpha;

        var resultEl = document.getElementById("resultChi");
        resultEl.innerHTML = "";

        var items = [
          { label: "类别数 k", value: k },
          { label: "总观测数 N", value: N },
          { label: "自由度 df", value: df },
          { label: "χ² 统计量", value: fmt(chiSq) },
          {
            label: "p 値",
            value: pVal < 0.0001 ? pVal.toExponential(4) : fmt(pVal),
            cls: reject ? "highlight-red" : "highlight-green"
          },
          { label: "α 水平", value: alpha }
        ];
        resultEl.appendChild(renderResultItems(items));
        resultEl.appendChild(renderConclusion(reject, alpha, "chi", "chi"));

        var tableWrapper = document.createElement("div");
        tableWrapper.className = "chi-table-wrapper";
        var tbl = document.createElement("table");
        tbl.className = "chi-table";
        var thead = document.createElement("thead");
        var hrow = document.createElement("tr");
        ["类别", "观测 O", "期望 E", "(O-E)²/E"].forEach(function (h) {
          var th = document.createElement("th");
          th.textContent = h;
          hrow.appendChild(th);
        });
        thead.appendChild(hrow);
        tbl.appendChild(thead);
        var tbody = document.createElement("tbody");
        for (var r = 0; r < k; r++) {
          var row = document.createElement("tr");
          var contrib = Math.pow(observed[r] - expected[r], 2) / expected[r];
          [r + 1, observed[r], fmt(expected[r], 2), fmt(contrib)].forEach(function (v, ci) {
            var td = document.createElement("td");
            td.textContent = v;
            if (ci === 2) td.className = "expected";
            row.appendChild(td);
          });
          tbody.appendChild(row);
        }
        tbl.appendChild(tbody);
        tableWrapper.appendChild(tbl);
        resultEl.appendChild(tableWrapper);

        var steps = [
          "H₀: 数据符合期望分布，H₁: 数据不符合期望分布",
          "总观测数 N = " + N + "，类别数 k = " + k,
          "χ² = Σ (O - E)² / E = " + fmt(chiSq),
          "df = k - 1 = " + df,
          "p 値 = " + (pVal < 0.0001 ? pVal.toExponential(4) : fmt(pVal)),
          "结论：p " + (reject ? "< " : "≥ ") + alpha + "，" + (reject ? "拒绝 H₀" : "未能拒绝 H₀")
        ];
        resultEl.appendChild(renderSteps(steps));

        showStatus("计算完成", "success");
        lastResult =
          "卡方检验结果\nχ² 统计量: " +
          fmt(chiSq) +
          "\ndf: " +
          df +
          "\np 値: " +
          fmt(pVal) +
          "\n" +
          (reject ? "结论：拒绝 H₀（α=" + alpha + "）" : "结论：未能拒绝 H₀（α=" + alpha + "）");
      }

      // ─── Buttons ──────────────────────────────────────────────────────────────
      document.getElementById("btnCalcOne").onclick = calcOneSample;
      document.getElementById("btnCalcTwo").onclick = calcTwoSample;
      document.getElementById("btnCalcChi").onclick = calcChiSquare;

      document.getElementById("btnReset").onclick = function () {
        document.getElementById("oneSampleData").value = "";
        document.getElementById("oneMu").value = "";
        document.getElementById("twoSampleData1").value = "";
        document.getElementById("twoSampleData2").value = "";
        document.getElementById("chiObserved").value = "";
        document.getElementById("chiExpected").value = "";
        document.getElementById("resultOne").innerHTML =
          '<div class="result-empty">输入数据后点击「计算」</div>';
        document.getElementById("resultTwo").innerHTML =
          '<div class="result-empty">输入数据后点击「计算」</div>';
        document.getElementById("resultChi").innerHTML =
          '<div class="result-empty">输入数据后点击「计算」</div>';
        lastResult = "";
        clearStatus();
      };

      document.getElementById("btnCopyResult").onclick = async function () {
        if (!lastResult) {
          showStatus("暂无结果可复制", "error");
          return;
        }
        try {
          await navigator.clipboard.writeText(lastResult);
          showStatus("已复制结果", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          if (currentTab === "one") calcOneSample();
          else if (currentTab === "two") calcTwoSample();
          else calcChiSquare();
        }
      });

      // ─── Theme (preserve exactly) ────────────────────────────────────────────
      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
