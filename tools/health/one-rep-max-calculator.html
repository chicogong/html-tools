      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */

        --color-error: var(--accent-red, #f43f5e);

        /* 玻璃拟态 */

        /* 辉光 */

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:

        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);

      }

      }

        gap: var(--space-3);

      }

        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;

        justify-content: center;

        padding: 0 var(--space-4);
        font-family: var(--font-mono);

        margin-bottom: var(--space-5);

        gap: var(--space-2);

        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

        cursor: pointer;
      }

        min-height: 400px;

        flex-direction: column;

    <script>
      var weightEl = document.getElementById("weightInput");
      var repsEl = document.getElementById("repsInput");
      var unitEl = document.getElementById("unitSelect");
      var statusEl = document.getElementById("status");
      var statsEl = document.getElementById("stats");
      var resultSection = document.getElementById("resultSection");
      var rm1Display = document.getElementById("rm1Display");
      var rm1Unit = document.getElementById("rm1Unit");
      var formulaGrid = document.getElementById("formulaGrid");
      var pctBody = document.getElementById("pctBody");

      var LS_KEY = "one_rep_max_v1";

      /* ── 1RM 公式 ── */
      function epley(w, r) {
        if (r === 1) return w;
        return w * (1 + r / 30);
      }
      function brzycki(w, r) {
        if (r === 1) return w;
        return w * (36 / (37 - r));
      }
      function lombardi(w, r) {
        return w * Math.pow(r, 0.1);
      }
      function mayhew(w, r) {
        return (100 * w) / (52.2 + 41.9 * Math.exp(-0.055 * r));
      }
      function oConner(w, r) {
        return w * (1 + r / 40);
      }
      function wathan(w, r) {
        return (100 * w) / (48.8 + 53.8 * Math.exp(-0.075 * r));
      }

      var FORMULAS = [
        { id: "epley", name: "Epley", fn: epley },
        { id: "brzycki", name: "Brzycki", fn: brzycki },
        { id: "lombardi", name: "Lombardi", fn: lombardi },
        { id: "mayhew", name: "Mayhew", fn: mayhew },
        { id: "oconner", name: "O'Conner", fn: oConner },
        { id: "wathan", name: "Wathan", fn: wathan }
      ];

      /* 百分比表数据 */
      var PCT_ROWS = [
        { pct: 100, repsRange: "1", goal: "最大力量测试" },
        { pct: 95, repsRange: "2", goal: "最大力量" },
        { pct: 90, repsRange: "3", goal: "力量 / 爆发力" },
        { pct: 85, repsRange: "4–5", goal: "力量" },
        { pct: 80, repsRange: "5–6", goal: "力量增肌" },
        { pct: 75, repsRange: "6–8", goal: "力量增肌" },
        { pct: 70, repsRange: "8–10", goal: "肌肉肥大" },
        { pct: 65, repsRange: "10–12", goal: "肌肉肥大" },
        { pct: 60, repsRange: "12–15", goal: "肌耐力" },
        { pct: 55, repsRange: "15–20", goal: "肌耐力" },
        { pct: 50, repsRange: "20+", goal: "有氧耐力" }
      ];

      function roundTo(val, dec) {
        var f = Math.pow(10, dec);
        return Math.round(val * f) / f;
      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function saveState() {
        try {
          localStorage.setItem(
            LS_KEY,
            JSON.stringify({
              weight: weightEl.value,
              reps: repsEl.value,
              unit: unitEl.value
            })
          );
        } catch (e) {
          /* ignore */
        }
      }

      function loadState() {
        try {
          var raw = localStorage.getItem(LS_KEY);
          if (!raw) return;
          var state = JSON.parse(raw);
          if (state.weight) weightEl.value = state.weight;
          if (state.reps) repsEl.value = state.reps;
          if (state.unit) unitEl.value = state.unit;
        } catch (e) {
          /* ignore */
        }
      }

      function calc() {
        var weight = parseFloat(weightEl.value);
        var reps = parseInt(repsEl.value, 10);
        var unit = unitEl.value;

        if (!weight || weight <= 0 || isNaN(weight)) {
          showStatus("请输入有效的重量", "error");
          return;
        }
        if (!reps || reps < 1 || reps > 30 || isNaN(reps)) {
          showStatus("次数须在 1–30 之间", "error");
          return;
        }

        saveState();

        /* 计算各公式 */
        var results = FORMULAS.map(function (f) {
          return { name: f.name, val: roundTo(f.fn(weight, reps), 1) };
        });

        /* 平均值（排除最大最小各1个再平均，若公式 >= 4） */
        var sorted = results.map(function (r) {
          return r.val;
        });
        sorted.sort(function (a, b) {
          return a - b;
        });
        var trimmed = sorted.length >= 4 ? sorted.slice(1, sorted.length - 1) : sorted;
        var avg =
          trimmed.reduce(function (s, v) {
            return s + v;
          }, 0) / trimmed.length;
        var avgRounded = roundTo(avg, 1);

        /* 更新主显示 */
        rm1Display.textContent = avgRounded;
        rm1Unit.textContent = unit;

        /* 公式卡片 */
        formulaGrid.innerHTML = "";
        results.forEach(function (r) {
          var card = document.createElement("div");
          card.className = "formula-card" + (r.val === avgRounded ? " highlight" : "");
          var nameEl = document.createElement("div");
          nameEl.className = "formula-name";
          nameEl.textContent = r.name;
          var valEl = document.createElement("div");
          valEl.className = "formula-val";
          valEl.textContent = r.val + " " + unit;
          card.appendChild(nameEl);
          card.appendChild(valEl);
          formulaGrid.appendChild(card);
        });

        /* 百分比表 */
        pctBody.innerHTML = "";
        PCT_ROWS.forEach(function (row) {
          var tr = document.createElement("tr");
          var weightAtPct = roundTo((avgRounded * row.pct) / 100, 1);
          var isCurrentPct = reps === 1 && row.pct === 100;
          tr.innerHTML =
            '<td class="' +
            (isCurrentPct ? "pct-highlight" : "") +
            '">' +
            row.pct +
            "%</td>" +
            '<td class="' +
            (isCurrentPct ? "pct-highlight" : "") +
            '">' +
            weightAtPct +
            " " +
            unit +
            "</td>" +
            "<td>" +
            row.repsRange +
            " 次</td>" +
            "<td>" +
            row.goal +
            "</td>";
          pctBody.appendChild(tr);
        });

        /* 状态栏 stats */
        document.getElementById("statEpley").textContent = results[0].val + " " + unit;
        document.getElementById("statBrzycki").textContent = results[1].val + " " + unit;
        document.getElementById("statAvg").textContent = avgRounded + " " + unit;
        statsEl.classList.add("show");

        resultSection.style.display = "";
        showStatus("计算完成（次数 " + reps + "，平均估算 1RM）", "success");
      }

      document.getElementById("btnCalc").onclick = calc;

      document.getElementById("btnReset").onclick = function () {
        weightEl.value = "";
        repsEl.value = "";
        resultSection.style.display = "none";
        statsEl.classList.remove("show");
        statusEl.textContent = "";
        statusEl.className = "status";
        try {
          localStorage.removeItem(LS_KEY);
        } catch (e) {
          /* ignore */
        }
      };

      document.getElementById("btnCopyResult").onclick = async function () {
        var rm1 = rm1Display.textContent;
        if (!rm1 || rm1 === "—") {
          showStatus("尚无结果", "error");
          return;
        }
        var unit = unitEl.value;
        var lines = ["1RM 估算结果（" + unit + "）", "平均: " + rm1 + " " + unit];
        document.querySelectorAll(".formula-card").forEach(function (card) {
          var nameDiv = card.querySelector(".formula-name");
          var valDiv = card.querySelector(".formula-val");
          if (nameDiv && valDiv) {
            lines.push(nameDiv.textContent + ": " + valDiv.textContent);
          }
        });
        try {
          await navigator.clipboard.writeText(lines.join("\n"));
          showStatus("已复制", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      /* 回车触发计算 */
      [weightEl, repsEl].forEach(function (el) {
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter") calc();
        });
      });

      /* 单位切换时重算 */
      unitEl.addEventListener("change", function () {
        if (rm1Display.textContent !== "—") calc();
      });

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
      loadState();
    </script>
  </body>
</html>
