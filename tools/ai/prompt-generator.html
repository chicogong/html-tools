<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI 提示词生成器 - WebUtils</title>

    <meta
      name="description"
      content="结构化 AI 提示词生成器，通过角色、背景、任务、要求等维度生成高质量 Prompt，提升 AI 输出准确率。"
    />
    <meta name="keywords" content="ai 提示词生成器, prompt generator, prompt 工程, 提示词结构化" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/ai/prompt-generator.html" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../favicon-16x16.png" />
    <meta name="theme-color" content="#0a0a0f" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/tool-base.css" />

    <style>
      .generator-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-top: 1.5rem;
      }

      @media (max-width: 768px) {
        .generator-layout {
          grid-template-columns: 1fr;
        }
      }

      .input-card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 1.5rem;
      }

      .result-card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
      }

      .form-group span.badge {
        font-size: 0.75rem;
        background: var(--accent-purple);
        color: white;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 0.5rem;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-surface);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 0.95rem;
        transition: border-color 0.2s;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }

      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .result-area {
        flex-grow: 1;
        background: var(--bg-deep);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 1rem;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text-primary);
        white-space: pre-wrap;
        overflow-y: auto;
        min-height: 300px;
      }

      .actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .btn {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          opacity 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-primary {
        background: var(--accent-cyan);
        color: var(--bg-deep);
      }

      .btn-primary:hover {
        opacity: 0.9;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--border-subtle);
        color: var(--text-primary);
      }

      .btn-outline:hover {
        background: var(--bg-surface);
      }

      .example-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .example-pill {
        font-size: 0.8rem;
        padding: 0.25rem 0.75rem;
        border-radius: 1rem;
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }

      .example-pill:hover {
        background: rgba(139, 92, 246, 0.1);
        border-color: var(--accent-purple);
        color: var(--accent-purple);
      }
    </style>
  </head>
  <body>
    <div class="tool-main" role="main">
      <div class="container">
        <a href="index.html" class="back-link">← 返回 AI 工具</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        <h1>✨ 结构化提示词生成器</h1>
        <p class="subtitle">
          根据 CREATE 框架 (Context, Role, Task, Format...) 快速生成高质量的 AI Prompt
        </p>

        <div class="example-pills">
          <span style="font-size: 0.85rem; color: var(--text-muted); align-self: center">
            快捷模板：
          </span>
          <button class="example-pill" onclick="loadTemplate('dev')">👨‍💻 程序员专家</button>
          <button class="example-pill" onclick="loadTemplate('translate')">🌍 专业翻译</button>
          <button class="example-pill" onclick="loadTemplate('writer')">✍️ 文案大师</button>
          <button class="example-pill" onclick="loadTemplate('clear')">🗑️ 清空重置</button>
        </div>

        <div class="generator-layout">
          <!-- 左侧输入区 -->
          <div class="input-card">
            <div class="form-group">
              <label>🎭 设定角色 (Role)</label>
              <input
                type="text"
                id="prompt-role"
                placeholder="例如：你是一个拥有 10 年经验的资深前端架构师"
                oninput="generatePrompt()"
              />
            </div>

            <div class="form-group">
              <label>
                🎯 核心任务 (Task)
                <span class="badge">必填</span>
              </label>
              <textarea
                id="prompt-task"
                placeholder="例如：请帮我用 React 和 Tailwind CSS 编写一个响应式的数据表格组件..."
                oninput="generatePrompt()"
              ></textarea>
            </div>

            <div class="form-group">
              <label>📖 背景信息 (Context)</label>
              <textarea
                id="prompt-context"
                placeholder="例如：我们的项目是在 Next.js 14 的 App Router 环境下运行的，需要处理大量分页数据..."
                oninput="generatePrompt()"
              ></textarea>
            </div>

            <div class="form-group">
              <label>📋 输出格式 (Format)</label>
              <input
                type="text"
                id="prompt-format"
                placeholder="例如：请直接输出完整的可运行代码，不要包含多余的解释"
                oninput="generatePrompt()"
              />
            </div>

            <div class="form-group">
              <label>⚠️ 约束条件 (Constraints/Rules)</label>
              <textarea
                id="prompt-rules"
                placeholder="例如：1. 必须使用 TypeScript&#10;2. 避免使用 class 组件，必须使用 hooks"
                oninput="generatePrompt()"
              ></textarea>
            </div>

            <div class="form-group">
              <label>🗣️ 语气风格 (Tone)</label>
              <select id="prompt-tone" onchange="generatePrompt()">
                <option value="">默认/中立</option>
                <option value="专业、严谨">专业、严谨</option>
                <option value="友好、鼓励">友好、鼓励</option>
                <option value="简洁、直接，没有废话">简洁、直接，没有废话</option>
                <option value="幽默风趣">幽默风趣</option>
              </select>
            </div>
          </div>

          <!-- 右侧预览区 -->
          <div class="result-card">
            <div class="actions">
              <h3 style="margin: 0; font-size: 1.1rem">生成的 Prompt</h3>
              <button class="btn btn-primary" onclick="copyPrompt()" id="copy-btn">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                复制提示词
              </button>
            </div>
            <div id="result-display" class="result-area">请在左侧填写内容以生成提示词...</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const templates = {
        dev: {
          role: "你是一个拥有 10 年经验的资深全栈工程师和架构师。",
          task: "请帮我重构以下代码，解决性能瓶颈并提高可读性。\n\n[在此处粘贴你的代码]",
          context: "这是一个高并发的 Node.js 生产环境系统，目前在处理长列表时存在明显的内存泄漏。",
          format:
            "请先简要指出目前的 3 个核心问题，然后直接输出重构后的完整代码，并在关键位置附带注释。",
          rules: "1. 必须符合最新的 ES6+ 语法规范\n2. 不能引入新的第三方库\n3. 考虑极端的边界情况",
          tone: "专业、严谨"
        },
        translate: {
          role: "你是一位精通多国语言的专业本地化翻译专家。",
          task: "请将以下英文文本翻译为地道、流畅的中文。\n\n[在此处粘贴英文文本]",
          context: "这篇文字将发布在科技公司的官方博客上，面向的是具有一定技术背景的中文读者。",
          format: "直接输出翻译结果。如果有难以直译的行业术语，请保留英文或在括号内加注英文。",
          rules: "1. 拒绝机翻感，符合中文阅读习惯\n2. 保持原有的 Markdown 格式排版不变",
          tone: "专业、严谨"
        },
        writer: {
          role: "你是一位拥有百万粉丝爆款经验的公众号/小红书文案大师。",
          task: "请帮我写一篇推荐最新款 AI 编程工具的文章。",
          context: "文章的目的是吸引小白用户注册试用，核心卖点是“不用懂代码也能做网页”。",
          format: "请输出包含标题（给出 3 个爆款候选）和正文。正文需分段清晰，善用 Emoji。",
          rules: "1. 字数控制在 800 字以内\n2. 增加互动性，结尾引导读者在评论区留言",
          tone: "友好、鼓励"
        },
        clear: {
          role: "",
          task: "",
          context: "",
          format: "",
          rules: "",
          tone: ""
        }
      };

      function loadTemplate(type) {
        const tpl = templates[type];
        document.getElementById("prompt-role").value = tpl.role;
        document.getElementById("prompt-task").value = tpl.task;
        document.getElementById("prompt-context").value = tpl.context;
        document.getElementById("prompt-format").value = tpl.format;
        document.getElementById("prompt-rules").value = tpl.rules;
        document.getElementById("prompt-tone").value = tpl.tone;
        generatePrompt();
      }

      function generatePrompt() {
        const role = document.getElementById("prompt-role").value.trim();
        const task = document.getElementById("prompt-task").value.trim();
        const context = document.getElementById("prompt-context").value.trim();
        const format = document.getElementById("prompt-format").value.trim();
        const rules = document.getElementById("prompt-rules").value.trim();
        const tone = document.getElementById("prompt-tone").value;

        if (!task && !role && !context) {
          document.getElementById("result-display").textContent = "请在左侧填写内容以生成提示词...";
          return;
        }

        let prompt = "";

        if (role) {
          prompt += `## 角色 (Role)\n${role}\n\n`;
        }

        if (context) {
          prompt += `## 背景信息 (Context)\n${context}\n\n`;
        }

        if (task) {
          prompt += `## 任务目标 (Task)\n${task}\n\n`;
        }

        if (rules) {
          prompt += `## 规则与约束 (Constraints)\n${rules}\n\n`;
        }

        if (format) {
          prompt += `## 输出格式 (Format)\n${format}\n\n`;
        }

        if (tone) {
          prompt += `## 语气风格 (Tone)\n请使用【${tone}】的语气进行回复。\n\n`;
        }

        document.getElementById("result-display").textContent = prompt.trim();
      }

      async function copyPrompt() {
        const text = document.getElementById("result-display").textContent;
        if (!text || text === "请在左侧填写内容以生成提示词...") return;

        try {
          await navigator.clipboard.writeText(text);
          const btn = document.getElementById("copy-btn");
          const originalHTML = btn.innerHTML;
          btn.innerHTML = "✅ 复制成功";
          btn.style.background = "var(--accent-green)";
          setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.style.background = "var(--accent-cyan)";
          }, 2000);
        } catch (err) {
          alert("复制失败，请手动选择复制");
        }
      }

      // 初始化主题
      window.toggleTheme = function () {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") !== "light";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        document.querySelector(".theme-toggle").textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("theme", isDark ? "light" : "dark");
      };

      function loadTheme() {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          document.querySelector(".theme-toggle").textContent = "☀️";
        }
      }

      loadTheme();
      generatePrompt();
    </script>
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
