    <style>
      :root {
        --color-bg-deep: #0a0a0f;
        --color-accent-cyan: #00f5d4;

        /* 字体变量 */
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      h1 {
        margin-bottom: 2rem;
        color: var(--color-accent-cyan);
      }
      .circle {
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: var(--color-accent-cyan);
        transition: transform 8s ease-in-out;
        opacity: 0.3;
      }
      .circle.inhale {
        transform: scale(1.5);
        opacity: 0.6;
      }
      .text {
        margin-top: 2rem;
        font-size: 2rem;
      }
      button {
        margin-top: 2rem;
        padding: 1rem 2rem;
        border: none;
        border-radius: 8px;
        background: var(--color-accent-cyan);
        color: #000;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="tool-main" role="main">
      <h1>🧘 呼吸练习 (4-7-8)</h1>
      <div class="circle" id="circle"></div>
      <div class="text" id="text">准备开始</div>
      <button onclick="start()">开始练习</button>
    </div>

    <script>
      let running = false;
      async function start() {
        if (running) return;
        running = true;
        const circle = document.getElementById("circle");
        const text = document.getElementById("text");

        for (let i = 0; i < 4; i++) {
          text.textContent = "吸气 (4秒)";
          circle.classList.add("inhale");
          await new Promise((r) => setTimeout(r, 4000));

          text.textContent = "屏住 (7秒)";
          await new Promise((r) => setTimeout(r, 7000));

          text.textContent = "呼气 (8秒)";
          circle.classList.remove("inhale");
          await new Promise((r) => setTimeout(r, 8000));
        }

        text.textContent = "完成！";
        running = false;
      }
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
