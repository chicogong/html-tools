<style>
/* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .panel-textarea {
        flex: 1;
        width: 100%;
        min-height: 350px;
        padding: var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        line-height: 1.6;
        color: var(--color-text-primary);
        background: var(--color-bg-input);
        border: 2px solid var(--color-border-default);
        border-radius: var(--radius-md);
        resize: vertical;
        tab-size: 2;
        transition: all var(--transition-fast);
      }
      .panel-textarea::placeholder {
        color: var(--text-muted);
      }
      .panel-textarea:hover {
        border-color: var(--color-border-strong);
      }
      .panel-textarea:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
      }
      .panel-textarea.error {
        border-color: var(--color-error);
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
      }
      .panel-textarea[readonly] {
        background: var(--color-bg-subtle);
      }
      .error-detail {
        display: none;
        margin-top: var(--space-4);
        padding: var(--space-4);
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--color-error);
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--color-error);
      }
      .error-detail.show {
        display: block;
      }
      .error-detail p {
        margin-bottom: var(--space-2);
      }
      .error-detail p:last-child {
        margin-bottom: 0;
      }
      .error-detail code {
        background: rgba(239, 68, 68, 0.15);
        padding: 2px var(--space-2);
        border-radius: var(--radius-sm);
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {
        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";
      }
      .stats {
        display: none;

<script>
/* ── pH 值计算器逻辑 ── */

      var REF_SOLUTIONS = [
        { name: "盐酸（胃酸）", ph: 1.5, note: "强酸" },
        { name: "柠檬汁", ph: 2.4, note: "强酸" },
        { name: "醋 / 食醋", ph: 2.9, note: "强酸" },
        { name: "碳酸饮料", ph: 3.3, note: "弱酸" },
        { name: "番茄汁", ph: 4.1, note: "弱酸" },
        { name: "黑咖啡", ph: 5.0, note: "弱酸" },
        { name: "雨水（洁净）", ph: 5.6, note: "弱酸" },
        { name: "牛奶", ph: 6.4, note: "弱酸" },
        { name: "纯水（25°C）", ph: 7.0, note: "中性" },
        { name: "血液", ph: 7.4, note: "弱碱" },
        { name: "海水", ph: 8.2, note: "弱碱" },
        { name: "小苏打溶液", ph: 8.5, note: "弱碱" },
        { name: "肥皂水", ph: 9.5, note: "弱碱" },
        { name: "氨水（家用）", ph: 11.0, note: "强碱" },
        { name: "漂白水", ph: 12.5, note: "强碱" },
        { name: "NaOH 溶液", ph: 13.5, note: "强碱" }
      ];

      function phToColor(ph) {
        var stops = [
          { t: 0, r: 255, g: 48, b: 48 },
          { t: 1, r: 255, g: 96, b: 48 },
          { t: 2, r: 255, g: 144, b: 48 },
          { t: 3, r: 255, g: 192, b: 48 },
          { t: 4, r: 240, g: 224, b: 64 },
          { t: 5, r: 180, g: 220, b: 50 },
          { t: 6, r: 64, g: 208, b: 80 },
          { t: 7, r: 64, g: 208, b: 128 },
          { t: 8, r: 64, g: 192, b: 208 },
          { t: 9, r: 64, g: 144, b: 224 },
          { t: 10, r: 80, g: 96, b: 224 },
          { t: 11, r: 96, g: 64, b: 224 },
          { t: 12, r: 128, g: 32, b: 208 },
          { t: 13, r: 160, g: 16, b: 176 },
          { t: 14, r: 192, g: 0, b: 144 }
        ];
        ph = Math.max(0, Math.min(14, ph));
        var lo = Math.floor(ph);
        var hi = Math.min(14, lo + 1);
        var f = ph - lo;
        var a = stops[lo];
        var bStop = stops[hi];
        var r = Math.round(a.r + (bStop.r - a.r) * f);
        var g = Math.round(a.g + (bStop.g - a.g) * f);
        var bv = Math.round(a.b + (bStop.b - a.b) * f);
        return "rgb(" + r + "," + g + "," + bv + ")";
      }

      function phLabel(ph) {
        if (ph < 3) return "强酸";
        if (ph < 6) return "弱酸";
        if (ph < 6.9) return "偏酸";
        if (ph <= 7.1) return "中性";
        if (ph <= 8) return "偏碱";
        if (ph <= 11) return "弱碱";
        return "强碱";
      }

      function toSciStr(val) {
        if (val === 0) return "0";
        var exp = Math.floor(Math.log10(val));
        var coeff = val / Math.pow(10, exp);
        var coeffStr = coeff.toFixed(2);
        var supMap = {
          "-": "⁻",
          0: "⁰",
          1: "¹",
          2: "²",
          3: "³",
          4: "⁴",
          5: "⁵",
          6: "⁶",
          7: "⁷",
          8: "⁸",
          9: "⁹"
        };
        var expStr = String(exp)
          .split("")
          .map(function (c) {
            return supMap[c] || c;
          })
          .join("");
        return coeffStr + "×10" + expStr;
      }

      function showResult(ph) {
        var statusEl = document.getElementById("statusEl");
        if (isNaN(ph) || ph < 0 || ph > 14) {
          statusEl.textContent = "pH 超出有效范围（0–14）";
          statusEl.className = "status error";
          return;
        }
        var poh = 14 - ph;
        var hConc = Math.pow(10, -ph);
        var ohConc = Math.pow(10, -poh);
        var color = phToColor(ph);
        var label = phLabel(ph);

        var card = document.getElementById("resultCard");
        card.style.display = "";
        var phValEl = document.getElementById("resultPhValue");
        phValEl.textContent = ph.toFixed(2);
        phValEl.style.color = color;

        var badge = document.getElementById("resultBadge");
        badge.textContent = label;
        badge.style.background = color + "22";
        badge.style.color = color;
        badge.style.border = "1px solid " + color + "66";

        document.getElementById("metaH").textContent = toSciStr(hConc) + " mol/L";
        document.getElementById("metaOH").textContent = toSciStr(ohConc) + " mol/L";
        document.getElementById("metaPOH").textContent = poh.toFixed(2);
        document.getElementById("metaKw").textContent = "1×10⁻¹⁴";

        var pct = (ph / 14) * 100;
        document.getElementById("scaleMarker").style.left = pct + "%";

        statusEl.textContent = "计算完成";
        statusEl.className = "status success";
      }

      function buildRefTable() {
        var tbody = document.getElementById("refTableBody");
        tbody.innerHTML = "";
        REF_SOLUTIONS.forEach(function (sol) {
          var tr = document.createElement("tr");
          var tdName = document.createElement("td");
          var dot = document.createElement("span");
          dot.className = "ref-dot";
          dot.style.background = phToColor(sol.ph);
          tdName.appendChild(dot);
          tdName.appendChild(document.createTextNode(sol.name));

          var tdPh = document.createElement("td");
          tdPh.className = "ref-ph";
          tdPh.textContent = sol.ph.toFixed(1);
          tdPh.style.color = phToColor(sol.ph);

          var tdNote = document.createElement("td");
          tdNote.textContent = sol.note;
          tdNote.style.color = phToColor(sol.ph);

          tr.appendChild(tdName);
          tr.appendChild(tdPh);
          tr.appendChild(tdNote);

          tr.addEventListener("click", function () {
            document.getElementById("phDirect").value = sol.ph;
            document.getElementById("hConc").value = "";
            document.getElementById("pohVal").value = "";
            showResult(sol.ph);
          });

          tbody.appendChild(tr);
        });
      }

      document.getElementById("btnCalcFromH").onclick = function () {
        var raw = document.getElementById("hConc").value.trim();
        var statusEl = document.getElementById("statusEl");
        if (!raw) {
          statusEl.textContent = "请输入 [H⁺] 浓度";
          statusEl.className = "status error";
          return;
        }
        var val = parseFloat(raw);
        if (isNaN(val) || val <= 0) {
          statusEl.textContent = "[H⁺] 必须是正数";
          statusEl.className = "status error";
          return;
        }
        var ph = -Math.log10(val);
        document.getElementById("pohVal").value = "";
        document.getElementById("phDirect").value = "";
        showResult(ph);
      };

      document.getElementById("btnCalcFromPOH").onclick = function () {
        var raw = document.getElementById("pohVal").value.trim();
        var statusEl = document.getElementById("statusEl");
        if (!raw) {
          statusEl.textContent = "请输入 pOH 值";
          statusEl.className = "status error";
          return;
        }
        var poh = parseFloat(raw);
        if (isNaN(poh) || poh < 0 || poh > 14) {
          statusEl.textContent = "pOH 必须在 0–14 之间";
          statusEl.className = "status error";
          return;
        }
        var ph = 14 - poh;
        document.getElementById("hConc").value = "";
        document.getElementById("phDirect").value = "";
        showResult(ph);
      };

      document.getElementById("btnCalcFromPH").onclick = function () {
        var raw = document.getElementById("phDirect").value.trim();
        var statusEl = document.getElementById("statusEl");
        if (!raw) {
          statusEl.textContent = "请输入 pH 值";
          statusEl.className = "status error";
          return;
        }
        var ph = parseFloat(raw);
        if (isNaN(ph) || ph < 0 || ph > 14) {
          statusEl.textContent = "pH 必须在 0–14 之间";
          statusEl.className = "status error";
          return;
        }
        document.getElementById("hConc").value = "";
        document.getElementById("pohVal").value = "";
        showResult(ph);
      };

      document.getElementById("btnClear").onclick = function () {
        document.getElementById("hConc").value = "";
        document.getElementById("pohVal").value = "";
        document.getElementById("phDirect").value = "";
        document.getElementById("resultCard").style.display = "none";
        document.getElementById("scaleMarker").style.left = "50%";
        var statusEl = document.getElementById("statusEl");
        statusEl.textContent = "";
        statusEl.className = "status";
      };

      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          var active = document.activeElement;
          if (active && active.id === "hConc") {
            document.getElementById("btnCalcFromH").click();
          } else if (active && active.id === "pohVal") {
            document.getElementById("btnCalcFromPOH").click();
          } else if (active && active.id === "phDirect") {
            document.getElementById("btnCalcFromPH").click();
          }
        }
      });

      buildRefTable();
      showResult(7);

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
</script>
