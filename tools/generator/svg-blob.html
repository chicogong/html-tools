<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Blob Generator | HTML Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --success-color: #22c55e;
        }
        
        body {
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .theme-toggle {
            background: none;
            border: 2px solid var(--pico-muted-border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }
        
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .controls {
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--pico-muted-border-color);
        }
        
        .control-section {
            margin-bottom: 1.5rem;
        }
        
        .control-section:last-child {
            margin-bottom: 0;
        }
        
        .control-title {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        
        .control-group {
            margin-bottom: 1rem;
        }
        
        .control-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--pico-muted-color);
            margin-bottom: 0.5rem;
        }
        
        .range-with-value {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .range-with-value input[type="range"] {
            flex: 1;
        }
        
        .range-value {
            min-width: 40px;
            text-align: right;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .color-input-wrapper {
            display: flex;
            gap: 0.5rem;
        }
        
        .color-input-wrapper input[type="color"] {
            width: 50px;
            height: 40px;
            padding: 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .color-input-wrapper input[type="text"] {
            flex: 1;
        }
        
        .gradient-inputs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .gradient-inputs input[type="color"] {
            width: 50px;
            height: 40px;
            padding: 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .btn-generate {
            width: 100%;
            margin-bottom: 0.5rem;
        }
        
        .btn-row {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-row button {
            flex: 1;
        }
        
        .preview-area {
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid var(--pico-muted-border-color);
            display: flex;
            flex-direction: column;
        }
        
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .preview-title {
            font-weight: 600;
        }
        
        .preview-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-small {
            padding: 0.25rem 0.75rem;
            font-size: 0.85rem;
        }
        
        .preview-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: repeating-conic-gradient(#80808020 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            border-radius: 8px;
            min-height: 400px;
            padding: 2rem;
        }
        
        .preview-container svg {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }
        
        .code-section {
            margin-top: 1.5rem;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .code-title {
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .code-tabs {
            display: flex;
            gap: 0.5rem;
        }
        
        .code-tab {
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--pico-muted-border-color);
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .code-tab.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .code-content {
            background: var(--pico-background-color);
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.8rem;
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .presets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }
        
        .preset-item {
            aspect-ratio: 1;
            border: 2px solid var(--pico-muted-border-color);
            border-radius: 6px;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preset-item:hover {
            border-color: var(--primary-color);
        }
        
        .preset-item svg {
            width: 100%;
            height: 100%;
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            background: var(--success-color);
            color: white;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .fill-type-select {
            margin-bottom: 0.5rem;
        }
        
        .gradient-direction {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .direction-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--pico-muted-border-color);
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .direction-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html" class="logo">HTML Tools</a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <span id="themeIcon">🌙</span>
            </button>
        </header>
        
        <main>
            <h1>SVG Blob Generator</h1>
            <p>生成随机有机形状的 SVG Blob，可用于背景装饰</p>
            
            <div class="main-grid">
                <div class="controls">
                    <div class="control-section">
                        <div class="control-title">形状参数</div>
                        
                        <div class="control-group">
                            <label>复杂度</label>
                            <div class="range-with-value">
                                <input type="range" id="complexity" min="3" max="12" value="6" oninput="updatePreview()">
                                <span class="range-value" id="complexityValue">6</span>
                            </div>
                        </div>
                        
                        <div class="control-group">
                            <label>不规则度</label>
                            <div class="range-with-value">
                                <input type="range" id="randomness" min="0" max="100" value="50" oninput="updatePreview()">
                                <span class="range-value" id="randomnessValue">50%</span>
                            </div>
                        </div>
                        
                        <div class="control-group">
                            <label>尺寸</label>
                            <div class="range-with-value">
                                <input type="range" id="size" min="100" max="600" value="300" oninput="updatePreview()">
                                <span class="range-value" id="sizeValue">300</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="control-section">
                        <div class="control-title">填充</div>
                        
                        <select class="fill-type-select" id="fillType" onchange="updateFillUI(); updatePreview();">
                            <option value="solid">纯色</option>
                            <option value="gradient" selected>渐变</option>
                        </select>
                        
                        <div id="solidColorUI" style="display: none;">
                            <div class="color-input-wrapper">
                                <input type="color" id="solidColor" value="#6366f1" onchange="updatePreview()">
                                <input type="text" id="solidColorText" value="#6366f1" onchange="syncSolidColor()">
                            </div>
                        </div>
                        
                        <div id="gradientUI">
                            <div class="gradient-inputs">
                                <input type="color" id="gradientColor1" value="#6366f1" onchange="updatePreview()">
                                <input type="color" id="gradientColor2" value="#ec4899" onchange="updatePreview()">
                            </div>
                            <div class="gradient-direction">
                                <button class="direction-btn active" data-dir="0" onclick="setDirection(0)" title="向右">→</button>
                                <button class="direction-btn" data-dir="45" onclick="setDirection(45)" title="右下">↘</button>
                                <button class="direction-btn" data-dir="90" onclick="setDirection(90)" title="向下">↓</button>
                                <button class="direction-btn" data-dir="135" onclick="setDirection(135)" title="左下">↙</button>
                                <button class="direction-btn" data-dir="180" onclick="setDirection(180)" title="向左">←</button>
                                <button class="direction-btn" data-dir="225" onclick="setDirection(225)" title="左上">↖</button>
                                <button class="direction-btn" data-dir="270" onclick="setDirection(270)" title="向上">↑</button>
                                <button class="direction-btn" data-dir="315" onclick="setDirection(315)" title="右上">↗</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="control-section">
                        <div class="control-title">预设色彩</div>
                        <div class="presets-grid" id="presetsGrid"></div>
                    </div>
                    
                    <div class="control-section">
                        <button class="btn-generate" onclick="generateBlob()">随机生成</button>
                        <div class="btn-row">
                            <button class="secondary" onclick="copySVG()">复制 SVG</button>
                            <button class="secondary" onclick="downloadSVG()">下载</button>
                        </div>
                    </div>
                </div>
                
                <div class="preview-area">
                    <div class="preview-header">
                        <span class="preview-title">预览</span>
                        <div class="preview-actions">
                            <button class="btn-small" onclick="downloadPNG()">导出 PNG</button>
                        </div>
                    </div>
                    
                    <div class="preview-container" id="previewContainer"></div>
                    
                    <div class="code-section">
                        <div class="code-header">
                            <span class="code-title">代码</span>
                            <div class="code-tabs">
                                <button class="code-tab active" data-tab="svg" onclick="switchTab('svg')">SVG</button>
                                <button class="code-tab" data-tab="css" onclick="switchTab('css')">CSS</button>
                                <button class="code-tab" data-tab="react" onclick="switchTab('react')">React</button>
                            </div>
                        </div>
                        <pre class="code-content" id="codeContent"></pre>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="toast" id="toast">已复制到剪贴板</div>
    
    <script>
        let currentSeed = Math.random();
        let currentTab = 'svg';
        let gradientDirection = 0;
        
        const colorPresets = [
            { colors: ['#6366f1', '#ec4899'], name: 'Purple Pink' },
            { colors: ['#3b82f6', '#06b6d4'], name: 'Blue Cyan' },
            { colors: ['#10b981', '#34d399'], name: 'Green' },
            { colors: ['#f59e0b', '#ef4444'], name: 'Orange Red' },
            { colors: ['#8b5cf6', '#6366f1'], name: 'Violet' },
            { colors: ['#ec4899', '#f43f5e'], name: 'Pink Red' },
            { colors: ['#14b8a6', '#22c55e'], name: 'Teal Green' },
            { colors: ['#f97316', '#fbbf24'], name: 'Orange Yellow' }
        ];
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeIcon').textContent = savedTheme === 'light' ? '🌙' : '☀️';
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('themeIcon').textContent = newTheme === 'light' ? '🌙' : '☀️';
            localStorage.setItem('theme', newTheme);
        }
        
        function initPresets() {
            const grid = document.getElementById('presetsGrid');
            colorPresets.forEach((preset, index) => {
                const item = document.createElement('div');
                item.className = 'preset-item';
                item.title = preset.name;
                item.onclick = () => applyPreset(preset);
                
                // Create mini blob preview
                const miniBlob = generateBlobPath(4, 30, 0.5, index * 0.1);
                item.innerHTML = `<svg viewBox="0 0 60 60">
                    <defs>
                        <linearGradient id="preset-grad-${index}" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:${preset.colors[0]}"/>
                            <stop offset="100%" style="stop-color:${preset.colors[1]}"/>
                        </linearGradient>
                    </defs>
                    <path d="${miniBlob}" fill="url(#preset-grad-${index})" transform="translate(30, 30)"/>
                </svg>`;
                
                grid.appendChild(item);
            });
        }
        
        function applyPreset(preset) {
            document.getElementById('fillType').value = 'gradient';
            document.getElementById('gradientColor1').value = preset.colors[0];
            document.getElementById('gradientColor2').value = preset.colors[1];
            updateFillUI();
            updatePreview();
        }
        
        function updateFillUI() {
            const fillType = document.getElementById('fillType').value;
            document.getElementById('solidColorUI').style.display = fillType === 'solid' ? 'block' : 'none';
            document.getElementById('gradientUI').style.display = fillType === 'gradient' ? 'block' : 'none';
        }
        
        function syncSolidColor() {
            const text = document.getElementById('solidColorText').value;
            if (/^#[0-9A-Fa-f]{6}$/.test(text)) {
                document.getElementById('solidColor').value = text;
                updatePreview();
            }
        }
        
        function setDirection(dir) {
            gradientDirection = dir;
            document.querySelectorAll('.direction-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.dir) === dir);
            });
            updatePreview();
        }
        
        // Seeded random number generator
        function seededRandom(seed) {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }
        
        function generateBlobPath(complexity, radius, randomness, seed) {
            const points = [];
            const angleStep = (Math.PI * 2) / complexity;
            
            for (let i = 0; i < complexity; i++) {
                const angle = i * angleStep;
                const randRadius = radius * (1 - randomness + seededRandom(seed + i) * randomness * 2);
                points.push({
                    x: Math.cos(angle) * randRadius,
                    y: Math.sin(angle) * randRadius
                });
            }
            
            // Generate smooth curve through points
            let path = `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;
            
            for (let i = 0; i < points.length; i++) {
                const p0 = points[(i - 1 + points.length) % points.length];
                const p1 = points[i];
                const p2 = points[(i + 1) % points.length];
                const p3 = points[(i + 2) % points.length];
                
                // Catmull-Rom to Bezier conversion
                const cp1x = p1.x + (p2.x - p0.x) / 6;
                const cp1y = p1.y + (p2.y - p0.y) / 6;
                const cp2x = p2.x - (p3.x - p1.x) / 6;
                const cp2y = p2.y - (p3.y - p1.y) / 6;
                
                path += ` C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
            }
            
            path += ' Z';
            return path;
        }
        
        function generateBlob() {
            currentSeed = Math.random() * 1000;
            updatePreview();
        }
        
        function updatePreview() {
            const complexity = parseInt(document.getElementById('complexity').value);
            const randomness = parseInt(document.getElementById('randomness').value) / 100;
            const size = parseInt(document.getElementById('size').value);
            const fillType = document.getElementById('fillType').value;
            
            // Update display values
            document.getElementById('complexityValue').textContent = complexity;
            document.getElementById('randomnessValue').textContent = Math.round(randomness * 100) + '%';
            document.getElementById('sizeValue').textContent = size;
            
            const radius = size / 2 * 0.8;
            const path = generateBlobPath(complexity, radius, randomness, currentSeed);
            
            let fill;
            let defs = '';
            
            if (fillType === 'solid') {
                fill = document.getElementById('solidColor').value;
            } else {
                const color1 = document.getElementById('gradientColor1').value;
                const color2 = document.getElementById('gradientColor2').value;
                
                // Calculate gradient coordinates based on direction
                const rad = gradientDirection * Math.PI / 180;
                const x1 = 50 - Math.cos(rad) * 50;
                const y1 = 50 - Math.sin(rad) * 50;
                const x2 = 50 + Math.cos(rad) * 50;
                const y2 = 50 + Math.sin(rad) * 50;
                
                defs = `<defs>
        <linearGradient id="blob-gradient" x1="${x1.toFixed(1)}%" y1="${y1.toFixed(1)}%" x2="${x2.toFixed(1)}%" y2="${y2.toFixed(1)}%">
            <stop offset="0%" style="stop-color:${color1}"/>
            <stop offset="100%" style="stop-color:${color2}"/>
        </linearGradient>
    </defs>`;
                fill = 'url(#blob-gradient)';
            }
            
            const svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    ${defs}
    <path d="${path}" fill="${fill}" transform="translate(${size/2}, ${size/2})"/>
</svg>`;
            
            document.getElementById('previewContainer').innerHTML = svg;
            updateCode();
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.code-tab').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            updateCode();
        }
        
        function updateCode() {
            const svg = document.getElementById('previewContainer').innerHTML;
            const codeEl = document.getElementById('codeContent');
            
            switch (currentTab) {
                case 'svg':
                    codeEl.textContent = svg;
                    break;
                case 'css':
                    const encoded = btoa(svg);
                    codeEl.textContent = `.blob {
    background-image: url("data:image/svg+xml;base64,${encoded}");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}`;
                    break;
                case 'react':
                    codeEl.textContent = generateReactComponent(svg);
                    break;
            }
        }
        
        function generateReactComponent(svg) {
            // Convert SVG to JSX
            let jsx = svg
                .replace(/xmlns="[^"]*"/g, '')
                .replace(/class=/g, 'className=')
                .replace(/style="([^"]*)"/g, (match, style) => {
                    const styleObj = style.split(';')
                        .filter(s => s.trim())
                        .map(s => {
                            const [prop, val] = s.split(':').map(x => x.trim());
                            const camelProp = prop.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
                            return `${camelProp}: '${val}'`;
                        })
                        .join(', ');
                    return `style={{${styleObj}}}`;
                });
            
            return `const BlobIcon = ({ className, ...props }) => (
  ${jsx.split('\n').join('\n  ')}
);

export default BlobIcon;`;
        }
        
        function copySVG() {
            const svg = document.getElementById('previewContainer').innerHTML;
            navigator.clipboard.writeText(svg).then(() => {
                showToast();
            });
        }
        
        function downloadSVG() {
            const svg = document.getElementById('previewContainer').innerHTML;
            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'blob.svg';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function downloadPNG() {
            const svg = document.getElementById('previewContainer').innerHTML;
            const size = parseInt(document.getElementById('size').value);
            
            const canvas = document.createElement('canvas');
            canvas.width = size * 2;
            canvas.height = size * 2;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            const svgBlob = new Blob([svg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = () => {
                ctx.drawImage(img, 0, 0, size * 2, size * 2);
                URL.revokeObjectURL(url);
                
                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = 'blob.png';
                a.click();
            };
            
            img.src = url;
        }
        
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // Initialize
        initTheme();
        initPresets();
        updateFillUI();
        updatePreview();
    </script>
</body>
</html>
