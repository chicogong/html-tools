    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {

    <script>
      // ===== State =====
      var conditions = [];
      var conditionIdCounter = 0;
      var currentLogic = "and";

      var FEATURES = [
        { value: "width", label: "width（宽度）" },
        { value: "height", label: "height（高度）" },
        { value: "inline-size", label: "inline-size（行内尺寸）" },
        { value: "block-size", label: "block-size（块尺寸）" },
        { value: "aspect-ratio", label: "aspect-ratio（宽高比）" },
        { value: "orientation", label: "orientation（方向）" }
      ];

      var OPERATORS = [
        { value: "min", label: ">=" },
        { value: "max", label: "<=" },
        { value: "exact", label: "=" }
      ];

      var ORIENTATION_VALUES = ["landscape", "portrait"];

      // ===== DOM refs =====
      var conditionListEl = document.getElementById("conditionList");
      var outputCodeEl = document.getElementById("outputCode");
      var statusEl = document.getElementById("status");
      var previewContainer = document.getElementById("previewContainer");
      var previewChild = document.getElementById("previewChild");
      var previewStatus = document.getElementById("previewStatus");
      var previewWidthInput = document.getElementById("previewWidth");
      var previewWidthVal = document.getElementById("previewWidthVal");

      // ===== Condition management =====
      function addCondition(feature, operator, value) {
        var id = ++conditionIdCounter;
        conditions.push({
          id: id,
          feature: feature || "width",
          operator: operator || "min",
          value: value !== undefined ? value : "600"
        });
        renderConditions();
        generate();
      }

      function removeCondition(id) {
        conditions = conditions.filter(function (c) {
          return c.id !== id;
        });
        renderConditions();
        generate();
      }

      function updateCondition(id, key, val) {
        var cond = conditions.find(function (c) {
          return c.id === id;
        });
        if (!cond) return;
        cond[key] = val;
        if (key === "feature" && val === "orientation") {
          cond.value = "landscape";
        } else if (key === "feature" && (cond.value === "landscape" || cond.value === "portrait")) {
          cond.value = "600";
        }
        renderConditions();
        generate();
      }

      function renderConditions() {
        conditionListEl.innerHTML = "";
        conditions.forEach(function (cond) {
          var row = document.createElement("div");
          row.className = "condition-row";

          // Feature select
          var featSel = document.createElement("select");
          FEATURES.forEach(function (f) {
            var opt = document.createElement("option");
            opt.value = f.value;
            opt.textContent = f.label;
            if (f.value === cond.feature) opt.selected = true;
            featSel.appendChild(opt);
          });
          (function (capturedId) {
            featSel.addEventListener("change", function () {
              updateCondition(capturedId, "feature", featSel.value);
            });
          })(cond.id);

          // Operator select
          var opSel = document.createElement("select");
          OPERATORS.forEach(function (o) {
            var opt = document.createElement("option");
            opt.value = o.value;
            opt.textContent = o.label;
            if (o.value === cond.operator) opt.selected = true;
            opSel.appendChild(opt);
          });
          (function (capturedId) {
            opSel.addEventListener("change", function () {
              updateCondition(capturedId, "operator", opSel.value);
            });
          })(cond.id);

          // Value input or select
          var valEl;
          if (cond.feature === "orientation") {
            valEl = document.createElement("select");
            ORIENTATION_VALUES.forEach(function (v) {
              var opt = document.createElement("option");
              opt.value = v;
              opt.textContent = v;
              if (v === cond.value) opt.selected = true;
              valEl.appendChild(opt);
            });
            (function (capturedId) {
              valEl.addEventListener("change", function () {
                updateCondition(capturedId, "value", valEl.value);
              });
            })(cond.id);
          } else if (cond.feature === "aspect-ratio") {
            valEl = document.createElement("input");
            valEl.type = "text";
            valEl.placeholder = "16/9";
            valEl.value = cond.value;
            (function (capturedId) {
              valEl.addEventListener("input", function () {
                updateCondition(capturedId, "value", valEl.value);
              });
            })(cond.id);
          } else {
            valEl = document.createElement("input");
            valEl.type = "number";
            valEl.min = "0";
            valEl.placeholder = "px";
            valEl.value = cond.value;
            (function (capturedId) {
              valEl.addEventListener("input", function () {
                updateCondition(capturedId, "value", valEl.value);
              });
            })(cond.id);
          }

          // Remove button
          var removeBtn = document.createElement("button");
          removeBtn.className = "btn-remove-cond";
          removeBtn.textContent = "×";
          removeBtn.title = "删除此条件";
          (function (capturedId) {
            removeBtn.addEventListener("click", function () {
              removeCondition(capturedId);
            });
          })(cond.id);

          row.appendChild(featSel);
          row.appendChild(opSel);
          row.appendChild(valEl);
          row.appendChild(removeBtn);
          conditionListEl.appendChild(row);
        });
      }

      // ===== Code generation =====
      function buildConditionStr(cond) {
        var feature = cond.feature;
        var op = cond.operator;
        var val = cond.value;
        var unit = "";

        if (feature !== "orientation" && feature !== "aspect-ratio") {
          unit = "px";
        }

        if (op === "min") {
          return "(min-" + feature + ": " + val + unit + ")";
        }
        if (op === "max") {
          return "(max-" + feature + ": " + val + unit + ")";
        }
        return "(" + feature + ": " + val + unit + ")";
      }

      function buildQueryCondition() {
        if (conditions.length === 0) return "/* 请添加查询条件 */";
        var glue = currentLogic === "and" ? " and " : " or ";
        return conditions.map(buildConditionStr).join(glue);
      }

      function generate() {
        var containerName = document.getElementById("containerName").value.trim();
        var containerType = document.getElementById("containerType").value;
        var containerSelector = document.getElementById("containerSelector").value.trim();
        var innerSelector = document.getElementById("innerSelector").value.trim() || ".element";
        var cssRulesRaw = document.getElementById("cssRules").value;
        var includeContainerDecl = document.getElementById("includeContainerDecl").checked;
        var includeComments = document.getElementById("includeComments").checked;
        var includeFallback = document.getElementById("includeFallback").checked;

        var cssLines = cssRulesRaw
          .split("\n")
          .map(function (l) {
            return l.trim();
          })
          .filter(function (l) {
            return l.length > 0;
          })
          .map(function (l) {
            return l.endsWith(";") ? l : l + ";";
          });

        var indent = "  ";
        var lines = [];
        var queryCondition = buildQueryCondition();
        var containerAtName = containerName ? " " + containerName : "";
        var containerRef = containerName ? containerName : "最近容器";

        if (includeComments) {
          lines.push("/* CSS Container Queries — 容器查询 */");
          lines.push("/* 浏览器支持: Chrome 105+, Firefox 110+, Safari 16+ */");
          lines.push("");
        }

        if (includeContainerDecl && containerSelector) {
          if (includeComments) {
            lines.push("/* 1. 在父元素上声明容器 */");
          }
          lines.push(containerSelector + " {");
          if (containerName) {
            lines.push(indent + "container-name: " + containerName + ";");
          }
          lines.push(indent + "container-type: " + containerType + ";");
          lines.push("}");
          lines.push("");
        }

        if (includeComments) {
          lines.push("/* 2. 当" + containerRef + "满足条件时应用样式 */");
        }

        lines.push("@container" + containerAtName + " " + queryCondition + " {");
        lines.push(indent + innerSelector + " {");
        if (cssLines.length > 0) {
          cssLines.forEach(function (rule) {
            lines.push(indent + indent + rule);
          });
        } else {
          lines.push(indent + indent + "/* 在左侧填写 CSS 规则 */");
        }
        lines.push(indent + "}");
        lines.push("}");

        if (includeFallback) {
          lines.push("");
          if (includeComments) {
            lines.push("/* 3. 不支持容器查询的降级处理 */");
          }
          lines.push("@supports not (container-type: inline-size) {");
          lines.push(indent + "/* 这里放媒体查询或默认样式 */");
          lines.push(indent + innerSelector + " {");
          cssLines.forEach(function (rule) {
            lines.push(indent + indent + rule);
          });
          lines.push(indent + "}");
          lines.push("}");
        }

        outputCodeEl.textContent = lines.join("\n");
        updatePreview();
        showStatus("代码已更新", "success");
      }

      // ===== Live preview =====
      function updatePreview() {
        var containerType = document.getElementById("containerType").value;
        previewContainer.style.containerType = containerType;

        var width = parseInt(previewWidthInput.value, 10);
        var satisfied = checkConditions(width);

        if (satisfied) {
          previewChild.style.background = "var(--color-success)";
          previewChild.textContent = "✓ 条件满足 — 样式已应用";
          previewStatus.textContent = "当前宽度 " + width + "px，查询条件满足";
        } else {
          previewChild.style.background = "var(--color-accent-primary)";
          previewChild.textContent = "预览元素";
          previewStatus.textContent = "当前宽度 " + width + "px，查询条件未满足";
        }
      }

      function checkConditions(width) {
        if (conditions.length === 0) return false;

        var results = conditions.map(function (cond) {
          var feature = cond.feature;
          var op = cond.operator;
          var val = parseFloat(cond.value);

          if (feature === "orientation") {
            var isLandscape = width > 300;
            return cond.value === "landscape" ? isLandscape : !isLandscape;
          }
          if (feature === "aspect-ratio") return true;

          if (op === "min") return width >= val;
          if (op === "max") return width <= val;
          if (op === "exact") return width === val;
          return false;
        });

        if (currentLogic === "and") return results.every(Boolean);
        return results.some(Boolean);
      }

      // ===== Status helper =====
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      // ===== Copy helpers =====
      async function copyText(text, label) {
        try {
          await navigator.clipboard.writeText(text);
          showStatus(label || "已复制", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      }

      function getQueryOnlyCode() {
        var containerName = document.getElementById("containerName").value.trim();
        var containerAtName = containerName ? " " + containerName : "";
        return "@container" + containerAtName + " " + buildQueryCondition() + " { ... }";
      }

      // ===== Event listeners =====
      document.getElementById("btnGenerate").onclick = generate;

      document.getElementById("btnReset").onclick = function () {
        document.getElementById("containerName").value = "";
        document.getElementById("containerType").value = "inline-size";
        document.getElementById("containerSelector").value = ".card-wrapper";
        document.getElementById("innerSelector").value = ".card";
        document.getElementById("cssRules").value =
          "flex-direction: column;\nfont-size: 0.875rem;\ngap: 8px;";
        document.getElementById("includeContainerDecl").checked = true;
        document.getElementById("includeComments").checked = true;
        document.getElementById("includeFallback").checked = false;
        conditions = [];
        currentLogic = "and";
        document.getElementById("logicAnd").classList.add("active");
        document.getElementById("logicOr").classList.remove("active");
        addCondition("width", "max", "600");
        showStatus("已重置", "success");
      };

      document.getElementById("btnCopyAll").onclick = function () {
        copyText(outputCodeEl.textContent, "全部代码已复制");
      };

      document.getElementById("btnCopyQuery").onclick = function () {
        copyText(getQueryOnlyCode(), "@container 规则已复制");
      };

      document.getElementById("btnCopyCode").onclick = function () {
        copyText(outputCodeEl.textContent, "已复制");
      };

      document.getElementById("btnAddCondition").onclick = function () {
        addCondition("width", "min", "600");
      };

      document.getElementById("logicAnd").onclick = function () {
        currentLogic = "and";
        document.getElementById("logicAnd").classList.add("active");
        document.getElementById("logicOr").classList.remove("active");
        generate();
      };

      document.getElementById("logicOr").onclick = function () {
        currentLogic = "or";
        document.getElementById("logicOr").classList.add("active");
        document.getElementById("logicAnd").classList.remove("active");
        generate();
      };

      // Live re-generate on any config change
      var liveInputIds = [
        "containerName",
        "containerType",
        "containerSelector",
        "innerSelector",
        "cssRules",
        "includeContainerDecl",
        "includeComments",
        "includeFallback"
      ];
      liveInputIds.forEach(function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        var evtType = el.type === "checkbox" ? "change" : "input";
        el.addEventListener(evtType, generate);
      });

      // Preview width slider
      previewWidthInput.addEventListener("input", function () {
        var w = previewWidthInput.value;
        previewWidthVal.textContent = w + "px";
        previewContainer.style.width = w + "px";
        updatePreview();
      });

      // ===== Theme =====
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      // ===== Init =====
      initTheme();
      addCondition("width", "max", "600");
    </script>
  </body>
</html>
