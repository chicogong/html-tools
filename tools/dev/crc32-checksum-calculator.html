    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;

    <script>
      // ── CRC-32 lookup table (IEEE 802.3 polynomial 0xEDB88320) ──
      var crc32Table = (function () {
        var table = new Uint32Array(256);
        for (var i = 0; i < 256; i++) {
          var c = i;
          for (var k = 0; k < 8; k++) {
            c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
          }
          table[i] = c;
        }
        return table;
      })();

      function crc32(bytes) {
        var crc = 0xffffffff;
        for (var i = 0; i < bytes.length; i++) {
          crc = crc32Table[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      function adler32(bytes) {
        var MOD_ADLER = 65521;
        var a = 1;
        var b = 0;
        for (var i = 0; i < bytes.length; i++) {
          a = (a + bytes[i]) % MOD_ADLER;
          b = (b + a) % MOD_ADLER;
        }
        return ((b << 16) | a) >>> 0;
      }

      function fnv1a32(bytes) {
        var hash = 0x811c9dc5;
        for (var i = 0; i < bytes.length; i++) {
          hash = hash ^ bytes[i];
          hash =
            (hash + (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24)) >>> 0;
        }
        return hash >>> 0;
      }

      function fnv1a64Hex(bytes) {
        if (typeof BigInt === "undefined") return null;
        var hash = BigInt("0xcbf29ce484222325");
        var prime = BigInt("0x00000100000001b3");
        var mask = BigInt("0xffffffffffffffff");
        for (var i = 0; i < bytes.length; i++) {
          hash = (hash ^ BigInt(bytes[i])) & mask;
          hash = (hash * prime) & mask;
        }
        return hash.toString(16).padStart(16, "0");
      }

      var crc16Table = (function () {
        var table = new Uint16Array(256);
        for (var i = 0; i < 256; i++) {
          var crc = i << 8;
          for (var j = 0; j < 8; j++) {
            crc = crc & 0x8000 ? (crc << 1) ^ 0x1021 : crc << 1;
          }
          table[i] = crc & 0xffff;
        }
        return table;
      })();

      function crc16(bytes) {
        var crc = 0xffff;
        for (var i = 0; i < bytes.length; i++) {
          crc = ((crc << 8) ^ crc16Table[((crc >> 8) ^ bytes[i]) & 0xff]) & 0xffff;
        }
        return crc;
      }

      function encodeText(text, encoding) {
        if (encoding === "latin1") {
          var arr = new Uint8Array(text.length);
          for (var i = 0; i < text.length; i++) {
            arr[i] = text.charCodeAt(i) & 0xff;
          }
          return arr;
        }
        return new TextEncoder().encode(text);
      }

      function formatHex(num, bits, upper) {
        var digits = bits / 4;
        var hex = num.toString(16).padStart(digits, "0");
        return upper ? hex.toUpperCase() : hex;
      }

      function formatSize(byteCount) {
        if (byteCount < 1024) return byteCount + " B";
        if (byteCount < 1048576) return (byteCount / 1024).toFixed(2) + " KB";
        return (byteCount / 1048576).toFixed(2) + " MB";
      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;

      function showStats(sizeLabel) {

      function buildResultCard(algo, desc, hexVal, decVal, bits) {
        var card = document.createElement("div");
        card.className = "result-card";

        var algoEl = document.createElement("div");
        algoEl.className = "result-algo";
        algoEl.textContent = algo;
        card.appendChild(algoEl);

        var valEl = document.createElement("div");
        valEl.className = "result-value";
        valEl.textContent = "0x" + hexVal;
        card.appendChild(valEl);

        var metaEl = document.createElement("div");
        metaEl.className = "result-meta";
        metaEl.textContent =
          (decVal !== null ? "十进制: " + decVal : "") + (bits ? " | " + bits + "-bit" : "");
        card.appendChild(metaEl);

        if (desc) {
          var descEl = document.createElement("div");
          descEl.className = "result-meta";
          descEl.textContent = desc;
          card.appendChild(descEl);
        }

        var copyBtn = document.createElement("button");
        copyBtn.className = "result-copy";
        copyBtn.textContent = "复制十六进制";
        (function (btn, val) {
          btn.addEventListener("click", function () {
            navigator.clipboard.writeText("0x" + val).then(
              function () {
                btn.textContent = "已复制!";
                setTimeout(function () {
                  btn.textContent = "复制十六进制";
                }, 1500);
              },
              function () {
                btn.textContent = "复制失败";
              }
            );
          });
        })(copyBtn, hexVal);
        card.appendChild(copyBtn);

        return card;
      }

      function computeAndRender(bytes, sizeLabel) {
        var upper = upperCaseEl.checked;
        var c32 = crc32(bytes);
        var a32 = adler32(bytes);
        var fnv32 = fnv1a32(bytes);
        var fnv64val = fnv1a64Hex(bytes);
        var c16 = crc16(bytes);

        resultsGrid.innerHTML = "";

        resultsGrid.appendChild(
          buildResultCard(
            "CRC-32",
            "IEEE 802.3 / ZIP / zlib 标准多项式",
            formatHex(c32, 32, upper),
            c32.toString(10),
            "32"
          )
        );
        resultsGrid.appendChild(
          buildResultCard(
            "Adler-32",
            "zlib / PNG 格式使用，速度快",
            formatHex(a32, 32, upper),
            a32.toString(10),
            "32"
          )
        );
        resultsGrid.appendChild(
          buildResultCard(
            "FNV-1a 32-bit",
            "Fowler-Noll-Vo，哈希表常用",
            formatHex(fnv32, 32, upper),
            fnv32.toString(10),
            "32"
          )
        );

        if (fnv64val !== null) {
          var fnv64Display = upper ? fnv64val.toUpperCase() : fnv64val;
          resultsGrid.appendChild(
            buildResultCard(
              "FNV-1a 64-bit",
              "64-bit 大哈希空间，碰撞率更低",
              fnv64Display,
              null,
              "64"
            )
          );
        }

        resultsGrid.appendChild(
          buildResultCard(
            "CRC-16 CCITT",
            "串口通信、XMODEM 协议使用",
            formatHex(c16, 16, upper),
            c16.toString(10),
            "16"
          )
        );

        resultsEmpty.style.display = "none";
        resultsGrid.style.display = "";
        showStats(sizeLabel);
        showStatus("计算完成 — " + bytes.length + " 字节", "success");
      }

      function calculateFromText() {
        var text = inputTextEl.value;
        if (!text) {
          showStatus("请输入文本", "error");
          return;
        }
        var bytes = encodeText(text, encodingEl.value);
        currentBytes = bytes;
        currentFileName = null;
        computeAndRender(bytes, formatSize(bytes.length));
      }

      var debounceTimer = null;
      inputTextEl.addEventListener("input", function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
          if (inputTextEl.value) calculateFromText();
        }, 300);
      });

      encodingEl.addEventListener("change", function () {
        if (inputTextEl.value) calculateFromText();
      });

      upperCaseEl.addEventListener("change", function () {
        if (currentBytes) {
          var label = currentFileName !== null ? currentFileName : formatSize(currentBytes.length);
          computeAndRender(currentBytes, label);
        }
      });

      document.getElementById("btnCalculate").onclick = function () {
        var activeTab = document.getElementById("tabText").classList.contains("active")
          ? "text"
          : "file";
        if (activeTab === "text") {
          calculateFromText();
        } else if (currentBytes) {
          computeAndRender(currentBytes, currentFileName || formatSize(currentBytes.length));
        } else {
          showStatus("请先选择文件", "error");
        }
      };

      document.getElementById("btnPaste").onclick = async function () {
        try {
          var text = await navigator.clipboard.readText();
          inputTextEl.value = text;
          if (text) calculateFromText();
          showStatus("已粘贴", "success");
        } catch (e) {
          showStatus("无法访问剪贴板", "error");
        }
      };

      document.getElementById("btnClear").onclick = function () {
        inputTextEl.value = "";
        currentBytes = null;
        currentFileName = null;
        resultsGrid.innerHTML = "";
        resultsGrid.style.display = "none";
        resultsEmpty.style.display = "";
        statsEl.classList.remove("show");
        statusEl.textContent = "";
        statusEl.className = "status";
        document.getElementById("fileInput").value = "";
      };

      document.getElementById("btnCopyAll").onclick = async function () {
        if (!currentBytes) {
          showStatus("没有计算结果", "error");
          return;
        }
        var upper = upperCaseEl.checked;
        var c32 = crc32(currentBytes);
        var a32 = adler32(currentBytes);
        var fnv32 = fnv1a32(currentBytes);
        var fnv64val = fnv1a64Hex(currentBytes);
        var c16 = crc16(currentBytes);
        var fnv64Str =
          fnv64val !== null ? "0x" + (upper ? fnv64val.toUpperCase() : fnv64val) : "N/A";
        var lines = [
          "CRC-32:       0x" + formatHex(c32, 32, upper) + " (" + c32 + ")",
          "Adler-32:     0x" + formatHex(a32, 32, upper) + " (" + a32 + ")",
          "FNV-1a 32bit: 0x" + formatHex(fnv32, 32, upper) + " (" + fnv32 + ")",
          "FNV-1a 64bit: " + fnv64Str,
          "CRC-16 CCITT: 0x" + formatHex(c16, 16, upper) + " (" + c16 + ")"
        ];
        try {
          await navigator.clipboard.writeText(lines.join("\n"));
          showStatus("已复制全部结果", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      document.getElementById("tabText").onclick = function () {
        document.getElementById("tabText").classList.add("active");
        document.getElementById("tabFile").classList.remove("active");
        document.getElementById("sectionText").classList.add("active");
        document.getElementById("sectionFile").classList.remove("active");
      };
      document.getElementById("tabFile").onclick = function () {
        document.getElementById("tabFile").classList.add("active");
        document.getElementById("tabText").classList.remove("active");
        document.getElementById("sectionFile").classList.add("active");
        document.getElementById("sectionText").classList.remove("active");
      };

      function handleFile(file) {
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
          var buffer = e.target.result;
          var bytes = new Uint8Array(buffer);
          currentBytes = bytes;
          currentFileName = file.name + " (" + formatSize(file.size) + ")";
          computeAndRender(bytes, currentFileName);
        };
        reader.onerror = function () {
          showStatus("文件读取失败", "error");
        };
        reader.readAsArrayBuffer(file);
      }

      document.getElementById("fileInput").addEventListener("change", function (e) {
        var file = e.target.files && e.target.files[0];
        if (file) handleFile(file);
      });

      var dropZone = document.getElementById("dropZone");
      dropZone.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("drag-over");
      });
      dropZone.addEventListener("drop", function (e) {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (file) {
          document.getElementById("tabFile").click();
          handleFile(file);
        }
      });

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
