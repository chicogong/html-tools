<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今夜观星 - WebUtils</title>
    <meta name="description" content="今夜可见星座和天体" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg-deep: #0a0a0f;
        --color-bg-card: #1a1a24;
        --color-text-primary: #e8e8ed;
        --color-accent-cyan: #00f5d4;

        /* 字体变量 */
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        padding: 2rem;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 2rem;
        color: var(--color-accent-cyan);
      }
      .constellation {
        background: var(--color-bg-card);
        padding: 1.5rem;
        border-radius: 10px;
        margin-bottom: 1rem;
      }
      .name {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <a
      href="../../index.html"
      style="
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #00f5d4;
        text-decoration: none;
        font-size: 0.9rem;
        z-index: 1000;
      "
    >
      ← 首页
    </a>
    <div class="container">
      <h1>✨ 今夜观星</h1>
      <div class="constellation">
        <div class="name">⭐ 北斗七星</div>
        <p>全年可见，指向北极星</p>
      </div>
      <div class="constellation">
        <div class="name">🌙 月球</div>
        <p>
          今晚月相：
          <span id="phase"></span>
        </p>
      </div>
    </div>
    <script>
      const day = new Date().getDate();
      const phase = Math.floor(day / 7.5) % 4;
      const phases = ["新月", "上弦月", "满月", "下弦月"];
      document.getElementById("phase").textContent = phases[phase];
    </script>
  </body>
</html>
