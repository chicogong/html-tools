<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Loader Generator | HTML Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
        }
        
        body {
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .theme-toggle {
            background: none;
            border: 2px solid var(--pico-muted-border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }
        
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .sidebar {
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--pico-muted-border-color);
        }
        
        .sidebar-title {
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .loader-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
        
        .loader-item {
            aspect-ratio: 1;
            background: var(--pico-background-color);
            border: 2px solid var(--pico-muted-border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .loader-item:hover {
            border-color: var(--primary-color);
        }
        
        .loader-item.active {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .loader-item .loader {
            transform: scale(0.5);
        }
        
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .preview-section {
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid var(--pico-muted-border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .preview-title {
            font-weight: 600;
            margin-bottom: 1.5rem;
            align-self: flex-start;
        }
        
        .preview-container {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .options-section {
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--pico-muted-border-color);
        }
        
        .options-title {
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .option-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--pico-muted-color);
        }
        
        .color-input-wrapper {
            display: flex;
            gap: 0.5rem;
        }
        
        .color-input-wrapper input[type="color"] {
            width: 50px;
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }
        
        .color-input-wrapper input[type="text"] {
            flex: 1;
        }
        
        .code-section {
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--pico-muted-border-color);
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .code-title {
            font-weight: 600;
        }
        
        .code-tabs {
            display: flex;
            gap: 0.5rem;
        }
        
        .code-tab {
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--pico-muted-border-color);
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .code-tab.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .code-content {
            background: var(--pico-background-color);
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .btn-copy {
            padding: 0.25rem 0.75rem;
            font-size: 0.85rem;
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            background: var(--success-color);
            color: white;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        /* Loader Styles */
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--loader-color, #6366f1);
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spinner-rotate 1s linear infinite;
        }
        
        @keyframes spinner-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-dots {
            display: flex;
            gap: 8px;
        }
        
        .loader-dots span {
            width: 12px;
            height: 12px;
            background: var(--loader-color, #6366f1);
            border-radius: 50%;
            animation: dots-bounce 1.4s ease-in-out infinite both;
        }
        
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes dots-bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .loader-pulse {
            width: 48px;
            height: 48px;
            background: var(--loader-color, #6366f1);
            border-radius: 50%;
            animation: pulse-scale 1.2s ease-in-out infinite;
        }
        
        @keyframes pulse-scale {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        
        .loader-bars {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        
        .loader-bars span {
            width: 6px;
            height: 24px;
            background: var(--loader-color, #6366f1);
            animation: bars-stretch 1.2s ease-in-out infinite;
        }
        
        .loader-bars span:nth-child(1) { animation-delay: -0.4s; }
        .loader-bars span:nth-child(2) { animation-delay: -0.3s; }
        .loader-bars span:nth-child(3) { animation-delay: -0.2s; }
        .loader-bars span:nth-child(4) { animation-delay: -0.1s; }
        
        @keyframes bars-stretch {
            0%, 40%, 100% { transform: scaleY(0.4); }
            20% { transform: scaleY(1); }
        }
        
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 4px solid var(--loader-color, #6366f1);
            border-radius: 50%;
            animation: ring-pulse 1s ease-out infinite;
        }
        
        @keyframes ring-pulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        
        .loader-dual-ring {
            width: 48px;
            height: 48px;
            border: 4px solid transparent;
            border-top-color: var(--loader-color, #6366f1);
            border-bottom-color: var(--loader-color, #6366f1);
            border-radius: 50%;
            animation: dual-ring-rotate 1s linear infinite;
        }
        
        @keyframes dual-ring-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-square {
            width: 40px;
            height: 40px;
            background: var(--loader-color, #6366f1);
            animation: square-rotate 1.2s ease-in-out infinite;
        }
        
        @keyframes square-rotate {
            0% { transform: perspective(120px) rotateX(0deg) rotateY(0deg); }
            50% { transform: perspective(120px) rotateX(-180deg) rotateY(0deg); }
            100% { transform: perspective(120px) rotateX(-180deg) rotateY(-180deg); }
        }
        
        .loader-bounce {
            display: flex;
            gap: 8px;
        }
        
        .loader-bounce span {
            width: 16px;
            height: 16px;
            background: var(--loader-color, #6366f1);
            border-radius: 50%;
            animation: bounce-jump 0.6s ease-in-out infinite alternate;
        }
        
        .loader-bounce span:nth-child(2) { animation-delay: 0.2s; }
        .loader-bounce span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce-jump {
            0% { transform: translateY(0); }
            100% { transform: translateY(-20px); }
        }
        
        .loader-wave {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 32px;
        }
        
        .loader-wave span {
            width: 6px;
            background: var(--loader-color, #6366f1);
            animation: wave-grow 1.2s ease-in-out infinite;
        }
        
        .loader-wave span:nth-child(1) { animation-delay: 0s; }
        .loader-wave span:nth-child(2) { animation-delay: 0.1s; }
        .loader-wave span:nth-child(3) { animation-delay: 0.2s; }
        .loader-wave span:nth-child(4) { animation-delay: 0.3s; }
        .loader-wave span:nth-child(5) { animation-delay: 0.4s; }
        
        @keyframes wave-grow {
            0%, 100% { height: 8px; }
            50% { height: 32px; }
        }
        
        .loader-ripple {
            position: relative;
            width: 48px;
            height: 48px;
        }
        
        .loader-ripple span {
            position: absolute;
            border: 4px solid var(--loader-color, #6366f1);
            border-radius: 50%;
            animation: ripple-expand 1.5s ease-out infinite;
        }
        
        .loader-ripple span:nth-child(2) {
            animation-delay: 0.5s;
        }
        
        @keyframes ripple-expand {
            0% { width: 0; height: 0; opacity: 1; top: 24px; left: 24px; }
            100% { width: 48px; height: 48px; opacity: 0; top: 0; left: 0; }
        }
        
        .loader-hourglass {
            width: 40px;
            height: 40px;
            border: 4px solid var(--loader-color, #6366f1);
            border-radius: 50%;
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation: hourglass-rotate 1s ease-in-out infinite;
        }
        
        @keyframes hourglass-rotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
            100% { transform: rotate(180deg); }
        }
        
        .loader-orbit {
            position: relative;
            width: 48px;
            height: 48px;
        }
        
        .loader-orbit::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--loader-color, #6366f1);
            border-radius: 50%;
            animation: orbit-rotate 1s linear infinite;
        }
        
        .loader-orbit::after {
            content: '';
            position: absolute;
            width: 48px;
            height: 48px;
            border: 2px solid var(--loader-color, #6366f1);
            border-radius: 50%;
            opacity: 0.3;
        }
        
        @keyframes orbit-rotate {
            0% { transform: rotate(0deg) translateX(18px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(18px) rotate(-360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html" class="logo">HTML Tools</a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <span id="themeIcon">🌙</span>
            </button>
        </header>
        
        <main>
            <h1>CSS Loader Generator</h1>
            <p>选择并自定义 CSS 加载动画，生成纯 CSS 代码</p>
            
            <div class="main-grid">
                <aside class="sidebar">
                    <div class="sidebar-title">选择样式</div>
                    <div class="loader-grid" id="loaderGrid"></div>
                </aside>
                
                <div class="content-area">
                    <div class="preview-section">
                        <div class="preview-title">预览</div>
                        <div class="preview-container" id="previewContainer"></div>
                    </div>
                    
                    <div class="options-section">
                        <div class="options-title">自定义选项</div>
                        <div class="options-grid">
                            <div class="option-group">
                                <label>颜色</label>
                                <div class="color-input-wrapper">
                                    <input type="color" id="colorPicker" value="#6366f1" onchange="updateColor(this.value)">
                                    <input type="text" id="colorText" value="#6366f1" onchange="updateColor(this.value)">
                                </div>
                            </div>
                            <div class="option-group">
                                <label>大小</label>
                                <input type="range" id="sizeSlider" min="24" max="96" value="48" onchange="updateSize(this.value)">
                                <span id="sizeValue">48px</span>
                            </div>
                            <div class="option-group">
                                <label>速度</label>
                                <select id="speedSelect" onchange="updateSpeed(this.value)">
                                    <option value="0.5">快速 (0.5s)</option>
                                    <option value="1" selected>正常 (1s)</option>
                                    <option value="1.5">慢速 (1.5s)</option>
                                    <option value="2">很慢 (2s)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="code-section">
                        <div class="code-header">
                            <div class="code-title">代码</div>
                            <div style="display: flex; gap: 0.5rem;">
                                <div class="code-tabs">
                                    <button class="code-tab active" data-tab="html" onclick="switchTab('html')">HTML</button>
                                    <button class="code-tab" data-tab="css" onclick="switchTab('css')">CSS</button>
                                </div>
                                <button class="btn-copy" onclick="copyCode()">复制</button>
                            </div>
                        </div>
                        <pre class="code-content" id="codeContent"></pre>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="toast" id="toast">已复制到剪贴板</div>
    
    <script>
        const loaders = [
            { id: 'spinner', name: '旋转', html: '<div class="loader-spinner"></div>' },
            { id: 'dots', name: '点', html: '<div class="loader-dots"><span></span><span></span><span></span></div>' },
            { id: 'pulse', name: '脉冲', html: '<div class="loader-pulse"></div>' },
            { id: 'bars', name: '条形', html: '<div class="loader-bars"><span></span><span></span><span></span><span></span><span></span></div>' },
            { id: 'ring', name: '环', html: '<div class="loader-ring"></div>' },
            { id: 'dual-ring', name: '双环', html: '<div class="loader-dual-ring"></div>' },
            { id: 'square', name: '方块', html: '<div class="loader-square"></div>' },
            { id: 'bounce', name: '弹跳', html: '<div class="loader-bounce"><span></span><span></span><span></span></div>' },
            { id: 'wave', name: '波浪', html: '<div class="loader-wave"><span></span><span></span><span></span><span></span><span></span></div>' },
            { id: 'ripple', name: '涟漪', html: '<div class="loader-ripple"><span></span><span></span></div>' },
            { id: 'hourglass', name: '沙漏', html: '<div class="loader-hourglass"></div>' },
            { id: 'orbit', name: '轨道', html: '<div class="loader-orbit"></div>' }
        ];
        
        let currentLoader = loaders[0];
        let currentColor = '#6366f1';
        let currentSize = 48;
        let currentSpeed = 1;
        let currentTab = 'html';
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeIcon').textContent = savedTheme === 'light' ? '🌙' : '☀️';
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('themeIcon').textContent = newTheme === 'light' ? '🌙' : '☀️';
            localStorage.setItem('theme', newTheme);
        }
        
        function initLoaderGrid() {
            const grid = document.getElementById('loaderGrid');
            loaders.forEach((loader, index) => {
                const item = document.createElement('div');
                item.className = 'loader-item' + (index === 0 ? ' active' : '');
                item.innerHTML = loader.html;
                item.title = loader.name;
                item.onclick = () => selectLoader(loader, item);
                grid.appendChild(item);
            });
        }
        
        function selectLoader(loader, element) {
            currentLoader = loader;
            document.querySelectorAll('.loader-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            updatePreview();
            updateCode();
        }
        
        function updateColor(color) {
            if (!/^#[0-9A-Fa-f]{6}$/.test(color)) return;
            currentColor = color;
            document.getElementById('colorPicker').value = color;
            document.getElementById('colorText').value = color;
            updatePreview();
            updateCode();
        }
        
        function updateSize(size) {
            currentSize = parseInt(size);
            document.getElementById('sizeValue').textContent = size + 'px';
            updatePreview();
            updateCode();
        }
        
        function updateSpeed(speed) {
            currentSpeed = parseFloat(speed);
            updatePreview();
            updateCode();
        }
        
        function updatePreview() {
            const container = document.getElementById('previewContainer');
            container.innerHTML = currentLoader.html;
            container.style.setProperty('--loader-color', currentColor);
            
            const loaderEl = container.firstElementChild;
            if (loaderEl) {
                const scale = currentSize / 48;
                loaderEl.style.transform = `scale(${scale})`;
                loaderEl.style.setProperty('--loader-color', currentColor);
                
                // Update animation duration
                const animations = loaderEl.getAnimations ? loaderEl.getAnimations() : [];
                animations.forEach(anim => {
                    if (anim.effect) {
                        const timing = anim.effect.getTiming();
                        anim.effect.updateTiming({ duration: timing.duration * currentSpeed });
                    }
                });
            }
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.code-tab').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            updateCode();
        }
        
        function updateCode() {
            const codeEl = document.getElementById('codeContent');
            if (currentTab === 'html') {
                codeEl.textContent = generateHTML();
            } else {
                codeEl.textContent = generateCSS();
            }
        }
        
        function generateHTML() {
            return currentLoader.html;
        }
        
        function generateCSS() {
            const cssMap = {
                'spinner': generateSpinnerCSS(),
                'dots': generateDotsCSS(),
                'pulse': generatePulseCSS(),
                'bars': generateBarsCSS(),
                'ring': generateRingCSS(),
                'dual-ring': generateDualRingCSS(),
                'square': generateSquareCSS(),
                'bounce': generateBounceCSS(),
                'wave': generateWaveCSS(),
                'ripple': generateRippleCSS(),
                'hourglass': generateHourglassCSS(),
                'orbit': generateOrbitCSS()
            };
            return cssMap[currentLoader.id] || '';
        }
        
        function generateSpinnerCSS() {
            return `.loader-spinner {
  width: ${currentSize}px;
  height: ${currentSize}px;
  border: ${Math.max(2, currentSize / 12)}px solid ${currentColor};
  border-bottom-color: transparent;
  border-radius: 50%;
  animation: spinner-rotate ${currentSpeed}s linear infinite;
}

@keyframes spinner-rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}`;
        }
        
        function generateDotsCSS() {
            const dotSize = Math.round(currentSize / 4);
            return `.loader-dots {
  display: flex;
  gap: ${Math.round(currentSize / 6)}px;
}

.loader-dots span {
  width: ${dotSize}px;
  height: ${dotSize}px;
  background: ${currentColor};
  border-radius: 50%;
  animation: dots-bounce ${currentSpeed * 1.4}s ease-in-out infinite both;
}

.loader-dots span:nth-child(1) { animation-delay: ${-currentSpeed * 0.32}s; }
.loader-dots span:nth-child(2) { animation-delay: ${-currentSpeed * 0.16}s; }

@keyframes dots-bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}`;
        }
        
        function generatePulseCSS() {
            return `.loader-pulse {
  width: ${currentSize}px;
  height: ${currentSize}px;
  background: ${currentColor};
  border-radius: 50%;
  animation: pulse-scale ${currentSpeed * 1.2}s ease-in-out infinite;
}

@keyframes pulse-scale {
  0% { transform: scale(0); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}`;
        }
        
        function generateBarsCSS() {
            const barWidth = Math.round(currentSize / 8);
            const barHeight = Math.round(currentSize / 2);
            return `.loader-bars {
  display: flex;
  gap: ${Math.round(currentSize / 12)}px;
  align-items: center;
}

.loader-bars span {
  width: ${barWidth}px;
  height: ${barHeight}px;
  background: ${currentColor};
  animation: bars-stretch ${currentSpeed * 1.2}s ease-in-out infinite;
}

.loader-bars span:nth-child(1) { animation-delay: ${-currentSpeed * 0.4}s; }
.loader-bars span:nth-child(2) { animation-delay: ${-currentSpeed * 0.3}s; }
.loader-bars span:nth-child(3) { animation-delay: ${-currentSpeed * 0.2}s; }
.loader-bars span:nth-child(4) { animation-delay: ${-currentSpeed * 0.1}s; }

@keyframes bars-stretch {
  0%, 40%, 100% { transform: scaleY(0.4); }
  20% { transform: scaleY(1); }
}`;
        }
        
        function generateRingCSS() {
            return `.loader-ring {
  width: ${currentSize}px;
  height: ${currentSize}px;
  border: ${Math.max(2, currentSize / 12)}px solid ${currentColor};
  border-radius: 50%;
  animation: ring-pulse ${currentSpeed}s ease-out infinite;
}

@keyframes ring-pulse {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(1.2); opacity: 0; }
}`;
        }
        
        function generateDualRingCSS() {
            return `.loader-dual-ring {
  width: ${currentSize}px;
  height: ${currentSize}px;
  border: ${Math.max(2, currentSize / 12)}px solid transparent;
  border-top-color: ${currentColor};
  border-bottom-color: ${currentColor};
  border-radius: 50%;
  animation: dual-ring-rotate ${currentSpeed}s linear infinite;
}

@keyframes dual-ring-rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}`;
        }
        
        function generateSquareCSS() {
            const size = Math.round(currentSize * 0.83);
            return `.loader-square {
  width: ${size}px;
  height: ${size}px;
  background: ${currentColor};
  animation: square-rotate ${currentSpeed * 1.2}s ease-in-out infinite;
}

@keyframes square-rotate {
  0% { transform: perspective(120px) rotateX(0deg) rotateY(0deg); }
  50% { transform: perspective(120px) rotateX(-180deg) rotateY(0deg); }
  100% { transform: perspective(120px) rotateX(-180deg) rotateY(-180deg); }
}`;
        }
        
        function generateBounceCSS() {
            const dotSize = Math.round(currentSize / 3);
            return `.loader-bounce {
  display: flex;
  gap: ${Math.round(currentSize / 6)}px;
}

.loader-bounce span {
  width: ${dotSize}px;
  height: ${dotSize}px;
  background: ${currentColor};
  border-radius: 50%;
  animation: bounce-jump ${currentSpeed * 0.6}s ease-in-out infinite alternate;
}

.loader-bounce span:nth-child(2) { animation-delay: ${currentSpeed * 0.2}s; }
.loader-bounce span:nth-child(3) { animation-delay: ${currentSpeed * 0.4}s; }

@keyframes bounce-jump {
  0% { transform: translateY(0); }
  100% { transform: translateY(-${Math.round(currentSize * 0.4)}px); }
}`;
        }
        
        function generateWaveCSS() {
            const barWidth = Math.round(currentSize / 8);
            return `.loader-wave {
  display: flex;
  gap: ${Math.round(currentSize / 12)}px;
  align-items: flex-end;
  height: ${Math.round(currentSize * 0.67)}px;
}

.loader-wave span {
  width: ${barWidth}px;
  background: ${currentColor};
  animation: wave-grow ${currentSpeed * 1.2}s ease-in-out infinite;
}

.loader-wave span:nth-child(1) { animation-delay: 0s; }
.loader-wave span:nth-child(2) { animation-delay: ${currentSpeed * 0.1}s; }
.loader-wave span:nth-child(3) { animation-delay: ${currentSpeed * 0.2}s; }
.loader-wave span:nth-child(4) { animation-delay: ${currentSpeed * 0.3}s; }
.loader-wave span:nth-child(5) { animation-delay: ${currentSpeed * 0.4}s; }

@keyframes wave-grow {
  0%, 100% { height: ${Math.round(currentSize * 0.17)}px; }
  50% { height: ${Math.round(currentSize * 0.67)}px; }
}`;
        }
        
        function generateRippleCSS() {
            return `.loader-ripple {
  position: relative;
  width: ${currentSize}px;
  height: ${currentSize}px;
}

.loader-ripple span {
  position: absolute;
  border: ${Math.max(2, currentSize / 12)}px solid ${currentColor};
  border-radius: 50%;
  animation: ripple-expand ${currentSpeed * 1.5}s ease-out infinite;
}

.loader-ripple span:nth-child(2) {
  animation-delay: ${currentSpeed * 0.5}s;
}

@keyframes ripple-expand {
  0% { width: 0; height: 0; opacity: 1; top: ${currentSize / 2}px; left: ${currentSize / 2}px; }
  100% { width: ${currentSize}px; height: ${currentSize}px; opacity: 0; top: 0; left: 0; }
}`;
        }
        
        function generateHourglassCSS() {
            const size = Math.round(currentSize * 0.83);
            return `.loader-hourglass {
  width: ${size}px;
  height: ${size}px;
  border: ${Math.max(2, currentSize / 12)}px solid ${currentColor};
  border-radius: 50%;
  border-top-color: transparent;
  border-bottom-color: transparent;
  animation: hourglass-rotate ${currentSpeed}s ease-in-out infinite;
}

@keyframes hourglass-rotate {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(180deg); }
  100% { transform: rotate(180deg); }
}`;
        }
        
        function generateOrbitCSS() {
            const dotSize = Math.round(currentSize / 4);
            return `.loader-orbit {
  position: relative;
  width: ${currentSize}px;
  height: ${currentSize}px;
}

.loader-orbit::before {
  content: '';
  position: absolute;
  width: ${dotSize}px;
  height: ${dotSize}px;
  background: ${currentColor};
  border-radius: 50%;
  animation: orbit-rotate ${currentSpeed}s linear infinite;
}

.loader-orbit::after {
  content: '';
  position: absolute;
  width: ${currentSize}px;
  height: ${currentSize}px;
  border: 2px solid ${currentColor};
  border-radius: 50%;
  opacity: 0.3;
}

@keyframes orbit-rotate {
  0% { transform: rotate(0deg) translateX(${Math.round(currentSize * 0.375)}px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(${Math.round(currentSize * 0.375)}px) rotate(-360deg); }
}`;
        }
        
        function copyCode() {
            const code = document.getElementById('codeContent').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast();
            });
        }
        
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // Initialize
        initTheme();
        initLoaderGrid();
        updatePreview();
        updateCode();
    </script>
</body>
</html>
