    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {
        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";
      }
      .footer {
        text-align: center;
        margin-top: var(--space-5);
        padding-top: var(--space-4);
      }
      .footer p {

      // ==================== State ====================
      var quizMode = "flag";

      var quizQueue = [];
      var wrongItems = [];
      var currentIdx = 0;
      var correctCount = 0;
      var wrongCount = 0;
      var totalCount = 0;

      // ==================== DOM refs ====================
      var startScreen = document.getElementById("startScreen");
      var quizScreen = document.getElementById("quizScreen");
      var resultScreen = document.getElementById("resultScreen");
      var questionFlag = document.getElementById("questionFlag");
      var questionText = document.getElementById("questionText");
      var questionPrompt = document.getElementById("questionPrompt");
      var optionsGrid = document.getElementById("optionsGrid");
      var feedbackText = document.getElementById("feedbackText");
      var feedbackHint = document.getElementById("feedbackHint");
      var btnNext = document.getElementById("btnNext");
      var btnRetryWrong = document.getElementById("btnRetryWrong");
      var btnRetryWrongResult = document.getElementById("btnRetryWrongResult");
      var progressFill = document.getElementById("progressFill");
      var progressLabel = document.getElementById("progressLabel");

      // ==================== Helpers ====================
      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = a[i];
          a[i] = a[j];
          a[j] = tmp;
        }
        return a;
      }

      function getFilteredCountries() {
        if (selectedRegions.indexOf("all") !== -1) return ALL_COUNTRIES;
        return ALL_COUNTRIES.filter(function (c) {
          return selectedRegions.indexOf(c[2]) !== -1;
        });
      }

      function getDistractors(correct, pool, count) {
        var others = pool.filter(function (c) {
          return c !== correct;
        });
        return shuffle(others).slice(0, count);
      }

      function getPromptText() {
        if (quizMode === "flag") return "看国旗，猜国家名称";
        if (quizMode === "capital") return "看首都，猜国家名称";
        return "看国家，猜所在大洲";
      }

      function buildQuestion(country, pool) {
        if (quizMode === "flag") {
          var distractors = getDistractors(country, pool, 3).map(function (c) {
            return c[0];
          });
          return {
            displayFlag: country[3],
            displayText: "",
            correctAnswer: country[0],
            distractors: distractors
          };
        }
        if (quizMode === "capital") {
          var distractors2 = getDistractors(country, pool, 3).map(function (c) {
            return c[0];
          });
          return {
            displayFlag: "",
            displayText: country[1],
            correctAnswer: country[0],
            distractors: distractors2
          };
        }
        var continents = ["亚洲", "欧洲", "非洲", "北美洲", "南美洲", "大洋洲"];
        var distractorConts = shuffle(
          continents.filter(function (c) {
            return c !== country[2];
          })
        ).slice(0, 3);
        return {
          displayFlag: country[3],
          displayText: country[0],
          correctAnswer: country[2],
          distractors: distractorConts
        };
      }

      function updateScoreBoard() {
        document.getElementById("scoreCorrect").textContent = correctCount;
        document.getElementById("scoreWrong").textContent = wrongCount;
        var answered2 = correctCount + wrongCount;
        var rate = answered2 > 0 ? Math.round((correctCount / answered2) * 100) + "%" : "—";
        document.getElementById("scoreRate").textContent = rate;
        document.getElementById("scoreRemain").textContent = totalCount - currentIdx;
        var pct = totalCount > 0 ? Math.round((currentIdx / totalCount) * 100) : 0;
        progressFill.style.width = pct + "%";
        progressLabel.textContent = currentIdx + " / " + totalCount;
      }

      // ==================== Quiz flow ====================
      function startQuiz(countries) {
        quizQueue = shuffle(countries);
        wrongItems = [];
        currentIdx = 0;
        correctCount = 0;
        wrongCount = 0;
        totalCount = quizQueue.length;
        answered = false;

        startScreen.style.display = "none";
        resultScreen.classList.remove("show");
        quizScreen.style.display = "flex";

        btnRetryWrong.style.display = "none";
        questionPrompt.textContent = getPromptText();

        updateScoreBoard();
        showQuestion();
      }

      function showQuestion() {
        if (currentIdx >= totalCount) {
          showResult();
          return;
        }
        answered = false;
        feedbackText.textContent = "";
        feedbackHint.textContent = "";
        feedbackText.className = "feedback-text";
        btnNext.style.display = "none";

        var country = quizQueue[currentIdx];
        var pool = getFilteredCountries();
        var q = buildQuestion(country, pool);

        questionFlag.textContent = q.displayFlag;
        questionText.textContent = q.displayText;

        var allOptions = shuffle([q.correctAnswer].concat(q.distractors));
        optionsGrid.innerHTML = "";
        allOptions.forEach(function (opt) {
          var btn = document.createElement("button");
          btn.className = "option-btn";
          btn.textContent = opt;
          btn.dataset.answer = opt;
          btn.onclick = function () {
            handleAnswer(btn, q.correctAnswer, country);
          };
          optionsGrid.appendChild(btn);
        });
        updateScoreBoard();
      }

      function handleAnswer(clickedBtn, correctAnswer, country) {
        if (answered) return;
        answered = true;

        var allBtns = optionsGrid.querySelectorAll(".option-btn");
        allBtns.forEach(function (b) {
          b.disabled = true;
          if (b.dataset.answer === correctAnswer) b.classList.add("correct");
        });

        if (clickedBtn.dataset.answer === correctAnswer) {
          clickedBtn.classList.add("correct");
          feedbackText.textContent = "回答正确！";
          feedbackText.className = "feedback-text correct";
          feedbackHint.textContent = buildHint(country);
          correctCount++;
        } else {
          clickedBtn.classList.add("wrong");
          feedbackText.textContent = "回答错误";
          feedbackText.className = "feedback-text wrong";
          feedbackHint.textContent = "正确答案：" + correctAnswer + " · " + buildHint(country);
          wrongCount++;
          wrongItems.push(country);
        }

        currentIdx++;
        updateScoreBoard();

        if (wrongItems.length > 0) btnRetryWrong.style.display = "";
        btnNext.style.display = "";
      }

      function buildHint(country) {
        return country[0] + " · 首都：" + country[1] + " · " + country[2] + " " + country[3];
      }

      function showResult() {
        quizScreen.style.display = "none";
        resultScreen.classList.add("show");

        var rate = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
        document.getElementById("resCorrect").textContent = correctCount;
        document.getElementById("resWrong").textContent = wrongCount;
        document.getElementById("resRate").textContent = rate + "%";

        var emoji = "🏆";
        var title = "测验完成！";
        if (rate >= 90) {
          emoji = "🏆";
          title = "完美！地理达人！";
        } else if (rate >= 70) {
          emoji = "🌟";
          title = "不错！继续加油！";
        } else if (rate >= 50) {
          emoji = "📚";
          title = "还需努力，多练几次！";
        } else {
          emoji = "🌍";
          title = "加油！重新练习一下！";
        }
        document.getElementById("resultEmoji").textContent = emoji;
        document.getElementById("resultTitle").textContent = title;

        var wrongListWrap = document.getElementById("wrongListWrap");
        var wrongListItems = document.getElementById("wrongListItems");
        if (wrongItems.length > 0) {
          btnRetryWrongResult.style.display = "";
          wrongListWrap.classList.add("show");
          wrongListItems.innerHTML = "";
          wrongItems.forEach(function (c) {
            var item = document.createElement("div");
            item.className = "wrong-item";
            var flagDiv = document.createElement("div");
            flagDiv.className = "wrong-item-flag";
            flagDiv.textContent = c[3];
            var infoDiv = document.createElement("div");
            infoDiv.className = "wrong-item-info";
            var nameDiv = document.createElement("div");
            nameDiv.className = "wrong-item-name";
            nameDiv.textContent = c[0];
            var detailDiv = document.createElement("div");
            detailDiv.className = "wrong-item-detail";
            detailDiv.textContent = "首都：" + c[1] + " · " + c[2];
            infoDiv.appendChild(nameDiv);
            infoDiv.appendChild(detailDiv);
            item.appendChild(flagDiv);
            item.appendChild(infoDiv);
            wrongListItems.appendChild(item);
          });
        } else {
          btnRetryWrongResult.style.display = "none";
          wrongListWrap.classList.remove("show");
        }
      }

      function retryWrong() {
        var pool = getFilteredCountries();
        var base = wrongItems.slice();
        if (base.length < 4) {
          var extra = shuffle(
            pool.filter(function (c) {
              return base.indexOf(c) === -1;
            })
          ).slice(0, 4 - base.length);
          base = base.concat(extra);
        }
        startQuiz(base);
      }

      // ==================== Event listeners ====================
      document.querySelectorAll(".mode-card").forEach(function (card) {
        card.onclick = function () {
          quizMode = card.dataset.mode;
          document.querySelectorAll(".mode-card").forEach(function (c) {
            c.classList.remove("selected");
          });
          card.classList.add("selected");
        };
      });

      document.getElementById("regionChips").onclick = function (e) {
        var chip = e.target.closest(".region-chip");
        if (!chip) return;
        var region = chip.dataset.region;
        var allChip = document.querySelector('.region-chip[data-region="all"]');
        if (region === "all") {
          selectedRegions = ["all"];
          document.querySelectorAll(".region-chip").forEach(function (c) {
            c.classList.remove("selected");
          });
          chip.classList.add("selected");
        } else {
          var idx = selectedRegions.indexOf("all");
          if (idx !== -1) selectedRegions.splice(idx, 1);
          allChip.classList.remove("selected");
          var ri = selectedRegions.indexOf(region);
          if (ri !== -1) {
            selectedRegions.splice(ri, 1);
            chip.classList.remove("selected");
          } else {
            selectedRegions.push(region);
            chip.classList.add("selected");
          }
          if (selectedRegions.length === 0) {
            selectedRegions = ["all"];
            allChip.classList.add("selected");
          }
        }
      };

      document.getElementById("btnStart").onclick = function () {
        var pool = getFilteredCountries();
        if (pool.length < 4) {
          alert("所选大洲的国家数量不足 4 个，请选择更多大洲。");
          return;
        }
        startQuiz(pool);
      };

      document.getElementById("btnRestart").onclick = function () {
        startQuiz(getFilteredCountries());
      };

      btnRetryWrong.onclick = retryWrong;
      btnRetryWrongResult.onclick = retryWrong;

      document.getElementById("btnPlayAgain").onclick = function () {
        startQuiz(getFilteredCountries());
      };

      document.getElementById("btnBackToStart").onclick = function () {
        resultScreen.classList.remove("show");
        quizScreen.style.display = "none";
        startScreen.style.display = "flex";
      };

      btnNext.onclick = showQuestion;

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
