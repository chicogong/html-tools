  let currentFilter = "all";
  let currentSort = { field: null, asc: true };

  function init() {
    renderTable();
    setupFilters();
    setupSort();
    loadTheme();
  }

  function renderTable() {
    const tbody = document.getElementById("modelBody");
    let filtered = models;

    // Apply filter
    if (currentFilter !== "all") {
      if (currentFilter === "opensource") {
        filtered = models.filter((m) => m.opensource);
      } else {
        filtered = models.filter((m) => m.vendor.toLowerCase() === currentFilter);
      }
    }

    // Apply sort
    if (currentSort.field) {
      filtered = [...filtered].sort((a, b) => {
        let valA, valB;
        switch (currentSort.field) {
          case "context":
            valA = a.context;
            valB = b.context;
            break;
          case "input":
            valA = a.inputPrice;
            valB = b.inputPrice;
            break;
          case "coding":
            valA = a.coding;
            valB = b.coding;
            break;
          case "reasoning":
            valA = a.reasoning;
            valB = b.reasoning;
            break;
          default:
            return 0;
        }
        return currentSort.asc ? valA - valB : valB - valA;
      });
    }

    tbody.innerHTML = filtered
      .map(
        (m) => `
        <tr>
          <td>
            <div class="model-cell">
              <span class="vendor-badge badge-${m.badge}">${m.vendor.slice(0, 2).toUpperCase()}</span>
              <div class="model-info">
                <div class="model-name">${m.name}</div>
                <div class="model-vendor">${m.vendor}</div>
              </div>
            </div>
          </td>
          <td class="context-cell">${formatContext(m.context)}</td>
          <td class="price-cell">
            <span class="price-in">↓ $${m.inputPrice}</span>
            <span class="price-out">↑ $${m.outputPrice}</span>
          </td>
          <td>${m.tags.map((t) => `<span class="tag tag-${t}">${getTagLabel(t)}</span>`).join(" ")}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="score-bar"><div class="score-fill ${getScoreClass(m.coding)}" style="width:${m.coding}%"></div></div>
              <span style="font-size:0.8rem;font-family: var(--font-mono);align-items:center;gap:8px;">
              <div class="score-bar"><div class="score-fill ${getScoreClass(m.reasoning)}" style="width:${m.reasoning}%"></div></div>
              <span style="font-size:0.8rem;font-family: var(--font-mono);color:var(--color-text-secondary)">${m.multimodal}</td>
          <td style="font-size:0.8rem;color:var(--color-text-secondary);max-width:180px">${m.useCase}</td>
        </tr>
      `
      )
      .join("");
  }

  function formatContext(num) {
    if (num >= 1000000) return num / 1000000 + "M";
    return num / 1000 + "K";
  }

  function getTagLabel(tag) {
    const labels = {
      flagship: "旗舰",
      fast: "快速",
      cheap: "经济",
      reasoning: "推理",
      opensource: "开源"
    };
    return labels[tag] || tag;
  }

  function getScoreClass(score) {
    if (score >= 90) return "score-high";
    if (score >= 80) return "score-mid";
    return "score-low";
  }

  function setupFilters() {
    document.querySelectorAll(".filter-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".filter-tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        currentFilter = tab.dataset.filter;
        renderTable();
      });
    });
  }

  function setupSort() {
    document.querySelectorAll(".model-table th.sortable").forEach((th) => {
      th.addEventListener("click", () => {
        const field = th.dataset.sort;
        if (currentSort.field === field) {
          currentSort.asc = !currentSort.asc;
        } else {
          currentSort.field = field;
          currentSort.asc = true;
        }

        document.querySelectorAll(".model-table th").forEach((h) => h.classList.remove("sorted"));
        th.classList.add("sorted");
        th.querySelector(".sort-icon").textContent = currentSort.asc ? "↑" : "↓";

        renderTable();
      });
    });
  }

  window.toggleTheme = function () {
    const html = document.documentElement;
    const isDark = html.getAttribute("data-theme") !== "light";
    html.setAttribute("data-theme", isDark ? "light" : "dark");
    document.querySelector(".theme-toggle").textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("theme", isDark ? "light" : "dark");
  };

  function loadTheme() {
    const saved = localStorage.getItem("theme");
    if (saved === "light") {
      document.documentElement.setAttribute("data-theme", "light");
      document.querySelector(".theme-toggle").textContent = "☀️";
    }
  }

  init();
</script>
