        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;

        --success-color: var(--accent-green, #10b981);

        --error-color: var(--accent-red, #f43f5e);

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */

        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --color-bg-card: #1a1a24;
        --color-text-primary: #e4e4e7;
        --color-text-secondary: #a1a1aa;
        --accent: #00f5d4;
        --accent-glow: rgba(0, 245, 212, 0.3);
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        overflow: hidden;
      }

      /* 弹幕画布 */
      #danmaku-stage {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      .danmaku-item {
        position: absolute;
        white-space: nowrap;
        font-size: 32px;
        font-weight: 600;
        text-shadow:
          2px 2px 4px rgba(0, 0, 0, 0.8),
          0 0 10px rgba(0, 0, 0, 0.5);
        animation: danmaku-move linear forwards;
        will-change: transform;
      }

      @keyframes danmaku-move {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(calc(-100% - 100vw));
        }
      }

      /* ========== 留言墙模式 ========== */
      #message-wall {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 80px 20px 180px;
        overflow: hidden;
        display: none;
        z-index: 10;
      }

      body.wall-mode #message-wall {
        display: block;
      }

      body.wall-mode #danmaku-stage {
        display: none;
      }

      body.wall-mode .screen-hint {
        display: none;
      }

      .wall-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .wall-bubble {
        position: absolute;
        padding: 12px 20px;
        border-radius: 20px;
        font-size: 18px;
        font-weight: 500;
        max-width: 280px;
        overflow-wrap: break-word;
        white-space: normal;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        animation: bubble-appear 0.5s ease-out forwards;
        transition: transform 0.3s ease;
      }

      .wall-bubble:hover {
        transform: scale(1.05);
        z-index: 100;
      }

      .wall-bubble::before {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 20px;
        width: 0;
        height: 0;
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-top: 10px solid currentcolor;
        opacity: 0.8;
      }

      @keyframes bubble-appear {
        0% {
          opacity: 0;
          transform: scale(0.5) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes bubble-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .wall-bubble.floating {
        animation:
          bubble-appear 0.5s ease-out forwards,
          bubble-float 4s ease-in-out infinite 0.5s;
      }

      /* 气泡颜色主题 */
      .wall-bubble.theme-cyan {
        background: linear-gradient(135deg, #00f5d4 0%, #00b4d8 100%);
        color: #000;
      }
      .wall-bubble.theme-cyan::before {
        border-top-color: #00b4d8;
      }

      .wall-bubble.theme-pink {
        background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
        color: #fff;
      }
      .wall-bubble.theme-pink::before {
        border-top-color: #c44569;
      }

      .wall-bubble.theme-yellow {
        background: linear-gradient(135deg, #ffd93d 0%, #ff9500 100%);
        color: #000;
      }
      .wall-bubble.theme-yellow::before {
        border-top-color: #ff9500;
      }

      .wall-bubble.theme-purple {
        background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
        color: #fff;
      }
      .wall-bubble.theme-purple::before {
        border-top-color: #7c3aed;
      }

      .wall-bubble.theme-blue {
        background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
        color: #fff;
      }
      .wall-bubble.theme-blue::before {
        border-top-color: #0284c7;
      }

      .wall-bubble.theme-green {
        background: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
        color: #000;
      }
      .wall-bubble.theme-green::before {
        border-top-color: #16a34a;
      }

      /* 留言墙空状态 */
      .wall-empty {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: var(--color-text-secondary);
      }

      .wall-empty-icon {
        font-size: 64px;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      .wall-empty-text {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .wall-empty-hint {
        font-size: 16px;
        opacity: 0.7;
      }

      /* 控制面板 */
      .control-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(to top, var(--bg-secondary) 0%, transparent 100%);
        padding: 60px 20px 20px;
        z-index: 100;
        transition: transform 0.3s ease;
      }

      .control-panel.hidden {
        transform: translateY(100%);
      }

      .panel-inner {
        max-width: 600px;
        margin: 0 auto;
      }

      .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      #danmaku-input {
        flex: 1;
        padding: 14px 18px;
        font-size: 16px;
        background: var(--color-bg-card);
        border: 2px solid transparent;
        border-radius: 12px;
        color: var(--color-text-primary);
        outline: none;
        transition: border-color 0.2s;
      }

      #danmaku-input:focus {
        border-color: var(--accent-cyan);
      }

      #danmaku-input::placeholder {
        color: var(--color-text-secondary);
      }

      .btn {
        padding: 14px 24px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent-cyan);
        color: var(--bg-deep);
      }

      .btn-primary:hover {
        box-shadow: 0 0 20px var(--accent-glow);
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: var(--color-bg-card);
        color: var(--color-text-primary);
      }

      .btn-secondary:hover {
        background: #252530;
      }

      .options-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .color-picker {
        display: flex;
        gap: 6px;
      }

      .color-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 3px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
      }

      .color-btn:hover {
        transform: scale(1.1);
      }

      .color-btn.active {
        border-color: var(--color-text-primary);
        box-shadow: 0 0 10px currentcolor;
      }

      .size-select {
        padding: 8px 12px;
        background: var(--color-bg-card);
        border: none;
        border-radius: 8px;
        color: var(--color-text-primary);
        font-size: 14px;
        cursor: pointer;
      }

      /* 顶部工具栏 */
      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to bottom, var(--bg-secondary) 0%, transparent 100%);
        z-index: 100;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: 700;
      }

      .logo-icon {
        font-size: 24px;
      }

      .top-actions {
        display: flex;
        gap: 10px;
      }

      .btn-icon {
        width: 44px;
        height: 44px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      /* 模式切换 */
      .mode-tabs {
        display: flex;
        background: var(--color-bg-card);
        border-radius: 10px;
        padding: 4px;
      }

      .mode-tab {
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        background: transparent;
        border: none;
        border-radius: 8px;
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }

      .mode-tab.active {
        background: var(--accent-cyan);
        color: var(--bg-deep);
      }

      /* 二维码弹窗 */
      .qr-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
      }

      .qr-modal.show {
        opacity: 1;
        visibility: visible;
      }

      .qr-content {
        background: var(--color-bg-card);
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        max-width: 360px;
        width: 90%;
      }

      .qr-content h3 {
        margin-bottom: 10px;
        font-size: 20px;
      }

      .qr-content p {
        color: var(--color-text-secondary);
        font-size: 14px;
        margin-bottom: 20px;
      }

      #qrcode {
        background: white;
        padding: 15px;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 20px;
      }

      #qrcode canvas {
        display: block;
      }

      .room-info {
        background: var(--bg-secondary);
        padding: 10px 15px;
        border-radius: 8px;
        font-family: var(--font-mono);
        font-size: 14px;
        margin-bottom: 15px;
        word-break: break-all;
      }

      .room-info .label {
        color: var(--color-text-secondary);
        font-size: 12px;
        display: block;
        margin-bottom: 5px;
      }

      .connection-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-top: 15px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
      }

      .status-dot.connected {
        background: #22c55e;
      }

      /* 投屏模式提示 */
      .screen-mode-hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: var(--color-text-secondary);
        pointer-events: none;

      .shortcuts-hint {

        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--color-bg-card);
        padding: 8px 16px;
        border-radius: 8px;

        color: var(--color-text-secondary);

        background: var(--bg-secondary);
        padding: 2px 6px;
        border-radius: 4px;
        margin: 0 2px;

      /* 全屏投屏模式 */
      body.screen-mode .control-panel,
      body.screen-mode .top-bar,
      body.screen-mode .stats,
      body.screen-mode .shortcuts-hint {
        opacity: 0;
        pointer-events: none;

      body.screen-mode:hover .top-bar {
        opacity: 1;
        pointer-events: auto;
      }

      /* 返回链接 */
      .back-link {
        position: fixed;
        top: 15px;
        left: 20px;
        color: var(--color-text-secondary);

        gap: 6px;

      }

      .back-link:hover {

      body.screen-mode .back-link {
        opacity: 0;
      }

      body.screen-mode:hover .back-link {
        opacity: 1;
      }

      /* 手机端发送模式 */
      body.sender-mode {
        background: var(--bg-secondary);
      }

      body.sender-mode .top-bar,
      body.sender-mode .stats,
      body.sender-mode .shortcuts-hint,
      body.sender-mode .screen-mode-hint,
      body.sender-mode .back-link {

      }

      body.sender-mode .control-panel {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: var(--bg-secondary);

        max-width: 100%;
      }

      .sender-header {

      body.sender-mode .sender-header {

      }

      .sender-header h2 {
        font-size: 24px;
        margin-bottom: 8px;
      }

      .sender-header p {
        color: var(--color-text-secondary);
        font-size: 14px;
      }

      /* 响应式 */
      @media (max-width: 600px) {
        .danmaku-item {

        .top-bar {
