<style>
:root {
        --color-bg-deep: #0a0a0f;
        --color-bg-surface: #1a1a22;
        --color-bg-subtle: #242430;
        --color-bg-input: #0e0e14;
        --color-text-primary: #f5f5f7;
        --color-text-secondary: #a1a1aa;
        --color-text-muted: #71717a;
        --color-border-default: rgba(255, 255, 255, 0.08);
        --color-border-subtle: rgba(255, 255, 255, 0.04);
        --color-border-strong: rgba(255, 255, 255, 0.12);
        --color-accent-primary: #00d4aa;
        --color-accent-secondary: #8b5cf6;
        --color-accent-tertiary: #3b82f6;
        --color-success: #22c55e;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --glass-bg: rgba(26, 26, 34, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 212, 170, 0.15);
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-xl: 24px;
        --radius-full: 9999px;
        --font-sans: "Inter", -apple-system, blinkmacsystemfont, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --nav-height: 56px;
        --container-max: 1400px;
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      }
      [data-theme="light"] {
        --color-bg-deep: #f8fafc;
        --color-bg-surface: #fff;
        --color-bg-subtle: #f1f5f9;
        --color-bg-input: #f8fafc;
        --color-text-primary: #0f172a;
        --color-text-secondary: #475569;
        --color-text-muted: #94a3b8;
        --color-border-default: rgba(0, 0, 0, 0.08);
        --color-border-subtle: rgba(0, 0, 0, 0.04);
        --color-border-strong: rgba(0, 0, 0, 0.12);
        --color-accent-primary: #00b894;
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--color-text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .form-section {
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        margin-bottom: var(--space-4);
      }
      .form-section-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--color-text-primary);
        margin-bottom: var(--space-3);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-3);
        margin-bottom: var(--space-3);
      }
      .form-row.single {
        grid-template-columns: 1fr;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }
      .form-group label {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--color-text-muted);
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        font-family: var(--font-mono);
        font-size: 0.875rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        transition: all var(--transition-fast);
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
      }
      .form-group input::placeholder,
      .form-group textarea::placeholder {
        color: var(--color-text-muted);
      }
      .form-group textarea {
        resize: vertical;
        min-height: 60px;
      }
      .items-list {
        max-height: 300px;
        overflow-y: auto;
        margin-bottom: var(--space-3);
      }
      .item-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr auto;
        gap: var(--space-2);
        align-items: center;
        padding: var(--space-2) 0;
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .item-row:last-child {
        border-bottom: none;
      }
      .item-row input {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
      }
      .item-row input:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .item-row .item-total {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--color-accent-primary);
        text-align: right;
        min-width: 60px;
      }
      .item-row .btn-remove {
        width: 28px;
        height: 28px;
        padding: 0;
        background: rgba(239, 68, 68, 0.1);
        color: var(--color-error);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .item-row .btn-remove:hover {
        background: rgba(239, 68, 68, 0.2);
      }
      .item-header {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr auto;
        gap: var(--space-2);
        padding: var(--space-2) 0;
        font-size: 0.6875rem;
        font-weight: 600;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--color-border-default);
      }
      .item-header span:nth-child(4) {
        text-align: right;
      }
      .add-item-btn {
        width: 100%;
        height: 36px;
        background: var(--color-bg-subtle);
        border: 1px dashed var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-muted);
        font-size: 0.8125rem;
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .add-item-btn:hover {
        border-color: var(--color-accent-primary);
        color: var(--color-accent-primary);
      }
      .tax-row {
        display: flex;
        align-items: center;
        gap: var(--space-3);
      }
      .tax-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .tax-row label {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        cursor: pointer;
      }
      .tax-row input[type="number"] {
        width: 80px;
        font-family: var(--font-mono);
        font-size: 0.875rem;
        padding: var(--space-2);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
      }
      .receipt-preview {
        background: #fff;
        border-radius: var(--radius-md);
        padding: var(--space-4);
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        color: #000;
        line-height: 1.4;
        width: 100%;
        max-width: 320px;
        margin: 0 auto;
        box-shadow: var(--shadow-lg);
        overflow: auto;
        max-height: 600px;
      }
      .receipt-preview .receipt-header {
        text-align: center;
        border-bottom: 1px dashed #000;
        padding-bottom: 8px;
        margin-bottom: 8px;
      }
      .receipt-preview .store-name {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .receipt-preview .store-address {
        font-size: 10px;
        color: #333;
        white-space: pre-line;
      }
      .receipt-preview .receipt-info {
        margin-bottom: 8px;
        font-size: 11px;
      }
      .receipt-preview .receipt-info div {
        display: flex;
        justify-content: space-between;
      }
      .receipt-preview .items-section {
        border-top: 1px dashed #000;
        border-bottom: 1px dashed #000;
        padding: 8px 0;
        margin-bottom: 8px;
      }
      .receipt-preview .item-line {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .receipt-preview .item-line .item-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .receipt-preview .item-line .item-qty {
        width: 40px;
        text-align: center;
      }
      .receipt-preview .item-line .item-price {
        width: 60px;
        text-align: right;
      }
      .receipt-preview .totals-section {
        margin-bottom: 8px;
      }
      .receipt-preview .total-line {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2px;
      }
      .receipt-preview .total-line.grand-total {
        font-weight: bold;
        font-size: 14px;
        border-top: 1px solid #000;
        padding-top: 4px;
        margin-top: 4px;
      }
      .receipt-preview .payment-section {
        border-top: 1px dashed #000;
        padding-top: 8px;
        margin-bottom: 8px;
      }
      .receipt-preview .receipt-footer {
        text-align: center;
        font-size: 10px;
        color: #666;
        border-top: 1px dashed #000;
        padding-top: 8px;
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--color-text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .footer {
        text-align: center;
        margin-top: var(--space-5);
        padding-top: var(--space-4);
      }
      .footer p {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--color-text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        flex-wrap: wrap;
      }
      .footer a {
        color: var(--color-accent-primary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }
      .footer a:hover {
        color: var(--color-text-primary);
      }
      @media print {
        body {
          background: #fff !important;
        }
        body::before {
          display: none;
        }
        .nav-bar,
        .toolbar,
        .panel:first-child,
        .status-bar,
        .footer,
        .tool-header {
          display: none !important;
        }
        .main-content {
          padding: 0 !important;
          min-height: auto !important;
        }
        .tool-card {
          background: transparent !important;
          border: none !important;
          box-shadow: none !important;
          padding: 0 !important;
        }
        .panels {
          display: block !important;
        }
        .panel:last-child {
          width: 80mm !important;
          margin: 0 auto !important;
        }
        .panel-header {
          display: none !important;
        }
        .receipt-preview {
          box-shadow: none !important;
          max-height: none !important;
        }
      }
      @media (max-width: 900px) {
        .panels {
          grid-template-columns: 1fr;
          gap: var(--space-4);
        }
        .receipt-preview {
          max-width: 100%;
        }
      }
      @media (max-width: 640px) {
        :root {
          --nav-height: 52px;
        }
        .nav-content {
          padding: 0 var(--space-4);
        }
        .nav-back-text {
          display: none;
        }
        .main-content {
          padding: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4)) var(--space-4)
            calc(var(--space-5) + var(--safe-area-bottom));
        }
        .tool-card {
          padding: var(--space-4);
          border-radius: var(--radius-md);
        }
        .tool-header {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
          margin-bottom: var(--space-4);
          padding-bottom: var(--space-4);
        }
        .tool-icon {
          width: 40px;
          height: 40px;
          font-size: 1rem;
        }
        .tool-info h1 {
          font-size: 1.125rem;
        }
        .toolbar {
          gap: var(--space-2);
          margin-bottom: var(--space-4);
        }
        .btn-group {
          flex-wrap: wrap;
        }
        .btn {
          height: 34px;
          padding: 0 var(--space-3);
          font-size: 0.75rem;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .item-row {
          grid-template-columns: 1fr 1fr;
          gap: var(--space-2);
        }
        .item-row input:first-child {
          grid-column: 1 / -1;
        }
        .item-header {
          display: none;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }
      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible),
      select:focus:not(:focus-visible),
      textarea:focus:not(:focus-visible) {
        outline: none;
      }
</style>

<main class="main-content">
      <div class="tool-card">
        <div class="tool-header">
          <div class="tool-icon">🧾</div>
          <div class="tool-info">
            <h1>收据生成器</h1>
            <p class="desc">生成专业收据，支持商品明细、税费计算和打印</p>
          </div>
        </div>
        <div class="toolbar">
          <div class="btn-group">
            <button id="btnPrint" class="btn btn-primary">打印</button>
            <button id="btnClear" class="btn">清空</button>
          </div>
        </div>
        <div class="panels">
          <div class="panel">
            <div class="panel-header"><span class="panel-label">收据信息</span></div>
            <div class="form-section">
              <div class="form-section-title">
                <span>🏪</span>
                <span>商家信息</span>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label for="storeName">商家名称</label>
                  <input type="text" id="storeName" placeholder="例如：XX 便利店">
                </div>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label for="storeAddress">商家地址</label>
                  <textarea id="storeAddress" placeholder="例如：XX市XX区XX路XX号
电话：XXX-XXXX-XXXX"></textarea>
                </div>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">
                <span>📋</span>
                <span>收据信息</span>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="receiptNo">收据号</label>
                  <input type="text" id="receiptNo" readonly="">
                </div>
                <div class="form-group">
                  <label for="receiptDate">日期</label>
                  <input type="date" id="receiptDate">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="receiptTime">时间</label>
                  <input type="time" id="receiptTime">
                </div>
                <div class="form-group">
                  <label for="cashier">收银员</label>
                  <input type="text" id="cashier" placeholder="可选">
                </div>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">
                <span>🛒</span>
                <span>商品明细</span>
              </div>
              <div class="item-header">
                <span>商品名称</span>
                <span>数量</span>
                <span>单价</span>
                <span>小计</span>
                <span></span>
              </div>
              <div class="items-list" id="itemsList"></div>
              <button class="add-item-btn" id="btnAddItem">+ 添加商品</button>
            </div>
            <div class="form-section">
              <div class="form-section-title">
                <span>💰</span>
                <span>税费与支付</span>
              </div>
              <div class="tax-row">
                <input type="checkbox" id="enableTax">
                <label for="enableTax">启用税费</label>
                <input type="number" id="taxRate" value="6" min="0" max="100" step="0.1" disabled="">
                <span style="color: var(--color-text-muted); font-size: 0.875rem">%</span>
              </div>
              <div class="form-row" style="margin-top: var(--space-3)">
                <div class="form-group">
                  <label for="paymentMethod">支付方式</label>
                  <select id="paymentMethod">
                    <option value="cash">现金</option>
                    <option value="card">银行卡</option>
                    <option value="wechat">微信支付</option>
                    <option value="alipay">支付宝</option>
                    <option value="other">其他</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="amountPaid">实收金额</label>
                  <input type="number" id="amountPaid" placeholder="可选" min="0" step="0.01">
                </div>
              </div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header"><span class="panel-label">预览</span></div>
            <div class="receipt-preview" id="receiptPreview">
              <div class="receipt-header">
                <div class="store-name" id="previewStoreName">商家名称</div>
                <div class="store-address" id="previewStoreAddress">商家地址</div>
              </div>
              <div class="receipt-info">
                <div>
                  <span>收据号:</span>
                  <span id="previewReceiptNo">-</span>
                </div>
                <div>
                  <span>日期:</span>
                  <span id="previewDate">-</span>
                </div>
                <div>
                  <span>时间:</span>
                  <span id="previewTime">-</span>
                </div>
                <div id="previewCashierRow" style="display: none">
                  <span>收银员:</span>
                  <span id="previewCashier">-</span>
                </div>
              </div>
              <div class="items-section">
                <div class="item-line" style="
                    font-weight: bold;
                    border-bottom: 1px solid #ccc;
                    padding-bottom: 4px;
                    margin-bottom: 4px;
                  ">
                  <span class="item-name">商品</span>
                  <span class="item-qty">数量</span>
                  <span class="item-price">金额</span>
                </div>
                <div id="previewItems"></div>
              </div>
              <div class="totals-section">
                <div class="total-line">
                  <span>小计:</span>
                  <span id="previewSubtotal">¥0.00</span>
                </div>
                <div class="total-line" id="previewTaxRow" style="display: none">
                  <span>
                    税费 (
                    <span id="previewTaxRate">0</span>
                    %):
                  </span>
                  <span id="previewTax">¥0.00</span>
                </div>
                <div class="total-line grand-total">
                  <span>合计:</span>
                  <span id="previewTotal">¥0.00</span>
                </div>
              </div>
              <div class="payment-section">
                <div class="total-line">
                  <span>支付方式:</span>
                  <span id="previewPayment">现金</span>
                </div>
                <div class="total-line" id="previewPaidRow" style="display: none">
                  <span>实收:</span>
                  <span id="previewPaid">¥0.00</span>
                </div>
                <div class="total-line" id="previewChangeRow" style="display: none">
                  <span>找零:</span>
                  <span id="previewChange">¥0.00</span>
                </div>
              </div>
              <div class="receipt-footer">
                <p>感谢您的惠顾！</p>
                <p>欢迎再次光临</p>
              </div>
            </div>
          </div>
        </div>
        <div class="status-bar">
          <div id="status" class="status"></div>
        </div>
      </div>
      <footer class="footer">
        <p>
          <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub
          </a>
          <span>·</span>
          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>
    </main>
