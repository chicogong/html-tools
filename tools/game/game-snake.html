      [data-theme="light"] {

        --food-glow: rgba(230, 57, 70, 0.3);

        --wall: #dc3545;
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        transition: all 0.3s ease;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 500px;
        margin-bottom: 20px;
      }

      .back-link {
        color: var(--color-text-secondary);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--accent-cyan);
      }

      h1 {
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-controls {
        display: flex;
        gap: 10px;
      }

      .icon-btn {
        background: var(--bg-secondary);
        border: 1px solid var(--bg-tertiary);
        color: var(--color-text-primary);
        width: 40px;
        height: 40px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: all 0.3s ease;
      }

      .icon-btn:hover {
        background: var(--bg-tertiary);
        transform: scale(1.05);
      }

      .game-container {
        background: var(--bg-secondary);
        border-radius: 20px;

        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 500px;
      }

      .score-board {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        padding: 15px;
        background: var(--bg-tertiary);
        border-radius: 12px;
      }

      .score-item {
        text-align: center;
      }

      .score-label {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
      }

      .score-value {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--accent-cyan);
      }

      .canvas-container {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        background: var(--bg-deep);
        border-radius: 12px;
        overflow: hidden;
      }

      #gameCanvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .game-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.3s ease;
        z-index: 10;
      }

      .game-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .overlay-title {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: var(--accent-cyan);
      }

      .overlay-score {
        font-size: 1.2rem;
        color: var(--color-text-secondary);
        margin-bottom: 20px;
      }

      .start-btn {
        background: linear-gradient(135deg, var(--snake-head), var(--snake-body));
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .start-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 20px var(--accent-glow);
      }

      .controls {
        margin-top: 20px;
      }

      .d-pad {
        display: grid;
        grid-template-columns: repeat(3, 60px);
        grid-template-rows: repeat(3, 60px);
        gap: 5px;
        justify-content: center;
      }

      .d-pad-btn {
        background: var(--bg-tertiary);
        border: 1px solid var(--bg-secondary);
        color: var(--color-text-primary);
        border-radius: 12px;
        font-size: 1.5rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .d-pad-btn:active {
        background: var(--accent-cyan);
        transform: scale(0.95);
      }

      .d-pad-btn.empty {
        visibility: hidden;
      }

      .settings-panel {
        margin-top: 20px;
        padding: 15px;
        background: var(--bg-tertiary);
        border-radius: 12px;
      }

      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--bg-secondary);
      }

      .setting-row:last-child {
        border-bottom: none;
      }

      .setting-label {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
      }

      .setting-control {
        display: flex;
        gap: 5px;
      }

      .speed-btn {
        background: var(--bg-secondary);
        border: 1px solid var(--bg-tertiary);
        color: var(--color-text-secondary);
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s ease;
      }

      .speed-btn.active {
        background: var(--accent-cyan);
        color: white;
        border-color: var(--accent-cyan);
      }

      .toggle-switch {
        position: relative;
        width: 50px;
        height: 26px;
        background: var(--bg-secondary);
        border-radius: 13px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .toggle-switch.active {
        background: var(--accent-cyan);
      }

      .toggle-switch::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        transition: all 0.3s ease;
      }

      .toggle-switch.active::after {
        left: 27px;
      }

      .instructions {
        margin-top: 20px;
        padding: 15px;
        background: var(--bg-tertiary);
        border-radius: 12px;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }

      .instructions h3 {
        font-size: 0.9rem;
        color: var(--color-text-primary);
        margin-bottom: 10px;
      }

      .instructions ul {
        list-style: none;
        display: grid;
        gap: 5px;
      }

      .instructions li {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .key {
        background: var(--bg-secondary);
        padding: 4px 10px;
        border-radius: 5px;
        font-family: var(--font-mono);
        font-size: 0.8rem;
      }

      /* Animations */
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      .shake {
        animation: shake 0.3s ease;
      }

      /* Mobile optimizations */
      @media (max-width: 500px) {
        body {
          padding: 10px;
        }

        h1 {
          font-size: 1.2rem;
        }

        .game-container {
          padding: 15px;
          border-radius: 15px;
        }

        .d-pad {
          grid-template-columns: repeat(3, 55px);
          grid-template-rows: repeat(3, 55px);
        }

        .score-value {
          font-size: 1.2rem;
        }
      }

      /* Hide mobile controls on desktop */
      @media (min-width: 768px) {
        .controls {
          opacity: 0.3;
        }

        .controls:hover {
          opacity: 1;
        }
      }

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);

      .breadcrumb a {

      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
