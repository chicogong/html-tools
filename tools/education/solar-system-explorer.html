    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }

        {

          en: "Pluto",

          emoji: "🟫",
          order: 9,
          massKg: 1.303e22,
          radiusKm: 1188.3,
          densityGcm3: 1.854,
          surfaceGravityMs2: 0.62,
          escapeVelocityKms: 1.21,
          orbitalPeriodDays: 90560,
          rotationPeriodDays: -6.387,
          distanceAU: 39.48,
          eccentricity: 0.249,
          axialTiltDeg: 122.53,
          moons: 5,
          rings: false,
          surfaceTempK: 44,
          desc: '冥王星于 2006 年被国际天文联合会重新划分为矮行星，位于柯伊伯带，由岩石和冰组成。2015 年新视野号探测器飞越冥王星，揭示其表面有心形氮冰平原"汤博区"，地貌异常复杂。'

      ];

      var UNITS = [
        { id: "km", name: "千米 (km)", factor: 1, group: "distance" },
        { id: "AU", name: "天文单位 (AU)", factor: 1.496e8, group: "distance" },
        { id: "ly", name: "光年 (ly)", factor: 9.461e12, group: "distance" },
        { id: "pc", name: "秒差距 (pc)", factor: 3.086e13, group: "distance" },
        { id: "Rsun", name: "太阳半径 (R☉)", factor: 696340, group: "distance" },
        { id: "Rearth", name: "地球半径 (R⊕)", factor: 6371, group: "distance" },
        { id: "kg", name: "千克 (kg)", factor: 1, group: "mass" },
        { id: "Msun", name: "太阳质量 (M☉)", factor: 1.989e30, group: "mass" },
        { id: "Mearth", name: "地球质量 (M⊕)", factor: 5.972e24, group: "mass" },
        { id: "Mjup", name: "木星质量 (M♃)", factor: 1.898e27, group: "mass" },
        { id: "days", name: "地球日 (d)", factor: 1, group: "time" },
        { id: "years", name: "地球年 (yr)", factor: 365.25, group: "time" },
        { id: "hours", name: "小时 (h)", factor: 1 / 24, group: "time" },
        { id: "Myr", name: "百万年 (Myr)", factor: 365.25e6, group: "time" }
      ];

      var currentBody = BODIES[3];
      var currentMode = "detail";

      function fmtNum(n) {
        if (n === null || n === undefined) return "—";
        if (Math.abs(n) >= 1e18 || (Math.abs(n) < 0.001 && n !== 0)) {
          return n.toExponential(3);
        }
        if (Number.isInteger(n)) return n.toLocaleString("zh-CN");
        return parseFloat(n.toPrecision(5)).toLocaleString("zh-CN");
      }

      function fmtMass(kg) {
        if (kg === null) return "—";
        var earthMasses = kg / 5.972e24;
        var sunMasses = kg / 1.989e30;
        if (sunMasses >= 0.01) return sunMasses.toFixed(4) + " M☉";
        if (earthMasses >= 1) return earthMasses.toFixed(4) + " M⊕";
        return (kg / 1e22).toFixed(3) + " × 10²² kg";
      }

      function fmtPeriod(days) {
        if (days === null) return "—";
        var absDays = Math.abs(days);
        if (absDays >= 365.25) return (days / 365.25).toFixed(2) + " 年";
        if (absDays < 1) return (days * 24).toFixed(2) + " 小时";
        return absDays.toFixed(2) + " 天" + (days < 0 ? "（逆转）" : "");
      }

      function fmtTemp(K) {
        if (K === null) return "—";
        return K + " K（" + (K - 273.15).toFixed(0) + " °C）";
      }

      function buildSidebar() {
        var list = document.getElementById("sidebarList");
        list.innerHTML = "";
        BODIES.forEach(function (b) {
          var btn = document.createElement("button");
          btn.className = "sse-body-btn" + (b.id === currentBody.id ? " active" : "");
          btn.dataset.id = b.id;
          btn.innerHTML =
            '<span class="sse-body-emoji">' +
            b.emoji +
            "</span>" +
            '<div class="sse-body-meta">' +
            '<div class="sse-body-name">' +
            b.name +
            "</div>" +
            '<div class="sse-body-type">' +
            b.type +
            "</div>" +
            "</div>";
          btn.addEventListener("click", function () {
            var btnId = btn.dataset.id;
            currentBody = BODIES.find(function (x) {
              return x.id === btnId;
            });
            buildSidebar();
            renderDetail();
          });
          list.appendChild(btn);
        });
      }

      function renderDetail() {
        var b = currentBody;
        var panel = document.getElementById("detailPanel");
        var maxR = BODIES[0].radiusKm;
        var pct = Math.max(0.5, (b.radiusKm / maxR) * 100).toFixed(1);

        var params = [
          { label: "质量", value: fmtMass(b.massKg), unit: "" },
          { label: "赤道半径", value: fmtNum(b.radiusKm), unit: "km" },
          { label: "平均密度", value: fmtNum(b.densityGcm3), unit: "g/cm³" },
          { label: "表面重力", value: fmtNum(b.surfaceGravityMs2), unit: "m/s²" },
          { label: "逃逸速度", value: fmtNum(b.escapeVelocityKms), unit: "km/s" },
          {
            label: "公转周期",
            value: b.orbitalPeriodDays !== null ? fmtPeriod(b.orbitalPeriodDays) : "—",
            unit: ""
          },
          { label: "自转周期", value: fmtPeriod(b.rotationPeriodDays), unit: "" },
          { label: "距太阳", value: b.distanceAU > 0 ? fmtNum(b.distanceAU) : "—", unit: "AU" },
          {
            label: "轨道离心率",
            value: b.eccentricity !== null ? fmtNum(b.eccentricity) : "—",
            unit: ""
          },
          { label: "轴倾角", value: fmtNum(b.axialTiltDeg), unit: "°" },
          { label: "已知卫星", value: String(b.moons), unit: "颗" },
          { label: "环系统", value: b.rings ? "有" : "无", unit: "" },
          { label: "表面温度", value: fmtTemp(b.surfaceTempK), unit: "" }
        ];

        var cardsHtml = params
          .map(function (p) {
            return (
              '<div class="sse-param-card">' +
              '<div class="sse-param-label">' +
              p.label +
              "</div>" +
              '<div class="sse-param-value">' +
              p.value +
              "</div>" +
              (p.unit ? '<div class="sse-param-unit">' + p.unit + "</div>" : "") +
              "</div>"
            );
          })
          .join("");

        panel.innerHTML =
          '<div class="sse-hero">' +
          '<div class="sse-hero-emoji">' +
          b.emoji +
          "</div>" +
          '<div class="sse-hero-info">' +
          "<h2>" +
          b.name +
          "</h2>" +
          '<div class="sse-hero-en">' +
          b.en +
          " · " +
          b.type +
          "</div>" +
          "<p>" +
          b.desc +
          "</p>" +
          "</div>" +
          "</div>" +
          '<div class="sse-size-bar-wrap">' +
          '<div class="sse-size-bar-label"><span>相对半径（对比太阳）</span><span>' +
          b.radiusKm.toLocaleString("zh-CN") +
          " km</span></div>" +
          '<div class="sse-size-bar-track">' +
          '<div class="sse-size-bar-fill" style="width:' +
          pct +
          '%"></div>' +
          "</div>" +
          "</div>" +
          '<p class="sse-section-title">物理参数</p>' +
          '<div class="sse-params-grid">' +
          cardsHtml +
          "</div>";

        document.getElementById("statusMsg").textContent =
          "当前查看：" + b.name + "（" + b.en + "）";
      }

      function buildCompareRow(lbl, val) {
        return (
          '<div class="sse-compare-row"><span class="sse-compare-lbl">' +
          lbl +
          '</span><span class="sse-compare-val">' +
          val +
          "</span></div>"
        );
      }

      function renderCompare() {
        var sort = document.getElementById("compareSort").value;
        var bodies = BODIES.slice();
        if (sort === "mass") {
          bodies.sort(function (a, b) {
            return b.massKg - a.massKg;
          });
        } else if (sort === "radius") {
          bodies.sort(function (a, b) {
            return b.radiusKm - a.radiusKm;
          });
        } else if (sort === "period") {
          bodies.sort(function (a, b) {
            var pa = a.orbitalPeriodDays !== null ? Math.abs(a.orbitalPeriodDays) : 0;
            var pb = b.orbitalPeriodDays !== null ? Math.abs(b.orbitalPeriodDays) : 0;
            return pa - pb;
          });
        } else if (sort === "moons") {
          bodies.sort(function (a, b) {
            return b.moons - a.moons;
          });
        }
        var grid = document.getElementById("compareGrid");
        grid.innerHTML = bodies
          .map(function (b) {
            return (
              '<div class="sse-compare-card">' +
              '<div class="sse-compare-head">' +
              '<span class="sse-compare-emoji">' +
              b.emoji +
              "</span>" +
              '<div><div class="sse-compare-name">' +
              b.name +
              '</div><div style="font-size:0.75rem;color:var(--text-muted);font-family:var(--font-mono)">' +
              b.type +
              "</div></div>" +
              "</div>" +
              buildCompareRow("质量", fmtMass(b.massKg)) +
              buildCompareRow("半径", fmtNum(b.radiusKm) + " km") +
              buildCompareRow("密度", fmtNum(b.densityGcm3) + " g/cm³") +
              buildCompareRow("表面重力", fmtNum(b.surfaceGravityMs2) + " m/s²") +
              buildCompareRow(
                "公转周期",
                b.orbitalPeriodDays !== null ? fmtPeriod(b.orbitalPeriodDays) : "—"
              ) +
              buildCompareRow("卫星数", b.moons + " 颗") +
              buildCompareRow("距太阳", b.distanceAU > 0 ? b.distanceAU + " AU" : "—") +
              buildCompareRow("表面温度", fmtTemp(b.surfaceTempK)) +
              "</div>"
            );
          })
          .join("");
      }

      function buildConvertSelects() {
        var fromEl = document.getElementById("convFrom");
        var toEl = document.getElementById("convTo");
        var groups = { distance: "距离", mass: "质量", time: "时间" };
        ["distance", "mass", "time"].forEach(function (g) {
          var og1 = document.createElement("optgroup");
          og1.label = groups[g];
          var og2 = document.createElement("optgroup");
          og2.label = groups[g];
          UNITS.filter(function (u) {
            return u.group === g;
          }).forEach(function (u) {
            var o1 = document.createElement("option");
            o1.value = u.id;
            o1.textContent = u.name;
            og1.appendChild(o1);
            var o2 = document.createElement("option");
            o2.value = u.id;
            o2.textContent = u.name;
            og2.appendChild(o2);
          });
          fromEl.appendChild(og1);
          toEl.appendChild(og2);
        });
        fromEl.value = "AU";
        toEl.value = "km";
        doConvert();
      }

      function doConvert() {
        var val = parseFloat(document.getElementById("convInput").value);
        var fromId = document.getElementById("convFrom").value;
        var toId = document.getElementById("convTo").value;
        var fromU = UNITS.find(function (u) {
          return u.id === fromId;
        });
        var toU = UNITS.find(function (u) {
          return u.id === toId;
        });
        var resEl = document.getElementById("convResult");
        var extraEl = document.getElementById("convExtra");
        extraEl.innerHTML = "";

        if (!fromU || !toU || fromU.group !== toU.group) {
          resEl.textContent = "单位类型不匹配";
          return;
        }
        if (isNaN(val)) {
          resEl.textContent = "请输入数值";
          return;
        }
        var siVal = val * fromU.factor;
        var result = siVal / toU.factor;
        resEl.textContent = fmtNum(result) + " " + toU.id;

        if (fromU.group === "distance") {
          var km = siVal;
          var refs = [
            { label: "月球轨道半径", km: 384400 },
            { label: "地球-太阳 (1 AU)", km: 1.496e8 },
            { label: "最近恒星 (比邻星)", km: 4.013e13 }
          ];
          var html = '<p class="sse-section-title" style="margin-top:var(--space-4)">距离参考</p>';
          refs.forEach(function (r) {
            var ratio = km / r.km;
            html +=
              '<div class="sse-compare-row" style="padding:6px 0;border-bottom:1px solid var(--color-border-subtle)">' +
              '<span class="sse-compare-lbl">' +
              r.label +
              "</span>" +
              '<span class="sse-compare-val">' +
              (ratio >= 1 ? fmtNum(ratio) + " 倍" : "约 1/" + fmtNum(1 / ratio) + " 倍") +
              "</span></div>";
          });
          extraEl.innerHTML = html;
        }
      }

      function buildTh(t) {
        return (
          '<th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--color-border-subtle);color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em">' +
          t +
          "</th>"
        );
      }

      function buildTd(t) {
        return (
          '<td style="padding:8px 12px;border-bottom:1px solid var(--color-border-subtle);color:var(--color-text-primary)">' +
          t +
          "</td>"
        );
      }

      function buildDistanceTable() {
        var planets = BODIES.filter(function (b) {
          return b.distanceAU > 0;
        });
        var html =
          '<table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:0.8125rem">' +
          "<thead><tr>" +
          buildTh("天体") +
          buildTh("距太阳 (AU)") +
          buildTh("距太阳 (km)") +
          buildTh("光到达时间") +
          buildTh("类型") +
          "</tr></thead><tbody>";
        planets.forEach(function (b) {
          var au = b.distanceAU;
          var km = au * 1.496e8;
          var lightMinutes = (km / 299792.458 / 60).toFixed(1);
          html +=
            "<tr>" +
            buildTd(b.emoji + " " + b.name) +
            buildTd(au.toFixed(3)) +
            buildTd(km.toExponential(3)) +
            buildTd(lightMinutes + " 分钟") +
            buildTd(b.type) +
            "</tr>";
        });
        html += "</tbody></table>";
        document.getElementById("distanceTable").innerHTML = html;
      }

      function setMode(mode) {
        currentMode = mode;
        document.getElementById("modeDetail").style.display = mode === "detail" ? "" : "none";
        document.getElementById("modeCompare").style.display = mode === "compare" ? "" : "none";
        document.getElementById("modeConvert").style.display = mode === "convert" ? "" : "none";
        document.getElementById("tabDetail").classList.toggle("active", mode === "detail");
        document.getElementById("tabCompare").classList.toggle("active", mode === "compare");
        document.getElementById("tabConvert").classList.toggle("active", mode === "convert");

        if (mode === "compare") renderCompare();
        if (mode === "convert") buildDistanceTable();

        var msgMap = {
          detail: "点击左侧天体查看详情",
          compare: "所有太阳系天体对比一览",
          convert: "输入数值并选择单位进行换算"
        };
        document.getElementById("statusMsg").textContent = msgMap[mode];
      }

      document.getElementById("tabDetail").addEventListener("click", function () {
        setMode("detail");
      });
      document.getElementById("tabCompare").addEventListener("click", function () {
        setMode("compare");
      });
      document.getElementById("tabConvert").addEventListener("click", function () {
        setMode("convert");
      });
      document.getElementById("compareSort").addEventListener("change", renderCompare);
      document.getElementById("convInput").addEventListener("input", doConvert);
      document.getElementById("convFrom").addEventListener("change", doConvert);
      document.getElementById("convTo").addEventListener("change", doConvert);

      buildSidebar();
      renderDetail();
      buildConvertSelects();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
