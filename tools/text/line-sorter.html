<style>
/* ============================================
         Design System - CSS Variables
         ============================================ */
      :root {
        /* Dark Theme (Default) */
        --color-bg-deep: #0a0a0f;
        --color-bg-surface: #1a1a22;
        --color-bg-subtle: #242430;
        --color-bg-input: #0e0e14;
        --color-text-primary: #f5f5f7;
        --color-text-secondary: #a1a1aa;
        --color-text-muted: #71717a;
        --color-border-default: rgba(255, 255, 255, 0.08);
        --color-border-subtle: rgba(255, 255, 255, 0.04);
        --color-border-strong: rgba(255, 255, 255, 0.12);
        --color-accent-primary: #00d4aa;
        --color-accent-secondary: #8b5cf6;
        --color-accent-tertiary: #3b82f6;
        --color-success: #22c55e;
        --color-warning: #f59e0b;
        --color-error: #ef4444;

        /* Glassmorphism */
        --glass-bg: rgba(26, 26, 34, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 212, 170, 0.15);

        /* Spacing */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;

        /* Border Radius */
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-xl: 24px;
        --radius-full: 9999px;

        /* Typography */
        --font-sans: "Inter", -apple-system, blinkmacsystemfont, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;

        /* Transitions */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;

        /* Layout */
        --nav-height: 56px;
        --container-max: 900px;
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* Light Theme */
      [data-theme="light"] {
        --color-bg-deep: #f8fafc;
        --color-bg-surface: #fff;
        --color-bg-subtle: #f1f5f9;
        --color-bg-input: #f8fafc;
        --color-text-primary: #0f172a;
        --color-text-secondary: #475569;
        --color-text-muted: #94a3b8;
        --color-border-default: rgba(0, 0, 0, 0.08);
        --color-border-subtle: rgba(0, 0, 0, 0.04);
        --color-border-strong: rgba(0, 0, 0, 0.12);
        --color-accent-primary: #00b894;
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
      }

      /* ============================================
         Base Styles
         ============================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      /* Subtle background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      /* ============================================
         Navigation Bar
         ============================================ */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      /* Back Button */
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      /* Nav Title */
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Nav Actions */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      /* Theme Toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      /* ============================================
         Main Content
         ============================================ */
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      /* ============================================
         Card Styles
         ============================================ */
      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      /* ============================================
         Form Elements
         ============================================ */
      textarea {
        width: 100%;
        padding: var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
        min-height: 200px;
        resize: vertical;
        line-height: 1.6;
      }

      textarea:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      textarea::placeholder {
        color: var(--color-text-muted);
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-2);
      }

      select {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        transition: all var(--transition-fast);
        cursor: pointer;
      }

      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      /* ============================================
         Options Grid
         ============================================ */
      .options-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .option-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }

      /* ============================================
         Checkbox Styles
         ============================================ */
      .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        cursor: pointer;
        user-select: none;
      }

      .checkbox-item input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border: 2px solid var(--color-border-strong);
        border-radius: var(--radius-sm);
        background: var(--color-bg-input);
        cursor: pointer;
        transition: all var(--transition-fast);
        position: relative;
      }

      .checkbox-item input[type="checkbox"]:checked {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
      }

      .checkbox-item input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1px;
        width: 6px;
        height: 10px;
        border: solid #000;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .checkbox-item span {
        font-size: 0.9375rem;
        color: var(--color-text-primary);
      }

      /* ============================================
         Stats Section
         ============================================ */
      .stats-bar {
        display: flex;
        gap: var(--space-4);
        flex-wrap: wrap;
        margin-bottom: var(--space-4);
      }

      .stat-item {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }

      .stat-value {
        color: var(--color-accent-primary);
        font-family: var(--font-mono);
        font-weight: 500;
      }

      /* ============================================
         Result Section
         ============================================ */
      .result-output {
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        min-height: 200px;
        max-height: 400px;
        overflow: auto;
        font-family: var(--font-mono);
        font-size: 0.9375rem;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--color-text-primary);
      }

      .result-output:empty::before {
        content: "排序结果将显示在这里...";
        color: var(--color-text-muted);
      }

      /* ============================================
         Buttons
         ============================================ */
      .button-group {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-5);
        flex-wrap: wrap;
      }

      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #000;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* ============================================
         Toast Notification
         ============================================ */
      .toast {
        position: fixed;
        bottom: calc(var(--space-6) + var(--safe-area-bottom));
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-3) var(--space-5);
        font-size: 0.875rem;
        color: var(--color-text-primary);
        box-shadow: var(--shadow-lg);
        opacity: 0;
        visibility: hidden;
        transition: all var(--transition-normal);
        z-index: 2000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        visibility: visible;
      }

      .toast.success {
        border-color: var(--color-success);
        color: var(--color-success);
      }

      /* ============================================
         Mobile Responsive
         ============================================ */
      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }

        .nav-content {
          padding: 0 var(--space-4);
        }

        .nav-back-text {
          display: none;
        }

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .card {
          padding: var(--space-4);
        }

        .options-grid {
          grid-template-columns: 1fr;
        }

        .checkbox-group {
          flex-direction: column;
          gap: var(--space-3);
        }

        .stats-bar {
          flex-direction: column;
          gap: var(--space-2);
        }

        .button-group {
          gap: var(--space-2);
        }

        button {
          padding: var(--space-2) var(--space-3);
          font-size: 0.875rem;
          flex: 1;
        }
      }

      /* Tablet */
      @media (min-width: 768px) {
        .nav-back-text {
          display: inline;
        }
      }

      /* Desktop */
      @media (min-width: 1024px) {
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-8));
        }
      }

      /* ============================================
         Accessibility
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }

      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      textarea:focus:not(:focus-visible),
      select:focus:not(:focus-visible),
      input:focus:not(:focus-visible) {
        outline: none;
      }
</style>

<main class="main-content">
      <div class="container">
        <!-- Input Card -->
        <div class="card">
          <h2 class="card-title">📝 输入文本</h2>
          <textarea id="input" placeholder="在此输入或粘贴多行文本，每行将作为一个排序单元...
例如：
香蕉
苹果
橙子
葡萄" oninput="sortLines()"></textarea>

          <div class="button-group">
            <button onclick="pasteFromClipboard()">📋 粘贴</button>
            <button onclick="loadSample()">📝 示例</button>
            <button onclick="clearInput()">🗑️ 清空</button>
          </div>
        </div>

        <!-- Options Card -->
        <div class="card">
          <h2 class="card-title">⚙️ 排序选项</h2>

          <div class="options-grid">
            <div class="option-group">
              <label for="sortMethod">排序方式</label>
              <select id="sortMethod" onchange="sortLines()">
                <option value="alphabetical">字母顺序 (A-Z)</option>
                <option value="alphabetical-desc">字母逆序 (Z-A)</option>
                <option value="numeric">数字顺序 (小到大)</option>
                <option value="numeric-desc">数字逆序 (大到小)</option>
                <option value="length">按长度 (短到长)</option>
                <option value="length-desc">按长度 (长到短)</option>
                <option value="reverse">反转行顺序</option>
                <option value="shuffle">随机打乱</option>
              </select>
            </div>
          </div>

          <div class="checkbox-group">
            <label class="checkbox-item">
              <input type="checkbox" id="caseSensitive" onchange="sortLines()">
              <span>区分大小写</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="removeDuplicates" onchange="sortLines()">
              <span>去除重复行</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="trimLines" checked="" onchange="sortLines()">
              <span>去除行首尾空格</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="removeEmpty" onchange="sortLines()">
              <span>去除空行</span>
            </label>
          </div>
        </div>

        <!-- Output Card -->
        <div class="card">
          <h2 class="card-title">📤 排序结果</h2>

          <div class="stats-bar">
            <span class="stat-item">
              输入行数:
              <span class="stat-value" id="inputLines">0</span>
            </span>
            <span class="stat-item">
              输出行数:
              <span class="stat-value" id="outputLines">0</span>
            </span>
            <span class="stat-item" id="duplicatesStat" style="display: none">
              去除重复:
              <span class="stat-value" id="duplicatesRemoved">0</span>
            </span>
          </div>

          <div class="result-output" id="output"></div>

          <div class="button-group">
            <button onclick="copyOutput()" class="primary">📋 复制结果</button>
            <button onclick="reshuffleLines()">🔀 重新打乱</button>
            <button onclick="applyToInput()">↩️ 应用为输入</button>
          </div>
        </div>
      </div>
    </main>

<script>
// ============================================
      // Elements
      // ============================================
      const inputEl = document.getElementById("input");
      const outputEl = document.getElementById("output");
      const sortMethodEl = document.getElementById("sortMethod");
      const caseSensitiveEl = document.getElementById("caseSensitive");
      const removeDuplicatesEl = document.getElementById("removeDuplicates");
      const trimLinesEl = document.getElementById("trimLines");
      const removeEmptyEl = document.getElementById("removeEmpty");
      const inputLinesEl = document.getElementById("inputLines");
      const outputLinesEl = document.getElementById("outputLines");
      const duplicatesStatEl = document.getElementById("duplicatesStat");
      const duplicatesRemovedEl = document.getElementById("duplicatesRemoved");
      const toastEl = document.getElementById("toast");

      // ============================================
      // Sort Logic
      // ============================================
      function sortLines() {
        const text = inputEl.value;
        if (!text.trim()) {
          outputEl.textContent = "";
          inputLinesEl.textContent = "0";
          outputLinesEl.textContent = "0";
          duplicatesStatEl.style.display = "none";
          return;
        }

        let lines = text.split("\n");
        inputLinesEl.textContent = lines.length;

        // Trim lines if enabled
        if (trimLinesEl.checked) {
          lines = lines.map((line) => line.trim());
        }

        // Remove empty lines if enabled
        if (removeEmptyEl.checked) {
          lines = lines.filter((line) => line.length > 0);
        }

        const beforeDedup = lines.length;

        // Remove duplicates if enabled
        if (removeDuplicatesEl.checked) {
          const seen = new Set();
          lines = lines.filter((line) => {
            const key = caseSensitiveEl.checked ? line : line.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
          duplicatesStatEl.style.display = "inline";
          duplicatesRemovedEl.textContent = beforeDedup - lines.length;
        } else {
          duplicatesStatEl.style.display = "none";
        }

        // Sort based on method
        const method = sortMethodEl.value;
        const caseSensitive = caseSensitiveEl.checked;

        switch (method) {
          case "alphabetical":
            lines.sort((a, b) => {
              const aVal = caseSensitive ? a : a.toLowerCase();
              const bVal = caseSensitive ? b : b.toLowerCase();
              return aVal.localeCompare(bVal, "zh-CN");
            });
            break;

          case "alphabetical-desc":
            lines.sort((a, b) => {
              const aVal = caseSensitive ? a : a.toLowerCase();
              const bVal = caseSensitive ? b : b.toLowerCase();
              return bVal.localeCompare(aVal, "zh-CN");
            });
            break;

          case "numeric":
            lines.sort((a, b) => {
              const aNum = parseFloat(a) || 0;
              const bNum = parseFloat(b) || 0;
              return aNum - bNum;
            });
            break;

          case "numeric-desc":
            lines.sort((a, b) => {
              const aNum = parseFloat(a) || 0;
              const bNum = parseFloat(b) || 0;
              return bNum - aNum;
            });
            break;

          case "length":
            lines.sort((a, b) => a.length - b.length);
            break;

          case "length-desc":
            lines.sort((a, b) => b.length - a.length);
            break;

          case "reverse":
            lines.reverse();
            break;

          case "shuffle":
            shuffleArray(lines);
            break;
        }

        outputEl.textContent = lines.join("\n");
        outputLinesEl.textContent = lines.length;

        // Save state
        saveState();
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      // ============================================
      // Actions
      // ============================================
      async function pasteFromClipboard() {
        try {
          const text = await navigator.clipboard.readText();
          inputEl.value = text;
          sortLines();
          showToast("已粘贴", "success");
        } catch (e) {
          showToast("无法访问剪贴板");
        }
      }

      function loadSample() {
        inputEl.value = `香蕉
苹果
橙子
葡萄
苹果
芒果
西瓜
草莓
葡萄
蓝莓
cherry
Apple
banana`;
        sortLines();
        showToast("已加载示例", "success");
      }

      function clearInput() {
        inputEl.value = "";
        outputEl.textContent = "";
        inputLinesEl.textContent = "0";
        outputLinesEl.textContent = "0";
        duplicatesStatEl.style.display = "none";
        localStorage.removeItem("line-sorter-state");
        showToast("已清空", "success");
      }

      async function copyOutput() {
        const text = outputEl.textContent;
        if (!text) {
          showToast("没有可复制的内容");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          showToast("已复制到剪贴板", "success");
        } catch (e) {
          showToast("复制失败");
        }
      }

      function reshuffleLines() {
        if (sortMethodEl.value !== "shuffle") {
          sortMethodEl.value = "shuffle";
        }
        sortLines();
        showToast("已重新打乱", "success");
      }

      function applyToInput() {
        const text = outputEl.textContent;
        if (!text) {
          showToast("没有可应用的内容");
          return;
        }
        inputEl.value = text;
        sortLines();
        showToast("已应用为输入", "success");
      }

      // ============================================
      // Toast
      // ============================================
      function showToast(message, type = "") {
        toastEl.textContent = message;
        toastEl.className = "toast show " + type;
        setTimeout(() => {
          toastEl.className = "toast";
        }, 2000);
      }

      // ============================================
      // State Management
      // ============================================
      function saveState() {
        const state = {
          input: inputEl.value,
          sortMethod: sortMethodEl.value,
          caseSensitive: caseSensitiveEl.checked,
          removeDuplicates: removeDuplicatesEl.checked,
          trimLines: trimLinesEl.checked,
          removeEmpty: removeEmptyEl.checked
        };
        localStorage.setItem("line-sorter-state", JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem("line-sorter-state");
        if (saved) {
          try {
            const state = JSON.parse(saved);
            inputEl.value = state.input || "";
            sortMethodEl.value = state.sortMethod || "alphabetical";
            caseSensitiveEl.checked = state.caseSensitive || false;
            removeDuplicatesEl.checked = state.removeDuplicates || false;
            trimLinesEl.checked = state.trimLines !== false;
            removeEmptyEl.checked = state.removeEmpty || false;
            sortLines();
          } catch (e) {
            console.error("Failed to load state:", e);
          }
        }
      }

      // ============================================
      // Theme Management
      // ============================================
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");

        document.documentElement.setAttribute("data-theme", theme);
      }

      // ============================================
      // Initialize
      // ============================================
      initTheme();
      loadState();
</script>
