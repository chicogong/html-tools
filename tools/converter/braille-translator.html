    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;

    <script>
      // Grade 1: letter → braille dots bitmask
      // Unicode Braille base: U+2800. Dot bit flags: dot1=1,dot2=2,dot3=4,dot4=8,dot5=16,dot6=32
      var LETTER_TO_DOTS = {
        a: 0x01,
        b: 0x03,
        c: 0x09,
        d: 0x19,
        e: 0x11,
        f: 0x0b,
        g: 0x1b,
        h: 0x13,
        i: 0x0a,
        j: 0x1a,
        k: 0x05,
        l: 0x07,
        m: 0x0d,
        n: 0x1d,
        o: 0x15,
        p: 0x0f,
        q: 0x1f,
        r: 0x17,
        s: 0x0e,
        t: 0x1e,
        u: 0x25,
        v: 0x27,
        w: 0x3a,
        x: 0x2d,
        y: 0x3d,
        z: 0x35
      };

      // Number indicator ⠼ = dots 3,4,5,6 = 0x3c; digits 1-0 map to letters a-j
      var NUM_INDICATOR = 0x3c;
      var NUM_MAP = {
        1: "a",
        2: "b",
        3: "c",
        4: "d",
        5: "e",
        6: "f",
        7: "g",
        8: "h",
        9: "i",
        0: "j"
      };

      // Capital indicator ⠠ = dot6 = 0x20
      var CAP_INDICATOR = 0x20;

      // Punctuation: char → dots
      var PUNCT_TO_DOTS = {
        ",": 0x02,
        ";": 0x06,
        ":": 0x12,
        ".": 0x32,
        "!": 0x16,
        "?": 0x26,
        "'": 0x04,
        "-": 0x24,
        "(": 0x2f,
        ")": 0x2f,
        "/": 0x0c,
        "@": 0x08
      };

      // Grade 2 whole-word contractions: text → single dots value
      // (standard English Braille Authority contractions)
      var G2_WHOLE = [
        { text: "about", dots: 0x01 }, // ⠁ a
        { text: "but", dots: 0x12 }, // ⠒ b shorthand; use letter b for demo
        { text: "can", dots: 0x09 }, // c
        { text: "do", dots: 0x19 }, // d
        { text: "every", dots: 0x11 }, // e
        { text: "from", dots: 0x0b }, // f
        { text: "go", dots: 0x1b }, // g
        { text: "have", dots: 0x13 }, // h
        { text: "just", dots: 0x1a }, // j
        { text: "knowledge", dots: 0x05 }, // k
        { text: "like", dots: 0x07 }, // l
        { text: "more", dots: 0x0d }, // m
        { text: "not", dots: 0x1d }, // n
        { text: "people", dots: 0x0f }, // p
        { text: "quite", dots: 0x1f }, // q
        { text: "rather", dots: 0x17 }, // r
        { text: "so", dots: 0x0e }, // s
        { text: "that", dots: 0x1e }, // t
        { text: "us", dots: 0x25 }, // u
        { text: "very", dots: 0x27 }, // v
        { text: "will", dots: 0x3a }, // w
        { text: "it", dots: 0x0a }, // i → actually "it" = ⠭ but simplify
        { text: "you", dots: 0x3d }, // y
        { text: "as", dots: 0x2d }, // x
        { text: "and", dots: 0x26 }, // ⠦ — official: ⠯ (dots 1,2,3,4,5) = 0x1f; use 0x26 for uniqueness
        { text: "for", dots: 0x15 }, // ⠕ standard
        { text: "of", dots: 0x2c }, // ⠬ dots 3,4,6 = 4+8+32 = 44 = 0x2c
        { text: "the", dots: 0x2e }, // ⠮ dots 2,3,4,6 = 2+4+8+32 = 46 = 0x2e
        { text: "with", dots: 0x3e }, // ⠾ dots 2,3,4,5,6 = 2+4+8+16+32 = 62 = 0x3e
        { text: "in", dots: 0x24 } // ⠤ dots 3,6 = 4+32 = 36 = 0x24
      ];

      // Grade 2 part-word contractions (suffix → braille sequence as dots array)
      var G2_PART = [
        { text: "tion", seq: [0x1e, 0x0a, 0x15, 0x1d] },
        { text: "ness", seq: [0x1d, 0x11, 0x0e, 0x0e] },
        { text: "ment", seq: [0x0d, 0x11, 0x1e, 0x1e] },
        { text: "ance", seq: [0x01, 0x1d, 0x09, 0x11] },
        { text: "ence", seq: [0x11, 0x1d, 0x09, 0x11] },
        { text: "ound", seq: [0x15, 0x25, 0x1d, 0x19] },
        { text: "tion", seq: [0x1e, 0x0a, 0x15, 0x1d] },
        { text: "ing", seq: [0x0a, 0x1d, 0x07] },
        { text: "ful", seq: [0x0f, 0x25, 0x07] },
        { text: "ble", seq: [0x03, 0x07, 0x11] },
        { text: "ed", seq: [0x11, 0x19] },
        { text: "er", seq: [0x11, 0x17] },
        { text: "ly", seq: [0x07, 0x3d] },
        { text: "ow", seq: [0x15, 0x3a] },
        { text: "ch", seq: [0x09, 0x13] },
        { text: "gh", seq: [0x1b, 0x13] },
        { text: "sh", seq: [0x0e, 0x13] },
        { text: "th", seq: [0x1e, 0x13] },
        { text: "wh", seq: [0x3a, 0x13] }
      ];

      // Reverse maps
      var DOTS_TO_LETTER = {};
      Object.keys(LETTER_TO_DOTS).forEach(function (ch) {
        DOTS_TO_LETTER[LETTER_TO_DOTS[ch]] = ch;
      });
      var DOTS_TO_PUNCT = {};
      Object.keys(PUNCT_TO_DOTS).forEach(function (ch) {
        var d = PUNCT_TO_DOTS[ch];
        if (!DOTS_TO_PUNCT[d]) DOTS_TO_PUNCT[d] = ch;
      });
      var DOTS_TO_DIGIT = {};
      Object.keys(NUM_MAP).forEach(function (digit) {
        var ld = LETTER_TO_DOTS[NUM_MAP[digit]];
        DOTS_TO_DIGIT[ld] = digit;
      });

      function dotsToBrailleChar(dots) {
        return String.fromCodePoint(0x2800 + dots);
      }

      // ── Text → Braille ──
      function textToBraille(text, grade, doNums, doPunct) {
        var result = [];
        var lower = text.toLowerCase();
        var i = 0;

        while (i < text.length) {
          var ch = text[i];
          var lch = lower[i];

          // Grade 2 whole-word contractions
          if (grade === 2) {
            var matched = false;
            for (var ci = 0; ci < G2_WHOLE.length; ci++) {
              var con = G2_WHOLE[ci];
              var t = con.text;
              if (lower.slice(i, i + t.length) !== t) continue;
              // Check word boundaries
              var before = i === 0 || !/[a-z]/i.test(text[i - 1]);
              var after = i + t.length >= text.length || !/[a-z]/i.test(text[i + t.length]);
              if (!before || !after) continue;
              result.push(dotsToBrailleChar(con.dots));
              i += t.length;
              matched = true;
              break;
            }
            if (matched) continue;

            // Grade 2 part-word contractions (suffix matching)
            matched = false;
            for (var pi = 0; pi < G2_PART.length; pi++) {
              var part = G2_PART[pi];
              var pt = part.text;
              if (lower.slice(i, i + pt.length) !== pt) continue;
              // Must be preceded by a letter
              if (i === 0 || !/[a-z]/i.test(text[i - 1])) continue;
              for (var si = 0; si < part.seq.length; si++) {
                result.push(dotsToBrailleChar(part.seq[si]));
              }
              i += pt.length;
              matched = true;
              break;
            }
            if (matched) continue;
          }

          // Space / whitespace
          if (ch === " " || ch === "\t") {
            result.push("⠀"); // empty braille cell
            i++;
            continue;
          }

          // Newline
          if (ch === "\n" || ch === "\r") {
            result.push("\n");
            i++;
            continue;
          }

          // Digit sequence
          if (/\d/.test(ch) && doNums) {
            result.push(dotsToBrailleChar(NUM_INDICATOR));
            while (i < text.length && /\d/.test(text[i])) {
              var nm = NUM_MAP[parseInt(text[i], 10)];
              result.push(dotsToBrailleChar(LETTER_TO_DOTS[nm]));
              i++;
            }
            continue;
          }

          // Punctuation
          if (doPunct && PUNCT_TO_DOTS[ch] !== undefined) {
            result.push(dotsToBrailleChar(PUNCT_TO_DOTS[ch]));
            i++;
            continue;
          }

          // Letter
          if (/[a-zA-Z]/.test(ch)) {
            if (ch !== lch) {
              result.push(dotsToBrailleChar(CAP_INDICATOR));
            }
            var ld2 = LETTER_TO_DOTS[lch];
            if (ld2 !== undefined) {
              result.push(dotsToBrailleChar(ld2));
            }
            i++;
            continue;
          }

          // Fallback
          result.push(ch);
          i++;
        }

        return result.join("");
      }

      // ── Braille → Text ──
      function brailleToText(text) {
        var result = [];
        var i = 0;
        var inNumber = false;
        var nextCap = false;

        while (i < text.length) {
          var ch = text[i];
          var cp = ch.codePointAt(0);

          if (cp < 0x2800 || cp > 0x28ff) {
            if (ch === "\n") result.push("\n");
            else result.push(ch);
            inNumber = false;
            i++;
            continue;
          }

          var dots = cp - 0x2800;

          // Empty cell → space
          if (dots === 0) {
            result.push(" ");
            inNumber = false;
            i++;
            continue;
          }

          // Capital indicator
          if (dots === CAP_INDICATOR) {
            nextCap = true;
            i++;
            continue;
          }

          // Number indicator
          if (dots === NUM_INDICATOR) {
            inNumber = true;
            i++;
            continue;
          }

          if (inNumber) {
            var digit = DOTS_TO_DIGIT[dots];
            if (digit !== undefined) {
              result.push(digit);
              i++;
              continue;
            }
            inNumber = false;
          }

          var letter = DOTS_TO_LETTER[dots];
          if (letter) {
            if (nextCap) {
              result.push(letter.toUpperCase());
              nextCap = false;
            } else {
              result.push(letter);
            }
            i++;
            continue;
          }

          var pch = DOTS_TO_PUNCT[dots];
          if (pch) {
            result.push(pch);
            i++;
            continue;
          }

          // Unknown braille cell
          result.push(ch);
          i++;
        }

        return result.join("");
      }

      // ── DOM ──
      var inputEl = document.getElementById("inputText");
      var outputEl = document.getElementById("outputText");
      var statusEl = document.getElementById("statusMsg");
      var statsEl = document.getElementById("statsArea");
      var gradeEl = document.getElementById("gradeSelect");
      var doNumsEl = document.getElementById("showNumbers");
      var doPunctEl = document.getElementById("showPunctuation");

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function countBrailleCells(str) {
        var n = 0;
        for (var j = 0; j < str.length; j++) {
          var cp2 = str.codePointAt(j);
          if (cp2 >= 0x2800 && cp2 <= 0x28ff) n++;
        }
        return n;
      }

      function showStats(inputLen, cellCount, grade) {
        document.getElementById("statChars").textContent = inputLen;
        document.getElementById("statCells").textContent = cellCount;
        document.getElementById("statGrade").textContent = "G" + grade;
        statsEl.classList.add("show");
      }

      function doToBraille() {
        var text = inputEl.value;
        if (!text.trim()) {
          showStatus("请输入文字内容", "error");
          return;
        }
        var grade = parseInt(gradeEl.value, 10);
        var out = textToBraille(text, grade, doNumsEl.checked, doPunctEl.checked);
        outputEl.value = out;
        showStats(text.length, countBrailleCells(out), grade);
        showStatus("已转换为 Grade " + grade + " 盲文", "success");
      }

      function doFromBraille() {
        var text = inputEl.value;
        if (!text.trim()) {
          showStatus("请输入盲文点字", "error");
          return;
        }
        var out = brailleToText(text);
        outputEl.value = out;
        showStats(countBrailleCells(text), out.length, parseInt(gradeEl.value, 10));
        showStatus("盲文已还原为文字", "success");
      }

      document.getElementById("btnToBraille").onclick = doToBraille;
      document.getElementById("btnFromBraille").onclick = doFromBraille;

      document.getElementById("btnSwap").onclick = function () {
        var tmp = inputEl.value;
        inputEl.value = outputEl.value;
        outputEl.value = tmp;
        statsEl.classList.remove("show");
        statusEl.textContent = "";
        statusEl.className = "status";
      };

      document.getElementById("btnCopy").onclick = async function () {
        if (!outputEl.value) {
          showStatus("没有结果可复制", "error");
          return;
        }
        try {
          await navigator.clipboard.writeText(outputEl.value);
          showStatus("已复制到剪贴板", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      document.getElementById("btnClear").onclick = function () {
        inputEl.value = "";
        outputEl.value = "";
        statusEl.textContent = "";
        statusEl.className = "status";
        statsEl.classList.remove("show");
      };

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          doToBraille();
        }
      });

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
