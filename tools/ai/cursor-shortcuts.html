  <body>
    <div class="tool-main" role="main">
      <div class="container">
        <a href="../../index.html" class="back-link">← 返回</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

            <h1>⌨️ Cursor 快捷键速查</h1>
            <p class="subtitle">AI 编辑器快捷键大全，提升编程效率</p>
          </div>
          <div class="os-toggle">
            <button class="os-btn active" data-os="mac">macOS</button>
            <button class="os-btn" data-os="win">Windows</button>
          </div>
        </div>

        <div class="search-box">
          <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="search" class="search-input" placeholder="搜索快捷键..." id="searchInput" />
          </div>
        </div>

        <div id="shortcutsContainer"></div>

        <div class="tips-card">
          <div class="tips-title">💡 使用技巧</div>
          <div class="tips-list">
            <div class="tip-item">
              <span class="tip-icon">→</span>
              <span>
                <strong>Tab</strong>
                是最常用的 AI 补全键，写代码时随时按 Tab 接受建议
              </span>
            </div>
            <div class="tip-item">
              <span class="tip-icon">→</span>
              <span>
                <strong>Ctrl/Cmd + K</strong>
                选中代码后可以让 AI 直接修改
              </span>
            </div>
            <div class="tip-item">
              <span class="tip-icon">→</span>
              <span>
                <strong>Ctrl/Cmd + L</strong>
                打开 AI 对话，可以 @ 引用文件或代码
              </span>
            </div>
            <div class="tip-item">
              <span class="tip-icon">→</span>
              <span>
                <strong>Ctrl/Cmd + I</strong>
                Composer 可以同时编辑多个文件
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentOS = "mac";

      const shortcuts = [
        {
          category: "AI 功能",
          icon: "🤖",
          items: [
            {
              desc: "AI 代码补全 / 接受建议",
              mac: ["Tab"],
              win: ["Tab"],
              ai: true,
              highlight: true
            },
            { desc: "拒绝 AI 建议", mac: ["Esc"], win: ["Esc"], ai: true },
            { desc: "接受部分建议（逐词）", mac: ["⌘", "→"], win: ["Ctrl", "→"], ai: true },
            {
              desc: "打开 AI 对话面板",
              mac: ["⌘", "L"],
              win: ["Ctrl", "L"],
              ai: true,
              highlight: true
            },
            {
              desc: "内联编辑（选中代码后）",
              mac: ["⌘", "K"],
              win: ["Ctrl", "K"],
              ai: true,
              highlight: true
            },
            {
              desc: "打开 Composer（多文件编辑）",
              mac: ["⌘", "I"],
              win: ["Ctrl", "I"],
              ai: true,
              highlight: true
            },
            { desc: "在终端中使用 AI", mac: ["⌘", "K"], win: ["Ctrl", "K"], ai: true },
            { desc: "快速修复 / AI 建议", mac: ["⌘", "."], win: ["Ctrl", "."], ai: true },
            { desc: "切换 AI 模型", mac: ["⌘", "/"], win: ["Ctrl", "/"], ai: true }
          ]
        },
        {
          category: "基础编辑",
          icon: "✏️",
          items: [
            { desc: "保存文件", mac: ["⌘", "S"], win: ["Ctrl", "S"] },
            { desc: "撤销", mac: ["⌘", "Z"], win: ["Ctrl", "Z"] },
            { desc: "重做", mac: ["⌘", "⇧", "Z"], win: ["Ctrl", "Y"] },
            { desc: "剪切行", mac: ["⌘", "X"], win: ["Ctrl", "X"] },
            { desc: "复制行", mac: ["⌘", "C"], win: ["Ctrl", "C"] },
            { desc: "删除行", mac: ["⌘", "⇧", "K"], win: ["Ctrl", "Shift", "K"] },
            { desc: "向上/下移动行", mac: ["⌥", "↑/↓"], win: ["Alt", "↑/↓"] },
            { desc: "向上/下复制行", mac: ["⌥", "⇧", "↑/↓"], win: ["Alt", "Shift", "↑/↓"] },
            { desc: "添加行注释", mac: ["⌘", "/"], win: ["Ctrl", "/"] },
            { desc: "添加块注释", mac: ["⌥", "⇧", "A"], win: ["Alt", "Shift", "A"] },
            { desc: "格式化文档", mac: ["⌥", "⇧", "F"], win: ["Alt", "Shift", "F"] },
            { desc: "格式化选中代码", mac: ["⌘", "K", "⌘", "F"], win: ["Ctrl", "K", "Ctrl", "F"] }
          ]
        },
        {
          category: "多光标与选择",
          icon: "🎯",
          items: [
            { desc: "添加光标（点击位置）", mac: ["⌥", "Click"], win: ["Alt", "Click"] },
            { desc: "在上/下方添加光标", mac: ["⌥", "⌘", "↑/↓"], win: ["Ctrl", "Alt", "↑/↓"] },
            { desc: "选中所有相同词", mac: ["⌘", "⇧", "L"], win: ["Ctrl", "Shift", "L"] },
            { desc: "选中下一个相同词", mac: ["⌘", "D"], win: ["Ctrl", "D"] },
            { desc: "扩展选择", mac: ["⌥", "⇧", "→"], win: ["Alt", "Shift", "→"] },
            { desc: "收缩选择", mac: ["⌥", "⇧", "←"], win: ["Alt", "Shift", "←"] },
            { desc: "选中当前行", mac: ["⌘", "L"], win: ["Ctrl", "L"] },
            { desc: "选中到行首/尾", mac: ["⌘", "⇧", "←/→"], win: ["Home/End", "Shift"] }
          ]
        },
        {
          category: "导航与搜索",
          icon: "🔍",
          items: [
            { desc: "快速打开文件", mac: ["⌘", "P"], win: ["Ctrl", "P"], highlight: true },
            {
              desc: "命令面板",
              mac: ["⌘", "⇧", "P"],
              win: ["Ctrl", "Shift", "P"],
              highlight: true
            },
            { desc: "全局搜索", mac: ["⌘", "⇧", "F"], win: ["Ctrl", "Shift", "F"] },
            { desc: "当前文件搜索", mac: ["⌘", "F"], win: ["Ctrl", "F"] },
            { desc: "搜索并替换", mac: ["⌘", "H"], win: ["Ctrl", "H"] },
            { desc: "跳转到行", mac: ["⌘", "G"], win: ["Ctrl", "G"] },
            { desc: "跳转到定义", mac: ["F12"], win: ["F12"] },
            { desc: "查看定义（悬浮）", mac: ["⌥", "F12"], win: ["Alt", "F12"] },
            { desc: "查找所有引用", mac: ["⇧", "F12"], win: ["Shift", "F12"] },
            { desc: "跳转到符号", mac: ["⌘", "⇧", "O"], win: ["Ctrl", "Shift", "O"] },
            { desc: "后退/前进", mac: ["⌃", "-/+"], win: ["Alt", "←/→"] }
          ]
        },
        {
          category: "视图与面板",
          icon: "🪟",
          items: [
            { desc: "切换侧边栏", mac: ["⌘", "B"], win: ["Ctrl", "B"] },
            { desc: "切换终端", mac: ["⌃", "`"], win: ["Ctrl", "`"] },
            { desc: "切换问题面板", mac: ["⌘", "⇧", "M"], win: ["Ctrl", "Shift", "M"] },
            { desc: "切换输出面板", mac: ["⌘", "⇧", "U"], win: ["Ctrl", "Shift", "U"] },
            { desc: "新建终端", mac: ["⌃", "⇧", "`"], win: ["Ctrl", "Shift", "`"] },
            { desc: "拆分编辑器", mac: ["⌘", "\\"], win: ["Ctrl", "\\"] },
            { desc: "切换编辑器组", mac: ["⌘", "1/2/3"], win: ["Ctrl", "1/2/3"] },
            { desc: "关闭当前标签", mac: ["⌘", "W"], win: ["Ctrl", "W"] },
            { desc: "重新打开关闭的标签", mac: ["⌘", "⇧", "T"], win: ["Ctrl", "Shift", "T"] },
            { desc: "放大/缩小", mac: ["⌘", "+/-"], win: ["Ctrl", "+/-"] }
          ]
        },
        {
          category: "Git 集成",
          icon: "📦",
          items: [
            { desc: "打开 Source Control", mac: ["⌃", "⇧", "G"], win: ["Ctrl", "Shift", "G"] },
            { desc: "查看文件更改", mac: ["⌘", "K", "D"], win: ["Ctrl", "K", "D"] },
            { desc: "暂存所有更改", mac: ["⌘", "K", "⌘", "S"], win: ["Ctrl", "K", "Ctrl", "S"] }
          ]
        }
      ];

      function init() {
        renderShortcuts();
        setupOSToggle();
        setupSearch();
        loadTheme();
      }

      function renderShortcuts(filter = "") {
        const container = document.getElementById("shortcutsContainer");
        const filterLower = filter.toLowerCase();

        container.innerHTML = shortcuts
          .map((cat) => {
            const filteredItems = cat.items.filter(
              (item) => !filter || item.desc.toLowerCase().includes(filterLower)
            );

            if (filteredItems.length === 0) return "";

            return `
          <div class="category">
            <div class="category-title">
              <span class="category-icon">${cat.icon}</span>
              ${cat.category}
            </div>
            <div class="shortcuts-grid">
              ${filteredItems.map((item) => renderShortcutItem(item)).join("")}
            </div>
          </div>
        `;
          })
          .join("");
      }

      function renderShortcutItem(item) {
        const keys = currentOS === "mac" ? item.mac : item.win;
        return `
        <div class="shortcut-item ${item.highlight ? "highlight" : ""}">
          <span class="shortcut-desc">
            ${item.desc}
            ${item.ai ? '<span class="ai-badge">✨ AI</span>' : ""}
          </span>
          <div class="shortcut-keys">
            ${keys
              .map(
                (key, i) => `
              <span class="key ${item.ai && i === keys.length - 1 ? "special" : ""}">${key}</span>
              ${i < keys.length - 1 ? '<span class="key-plus">+</span>' : ""}
            `
              )
              .join("")}
          </div>
        </div>
      `;
      }

      function setupOSToggle() {
        document.querySelectorAll(".os-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".os-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentOS = btn.dataset.os;
            renderShortcuts(document.getElementById("searchInput").value);
          });
        });
      }

      function setupSearch() {
        const input = document.getElementById("searchInput");
        input.addEventListener("input", (e) => {
          renderShortcuts(e.target.value);
        });
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") !== "light";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        document.querySelector(".theme-toggle").textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("theme", isDark ? "light" : "dark");
      };

      function loadTheme() {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          document.querySelector(".theme-toggle").textContent = "☀️";
        }
      }

      init();
    </script>

    <script src="../../assets/js/tool-chrome.js"></script>
