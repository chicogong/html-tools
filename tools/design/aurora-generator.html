    <style>
      .layout-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 32px;
        min-height: calc(100vh - 120px);
      }

      /* ==================== 极光预览区 ==================== */
      .preview-section {
        position: relative;
        border-radius: var(--radius-xl);
        overflow: hidden;
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow-lg);
        display: flex;
        flex-direction: column;
        background: #000; /* Dark canvas default */
      }
      
      .preview-header {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 8px 16px;
        border-radius: var(--radius-full);
        color: #fff;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* 极光 DOM 结构 */
      .aurora-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .aurora-blob {
        position: absolute;
        filter: blur(60px);
        opacity: 0.8;
        border-radius: 50%;
        animation-name: float;
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
        animation-direction: alternate;
      }

      .blob-1 { top: -10%; left: -10%; width: 50%; height: 50%; animation-duration: 10s; }
      .blob-2 { top: 40%; left: -20%; width: 60%; height: 60%; animation-duration: 14s; animation-delay: -2s; }
      .blob-3 { top: -20%; right: -10%; width: 55%; height: 55%; animation-duration: 12s; animation-delay: -5s; }
      .blob-4 { bottom: -20%; right: -20%; width: 65%; height: 65%; animation-duration: 16s; animation-delay: -8s; }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
      }

      /* ==================== 玻璃拟态中心卡片演示 ==================== */
      .glass-card {
        position: relative;
        z-index: 2;
        margin: auto;
        padding: 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        color: #fff;
        text-align: center;
        max-width: 400px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
        animation: card-float 6s ease-in-out infinite alternate;
      }
      
      .glass-card h2 { margin: 0 0 16px 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
      .glass-card p { margin: 0; font-size: 15px; color: rgba(255, 255, 255, 0.7); line-height: 1.6; }

      @keyframes card-float {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-10px); }
      }

      /* ==================== 控制面板区 ==================== */
      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .control-card {
        padding: 24px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
      }

      .control-group { margin-bottom: 20px; }
      .control-group:last-child { margin-bottom: 0; }

      .color-pickers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .color-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .color-picker-ui {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        width: 100%;
        height: 48px;
        padding: 4px;
        background: var(--bg-input);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: border-color var(--transition-fast);
      }
      .color-picker-ui:hover { border-color: var(--accent-cyan); }
      .color-picker-ui::-webkit-color-swatch-wrapper { padding: 0; }
      .color-picker-ui::-webkit-color-swatch { border: none; border-radius: 4px; }

      .range-slider {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        background: var(--bg-input);
        border-radius: 3px;
        outline: none;
        margin-top: 8px;
      }
      .range-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent-cyan);
        cursor: pointer;
        border: 2px solid var(--bg-card);
        box-shadow: 0 0 0 1px var(--border-subtle), var(--shadow-sm);
        transition: transform var(--transition-fast);
      }
      .range-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

      .code-output {
        margin-top: 16px;
        position: relative;
      }
      
      .code-output pre {
        background: var(--bg-input);
        padding: 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-strong);
        overflow-x: auto;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-primary);
        line-height: 1.5;
        margin: 0;
        max-height: 250px;
      }

      .copy-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        background: var(--bg-card);
        border: 1px solid var(--border-strong);
        color: var(--text-primary);
        padding: 6px 12px;
        font-size: 12px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
      }
      .copy-btn:hover {
        background: var(--accent-cyan);
        color: #000;
        border-color: var(--accent-cyan);
      }

      .value-display {
        float: right;
        font-family: var(--font-mono);
        color: var(--accent-cyan);
        font-size: 13px;
      }

      /* 响应式 */
      @media (max-width: 900px) {
        .layout-container {
          grid-template-columns: 1fr;
        }
        .preview-section {
          min-height: 400px;
        }
      }

  <body>
    <!-- 页头/面包屑通常由外部嵌入或隐藏，零构建直接呈现核心内容 -->

    <main class="layout-container">
      <!-- 左侧预览区 -->
      <section class="preview-section" id="preview-bg">
        <div class="preview-header">Live Preview</div>
        <div class="aurora-container" id="aurora-container">
          <div class="aurora-blob blob-1" id="blob-1"></div>
          <div class="aurora-blob blob-2" id="blob-2"></div>
          <div class="aurora-blob blob-3" id="blob-3"></div>
          <div class="aurora-blob blob-4" id="blob-4"></div>
        </div>
        
        <div class="glass-card">
          <h2>Aurora Aurora </h2>
          <p>Beautiful, fluid, organic mesh gradients powered entirely by CSS keyframes and filters.</p>
        </div>
      </section>

      <!-- 右侧控制面板 -->
      <section class="control-panel">
        <div class="control-card">
          <div class="control-group">
            <label class="tb-label">Color Palette</label>
            <div class="color-pickers">
              <div class="color-item">
                <input type="color" id="color-1" class="color-picker-ui" value="#00f5d4" />
              </div>
              <div class="color-item">
                <input type="color" id="color-2" class="color-picker-ui" value="#9b5de5" />
              </div>
              <div class="color-item">
                <input type="color" id="color-3" class="color-picker-ui" value="#f15bb5" />
              </div>
              <div class="color-item">
                <input type="color" id="color-4" class="color-picker-ui" value="#fee440" />
              </div>
            </div>
          </div>

          <div class="control-group" style="margin-top: 24px;">
            <label class="tb-label">Background Base <span id="val-bg" class="value-display">#0a0a0f</span></label>
            <input type="color" id="color-bg" class="color-picker-ui" value="#0a0a0f" style="height: 36px;" />
          </div>

          <div class="control-group">
            <label class="tb-label">Blur Radius <span id="val-blur" class="value-display">60px</span></label>
            <input type="range" id="blur-slider" class="range-slider" min="20" max="150" value="60" />
          </div>

          <div class="control-group">
            <label class="tb-label">Opacity <span id="val-opacity" class="value-display">0.8</span></label>
            <input type="range" id="opacity-slider" class="range-slider" min="0.1" max="1" step="0.05" value="0.8" />
          </div>

          <div class="control-group">
            <label class="tb-label">Animation Speed <span id="val-speed" class="value-display">1x</span></label>
            <input type="range" id="speed-slider" class="range-slider" min="0.1" max="3" step="0.1" value="1" />
          </div>
        </div>

        <div class="control-card">
          <label class="tb-label">Generated CSS</label>
          <div class="code-output">
            <button class="copy-btn" id="copy-btn">Copy CSS</button>
            <pre id="css-code">/* CSS Output */</pre>
          </div>
        </div>
      </section>
    </main>

    <script>
      // Elements
      const b1 = document.getElementById('blob-1');
      const b2 = document.getElementById('blob-2');
      const b3 = document.getElementById('blob-3');
      const b4 = document.getElementById('blob-4');
      const container = document.getElementById('aurora-container');
      const previewBg = document.getElementById('preview-bg');

      const inputs = {
        c1: document.getElementById('color-1'),
        c2: document.getElementById('color-2'),
        c3: document.getElementById('color-3'),
        c4: document.getElementById('color-4'),
        bg: document.getElementById('color-bg'),
        blur: document.getElementById('blur-slider'),
        opacity: document.getElementById('opacity-slider'),
        speed: document.getElementById('speed-slider')
      };

      const displays = {
        bg: document.getElementById('val-bg'),
        blur: document.getElementById('val-blur'),
        opacity: document.getElementById('val-opacity'),
        speed: document.getElementById('val-speed')
      };

      const cssOutput = document.getElementById('css-code');
      const copyBtn = document.getElementById('copy-btn');

      // Default animation durations (seconds)
      const baseDurations = [10, 14, 12, 16];

      function updateAurora() {
        const c1 = inputs.c1.value;
        const c2 = inputs.c2.value;
        const c3 = inputs.c3.value;
        const c4 = inputs.c4.value;
        const bg = inputs.bg.value;
        const blur = inputs.blur.value;
        const op = inputs.opacity.value;
        const speed = parseFloat(inputs.speed.value);

        // Update UI displays
        displays.bg.textContent = bg;
        displays.blur.textContent = blur + 'px';
        displays.opacity.textContent = op;
        displays.speed.textContent = speed + 'x';

        // Apply styles to preview
        previewBg.style.backgroundColor = bg;
        
        b1.style.backgroundColor = c1;
        b2.style.backgroundColor = c2;
        b3.style.backgroundColor = c3;
        b4.style.backgroundColor = c4;

        [b1, b2, b3, b4].forEach((b) => {
          b.style.filter = `blur(${blur}px)`;
          b.style.opacity = op;
        });

        if (speed === 0) {
          [b1, b2, b3, b4].forEach(b => b.style.animationPlayState = 'paused');
        } else {
          [b1, b2, b3, b4].forEach(b => b.style.animationPlayState = 'running');
          b1.style.animationDuration = `${baseDurations[0] / speed}s`;
          b2.style.animationDuration = `${baseDurations[1] / speed}s`;
          b3.style.animationDuration = `${baseDurations[2] / speed}s`;
          b4.style.animationDuration = `${baseDurations[3] / speed}s`;
        }

        generateCSS(c1, c2, c3, c4, bg, blur, op, speed);
      }

      function generateCSS(c1, c2, c3, c4, bg, blur, op, speed) {
        const dur1 = speed > 0 ? (baseDurations[0] / speed).toFixed(1) : 0;
        const dur2 = speed > 0 ? (baseDurations[1] / speed).toFixed(1) : 0;
        const dur3 = speed > 0 ? (baseDurations[2] / speed).toFixed(1) : 0;
        const dur4 = speed > 0 ? (baseDurations[3] / speed).toFixed(1) : 0;

        const code = `.aurora-wrapper {
  position: relative;
  width: 100%;
  height: 100vh;
  background-color: ${bg};
  overflow: hidden;
}

.aurora-blob {
  position: absolute;
  filter: blur(${blur}px);
  opacity: ${op};
  border-radius: 50%;
  animation: aurora-float infinite alternate ease-in-out;
}

.blob-1 {
  top: -10%; left: -10%; width: 50%; height: 50%;
  background-color: ${c1};
  animation-duration: ${dur1}s;
}
.blob-2 {
  top: 40%; left: -20%; width: 60%; height: 60%;
  background-color: ${c2};
  animation-duration: ${dur2}s;
  animation-delay: -2s;
}
.blob-3 {
  top: -20%; right: -10%; width: 55%; height: 55%;
  background-color: ${c3};
  animation-duration: ${dur3}s;
  animation-delay: -5s;
}
.blob-4 {
  bottom: -20%; right: -20%; width: 65%; height: 65%;
  background-color: ${c4};
  animation-duration: ${dur4}s;
  animation-delay: -8s;
}

@keyframes aurora-float {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -50px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.9); }
  100% { transform: translate(0, 0) scale(1); }
}`;
        cssOutput.textContent = code;
      }

      // Event Listeners
      Object.values(inputs).forEach(input => {
        input.addEventListener('input', updateAurora);
      });

      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(cssOutput.textContent).then(() => {
          const origText = copyBtn.textContent;
          copyBtn.textContent = 'Copied!';
          copyBtn.style.backgroundColor = 'var(--accent-green)';
          setTimeout(() => {
            copyBtn.textContent = origText;
            copyBtn.style.backgroundColor = '';
          }, 2000);
        });
      });

      // Initial render
      updateAurora();
    </script>
    
    <!-- 全局主题与悬浮球注入 -->
    <script>
      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      initTheme();
    </script>
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
