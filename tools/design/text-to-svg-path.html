    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select,
      .option-item input[type="number"],
      .option-item input[type="color"],
      .option-item input[type="text"] {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus,
      .option-item input[type="number"]:focus,
      .option-item input[type="text"]:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="number"] {
        width: 72px;
      }
      .option-item input[type="color"] {
        width: 42px;
        height: 32px;

    <script>
      /* global opentype */

      var uploadedFont = null;
      var lastSvgCode = "";

      var textInputEl = document.getElementById("textInput");
      var svgOutputEl = document.getElementById("svgOutput");
      var svgPreviewEl = document.getElementById("svgPreview");
      var statusEl = document.getElementById("status");
      var statsEl = document.getElementById("stats");
      var fontFileInputEl = document.getElementById("fontFileInput");
      var fontUploadLabelEl = document.getElementById("fontUploadLabel");
      var fontUploadTextEl = document.getElementById("fontUploadText");
      var charCountEl = document.getElementById("charCount");

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      function updateCharCount() {
        var text = textInputEl.value;
        charCountEl.textContent = text.length + " 字符";
      }

      function escapeXml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&apos;");
      }

      /**
       * Generate SVG using opentype.js when a font is uploaded.
       */
      function generateWithOpentype(text, fontSize, fillColor, strokeColor, strokeWidth, fillNone) {
        var font = uploadedFont;
        var x = 0;
        var y = fontSize;
        var pathData = font.getPath(text, x, y, fontSize);
        var bbox = pathData.getBoundingBox();

        var padX = strokeWidth + 4;
        var padY = strokeWidth + 4;
        var bboxW = bbox.x2 - bbox.x1;
        var bboxH = bbox.y2 - bbox.y1;
        var svgW = Math.ceil(bboxW > 0 ? bboxW + padX * 2 : fontSize * text.length);
        var svgH = Math.ceil(bboxH > 0 ? bboxH + padY * 2 : fontSize * 1.4);

        var dx = -bbox.x1 + padX;
        var dy = -bbox.y1 + padY;

        var adjusted = font.getPath(text, x + dx, y + dy, fontSize);
        var pathStr = adjusted.toPathData(2);

        var fill = fillNone ? "none" : fillColor;
        var stroke = strokeWidth > 0 ? strokeColor : "none";
        var swAttr = strokeWidth > 0 ? ' stroke-width="' + strokeWidth + '"' : "";

        var svg =
          '<svg xmlns="http://www.w3.org/2000/svg"' +
          ' width="' +
          svgW +
          '" height="' +
          svgH +
          '"' +
          ' viewBox="0 0 ' +
          svgW +
          " " +
          svgH +
          '">\n' +
          '  <path d="' +
          pathStr +
          '"' +
          ' fill="' +
          fill +
          '"' +
          ' stroke="' +
          stroke +
          '"' +
          swAttr +
          "/>\n" +
          "</svg>";

        return {
          svg: svg,
          pathCount: (pathStr.match(/[MmZz]/g) || []).length
        };
      }

      /**
       * Fallback: SVG with <text> element when no font is uploaded.
       */
      function generateFallbackSvg(text, fontSize, fillColor, strokeColor, strokeWidth, fillNone) {
        var canvas = document.createElement("canvas");
        var ctx = canvas.getContext("2d");
        ctx.font = fontSize + "px sans-serif";
        var metrics = ctx.measureText(text);

        var textW = Math.ceil(metrics.width) || fontSize * text.length * 0.6;
        var ascent = metrics.actualBoundingBoxAscent || fontSize * 0.8;
        var descent = metrics.actualBoundingBoxDescent || fontSize * 0.2;
        var textH = Math.ceil(ascent + descent);

        var pad = strokeWidth + 8;
        var svgW = textW + pad * 2;
        var svgH = textH + pad * 2;
        var baseY = pad + ascent;

        var fill = fillNone ? "none" : fillColor;
        var stroke = strokeWidth > 0 ? strokeColor : "none";
        var swAttr = strokeWidth > 0 ? ' stroke-width="' + strokeWidth + '"' : "";

        var svg =
          '<svg xmlns="http://www.w3.org/2000/svg"' +
          ' width="' +
          svgW +
          '" height="' +
          svgH +
          '"' +
          ' viewBox="0 0 ' +
          svgW +
          " " +
          svgH +
          '">\n' +
          "  <!-- NOTE: Upload a TTF/OTF font to generate true <path> outlines -->\n" +
          '  <text x="' +
          pad +
          '" y="' +
          baseY.toFixed(1) +
          '"' +
          ' font-family="sans-serif"' +
          ' font-size="' +
          fontSize +
          '"' +
          ' fill="' +
          fill +
          '"' +
          ' stroke="' +
          stroke +
          '"' +
          swAttr +
          ">" +
          escapeXml(text) +
          "</text>\n" +
          "</svg>";

        return { svg: svg, pathCount: 0 };
      }

      function doConvert() {
        var text = textInputEl.value;
        if (!text.trim()) {
          showStatus("请先输入文字", "error");
          return;
        }

        var fontSize = parseInt(document.getElementById("fontSize").value, 10) || 72;
        var fillColor = document.getElementById("fillColor").value;
        var strokeColor = document.getElementById("strokeColor").value;
        var strokeWidth = parseFloat(document.getElementById("strokeWidth").value) || 0;
        var fillNone = document.getElementById("fillNone").checked;

        var result;
        var modeText;

        if (uploadedFont) {
          try {
            result = generateWithOpentype(
              text,
              fontSize,
              fillColor,
              strokeColor,
              strokeWidth,
              fillNone
            );
            modeText = "路径模式（TTF 字体）";
          } catch (err) {
            showStatus("路径生成失败: " + err.message, "error");
            return;
          }
        } else {
          result = generateFallbackSvg(
            text,
            fontSize,
            fillColor,
            strokeColor,
            strokeWidth,
            fillNone
          );
          modeText = "文本模式（上传 TTF 获取真实路径）";
        }

        lastSvgCode = result.svg;
        svgOutputEl.value = result.svg;
        svgPreviewEl.innerHTML = result.svg;
        document.getElementById("previewMode").textContent = modeText;

        document.getElementById("statChars").textContent = text.length;
        document.getElementById("statPaths").textContent = result.pathCount;
        document.getElementById("statSize").textContent = formatBytes(new Blob([result.svg]).size);
        statsEl.classList.add("show");

        if (uploadedFont) {
          showStatus("SVG 路径生成成功", "success");
        } else {
          showStatus("已生成 SVG（上传 TTF 字体可获得真实轮廓路径）", "");
        }
      }

      fontFileInputEl.addEventListener("change", function () {
        var file = fontFileInputEl.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            var buffer = e.target.result;
            uploadedFont = opentype.parse(buffer);
            fontUploadTextEl.textContent = file.name;
            fontUploadLabelEl.classList.add("has-font");
            showStatus("字体已加载：" + file.name, "success");
          } catch (err) {
            uploadedFont = null;
            fontUploadLabelEl.classList.remove("has-font");
            fontUploadTextEl.textContent = "上传 TTF/OTF 字体";
            showStatus("字体加载失败：" + err.message, "error");
          }
        };
        reader.readAsArrayBuffer(file);
      });

      document.getElementById("btnConvert").onclick = doConvert;

      document.getElementById("btnCopySvg").onclick = async function () {
        if (!lastSvgCode) {
          showStatus("请先生成 SVG", "error");
          return;
        }
        try {
          await navigator.clipboard.writeText(lastSvgCode);
          showStatus("SVG 代码已复制", "success");
        } catch (e) {
          showStatus("复制失败，请手动复制", "error");
        }
      };

      document.getElementById("btnDownload").onclick = function () {
        if (!lastSvgCode) {
          showStatus("请先生成 SVG", "error");
          return;
        }
        var blob = new Blob([lastSvgCode], { type: "image/svg+xml" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        var rawText = textInputEl.value.trim().slice(0, 20).replace(/\s+/g, "_") || "text";
        a.download = rawText + ".svg";
        a.click();
        URL.revokeObjectURL(url);
        showStatus("已下载 " + a.download, "success");
      };

      document.getElementById("btnClear").onclick = function () {
        textInputEl.value = "";
        svgOutputEl.value = "";
        svgPreviewEl.innerHTML =
          '<div class="svg-preview-placeholder">输入文字后点击「生成路径」预览</div>';
        lastSvgCode = "";
        statsEl.classList.remove("show");
        statusEl.textContent = "";
        statusEl.className = "status";
        charCountEl.textContent = "";
        document.getElementById("previewMode").textContent = "";
      };

      textInputEl.addEventListener("input", updateCharCount);

      function autoConvertIfReady() {
        if (textInputEl.value.trim() && lastSvgCode) doConvert();
      }
      document.getElementById("fontSize").addEventListener("change", autoConvertIfReady);
      document.getElementById("fillColor").addEventListener("input", autoConvertIfReady);
      document.getElementById("strokeColor").addEventListener("input", autoConvertIfReady);
      document.getElementById("strokeWidth").addEventListener("change", autoConvertIfReady);
      document.getElementById("fillNone").addEventListener("change", autoConvertIfReady);

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          doConvert();
        }
      });

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
