                </div>
                <div class="form-group">
                  <label for="contractDate">签订日期</label>
                  <input type="date" id="contractDate">
                </div>
                <div class="form-group">
                  <label for="partyA">甲方名称</label>
                  <input type="text" id="partyA" placeholder="甲方公司/个人名称">
                </div>
                <div class="form-group">
                  <label for="partyB">乙方名称</label>
                  <input type="text" id="partyB" placeholder="乙方公司/个人名称">
                </div>
              </div>
            </div>

            <div class="form-section">
              <h3>合同期限</h3>
              <div class="form-grid">
                <div class="form-group">
                  <label for="startDate">开始日期</label>
                  <input type="date" id="startDate">
                </div>
                <div class="form-group">
                  <label for="endDate">结束日期</label>
                  <input type="date" id="endDate">
                </div>
              </div>
            </div>

            <div class="form-section">
              <h3>金额与付款</h3>
              <div class="form-grid">
                <div class="form-group">
                  <label for="amount">金额 (元)</label>
                  <input type="number" id="amount" placeholder="10000">
                </div>
                <div class="form-group">
                  <label for="paymentMethod">付款方式</label>
                  <select id="paymentMethod">
                    <option value="一次性付清">一次性付清</option>
                    <option value="分期付款">分期付款</option>
                    <option value="按月支付">按月支付</option>
                    <option value="按季度支付">按季度支付</option>
                    <option value="完工后支付">完工后支付</option>
                  </select>
                </div>
              </div>
            </div>

            <div id="serviceFields" class="template-fields active">
              <div class="form-section">
                <h3>服务内容</h3>
                <div class="form-grid">
                  <div class="form-group full">
                    <label for="serviceScope">服务范围</label>
                    <textarea id="serviceScope" placeholder="详细描述服务内容、交付标准等..."></textarea>
                  </div>
                  <div class="form-group full">
                    <label for="serviceLocation">服务地点</label>
                    <input type="text" id="serviceLocation" placeholder="服务执行地点">
                  </div>
                </div>
              </div>
            </div>

            <div id="employmentFields" class="template-fields">
              <div class="form-section">
                <h3>岗位信息</h3>
                <div class="form-grid">
                  <div class="form-group">
                    <label for="position">岗位名称</label>
                    <input type="text" id="position" placeholder="如：软件工程师">
                  </div>
                  <div class="form-group">
                    <label for="department">所属部门</label>
                    <input type="text" id="department" placeholder="如：技术部">
                  </div>
                  <div class="form-group full">
                    <label for="jobDuties">工作职责</label>
                    <textarea id="jobDuties" placeholder="详细描述工作职责和要求..."></textarea>
                  </div>
                  <div class="form-group">
                    <label for="workLocation">工作地点</label>
                    <input type="text" id="workLocation" placeholder="工作地点">
                  </div>
                  <div class="form-group">
                    <label for="probation">试用期 (月)</label>
                    <input type="number" id="probation" placeholder="3" min="0" max="6">
                  </div>
                </div>
              </div>
            </div>

            <div id="rentalFields" class="template-fields">
              <div class="form-section">
                <h3>租赁物信息</h3>
                <div class="form-grid">
                  <div class="form-group full">
                    <label for="rentalItem">租赁物描述</label>
                    <textarea id="rentalItem" placeholder="详细描述租赁物品、房屋地址、面积等..."></textarea>
                  </div>
                  <div class="form-group">
                    <label for="deposit">押金 (元)</label>
                    <input type="number" id="deposit" placeholder="5000">
                  </div>
                  <div class="form-group">
                    <label for="rentalUse">使用用途</label>
                    <select id="rentalUse">
                      <option value="居住">居住</option>
                      <option value="办公">办公</option>
                      <option value="商业经营">商业经营</option>
                      <option value="仓储">仓储</option>
                      <option value="其他">其他</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-section">
              <h3>附加条款 (可选)</h3>
              <div class="form-grid">
                <div class="form-group full">
                  <label for="extraTerms">其他约定</label>
                  <textarea id="extraTerms" placeholder="添加其他特殊约定条款..."></textarea>
                </div>
              </div>
            </div>
          </div>

          <div class="panel preview-panel">
            <div class="panel-header"><span class="panel-label">合同预览</span></div>
            <div id="contractPreview" class="contract-preview"></div>
          </div>
        </div>
        <div class="status-bar">
          <div id="status" class="status"></div>
        </div>
      </div>
