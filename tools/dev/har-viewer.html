    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {
        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";
      }
      .stats {
        display: none;
        gap: var(--space-6);
        flex-wrap: wrap;
      }
      .stats.show {
        display: flex;
      }
      .stat-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-accent-primary);
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .footer {
        text-align: center;
        margin-top: var(--space-5);
        padding-top: var(--space-4);
      }
      .footer p {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        flex-wrap: wrap;
      }
      .footer a {
        color: var(--color-accent-primary);
        text-decoration: none;

      dropZone.addEventListener("click", function () {
        fileInput.click();

      dropZone.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropZone.classList.add("drag-over");

      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("drag-over");
      });
      dropZone.addEventListener("drop", function (e) {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        var files = e.dataTransfer.files;
        if (files.length > 0) loadFile(files[0]);
      });
      fileInput.addEventListener("change", function () {
        if (fileInput.files.length > 0) loadFile(fileInput.files[0]);
      });

      function loadFile(file) {
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            var parsed = JSON.parse(e.target.result);
            harData = parsed;
            processHar(parsed);
          } catch (err) {
            alert("无法解析 HAR 文件：" + err.message);
          }
        };
        reader.readAsText(file);
      }

      function processHar(har) {
        var log = har.log;
        if (!log || !log.entries) {
          alert("不是有效的 HAR 文件（缺少 log.entries）");
          return;
        }
        allEntries = log.entries;
        computeTimeline();
        updateSummary();
        dropZone.style.display = "none";
        harContent.classList.add("show");
        applyFilters();
      }

      function computeTimeline() {
        if (allEntries.length === 0) return;
        var startTimes = allEntries.map(function (e) {
          return new Date(e.startedDateTime).getTime();
        });
        var minStart = Math.min.apply(null, startTimes);
        var maxEnd = 0;
        allEntries.forEach(function (e) {
          var startMs = new Date(e.startedDateTime).getTime();
          var endMs = startMs + (e.time || 0);
          if (endMs > maxEnd) maxEnd = endMs;
          e._startOffset = startMs - minStart;
        });
        totalTimelineMs = maxEnd - minStart;
      }

      function formatSize(bytes) {
        if (!bytes || bytes < 0) return "—";
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      function formatTime(ms) {
        if (ms === undefined || ms === null || ms < 0) return "—";
        if (ms < 1000) return Math.round(ms) + "ms";
        return (ms / 1000).toFixed(2) + "s";
      }

      function updateSummary() {
        var totalTransfer = 0;
        var totalTime = 0;
        var errors = 0;
        var slow = 0;
        allEntries.forEach(function (e) {
          var body = (e.response && e.response.content && e.response.content.size) || 0;
          var hdr = (e.response && e.response.headersSize) || 0;
          totalTransfer += Math.max(body, 0) + Math.max(hdr, 0);
          totalTime += e.time || 0;
          var status = e.response && e.response.status;
          if (status >= 400 || status === 0) errors++;
          if ((e.time || 0) > 1000) slow++;
        });
        document.getElementById("sumRequests").textContent = allEntries.length;
        document.getElementById("sumDuration").textContent = formatTime(totalTimelineMs);
        document.getElementById("sumTransfer").textContent = formatSize(totalTransfer);
        document.getElementById("sumErrors").textContent = errors;
        document.getElementById("sumAvgTime").textContent =
          allEntries.length > 0 ? formatTime(totalTime / allEntries.length) : "—";
        document.getElementById("sumSlowReqs").textContent = slow;
      }

      function getEntryType(entry) {
        var mimeType =
          (entry.response && entry.response.content && entry.response.content.mimeType) || "";
        var resourceType = entry._resourceType || "";
        if (resourceType) {
          if (/xhr|fetch/.test(resourceType)) return "xhr";
          if (/document/.test(resourceType)) return "document";
          if (/script/.test(resourceType)) return "script";
          if (/stylesheet/.test(resourceType)) return "stylesheet";
          if (/image/.test(resourceType)) return "image";
          if (/font/.test(resourceType)) return "font";
        }
        if (/javascript/.test(mimeType)) return "script";
        if (/css/.test(mimeType)) return "stylesheet";
        if (/image/.test(mimeType)) return "image";
        if (/font/.test(mimeType)) return "font";
        if (/html/.test(mimeType)) return "document";
        if (/json|xml/.test(mimeType)) return "xhr";
        return "other";
      }

      function getHostname(url) {
        try {
          return new URL(url).hostname;
        } catch (e) {
          return url.split("/")[0] || url;
        }
      }

      function getPathname(url) {
        try {
          var u = new URL(url);
          return u.pathname + u.search;
        } catch (e) {
          return url;
        }
      }

      function applyFilters() {
        var query = filterInput.value.toLowerCase();
        filteredEntries = allEntries.filter(function (e) {
          var url = (e.request && e.request.url) || "";
          if (query && !url.toLowerCase().includes(query)) return false;
          if (activeTypeFilter !== "all" && getEntryType(e) !== activeTypeFilter) return false;
          return true;
        });
        renderWaterfall();
      }

      function renderWaterfall() {
        waterfallList.innerHTML = "";
        var frag = document.createDocumentFragment();
        filteredEntries.forEach(function (entry, idx) {
          var row = buildRow(entry, idx + 1);
          frag.appendChild(row);
        });
        waterfallList.appendChild(frag);
        document.getElementById("statVisible").textContent = filteredEntries.length;
        document.getElementById("statTotal").textContent = allEntries.length;
        statsEl.classList.add("show");
        showStatus(filteredEntries.length + " 条请求", "");
        selectedRow = null;
        detailPanel.classList.remove("show");
      }

      function buildRow(entry, num) {
        var url = (entry.request && entry.request.url) || "";
        var method = (entry.request && entry.request.method) || "GET";
        var status = (entry.response && entry.response.status) || 0;
        var size = (entry.response && entry.response.content && entry.response.content.size) || 0;
        var time = entry.time || 0;

        var row = document.createElement("div");
        row.className = "waterfall-row";

        var colNum = document.createElement("span");
        colNum.className = "wf-col";
        colNum.style.color = "var(--text-muted)";
        colNum.textContent = num;

        var colMethod = document.createElement("span");
        colMethod.className = "wf-col method " + getMethodClass(method);
        colMethod.textContent = method;

        var colHost = document.createElement("span");
        colHost.className = "wf-col";
        colHost.title = getHostname(url);
        colHost.textContent = getHostname(url);

        var colUrl = document.createElement("div");
        colUrl.className = "waterfall-bar-cell";
        colUrl.style.position = "relative";

        var urlText = document.createElement("span");
        urlText.className = "wf-col";
        urlText.style.cssText =
          "position:absolute;top:0;left:0;right:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:4px;font-size:0.75rem;";
        urlText.textContent = getPathname(url);
        urlText.title = url;

        var barWrapper = document.createElement("div");
        barWrapper.style.cssText =
          "position:absolute;bottom:0;left:0;right:0;height:8px;background:var(--color-bg-subtle);border-radius:4px;overflow:hidden;";

        if (totalTimelineMs > 0) {
          var bar = document.createElement("div");
          bar.className = "waterfall-bar" + (time > 3000 ? " slow" : time > 1000 ? " medium" : "");
          var leftPct = ((entry._startOffset || 0) / totalTimelineMs) * 100;
          var widthPct = (time / totalTimelineMs) * 100;
          bar.style.left = leftPct + "%";
          bar.style.width = Math.max(widthPct, 0.5) + "%";
          barWrapper.appendChild(bar);
        }

        colUrl.appendChild(urlText);
        colUrl.appendChild(barWrapper);

        var colStatus = document.createElement("span");
        colStatus.className = "wf-col status-badge " + getStatusClass(status);
        colStatus.textContent = status || "—";

        var colSize = document.createElement("span");
        colSize.className = "wf-col";
        colSize.textContent = formatSize(size);

        var colTime = document.createElement("span");
        colTime.className = "wf-col";
        colTime.style.color =
          time > 3000
            ? "var(--accent-red)"
            : time > 1000
              ? "var(--accent-yellow)"
              : "var(--color-text-secondary)";
        colTime.textContent = formatTime(time);

        row.appendChild(colNum);
        row.appendChild(colMethod);
        row.appendChild(colHost);
        row.appendChild(colUrl);
        row.appendChild(colStatus);
        row.appendChild(colSize);
        row.appendChild(colTime);

        row.addEventListener("click", function () {
          if (selectedRow) selectedRow.classList.remove("selected");
          row.classList.add("selected");
          selectedRow = row;
          showDetail(entry);
        });

        return row;
      }

      function getMethodClass(method) {
        var m = (method || "").toUpperCase();
        if (m === "GET") return "method-get";
        if (m === "POST") return "method-post";
        if (m === "PUT") return "method-put";
        if (m === "DELETE") return "method-delete";
        if (m === "PATCH") return "method-patch";
        return "method-other";
      }

      function getStatusClass(status) {
        if (status >= 200 && status < 300) return "status-2xx";
        if (status >= 300 && status < 400) return "status-3xx";
        if (status >= 400 && status < 500) return "status-4xx";
        if (status >= 500) return "status-5xx";
        return "status-other";
      }

      function showDetail(entry) {
        detailPanel.classList.add("show");

        var url = (entry.request && entry.request.url) || "";
        var method = (entry.request && entry.request.method) || "";
        var status = (entry.response && entry.response.status) || 0;
        var statusText = (entry.response && entry.response.statusText) || "";
        var size = (entry.response && entry.response.content && entry.response.content.size) || 0;
        var mimeType =
          (entry.response && entry.response.content && entry.response.content.mimeType) || "";

        var paneGeneral = document.getElementById("paneGeneral");
        paneGeneral.innerHTML = "";
        var generalGrid = document.createElement("div");
        generalGrid.className = "general-info";
        var generalItems = [
          ["URL", url],
          ["方法", method],
          ["状态", status + (statusText ? " " + statusText : "")],
          ["MIME 类型", mimeType || "—"],
          ["响应大小", formatSize(size)],
          ["耗时", formatTime(entry.time)],
          ["开始时间", entry.startedDateTime || "—"],
          ["启动偏移", formatTime(entry._startOffset)]
        ];
        generalItems.forEach(function (item) {
          var infoRow = document.createElement("div");
          infoRow.className = "info-row";
          var k = document.createElement("span");
          k.className = "info-key";
          k.textContent = item[0];
          var v = document.createElement("span");
          v.className = "info-val";
          v.textContent = item[1];
          infoRow.appendChild(k);
          infoRow.appendChild(v);
          generalGrid.appendChild(infoRow);
        });
        paneGeneral.appendChild(generalGrid);

        renderHeaderTable(
          document.getElementById("paneReqHeaders"),
          entry.request && entry.request.headers
        );
        renderHeaderTable(
          document.getElementById("paneResHeaders"),
          entry.response && entry.response.headers
        );
        renderTiming(document.getElementById("paneTiming"), entry.timings, entry.time);
        renderResponseBody(
          document.getElementById("paneResponse"),
          entry.response && entry.response.content
        );
      }

      function renderHeaderTable(container, headers) {
        container.innerHTML = "";
        if (!headers || headers.length === 0) {
          container.textContent = "无头信息";
          return;
        }
        var table = document.createElement("table");
        table.className = "header-table";
        headers.forEach(function (h) {
          var tr = document.createElement("tr");
          var td1 = document.createElement("td");
          td1.textContent = h.name;
          var td2 = document.createElement("td");
          td2.textContent = h.value;
          tr.appendChild(td1);
          tr.appendChild(td2);
          table.appendChild(tr);
        });
        container.appendChild(table);
      }

      function renderTiming(container, timings, total) {
        container.innerHTML = "";
        if (!timings) {
          container.textContent = "无耗时信息";
          return;
        }
        var timingColors = {
          blocked: "#8888a0",
          dns: "#4cc9f0",
          connect: "#fbbf24",
          ssl: "#f72585",
          send: "#10b981",
          wait: "#00f5d4",
          receive: "#7b2cbf"
        };
        var timingLabels = {
          blocked: "等待/阻塞",
          dns: "DNS 查询",
          connect: "TCP 连接",
          ssl: "TLS/SSL",
          send: "发送请求",
          wait: "等待响应 (TTFB)",
          receive: "接收数据"
        };
        var allTotal = total || 1;
        var barsDiv = document.createElement("div");
        barsDiv.className = "timing-bars";
        Object.keys(timingLabels).forEach(function (key) {
          var val = timings[key];
          if (val === undefined || val === null || val < 0) return;
          var rowDiv = document.createElement("div");
          rowDiv.className = "timing-row";
          var label = document.createElement("span");
          label.className = "timing-label";
          label.textContent = timingLabels[key];
          var track = document.createElement("div");
          track.className = "timing-track";
          var fill = document.createElement("div");
          fill.className = "timing-fill";
          fill.style.background = timingColors[key] || "#00f5d4";
          fill.style.width = Math.min((val / allTotal) * 100, 100) + "%";
          track.appendChild(fill);
          var valSpan = document.createElement("span");
          valSpan.className = "timing-value";
          valSpan.textContent = formatTime(val);
          rowDiv.appendChild(label);
          rowDiv.appendChild(track);
          rowDiv.appendChild(valSpan);
          barsDiv.appendChild(rowDiv);
        });
        container.appendChild(barsDiv);
      }

      function renderResponseBody(container, content) {
        container.innerHTML = "";
        if (!content) {
          container.textContent = "无响应体数据";
          return;
        }
        var text = content.text || "";
        if (!text) {
          var notice = document.createElement("div");
          notice.style.color = "var(--text-muted)";
          notice.style.fontFamily = "var(--font-mono)";
          notice.style.fontSize = "0.8125rem";
          notice.textContent = "响应体为空或未捕获（大小: " + formatSize(content.size) + "）";
          container.appendChild(notice);
          return;
        }
        var mimeType = content.mimeType || "";
        var displayText = text;
        if (/json/.test(mimeType)) {
          try {
            displayText = JSON.stringify(JSON.parse(text), null, 2);
          } catch (e) {
            displayText = text;
          }
        }
        var pre = document.createElement("div");
        pre.className = "response-body";
        pre.textContent = displayText.slice(0, 20000) + (displayText.length > 20000 ? "\n..." : "");
        container.appendChild(pre);
      }

      document.querySelectorAll(".detail-tab").forEach(function (tab) {
        tab.addEventListener("click", function () {
          document.querySelectorAll(".detail-tab").forEach(function (t) {
            t.classList.remove("active");
          });
          document.querySelectorAll(".detail-pane").forEach(function (p) {
            p.classList.remove("active");
          });
          tab.classList.add("active");
          var paneId = "pane" + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
          var pane = document.getElementById(paneId);
          if (pane) pane.classList.add("active");
        });
      });

      document.querySelectorAll(".type-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document.querySelectorAll(".type-btn").forEach(function (b) {
            b.classList.remove("active");
          });
          btn.classList.add("active");
          activeTypeFilter = btn.dataset.type;
          applyFilters();
        });
      });

      filterInput.addEventListener("input", function () {
        applyFilters();
      });

      document.getElementById("btnReset").addEventListener("click", function () {
        harData = null;
        allEntries = [];
        filteredEntries = [];
        selectedRow = null;
        totalTimelineMs = 0;
        harContent.classList.remove("show");
        detailPanel.classList.remove("show");
        dropZone.style.display = "";
        fileInput.value = "";
        filterInput.value = "";
        document.querySelectorAll(".type-btn").forEach(function (b) {
          b.classList.remove("active");
        });
        document.querySelector('.type-btn[data-type="all"]').classList.add("active");
        activeTypeFilter = "all";
        statusEl.textContent = "";
        statusEl.className = "status";
        statsEl.classList.remove("show");
      });

      document.getElementById("btnExportFiltered").addEventListener("click", function () {
        if (filteredEntries.length === 0) {
          showStatus("没有可导出的数据", "error");
          return;
        }
        var exportHar = {
          log: {
            version: (harData && harData.log && harData.log.version) || "1.2",
            creator: { name: "HAR Viewer", version: "1.0" },
            entries: filteredEntries
          }
        };
        var blob = new Blob([JSON.stringify(exportHar, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "filtered-export.har";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("已导出 " + filteredEntries.length + " 条请求", "success");
      });

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
