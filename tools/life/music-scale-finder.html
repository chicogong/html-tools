<style>
/* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item label {
        cursor: pointer;
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {
        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";
      }
      .footer {
        text-align: center;
        margin-top: var(--space-5);
        padding-top: var(--space-4);
      }
      .footer p {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        flex-wrap: wrap;
      }
      .footer a {
        color: var(--color-accent-primary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }
      .footer a:hover {
        color: var(--color-text-primary);
      }
      @media (max-width: 640px) {
        :root {
          --nav-height: 52px;
        }
        .nav-content {
          padding: 0 var(--space-4);
        }
        .nav-back-text {
          display: none;
        }
        .main-content {
          padding: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4)) var(--space-4)
            calc(var(--space-5) + var(--safe-area-bottom));
        }
        .tool-card {
          padding: var(--space-4);
          border-radius: var(--radius-md);
        }
        .tool-header {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
          margin-bottom: var(--space-4);
          padding-bottom: var(--space-4);
        }
        .tool-icon {
          width: 40px;
          height: 40px;
          font-size: 1rem;
        }
        .tool-info h1 {
          font-size: 1.125rem;
        }
        .toolbar {
          gap: var(--space-2);
          margin-bottom: var(--space-4);
        }
        .btn-group {
          flex-wrap: wrap;
        }
        .btn {
          height: 34px;
          padding: 0 var(--space-3);
          font-size: 0.75rem;
        }
        .options-bar {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--space-3);
          margin-bottom: var(--space-4);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }
      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible),
      select:focus:not(:focus-visible),
      textarea:focus:not(:focus-visible) {
        outline: none;
      }

      /* ===== Music Scale Finder 专用样式 ===== */
      .scale-notes-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);

<script>
var ALL_NOTES_SHARP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      var ALL_NOTES_FLAT = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];

      var SCALES = {
        major: {
          name: "大调 Major",
          intervals: [0, 2, 4, 5, 7, 9, 11],
          steps: ["W", "W", "H", "W", "W", "W", "H"],
          chordQualities: ["M", "m", "m", "M", "M", "m", "dim"]
        },
        minor: {
          name: "自然小调 Natural Minor",
          intervals: [0, 2, 3, 5, 7, 8, 10],
          steps: ["W", "H", "W", "W", "H", "W", "W"],
          chordQualities: ["m", "dim", "M", "m", "m", "M", "M"]
        },
        harmonic_minor: {
          name: "和声小调 Harmonic Minor",
          intervals: [0, 2, 3, 5, 7, 8, 11],
          steps: ["W", "H", "W", "W", "H", "A2", "H"],
          chordQualities: ["m", "dim", "aug", "m", "M", "M", "dim"]
        },
        melodic_minor: {
          name: "旋律小调 Melodic Minor",
          intervals: [0, 2, 3, 5, 7, 9, 11],
          steps: ["W", "H", "W", "W", "W", "W", "H"],
          chordQualities: ["m", "m", "aug", "M", "M", "dim", "dim"]
        },
        dorian: {
          name: "多利亚 Dorian",
          intervals: [0, 2, 3, 5, 7, 9, 10],
          steps: ["W", "H", "W", "W", "W", "H", "W"],
          chordQualities: ["m", "m", "M", "M", "m", "dim", "M"]
        },
        phrygian: {
          name: "弗里几亚 Phrygian",
          intervals: [0, 1, 3, 5, 7, 8, 10],
          steps: ["H", "W", "W", "W", "H", "W", "W"],
          chordQualities: ["m", "M", "M", "m", "dim", "M", "m"]
        },
        lydian: {
          name: "利底亚 Lydian",
          intervals: [0, 2, 4, 6, 7, 9, 11],
          steps: ["W", "W", "W", "H", "W", "W", "H"],
          chordQualities: ["M", "M", "m", "dim", "M", "m", "m"]
        },
        mixolydian: {
          name: "混合利底亚 Mixolydian",
          intervals: [0, 2, 4, 5, 7, 9, 10],
          steps: ["W", "W", "H", "W", "W", "H", "W"],
          chordQualities: ["M", "m", "dim", "M", "m", "m", "M"]
        },
        locrian: {
          name: "洛克里亚 Locrian",
          intervals: [0, 1, 3, 5, 6, 8, 10],
          steps: ["H", "W", "W", "H", "W", "W", "W"],
          chordQualities: ["dim", "M", "m", "m", "M", "M", "m"]
        },
        pentatonic_major: {
          name: "五声大调 Major Pentatonic",
          intervals: [0, 2, 4, 7, 9],
          steps: ["W", "W", "m3", "W", "m3"],
          chordQualities: null
        },
        pentatonic_minor: {
          name: "五声小调 Minor Pentatonic",
          intervals: [0, 3, 5, 7, 10],
          steps: ["m3", "W", "W", "m3", "W"],
          chordQualities: null
        },
        blues: {
          name: "布鲁斯 Blues",
          intervals: [0, 3, 5, 6, 7, 10],
          steps: ["m3", "W", "H", "H", "m3", "W"],
          chordQualities: null
        },
        whole_tone: {
          name: "全音阶 Whole Tone",
          intervals: [0, 2, 4, 6, 8, 10],
          steps: ["W", "W", "W", "W", "W", "W"],
          chordQualities: null
        },
        diminished: {
          name: "减音阶 Diminished (W-H)",
          intervals: [0, 2, 3, 5, 6, 8, 9, 11],
          steps: ["W", "H", "W", "H", "W", "H", "W", "H"],
          chordQualities: null
        }
      };

      var ROMAN_NUMERALS = ["I", "II", "III", "IV", "V", "VI", "VII"];
      var DEGREE_NAMES = ["主音", "上主音", "中音", "下属音", "属音", "下中音", "导音"];
      var GUITAR_OPEN = [4, 11, 7, 2, 9, 4];

      function noteIndex(noteName) {
        var idx = ALL_NOTES_SHARP.indexOf(noteName);
        if (idx === -1) idx = ALL_NOTES_FLAT.indexOf(noteName);
        return idx;
      }

      function getScaleNotes(rootName, scaleKey, useFlat) {
        var notes = useFlat ? ALL_NOTES_FLAT : ALL_NOTES_SHARP;
        var root = noteIndex(rootName);
        var scale = SCALES[scaleKey];
        return scale.intervals.map(function (semitones) {
          return notes[(root + semitones) % 12];
        });
      }

      function getScaleIndices(rootName, scaleKey) {
        var root = noteIndex(rootName);
        var scale = SCALES[scaleKey];
        return scale.intervals.map(function (s) {
          return (root + s) % 12;
        });
      }

      function renderNotes(scaleNotes) {
        var container = document.getElementById("scaleNotesRow");
        container.innerHTML = "";
        var degrees = ["1", "2", "3", "4", "5", "6", "7", "8", "9"];
        scaleNotes.forEach(function (note, i) {
          var badge = document.createElement("div");
          badge.className = "note-badge" + (i === 0 ? " root" : "");
          var nameEl = document.createElement("div");
          nameEl.className = "note-name";
          nameEl.textContent = note;
          var degEl = document.createElement("div");
          degEl.className = "note-degree";
          degEl.textContent = degrees[i] || "-";
          badge.appendChild(nameEl);
          badge.appendChild(degEl);
          container.appendChild(badge);
        });
      }

      function renderFormula(scaleKey) {
        var scale = SCALES[scaleKey];
        var el = document.getElementById("scaleFormula");
        el.innerHTML =
          "<strong>" +
          scale.name +
          "</strong>" +
          "&emsp;半音公式：" +
          scale.intervals.join(", ") +
          "&emsp;步进：" +
          scale.steps.join(" - ");
      }

      function renderIntervals(scaleKey) {
        var scale = SCALES[scaleKey];
        var container = document.getElementById("intervalRow");
        container.innerHTML = "";
        scale.steps.forEach(function (step) {
          var badge = document.createElement("span");
          var cls = step === "W" ? "whole" : step === "H" ? "half" : "";
          badge.className = "interval-badge " + cls;
          if (step === "W") badge.textContent = "全音 W";
          else if (step === "H") badge.textContent = "半音 H";
          else if (step === "m3") badge.textContent = "小三度";
          else if (step === "A2") badge.textContent = "增二度";
          else badge.textContent = step;
          container.appendChild(badge);
        });
      }

      function renderPiano(scaleIndices, rootIdx) {
        var piano = document.getElementById("pianoEl");
        piano.innerHTML = "";
        var layout = [
          { note: 0, type: "white" },
          { note: 1, type: "black" },
          { note: 2, type: "white" },
          { note: 3, type: "black" },
          { note: 4, type: "white" },
          { note: 5, type: "white" },
          { note: 6, type: "black" },
          { note: 7, type: "white" },
          { note: 8, type: "black" },
          { note: 9, type: "white" },
          { note: 10, type: "black" },
          { note: 11, type: "white" }
        ];
        var noteNames = ALL_NOTES_SHARP;
        for (var oct = 0; oct < 2; oct++) {
          layout.forEach(function (k) {
            var key = document.createElement("div");
            var inScale = scaleIndices.indexOf(k.note) !== -1;
            var isRoot = k.note === rootIdx;
            var cls = "piano-key " + k.type;
            if (isRoot) cls += " is-root";
            else if (inScale) cls += " in-scale";
            key.className = cls;
            if (inScale || isRoot) {
              var lbl = document.createElement("div");
              lbl.className = "piano-key-label";
              lbl.textContent = noteNames[k.note];
              key.appendChild(lbl);
            }
            piano.appendChild(key);
          });
        }
      }

      function renderFretboard(scaleIndices, rootIdx) {
        var numFrets = 13;
        var stringNotes = GUITAR_OPEN;
        var stringLabels = ["e", "B", "G", "D", "A", "E"];
        var noteNames = ALL_NOTES_SHARP;

        var numRow = document.getElementById("fretNumbers");
        numRow.innerHTML = "";
        var emptyDiv = document.createElement("div");
        emptyDiv.style.width = "32px";
        emptyDiv.style.flexShrink = "0";
        numRow.appendChild(emptyDiv);
        for (var f = 0; f < numFrets; f++) {
          var numEl = document.createElement("div");
          numEl.className = "fret-num";
          numEl.textContent = f === 0 ? "开" : String(f);
          numRow.appendChild(numEl);
        }

        var strContainer = document.getElementById("fretStrings");
        strContainer.innerHTML = "";
        stringNotes.forEach(function (openNote, si) {
          var row = document.createElement("div");
          row.className = "fret-row";
          var strLbl = document.createElement("div");
          strLbl.className = "string-label";
          strLbl.textContent = stringLabels[si];
          row.appendChild(strLbl);
          for (var fret = 0; fret < numFrets; fret++) {
            var noteAtFret = (openNote + fret) % 12;
            var cell = document.createElement("div");
            cell.className = "fret-cell";
            var inScale = scaleIndices.indexOf(noteAtFret) !== -1;
            var isRoot = noteAtFret === rootIdx;
            if (inScale || isRoot) {
              var dot = document.createElement("div");
              dot.className = "fret-dot " + (isRoot ? "is-root" : "in-scale");
              dot.textContent = noteNames[noteAtFret];
              cell.appendChild(dot);
            }
            row.appendChild(cell);
          }
          strContainer.appendChild(row);
        });
      }

      function renderChords(scaleNotes, scaleKey) {
        var tbody = document.getElementById("chordTableBody");
        tbody.innerHTML = "";
        var scale = SCALES[scaleKey];
        if (!scale.chordQualities) {
          var tr = document.createElement("tr");
          var td = document.createElement("td");
          td.colSpan = 5;
          td.textContent = "此音阶通常无固定自然和弦级数";
          td.style.color = "var(--text-muted)";
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }
        var n = scaleNotes.length;
        for (var i = 0; i < n; i++) {
          var quality = scale.chordQualities[i];
          var root = scaleNotes[i];
          var third = scaleNotes[(i + 2) % n];
          var fifth = scaleNotes[(i + 4) % n];
          var roman = ROMAN_NUMERALS[i] || String(i + 1);
          if (quality === "m") roman = roman.toLowerCase();
          else if (quality === "dim") roman = roman.toLowerCase() + "°";
          else if (quality === "aug") roman = roman + "+";

          var chordName = root;
          if (quality === "m") chordName += "m";
          else if (quality === "dim") chordName += "dim";
          else if (quality === "aug") chordName += "aug";

          var qualityLabel =
            quality === "M"
              ? "大三和弦"
              : quality === "m"
                ? "小三和弦"
                : quality === "dim"
                  ? "减三和弦"
                  : quality === "aug"
                    ? "增三和弦"
                    : quality;
          var qualityClass =
            quality === "M" ? "major" : quality === "m" ? "minor" : quality === "dim" ? "dim" : "";

          var tr = document.createElement("tr");
          var degTd = document.createElement("td");
          degTd.textContent = i + 1 + " — " + (DEGREE_NAMES[i] || "");
          var romanTd = document.createElement("td");
          romanTd.textContent = roman;
          var nameTd = document.createElement("td");
          nameTd.textContent = chordName;
          var qualTd = document.createElement("td");
          var qSpan = document.createElement("span");
          qSpan.className = "chord-quality " + qualityClass;
          qSpan.textContent = qualityLabel;
          qualTd.appendChild(qSpan);
          var notesTd = document.createElement("td");
          notesTd.textContent = root + " - " + third + " - " + fifth;
          tr.appendChild(degTd);
          tr.appendChild(romanTd);
          tr.appendChild(nameTd);
          tr.appendChild(qualTd);
          tr.appendChild(notesTd);
          tbody.appendChild(tr);
        }
      }

      function updateStatus(rootName, scaleKey) {
        var scale = SCALES[scaleKey];
        var statusEl = document.getElementById("status");
        statusEl.className = "status success";
        statusEl.textContent =
          rootName + " " + scale.name + "　共 " + scale.intervals.length + " 个音";
      }

      function render() {
        var rootName = document.getElementById("rootNote").value;
        var scaleKey = document.getElementById("scaleMode").value;
        var useFlat = document.getElementById("noteDisplay").value === "flat";
        var scaleNotes = getScaleNotes(rootName, scaleKey, useFlat);
        var scaleIndices = getScaleIndices(rootName, scaleKey);
        var rootIdx = noteIndex(rootName);
        renderNotes(scaleNotes);
        renderFormula(scaleKey);
        renderIntervals(scaleKey);
        renderPiano(scaleIndices, rootIdx);
        renderFretboard(scaleIndices, rootIdx);
        renderChords(scaleNotes, scaleKey);
        updateStatus(rootName, scaleKey);
        saveState();
      }

      var TABS = [
        { btn: "tabPiano", view: "viewPiano" },
        { btn: "tabGuitar", view: "viewGuitar" },
        { btn: "tabChords", view: "viewChords" }
      ];

      function activateTab(idx) {
        TABS.forEach(function (t, i) {
          var btn = document.getElementById(t.btn);
          var view = document.getElementById(t.view);
          if (i === idx) {
            btn.classList.add("active");
            view.classList.add("active");
          } else {
            btn.classList.remove("active");
            view.classList.remove("active");
          }
        });
      }

      document.getElementById("tabPiano").onclick = function () {
        activateTab(0);
      };
      document.getElementById("tabGuitar").onclick = function () {
        activateTab(1);
      };
      document.getElementById("tabChords").onclick = function () {
        activateTab(2);
      };

      document.getElementById("btnCopyNotes").onclick = function () {
        var rootName = document.getElementById("rootNote").value;
        var scaleKey = document.getElementById("scaleMode").value;
        var useFlat = document.getElementById("noteDisplay").value === "flat";
        var notes = getScaleNotes(rootName, scaleKey, useFlat);
        var statusEl = document.getElementById("status");
        navigator.clipboard
          .writeText(notes.join(", "))
          .then(function () {
            statusEl.className = "status success";
            statusEl.textContent = "已复制：" + notes.join(", ");
          })
          .catch(function () {
            statusEl.className = "status error";
            statusEl.textContent = "复制失败";
          });
      };

      document.getElementById("btnCopyFormula").onclick = function () {
        var scaleKey = document.getElementById("scaleMode").value;
        var scale = SCALES[scaleKey];
        var text =
          scale.name + " 公式：" + scale.intervals.join(", ") + "  步进：" + scale.steps.join("-");
        var statusEl = document.getElementById("status");
        navigator.clipboard
          .writeText(text)
          .then(function () {
            statusEl.className = "status success";
            statusEl.textContent = "公式已复制";
          })
          .catch(function () {
            statusEl.className = "status error";
            statusEl.textContent = "复制失败";
          });
      };

      var LS_KEY = "music_scale_finder_v1";

      function saveState() {
        try {
          localStorage.setItem(
            LS_KEY,
            JSON.stringify({
              root: document.getElementById("rootNote").value,
              mode: document.getElementById("scaleMode").value,
              display: document.getElementById("noteDisplay").value
            })
          );
        } catch (e) {
          /* ignore */
        }
      }

      function loadState() {
        try {
          var saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");
          if (!saved) return;
          if (saved.root) document.getElementById("rootNote").value = saved.root;
          if (saved.mode) document.getElementById("scaleMode").value = saved.mode;
          if (saved.display) document.getElementById("noteDisplay").value = saved.display;
        } catch (e) {
          /* ignore */
        }
      }

      document.getElementById("rootNote").addEventListener("change", render);
      document.getElementById("scaleMode").addEventListener("change", render);
      document.getElementById("noteDisplay").addEventListener("change", render);

      loadState();
      render();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
</script>
