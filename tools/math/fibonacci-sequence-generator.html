<style>
/* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .panel-textarea {
        flex: 1;
        width: 100%;
        min-height: 350px;
        padding: var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        line-height: 1.6;
        color: var(--color-text-primary);
        background: var(--color-bg-input);
        border: 2px solid var(--color-border-default);
        border-radius: var(--radius-md);
        resize: vertical;
        tab-size: 2;
        transition: all var(--transition-fast);
      }
      .panel-textarea::placeholder {
        color: var(--text-muted);
      }
      .panel-textarea:hover {
        border-color: var(--color-border-strong);
      }
      .panel-textarea:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
      }
      .panel-textarea[readonly] {
        background: var(--color-bg-subtle);
      }
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .status.success {
        color: var(--color-success);
      }
      .status.success::before {
        content: "✓";
      }
      .status.error {
        color: var(--color-error);
      }
      .status.error::before {
        content: "✗";
      }
      .stats {
        display: none;
        gap: var(--space-6);
        flex-wrap: wrap;
      }
      .stats.show {
        display: flex;
      }
      .stat-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-accent-primary);
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .footer {
        text-align: center;
        margin-top: var(--space-5);
        padding-top: var(--space-4);
      }
      .footer p {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;

<script>
/* ===== BigInt-based Fibonacci generator ===== */

      var PHI = 1.618033988749895;
      var fibSequence = [];

      function generateFib(n, a, b) {
        var seq = [];
        var prev = BigInt(a);
        var curr = BigInt(b);
        if (n >= 1) seq.push(prev);
        if (n >= 2) seq.push(curr);
        for (var i = 2; i < n; i++) {
          var next = prev + curr;
          seq.push(next);
          prev = curr;
          curr = next;
        }
        return seq;
      }

      function showStatus(msg, type) {
        var el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      function updateStats(seq) {
        document.getElementById("statN").textContent = seq.length;
        var lastStr = seq.length ? seq[seq.length - 1].toString() : "0";
        document.getElementById("statDigits").textContent = lastStr.length;
        var statsEl = document.getElementById("stats");
        if (seq.length >= 2) {
          var last = seq[seq.length - 1];
          var prev = seq[seq.length - 2];
          if (prev !== 0n) {
            var ratio = Number(last) / Number(prev);
            document.getElementById("statPhi").textContent = ratio.toFixed(10);
          } else {
            document.getElementById("statPhi").textContent = "—";
          }
          statsEl.classList.add("show");
        } else {
          statsEl.classList.remove("show");
        }
      }

      function renderSequence(seq) {
        var lines = seq.map(function (v, i) {
          var idx = String(i + 1).padStart(4, " ");
          return idx + ". " + v.toString();
        });
        document.getElementById("seqOutput").textContent = lines.join("\n");
        document.getElementById("seqInfo").textContent = seq.length + " 项";
      }

      function renderRatioTable(seq) {
        var tbody = document.getElementById("ratioBody");
        tbody.textContent = "";
        if (seq.length < 2) {
          var tr = document.createElement("tr");
          var td = document.createElement("td");
          td.setAttribute("colspan", "6");
          td.style.textAlign = "center";
          td.style.color = "var(--text-muted)";
          td.textContent = "至少需要 2 项";
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }
        for (var i = 0; i < seq.length - 1; i++) {
          var fn = seq[i];
          var fn1 = seq[i + 1];
          if (fn === 0n) continue;
          var ratio = Number(fn1) / Number(fn);
          var err = Math.abs(ratio - PHI);
          var accuracy = Math.max(0, Math.min(100, 100 - err * 100));
          var barWidth = Math.min(100, accuracy);
          var row = document.createElement("tr");

          var tdN = document.createElement("td");
          tdN.textContent = i + 1;

          var tdFn = document.createElement("td");
          var fnStr = fn.toString();
          tdFn.textContent = fnStr.length > 20 ? fnStr.slice(0, 17) + "…" : fnStr;

          var tdFn1 = document.createElement("td");
          var fn1Str = fn1.toString();
          tdFn1.textContent = fn1Str.length > 20 ? fn1Str.slice(0, 17) + "…" : fn1Str;

          var tdRatio = document.createElement("td");
          if (err < 0.0001) {
            var span = document.createElement("span");
            span.className = "phi-highlight";
            span.textContent = ratio.toFixed(10);
            tdRatio.appendChild(span);
          } else {
            tdRatio.textContent = ratio.toFixed(10);
          }

          var tdErr = document.createElement("td");
          tdErr.textContent = err < 1e-15 ? "< 1e-15" : err.toExponential(3);

          var tdBar = document.createElement("td");
          tdBar.className = "ratio-bar-cell";
          var bar = document.createElement("div");
          bar.className = "ratio-bar";
          bar.style.width = barWidth.toFixed(1) + "%";
          tdBar.appendChild(bar);

          row.appendChild(tdN);
          row.appendChild(tdFn);
          row.appendChild(tdFn1);
          row.appendChild(tdRatio);
          row.appendChild(tdErr);
          row.appendChild(tdBar);
          tbody.appendChild(row);
        }
      }

      function drawSpiral(seq) {
        var canvas = document.getElementById("spiralCanvas");
        var ctx = canvas.getContext("2d");
        var W = canvas.width;
        var H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        var rawTerms = seq
          .filter(function (v) {
            return v > 0n;
          })
          .slice(0, 12);

        if (rawTerms.length < 2) {
          ctx.fillStyle = "var(--text-muted, #55556a)";
          ctx.font = "14px monospace";
          ctx.textAlign = "center";
          ctx.fillText("需要至少 2 个正数项", W / 2, H / 2);
          return;
        }

        var totalSpan =
          Number(rawTerms[rawTerms.length - 1]) + Number(rawTerms[rawTerms.length - 2]);
        var scale = (Math.min(W, H) - 40) / totalSpan;
        var margin = 20;

        var dirs = [
          [1, 0],
          [0, -1],
          [-1, 0],
          [0, 1]
        ];

        var colors = [
          "rgba(0,245,212,0.55)",
          "rgba(76,201,240,0.55)",
          "rgba(139,92,246,0.55)",
          "rgba(247,37,133,0.55)",
          "rgba(255,159,28,0.55)",
          "rgba(16,185,129,0.55)"
        ];

        var terms = rawTerms.map(function (v) {
          return Number(v) * scale;
        });

        var rects = [];
        var curX = 0;
        var curY = 0;

        for (var i = 0; i < terms.length; i++) {
          var d = dirs[i % 4];
          var s = terms[i];
          rects.push({ x: curX, y: curY, s: s, d: d, idx: i });
          if (d[0] === 1) {
            curX += s;
          } else if (d[0] === -1) {
            curX -= s;
          } else if (d[1] === 1) {
            curY += s;
          } else {
            curY -= s;
          }
        }

        var bbMinX = Infinity;
        var bbMinY = Infinity;
        var bbMaxX = -Infinity;
        var bbMaxY = -Infinity;
        for (var ri = 0; ri < rects.length; ri++) {
          var r = rects[ri];
          var rx1 = r.x;
          var ry1 = r.y;
          var rx2 = r.x + r.s * (r.d[0] || 1);
          var ry2 = r.y + r.s * (r.d[1] || 1);
          bbMinX = Math.min(bbMinX, rx1, rx2);
          bbMinY = Math.min(bbMinY, ry1, ry2);
          bbMaxX = Math.max(bbMaxX, rx1, rx2);
          bbMaxY = Math.max(bbMaxY, ry1, ry2);
        }

        var offX = margin - bbMinX + (W - 2 * margin - (bbMaxX - bbMinX)) / 2;
        var offY = margin - bbMinY + (H - 2 * margin - (bbMaxY - bbMinY)) / 2;

        for (var di = 0; di < rects.length; di++) {
          var rect = rects[di];
          var ax = rect.x + offX;
          var ay = rect.y + offY;
          var sq = rect.s;
          var drawX = rect.d[0] < 0 ? ax - sq : ax;
          var drawY = rect.d[1] < 0 ? ay - sq : ay;
          ctx.fillStyle = colors[rect.idx % colors.length];
          ctx.fillRect(drawX, drawY, sq, sq);
          ctx.strokeStyle = "rgba(255,255,255,0.2)";
          ctx.lineWidth = 1;
          ctx.strokeRect(drawX, drawY, sq, sq);
          if (sq > 18) {
            ctx.fillStyle = "rgba(255,255,255,0.85)";
            ctx.font = "bold " + Math.min(14, sq * 0.35) + "px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(rawTerms[rect.idx].toString(), drawX + sq / 2, drawY + sq / 2);
          }
        }

        ctx.strokeStyle = "rgba(255,215,0,0.7)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        var firstArc = true;
        for (var ai = 0; ai < rects.length; ai++) {
          var arect = rects[ai];
          var asq = arect.s;
          if (asq < 1) continue;
          var adrawX = arect.d[0] < 0 ? arect.x + offX - asq : arect.x + offX;
          var adrawY = arect.d[1] < 0 ? arect.y + offY - asq : arect.y + offY;
          var arcX;
          var arcY;
          var startAngle;
          var endAngle;
          var adir = arect.idx % 4;
          if (adir === 0) {
            arcX = adrawX;
            arcY = adrawY + asq;
            startAngle = -Math.PI / 2;
            endAngle = 0;
          } else if (adir === 1) {
            arcX = adrawX + asq;
            arcY = adrawY + asq;
            startAngle = Math.PI;
            endAngle = -Math.PI / 2;
          } else if (adir === 2) {
            arcX = adrawX + asq;
            arcY = adrawY;
            startAngle = Math.PI / 2;
            endAngle = Math.PI;
          } else {
            arcX = adrawX;
            arcY = adrawY;
            startAngle = 0;
            endAngle = Math.PI / 2;
          }
          if (firstArc) {
            ctx.moveTo(arcX + asq * Math.cos(startAngle), arcY + asq * Math.sin(startAngle));
            firstArc = false;
          }
          ctx.arc(arcX, arcY, asq, startAngle, endAngle);
        }
        ctx.stroke();
      }

      function generate() {
        var n = parseInt(document.getElementById("fibCount").value, 10);
        var a = parseInt(document.getElementById("startA").value, 10);
        var b = parseInt(document.getElementById("startB").value, 10);
        if (isNaN(n) || n < 1 || n > 500) {
          showStatus("项数 N 需在 1 ~ 500 范围内", "error");
          return;
        }
        if (isNaN(a) || isNaN(b)) {
          showStatus("初始值必须是整数", "error");
          return;
        }
        try {
          fibSequence = generateFib(n, a, b);
          renderSequence(fibSequence);
          renderRatioTable(fibSequence);
          drawSpiral(fibSequence);
          updateStats(fibSequence);
          showStatus("生成成功，共 " + n + " 项", "success");
        } catch (e) {
          showStatus("生成失败: " + e.message, "error");
        }
      }

      function switchTab(name) {
        var tabs = ["Seq", "Ratio", "Spiral"];
        for (var t = 0; t < tabs.length; t++) {
          var tab = tabs[t];
          var btn = document.getElementById("tab" + tab);
          var panel = document.getElementById("panel" + tab);
          if (btn) btn.classList.toggle("active", tab === name);
          if (panel) panel.classList.toggle("active", tab === name);
        }
        if (name === "Spiral" && fibSequence.length) drawSpiral(fibSequence);
      }

      document.getElementById("btnGenerate").onclick = generate;

      document.getElementById("btnCopy").onclick = function () {
        if (!fibSequence.length) {
          showStatus("请先生成数列", "error");
          return;
        }
        var text = fibSequence
          .map(function (v) {
            return v.toString();
          })
          .join(", ");
        navigator.clipboard.writeText(text).then(
          function () {
            showStatus("数列已复制", "success");
          },
          function () {
            showStatus("复制失败", "error");
          }
        );
      };

      document.getElementById("btnReset").onclick = function () {
        document.getElementById("fibCount").value = "20";
        document.getElementById("startA").value = "0";
        document.getElementById("startB").value = "1";
        fibSequence = [];
        document.getElementById("seqOutput").textContent = "点击「生成」查看数列…";
        document.getElementById("seqInfo").textContent = "";
        document.getElementById("ratioBody").innerHTML =
          '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">请先生成数列</td></tr>';
        var canvas = document.getElementById("spiralCanvas");
        var ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById("stats").classList.remove("show");
        document.getElementById("status").textContent = "";
        document.getElementById("status").className = "status";
      };

      document.getElementById("tabSeq").onclick = function () {
        switchTab("Seq");
      };
      document.getElementById("tabRatio").onclick = function () {
        switchTab("Ratio");
      };
      document.getElementById("tabSpiral").onclick = function () {
        switchTab("Spiral");
      };

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          generate();
        }
      });

      generate();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
</script>
