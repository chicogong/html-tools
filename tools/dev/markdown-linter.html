    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }

    <script>
      var mdInputEl = document.getElementById("mdInput");
      var lintResultsEl = document.getElementById("lintResults");
      var statusEl = document.getElementById("status");
      var statsEl = document.getElementById("stats");
      var issueCountEl = document.getElementById("issueCount");
      var LS_KEY = "markdown_linter_input_v1";

      var SAMPLE_MD = [
        "# 项目简介",
        "",
        "这是一个示例 Markdown 文档，包含一些常见问题。",
        "",
        "### 安装方法",
        "",
        "跳过了 H2，直接使用 H3。",
        "",
        "## 快速开始",
        "",
        "```",
        "npm install",
        "```",
        "",
        "代码块缺少语言标识。",
        "",
        "## 快速开始",
        "",
        "这是一个重复的标题。",
        "",
        "## 链接示例  ",
        "",
        "这行末尾有多余空格。",
        "",
        "- [正常链接](https://example.com)",
        "- [空链接]()",
        "- [引用链接][ref]",
        "- 裸露 URL: http://example.org",
        "",
        "## 空节标题",
        "",
        "## 另一个节",
        "",
        "这里有内容。"
      ].join("\n");

      function loadFromStorage() {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) mdInputEl.value = saved;
      }
      function saveToStorage() {
        localStorage.setItem(LS_KEY, mdInputEl.value);
      }
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function lintMarkdown(text) {
        var lines = text.split("\n");
        var issues = [];
        var headingLevelEnabled = document.getElementById("chkHeadingLevel").checked;
        var dupHeadingEnabled = document.getElementById("chkDupHeading").checked;
        var codeLangEnabled = document.getElementById("chkCodeLang").checked;
        var brokenLinkEnabled = document.getElementById("chkBrokenLink").checked;
        var trailingSpaceEnabled = document.getElementById("chkTrailingSpace").checked;
        var emptySectionEnabled = document.getElementById("chkEmptySection").checked;
        var longLineEnabled = document.getElementById("chkLongLine").checked;

        var prevHeadingLevel = 0;
        var seenHeadings = {};
        var inCodeBlock = false;
        var codeBlockLine = -1;
        var lastHeadingText = null;
        var lastHeadingLineIdx = -1;
        var sectionHasContent = false;

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var lineNum = i + 1;

          // Track fenced code blocks
          if (/^(`{3,}|~{3,})/.test(line)) {
            if (!inCodeBlock) {
              inCodeBlock = true;
              codeBlockLine = lineNum;
              var fenceMatch = line.match(/^(`{3,}|~{3,})(.*)/);
              var lang = fenceMatch ? fenceMatch[2].trim() : "";
              if (codeLangEnabled && !lang) {
                issues.push({
                  line: lineNum,
                  severity: "warning",
                  rule: "MD040",
                  message: "代码块未指定语言标识符"
                });
              }
            } else {
              inCodeBlock = false;
              codeBlockLine = -1;
            }
            continue;
          }

          if (inCodeBlock) continue;

          // Heading checks
          var headingMatch = line.match(/^(#{1,6})\s+(.+)/);
          if (headingMatch) {
            var level = headingMatch[1].length;
            var headingText = headingMatch[2].trim();

            // Check heading level jump
            if (headingLevelEnabled && prevHeadingLevel > 0 && level > prevHeadingLevel + 1) {
              issues.push({
                line: lineNum,
                severity: "error",
                rule: "MD001",
                message:
                  "标题层级跳跃：从 H" +
                  prevHeadingLevel +
                  " 跳到 H" +
                  level +
                  "（应为 H" +
                  (prevHeadingLevel + 1) +
                  "）"
              });
            }

            // Check empty section (previous heading had no content)
            if (emptySectionEnabled && lastHeadingText !== null && !sectionHasContent) {
              issues.push({
                line: lastHeadingLineIdx + 1,
                severity: "warning",
                rule: "MD026",
                message: "空节：标题「" + lastHeadingText + "」下没有任何内容"
              });
            }

            // Check duplicate headings
            var headingKey = headingText.toLowerCase();
            if (dupHeadingEnabled && seenHeadings[headingKey] !== undefined) {
              issues.push({
                line: lineNum,
                severity: "warning",
                rule: "MD024",
                message:
                  "重复标题：「" + headingText + "」已在第 " + seenHeadings[headingKey] + " 行出现"
              });
            } else {
              seenHeadings[headingKey] = lineNum;
            }

            prevHeadingLevel = level;
            lastHeadingText = headingText;
            lastHeadingLineIdx = i;
            sectionHasContent = false;
            continue;
          }

          // Track section content (non-empty lines that aren't headings)
          if (line.trim().length > 0) {
            sectionHasContent = true;
          }

          // Trailing spaces
          if (trailingSpaceEnabled && / {2,}$/.test(line)) {
            issues.push({
              line: lineNum,
              severity: "info",
              rule: "MD009",
              message: "行尾有多余空格（" + (line.length - line.trimEnd().length) + " 个）"
            });
          }

          // Broken / malformed links
          if (brokenLinkEnabled) {
            // Inline link with empty URL
            var emptyLinkRe = /\[([^\]]*)\]\(\s*\)/g;
            var emptyMatch;
            while ((emptyMatch = emptyLinkRe.exec(line)) !== null) {
              issues.push({
                line: lineNum,
                severity: "error",
                rule: "MD011",
                message: "链接 URL 为空：[" + emptyMatch[1] + "]()"
              });
            }

            // Reference-style link [text][ref]
            var refLinkRe = /\[([^\]]+)\]\[([^\]]*)\]/g;
            var refMatch;
            while ((refMatch = refLinkRe.exec(line)) !== null) {
              issues.push({
                line: lineNum,
                severity: "warning",
                rule: "MD052",
                message: "引用式链接 [" + refMatch[1] + "][" + refMatch[2] + "]，确认已定义引用"
              });
            }

            // Bare URLs (not inside a link or code span)
            var bareUrlRe = /(?<![(\[`])https?:\/\/[^\s)\]`]+/g;
            var bareMatch;
            while ((bareMatch = bareUrlRe.exec(line)) !== null) {
              issues.push({
                line: lineNum,
                severity: "info",
                rule: "MD034",
                message: "裸露 URL，建议用 <URL> 或 [文字](URL) 包裹：" + bareMatch[0]
              });
            }
          }

          // Long line check
          if (longLineEnabled && line.length > 120) {
            issues.push({
              line: lineNum,
              severity: "info",
              rule: "MD013",
              message: "行长度 " + line.length + " 超过 120 字符"
            });
          }
        }

        // Check last section for emptiness
        if (emptySectionEnabled && lastHeadingText !== null && !sectionHasContent) {
          issues.push({
            line: lastHeadingLineIdx + 1,
            severity: "warning",
            rule: "MD026",
            message: "空节：标题「" + lastHeadingText + "」下没有任何内容"
          });
        }

        // Check unclosed code block
        if (inCodeBlock) {
          issues.push({
            line: codeBlockLine,
            severity: "error",
            rule: "MD031",
            message: "代码块未闭合（从第 " + codeBlockLine + " 行开始）"
          });
        }

        // Sort by line number
        issues.sort(function (a, b) {
          return a.line - b.line || a.severity.localeCompare(b.severity);
        });

        return issues;
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderResults(issues, lineCount) {
        var errors = issues.filter(function (item) {
          return item.severity === "error";
        });
        var warnings = issues.filter(function (item) {
          return item.severity === "warning";
        });
        var infos = issues.filter(function (item) {
          return item.severity === "info";
        });

        document.getElementById("statErrors").textContent = errors.length;
        document.getElementById("statWarnings").textContent = warnings.length;
        document.getElementById("statInfos").textContent = infos.length;
        document.getElementById("statLines").textContent = lineCount;
        statsEl.classList.add("show");

        var total = issues.length;
        issueCountEl.textContent = total > 0 ? total + " 个问题" : "";

        if (total === 0) {
          lintResultsEl.innerHTML =
            '<div class="lint-all-clear">' +
            '<div class="lint-all-clear-icon">&#10003;</div>' +
            '<div class="lint-all-clear-text">没有发现问题，文档规范！</div>' +
            "</div>";
          showStatus("检查完成，0 个问题", "success");
          return;
        }

        var html = "";
        var groups = [
          { label: "错误", items: errors },
          { label: "警告", items: warnings },
          { label: "提示", items: infos }
        ];
        groups.forEach(function (group) {
          if (group.items.length === 0) return;
          html +=
            '<div class="lint-section-header">' +
            group.label +
            " (" +
            group.items.length +
            ")</div>";
          group.items.forEach(function (issue) {
            var sevClass = issue.severity;
            html +=
              '<div class="lint-item severity-' +
              sevClass +
              '">' +
              '<span class="lint-line">L' +
              issue.line +
              "</span>" +
              '<span class="lint-severity ' +
              sevClass +
              '">' +
              issue.severity +
              "</span>" +
              '<span class="lint-rule">' +
              escapeHtml(issue.rule) +
              "</span>" +
              '<span class="lint-msg">' +
              escapeHtml(issue.message) +
              "</span>" +
              "</div>";
          });
        });
        lintResultsEl.innerHTML = html;

        if (errors.length > 0) {
          showStatus("发现 " + errors.length + " 个错误，" + warnings.length + " 个警告", "error");
        } else {
          showStatus("发现 " + warnings.length + " 个警告，" + infos.length + " 个提示", "");
        }
      }

      function buildPlainReport(issues) {
        if (issues.length === 0) return "检查完成：没有发现问题。";
        var lines = ["Markdown Lint 报告", "=".repeat(40)];
        issues.forEach(function (issue) {
          lines.push(
            "L" + issue.line + "\t" + issue.severity + "\t" + issue.rule + "\t" + issue.message
          );
        });
        return lines.join("\n");
      }

      function runLint() {
        var text = mdInputEl.value;
        if (!text.trim()) {
          showStatus("请先输入 Markdown 内容", "error");
          lintResultsEl.innerHTML = '<div class="lint-empty">请先输入 Markdown 内容</div>';
          statsEl.classList.remove("show");
          issueCountEl.textContent = "";
          return;
        }
        var issues = lintMarkdown(text);
        var lineCount = text.split("\n").length;
        renderResults(issues, lineCount);
      }

      document.getElementById("btnPaste").onclick = async function () {
        try {
          var text = await navigator.clipboard.readText();
          mdInputEl.value = text;
          saveToStorage();
          showStatus("已粘贴", "success");
        } catch (e) {
          showStatus("无法访问剪贴板", "error");
        }
      };

      document.getElementById("btnLint").onclick = function () {
        runLint();
        saveToStorage();
      };

      document.getElementById("btnClear").onclick = function () {
        mdInputEl.value = "";
        lintResultsEl.innerHTML = '<div class="lint-empty">粘贴 Markdown 后点击「检查」</div>';
        statsEl.classList.remove("show");
        issueCountEl.textContent = "";
        statusEl.textContent = "";
        statusEl.className = "status";
        localStorage.removeItem(LS_KEY);
      };

      document.getElementById("btnCopyReport").onclick = async function () {
        var text = mdInputEl.value;
        if (!text.trim()) {
          showStatus("没有内容可检查", "error");
          return;
        }
        var issues = lintMarkdown(text);
        var report = buildPlainReport(issues);
        try {
          await navigator.clipboard.writeText(report);
          showStatus("报告已复制", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      document.getElementById("btnLoadSample").onclick = function () {
        mdInputEl.value = SAMPLE_MD;
        saveToStorage();
        showStatus("示例已加载，点击「检查」查看结果", "");
      };

      mdInputEl.addEventListener("input", function () {
        saveToStorage();
      });

      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          runLint();
        }
      });

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
      loadFromStorage();
    </script>

    <!-- 全局 UI 注入 -->
    <script src="../../assets/js/tool-chrome.js"></script>
  </body>
</html>
