<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>材料用量计算 - WebUtils</title>
    <meta name="description" content="计算装修、DIY所需材料数量" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg-deep: #0a0a0f;
        --color-bg-card: #1a1a24;
        --color-text-primary: #e8e8ed;
        --color-accent-cyan: #00f5d4;
        --border-subtle: #2a2a36;

        /* 字体变量 */
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        padding: 2rem;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 2rem;
        color: var(--color-accent-cyan);
      }
      .card {
        background: var(--color-bg-card);
        padding: 1.5rem;
        border-radius: 10px;
        margin-bottom: 1rem;
      }
      input {
        width: 100%;
        padding: 0.75rem;
        margin: 0.5rem 0;
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
      }
      button {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: 6px;
        background: var(--color-accent-cyan);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
      }
      .result {
        font-family: "JetBrains Mono";
        font-size: 2rem;
        text-align: center;
        color: var(--color-accent-cyan);
        margin: 1rem 0;
      }
    </style>
  </head>
  <body>
    <a
      href="../../index.html"
      style="
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #00f5d4;
        text-decoration: none;
        font-size: 0.9rem;
        z-index: 1000;
      "
    >
      ← 首页
    </a>
    <div class="container">
      <h1>🔨 材料用量计算</h1>
      <div class="card">
        <label for="input---------">房间长度 (米)</label>
        <input
          type="number"
          id="length"
          value="5"
          aria-label="数字输入框"
          placeholder="请输入数字输入框"
        />
        <label for="input---------">房间宽度 (米)</label>
        <input
          type="number"
          id="width"
          value="4"
          aria-label="数字输入框"
          placeholder="请输入数字输入框"
        />
        <button onclick="calc()" aria-label="计算面积">计算面积</button>
        <div class="result" id="result"></div>
      </div>
    </div>
    <script>
      function calc() {
        const l = parseFloat(document.getElementById("length").value) || 0;
        const w = parseFloat(document.getElementById("width").value) || 0;
        const area = l * w;
        document.getElementById("result").textContent = `面积: ${area.toFixed(2)} 平方米`;
      }
    </script>
  </body>
</html>
