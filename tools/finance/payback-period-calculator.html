    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;

    <script>
      var LS_KEY = "payback_period_v1";

      /* ──────── 状态 ──────── */
      var cashflows = [150000, 200000, 250000, 300000, 350000, 400000];

      /* ──────── DOM 元素 ──────── */
      var rowsEl = document.getElementById("cashflowRows");
      var statusEl = document.getElementById("status");
      var statsEl = document.getElementById("stats");
      var resultSection = document.getElementById("resultSection");
      var cfTableBody = document.getElementById("cfTableBody");

      /* ──────── 行管理 ──────── */
      function renderRows() {
        rowsEl.innerHTML = "";
        cashflows.forEach(function (cf, i) {
          var row = document.createElement("div");
          row.className = "cashflow-row";

          var yearSpan = document.createElement("span");
          yearSpan.className = "cashflow-row-year";
          yearSpan.textContent = "第 " + (i + 1) + " 年";

          var inp = document.createElement("input");
          inp.type = "number";
          inp.step = "1";
          inp.placeholder = "净现金流";
          inp.value = cf !== null && cf !== undefined ? String(cf) : "";
          inp.dataset.idx = String(i);
          inp.addEventListener("input", function () {
            var idx = parseInt(this.dataset.idx, 10);
            var v = parseFloat(this.value);
            cashflows[idx] = isNaN(v) ? 0 : v;
          });

          var removeBtn = document.createElement("button");
          removeBtn.className = "btn-remove-row";
          removeBtn.textContent = "×";
          removeBtn.title = "删除此行";
          removeBtn.dataset.idx = String(i);
          removeBtn.addEventListener("click", function () {
            var idx = parseInt(this.dataset.idx, 10);
            cashflows.splice(idx, 1);
            renderRows();
          });

          row.appendChild(yearSpan);
          row.appendChild(inp);
          row.appendChild(removeBtn);
          rowsEl.appendChild(row);
        });
      }

      /* ──────── 格式化工具 ──────── */
      function fmtNum(n) {
        if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(2) + " 亿";
        if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(2) + " 万";
        return n.toFixed(2);
      }

      function fmtPeriod(years) {
        var y = Math.floor(years);
        var m = Math.round((years - y) * 12);
        if (m === 12) {
          y += 1;
          m = 0;
        }
        if (y === 0) return m + " 个月";
        if (m === 0) return y + " 年";
        return y + " 年 " + m + " 个月";
      }

      /* ──────── 计算核心 ──────── */
      function computePayback(investment, cfs, rate) {
        var n = cfs.length;
        var cumStatic = 0;
        var cumDynamic = 0;
        var staticPeriod = null;
        var dynamicPeriod = null;
        var rows = [];
        var r = rate / 100;

        for (var i = 0; i < n; i++) {
          var cf = cfs[i];
          var discount = cf / Math.pow(1 + r, i + 1);
          var prevCumStatic = cumStatic;
          var prevCumDynamic = cumDynamic;
          cumStatic += cf;
          cumDynamic += discount;

          // 静态回收期
          if (staticPeriod === null && cumStatic - investment >= 0) {
            var prevNet = prevCumStatic - investment;
            if (prevNet >= 0) {
              staticPeriod = i; // 已经回收（不应到这里）
            } else {
              // 在第 i+1 年内回收：i 年后剩 prevNet（负数），本年回收 cf
              staticPeriod = i + -prevNet / cf;
            }
          }

          // 动态回收期
          if (dynamicPeriod === null && cumDynamic - investment >= 0) {
            var prevDynNet = prevCumDynamic - investment;
            if (prevDynNet >= 0) {
              dynamicPeriod = i;
            } else {
              dynamicPeriod = i + -prevDynNet / discount;
            }
          }

          rows.push({
            year: i + 1,
            cf: cf,
            cumStatic: cumStatic - investment,
            discountedCF: discount,
            cumDynamic: cumDynamic - investment
          });
        }

        return {
          staticPeriod: staticPeriod,
          dynamicPeriod: dynamicPeriod,
          rows: rows,
          totalCF: cumStatic,
          npv: cumDynamic - investment
        };
      }

      /* ──────── 图表绘制 ──────── */
      function drawChart(rows, investment) {
        var canvas = document.getElementById("cfChart");
        var ctx = canvas.getContext("2d");

        // DPI 适配
        var dpr = window.devicePixelRatio || 1;
        var rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = 220 * dpr;
        ctx.scale(dpr, dpr);

        var W = rect.width;
        var H = 220;
        var padL = 72;
        var padR = 20;
        var padT = 24;
        var padB = 36;
        var chartW = W - padL - padR;
        var chartH = H - padT - padB;

        var isDark = document.documentElement.getAttribute("data-theme") !== "light";
        var colBg = isDark ? "#0e0e14" : "#f5f5f5";
        var colGrid = isDark ? "#2a2a3a" : "#e5e5e5";
        var colText = isDark ? "#55556a" : "#999";
        var colStatic = "#00f5d4";
        var colDynamic = "#4cc9f0";
        var colZero = isDark ? "#3a3a4a" : "#ccc";

        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = colBg;
        ctx.fillRect(0, 0, W, H);

        // 数据：从 -investment 开始（第 0 期）
        var staticData = [-investment].concat(
          rows.map(function (r) {
            return r.cumStatic;
          })
        );
        var dynamicData = [-investment].concat(
          rows.map(function (r) {
            return r.cumDynamic;
          })
        );
        var allVals = staticData.concat(dynamicData);
        var minVal = Math.min.apply(null, allVals);
        var maxVal = Math.max.apply(null, allVals);
        var span = maxVal - minVal || 1;
        var pad = span * 0.12;
        minVal -= pad;
        maxVal += pad;
        span = maxVal - minVal;

        function toX(i) {
          return padL + (i / (staticData.length - 1)) * chartW;
        }
        function toY(v) {
          return padT + ((maxVal - v) / span) * chartH;
        }

        // 网格线
        var gridCount = 4;
        for (var gi = 0; gi <= gridCount; gi++) {
          var gv = minVal + (span / gridCount) * gi;
          var gy = toY(gv);
          ctx.strokeStyle = colGrid;
          ctx.lineWidth = 0.5;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.moveTo(padL, gy);
          ctx.lineTo(W - padR, gy);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = colText;
          ctx.font = "10px 'JetBrains Mono', monospace";
          ctx.textAlign = "right";
          ctx.fillText(fmtNum(gv), padL - 6, gy + 4);
        }

        // 零轴
        if (minVal < 0 && maxVal > 0) {
          var zy = toY(0);
          ctx.strokeStyle = colZero;
          ctx.lineWidth = 1;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(padL, zy);
          ctx.lineTo(W - padR, zy);
          ctx.stroke();
        }

        // X 轴标签
        ctx.fillStyle = colText;
        ctx.font = "10px 'JetBrains Mono', monospace";
        ctx.textAlign = "center";
        staticData.forEach(function (v, i) {
          ctx.fillText(i === 0 ? "初始" : "Y" + i, toX(i), H - padB + 14);
        });

        // 折线绘制
        function drawLine(data, color, dash) {
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.setLineDash(dash || []);
          ctx.beginPath();
          data.forEach(function (v, i) {
            var px = toX(i);
            var py = toY(v);
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.stroke();
          ctx.setLineDash([]);
          data.forEach(function (v, i) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(toX(i), toY(v), 3.5, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        drawLine(staticData, colStatic, []);
        drawLine(dynamicData, colDynamic, [5, 4]);

        // 图例
        var legX = padL + 8;
        var legY = padT + 12;
        ctx.fillStyle = colStatic;
        ctx.fillRect(legX, legY - 6, 16, 3);
        ctx.fillStyle = colText;
        ctx.font = "10px 'JetBrains Mono', monospace";
        ctx.textAlign = "left";
        ctx.fillText("静态", legX + 20, legY);
        ctx.fillStyle = colDynamic;
        ctx.fillRect(legX + 60, legY - 6, 16, 3);
        ctx.fillStyle = colText;
        ctx.fillText("动态", legX + 80, legY);
      }

      /* ──────── 状态提示 ──────── */
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      /* ──────── 主计算入口 ──────── */
      function calculate() {
        var investment = parseFloat(document.getElementById("initialInvestment").value);
        var rate = parseFloat(document.getElementById("discountRate").value);

        if (isNaN(investment) || investment <= 0) {
          showStatus("请输入有效的初始投资额", "error");
          return;
        }
        if (isNaN(rate) || rate < 0) {
          showStatus("请输入有效的折现率（≥0）", "error");
          return;
        }
        if (cashflows.length === 0) {
          showStatus("请至少添加一年现金流", "error");
          return;
        }

        var result = computePayback(investment, cashflows, rate);

        // 静态回收期
        if (result.staticPeriod !== null && isFinite(result.staticPeriod)) {
          document.getElementById("staticPayback").textContent = fmtPeriod(result.staticPeriod);
          document.getElementById("staticSub").textContent =
            "约 " + result.staticPeriod.toFixed(2) + " 年";
        } else {
          document.getElementById("staticPayback").textContent = "未回收";
          document.getElementById("staticSub").textContent = "现金流不足以回收投资";
        }

        // 动态回收期
        if (
          result.dynamicPeriod !== null &&
          isFinite(result.dynamicPeriod) &&
          result.dynamicPeriod >= 0
        ) {
          document.getElementById("dynamicPayback").textContent = fmtPeriod(result.dynamicPeriod);
          document.getElementById("dynamicSub").textContent =
            "折现率 " + rate + "% · 约 " + result.dynamicPeriod.toFixed(2) + " 年";
        } else {
          document.getElementById("dynamicPayback").textContent = "未回收";
          document.getElementById("dynamicSub").textContent = "折现后现金流不足以回收投资";
        }

        // 明细表格
        cfTableBody.innerHTML = "";
        result.rows.forEach(function (r) {
          var tr = document.createElement("tr");
          if (r.cumStatic >= 0) tr.classList.add("recovered");

          function td(val) {
            var cell = document.createElement("td");
            cell.textContent = val;
            return cell;
          }
          tr.appendChild(td("第 " + r.year + " 年"));
          tr.appendChild(td(fmtNum(r.cf)));
          tr.appendChild(td(fmtNum(r.cumStatic)));
          tr.appendChild(td(fmtNum(r.discountedCF)));
          tr.appendChild(td(fmtNum(r.cumDynamic)));
          cfTableBody.appendChild(tr);
        });

        // 统计栏
        document.getElementById("statYears").textContent = cashflows.length;
        document.getElementById("statTotalCF").textContent = fmtNum(result.totalCF);
        document.getElementById("statNPV").textContent = fmtNum(result.npv);
        statsEl.classList.add("show");

        resultSection.style.display = "";

        // 图表需要 resultSection 可见后再绘制
        requestAnimationFrame(function () {
          drawChart(result.rows, investment);
        });

        showStatus("计算完成", "success");
        saveToStorage();
      }

      /* ──────── 持久化 ──────── */
      function saveToStorage() {
        var data = {
          investment: document.getElementById("initialInvestment").value,
          rate: document.getElementById("discountRate").value,
          cfs: cashflows.slice()
        };
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      function loadFromStorage() {
        try {
          var raw = localStorage.getItem(LS_KEY);
          if (!raw) return;
          var data = JSON.parse(raw);
          if (data.investment) document.getElementById("initialInvestment").value = data.investment;
          if (data.rate !== undefined) document.getElementById("discountRate").value = data.rate;
          if (Array.isArray(data.cfs) && data.cfs.length > 0) cashflows = data.cfs;
        } catch (e) {
          /* ignore */
        }
      }

      /* ──────── 示例数据 ──────── */
      function loadSample() {
        document.getElementById("initialInvestment").value = "1000000";
        document.getElementById("discountRate").value = "10";
        cashflows = [150000, 200000, 250000, 300000, 350000, 400000];
        renderRows();
        resultSection.style.display = "none";
        statsEl.classList.remove("show");
        showStatus('示例数据已载入，点击"计算"查看结果', "");
      }

      /* ──────── 等额填入 ──────── */
      function fillEqual() {
        var first = cashflows.length > 0 ? cashflows[0] : 0;
        for (var i = 0; i < cashflows.length; i++) {
          cashflows[i] = first;
        }
        renderRows();
      }

      /* ──────── 事件绑定 ──────── */
      document.getElementById("btnCalculate").onclick = calculate;

      document.getElementById("btnReset").onclick = function () {
        document.getElementById("initialInvestment").value = "";
        document.getElementById("discountRate").value = "10";
        cashflows = [0, 0, 0, 0, 0];
        renderRows();
        resultSection.style.display = "none";
        statsEl.classList.remove("show");
        statusEl.textContent = "";
        statusEl.className = "status";
        localStorage.removeItem(LS_KEY);
      };

      document.getElementById("btnAddYear").onclick = function () {
        cashflows.push(0);
        renderRows();
      };

      document.getElementById("btnFillEqual").onclick = fillEqual;
      document.getElementById("btnLoadSample").onclick = loadSample;

      // Ctrl/Cmd + Enter 触发计算
      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          calculate();
        }
      });

      // 窗口缩放重绘图表
      window.addEventListener("resize", function () {
        if (resultSection.style.display !== "none") {
          var investment = parseFloat(document.getElementById("initialInvestment").value);
          var rate = parseFloat(document.getElementById("discountRate").value);
          if (!isNaN(investment) && investment > 0 && !isNaN(rate)) {
            var result = computePayback(investment, cashflows, rate);
            drawChart(result.rows, investment);
          }
        }
      });

      /* ──────── 初始化 ──────── */
      loadFromStorage();
      renderRows();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        // 主题切换后重绘图表
        if (resultSection.style.display !== "none") {
          var investment = parseFloat(document.getElementById("initialInvestment").value);
          var rate = parseFloat(document.getElementById("discountRate").value);
          if (!isNaN(investment) && investment > 0 && !isNaN(rate)) {
            var result = computePayback(investment, cashflows, rate);
            drawChart(result.rows, investment);
          }
        }
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
