    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;
      }
      .panel {
        display: flex;

        99944: "科威特",
        99945: "纳米比亚",
        99946: "尼泊尔",
        99947: "塔吉克斯坦",
        99948: "厄立特里亚",
        99949: "毛里塔尼亚",
        99950: "亚美尼亚",
        99951: "科索沃",
        99952: "马来西亚",
        99953: "巴拉圭",
        99954: "玻利维亚",
        99955: "苏里南",
        99956: "阿拉伯联合酋长国",
        99957: "中非共和国",
        99958: "巴林",
        99959: "利比里亚",
        99960: "赤道几内亚",
        99961: "菲律宾",
        99962: "海地",
        99963: "津巴布韦",
        99964: "越南",
        99965: "贝宁",
        99966: "科威特",
        99967: "巴拉圭",
        99968: "博茨瓦纳",
        99969: "巴林",
        99970: "海地",
        99971: "委内瑞拉",
        99972: "阿富汗",
        99973: "加纳",
        99974: "也门",
        99975: "科摩罗"
      };

      // Normalize: remove dashes, spaces, lowercase X
      function normalize(isbn) {
        return isbn.replace(/[-\s]/g, "").toUpperCase();
      }

      function validateIsbn10(isbn) {
        if (isbn.length !== 10) return false;
        if (!/^\d{9}[\dX]$/.test(isbn)) return false;
        var sum = 0;
        for (var i = 0; i < 9; i++) {
          sum += parseInt(isbn[i], 10) * (10 - i);
        }
        var check = isbn[9] === "X" ? 10 : parseInt(isbn[9], 10);
        sum += check;
        return sum % 11 === 0;
      }

      function validateIsbn13(isbn) {
        if (isbn.length !== 13) return false;
        if (!/^\d{13}$/.test(isbn)) return false;
        var sum = 0;
        for (var i = 0; i < 12; i++) {
          sum += parseInt(isbn[i], 10) * (i % 2 === 0 ? 1 : 3);
        }
        var check = (10 - (sum % 10)) % 10;
        return check === parseInt(isbn[12], 10);
      }

      function isbn10ToIsbn13(isbn10) {
        var base = "978" + isbn10.slice(0, 9);
        var sum = 0;
        for (var i = 0; i < 12; i++) {
          sum += parseInt(base[i], 10) * (i % 2 === 0 ? 1 : 3);
        }
        var check = (10 - (sum % 10)) % 10;
        return base + check;
      }

      function isbn13ToIsbn10(isbn13) {
        // Only valid for 978-prefix
        if (!isbn13.startsWith("978")) return null;
        var base = isbn13.slice(3, 12);
        var sum = 0;
        for (var i = 0; i < 9; i++) {
          sum += parseInt(base[i], 10) * (10 - i);
        }
        var check = (11 - (sum % 11)) % 11;
        return base + (check === 10 ? "X" : String(check));
      }

      function formatIsbn10(isbn) {
        // group-publisher-title-check — approximate formatting
        return (
          isbn.slice(0, 1) + "-" + isbn.slice(1, 4) + "-" + isbn.slice(4, 9) + "-" + isbn.slice(9)
        );
      }

      function formatIsbn13(isbn) {
        // prefix-group-publisher-title-check — approximate
        return (
          isbn.slice(0, 3) +
          "-" +
          isbn.slice(3, 4) +
          "-" +
          isbn.slice(4, 7) +
          "-" +
          isbn.slice(7, 12) +
          "-" +
          isbn.slice(12)
        );
      }

      function getGroupInfo(isbn) {
        // isbn here is the raw group digits (no 978/979 prefix)
        // try longest match first (up to 5 digits)
        for (var len = 5; len >= 1; len--) {
          var prefix = isbn.slice(0, len);
          if (ISBN_GROUPS[prefix]) {
            return { prefix: prefix, region: ISBN_GROUPS[prefix] };
          }
        }
        return null;
      }

      function getIsbn13PrefixLabel(isbn13) {
        var prefix = isbn13.slice(0, 3);
        if (prefix === "978") return "978（Bookland EAN，传统国际书号）";
        if (prefix === "979") return "979（扩展空间，部分分配给国际乐谱局 ISMN）";
        return prefix;
      }

      function calcExpectedCheck10(isbn9) {
        var sum = 0;
        for (var i = 0; i < 9; i++) {
          sum += parseInt(isbn9[i], 10) * (10 - i);
        }
        var c = (11 - (sum % 11)) % 11;
        return c === 10 ? "X" : String(c);
      }

      function calcExpectedCheck13(isbn12) {
        var sum = 0;
        for (var i = 0; i < 12; i++) {
          sum += parseInt(isbn12[i], 10) * (i % 2 === 0 ? 1 : 3);
        }
        return String((10 - (sum % 10)) % 10);
      }

      function showStatus(msg, type) {
        var statusEl = document.getElementById("status");
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function doValidate() {
        var raw = document.getElementById("isbnInput").value.trim();
        if (!raw) {
          showStatus("请输入 ISBN", "error");
          return;
        }
        var isbn = normalize(raw);
        var inputEl = document.getElementById("isbnInput");
        var resultCard = document.getElementById("resultCard");
        var resultBadge = document.getElementById("resultBadge");
        var infoGrid = document.getElementById("infoGrid");
        var convArea = document.getElementById("conversionArea");

        var isIsbn10 = isbn.length === 10;
        var isIsbn13 = isbn.length === 13;

        if (!isIsbn10 && !isIsbn13) {
          inputEl.className = "isbn-input invalid";
          resultCard.className = "result-card show result-invalid";
          resultBadge.textContent =
            "格式错误：长度应为 10 位（ISBN-10）或 13 位（ISBN-13），当前 " + isbn.length + " 位";
          resultBadge.className = "result-badge invalid";
          infoGrid.innerHTML = "";
          convArea.className = "conversion-area";
          showStatus("ISBN 长度不正确", "error");
          return;
        }

        var valid = isIsbn10 ? validateIsbn10(isbn) : validateIsbn13(isbn);

        inputEl.className = "isbn-input " + (valid ? "valid" : "invalid");
        resultCard.className = "result-card show " + (valid ? "result-valid" : "result-invalid");
        resultBadge.textContent = valid
          ? "✓ 有效 ISBN-" + (isIsbn10 ? "10" : "13")
          : "✗ 无效 ISBN-" + (isIsbn10 ? "10" : "13") + "（校验位错误）";
        resultBadge.className = "result-badge " + (valid ? "valid" : "invalid");

        // Build info grid
        var items = [];

        if (isIsbn10) {
          var expectedCheck10 = calcExpectedCheck10(isbn.slice(0, 9));
          items.push({ label: "类型", value: "ISBN-10", accent: false });
          items.push({ label: "规范化", value: isbn, accent: true });
          items.push({ label: "带连字符", value: formatIsbn10(isbn), accent: false });
          items.push({
            label: "校验位",
            value: isbn[9] + "（期望 " + expectedCheck10 + "）",
            accent: false
          });
          var g10 = getGroupInfo(isbn);
          if (g10) {
            items.push({
              label: "登记组（语言/国家）",
              value: g10.prefix + " — " + g10.region,
              accent: false
            });
          }
          items.push({ label: "出版商前缀", value: isbn.slice(0, 7), accent: false });
        } else {
          var prefix3 = isbn.slice(0, 3);
          var groupPart = isbn.slice(3);
          var expectedCheck13 = calcExpectedCheck13(isbn.slice(0, 12));
          items.push({ label: "类型", value: "ISBN-13 / EAN-13", accent: false });
          items.push({ label: "规范化", value: isbn, accent: true });
          items.push({ label: "带连字符", value: formatIsbn13(isbn), accent: false });
          items.push({ label: "EAN 前缀", value: getIsbn13PrefixLabel(isbn), accent: false });
          items.push({
            label: "校验位",
            value: isbn[12] + "（期望 " + expectedCheck13 + "）",
            accent: false
          });
          var g13 = getGroupInfo(groupPart);
          if (g13) {
            items.push({
              label: "登记组（语言/国家）",
              value: g13.prefix + " — " + g13.region,
              accent: false
            });
          }
          items.push({
            label: "出版商前缀",
            value: prefix3 + "-" + isbn.slice(3, 10),
            accent: false
          });
        }

        infoGrid.innerHTML = items
          .map(function (item) {
            return (
              '<div class="info-item">' +
              '<div class="info-label">' +
              item.label +
              "</div>" +
              '<div class="info-value' +
              (item.accent ? " accent" : "") +
              '">' +
              item.value +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        // Conversion
        if (valid) {
          convArea.className = "conversion-area show";
          if (isIsbn10) {
            document.getElementById("convIsbn10").textContent = isbn;
            document.getElementById("convIsbn13").textContent = isbn10ToIsbn13(isbn);
          } else {
            var isbn10result = isbn13ToIsbn10(isbn);
            document.getElementById("convIsbn10").textContent = isbn10result || "仅适用于 978 前缀";
            document.getElementById("convIsbn13").textContent = isbn;
          }
        } else {
          convArea.className = "conversion-area";
        }

        showStatus(valid ? "验证通过" : "校验位不匹配", valid ? "success" : "error");
      }

      function doBatchValidate() {
        var raw = document.getElementById("batchInput").value;
        var lines = raw
          .split("\n")
          .map(function (l) {
            return l.trim();
          })
          .filter(function (l) {
            return l.length > 0;
          });
        var outputEl = document.getElementById("batchOutput");

        if (lines.length === 0) {
          showStatus("请在批量输入框输入 ISBN", "error");
          return;
        }

        var html = "";
        var validCount = 0;
        var invalidCount = 0;

        lines.forEach(function (line) {
          var isbn = normalize(line);
          var isIsbn10 = isbn.length === 10;
          var isIsbn13 = isbn.length === 13;
          var valid = false;
          var msg = "";

          if (!isIsbn10 && !isIsbn13) {
            msg = "长度错误（" + isbn.length + " 位）";
          } else if (isIsbn10) {
            valid = validateIsbn10(isbn);
            msg = valid ? "ISBN-10 有效" : "ISBN-10 校验位错误";
          } else {
            valid = validateIsbn13(isbn);
            msg = valid ? "ISBN-13 有效" : "ISBN-13 校验位错误";
          }

          if (valid) {
            validCount++;
          } else {
            invalidCount++;
          }

          html +=
            '<div class="batch-result-item ' +
            (valid ? "batch-valid" : "batch-invalid") +
            '">' +
            '<span class="batch-icon">' +
            (valid ? "✓" : "✗") +
            "</span>" +
            '<span class="batch-isbn">' +
            line +
            "</span>" +
            '<span class="batch-msg">' +
            msg +
            "</span>" +
            "</div>";
        });

        outputEl.innerHTML = html;
        showStatus(
          "共 " + lines.length + " 个：有效 " + validCount + " 个，无效 " + invalidCount + " 个",
          invalidCount === 0 ? "success" : "error"
        );
      }

      function doCopyResult() {
        var items = document.querySelectorAll(".batch-result-item");
        if (items.length === 0) {
          showStatus("没有可复制的结果", "error");
          return;
        }
        var lines = [];
        items.forEach(function (item) {
          var icon = item.querySelector(".batch-icon").textContent;
          var isbn = item.querySelector(".batch-isbn").textContent;
          var msg = item.querySelector(".batch-msg").textContent;
          lines.push(icon + " " + isbn + " — " + msg);
        });
        navigator.clipboard
          .writeText(lines.join("\n"))
          .then(function () {
            showStatus("结果已复制", "success");
          })
          .catch(function () {
            showStatus("复制失败", "error");
          });
      }

      document.getElementById("btnValidate").onclick = doValidate;

      document.getElementById("btnPaste").onclick = function () {
        navigator.clipboard
          .readText()
          .then(function (text) {
            document.getElementById("isbnInput").value = text.trim();
            showStatus("已粘贴", "success");
          })
          .catch(function () {
            showStatus("无法访问剪贴板", "error");
          });
      };

      document.getElementById("btnClear").onclick = function () {
        document.getElementById("isbnInput").value = "";
        document.getElementById("isbnInput").className = "isbn-input";
        document.getElementById("resultCard").className = "result-card";
        document.getElementById("conversionArea").className = "conversion-area";
        document.getElementById("status").textContent = "";
        document.getElementById("status").className = "status";
      };

      document.getElementById("btnBatchValidate").onclick = doBatchValidate;
      document.getElementById("btnCopyResult").onclick = doCopyResult;

      document.getElementById("isbnInput").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          doValidate();
        }
      });

      document.getElementById("isbnInput").addEventListener("input", function () {
        this.className = "isbn-input";
        document.getElementById("resultCard").className = "result-card";
        document.getElementById("conversionArea").className = "conversion-area";
      });

      // Load from URL hash
      (function () {
        var hash = location.hash.slice(1);
        if (hash) {
          try {
            document.getElementById("isbnInput").value = decodeURIComponent(hash);
          } catch (e) {}
        }
      })();

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
