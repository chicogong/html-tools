    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;

        return Math.round(v * 18.0182);
      }
      function mgdlToMmol(v) {
        return Math.round((v / 18.0182) * 10) / 10;
      }
      function displayVal(mmol) {
        if (useMgdl) return mmolToMgdl(mmol) + " mg/dL";
        return mmol.toFixed(1) + " mmol/L";
      }
      function classifyGlucose(mmol, mealType) {
        var range = RANGES[mealType] || RANGES.random;
        if (mmol < range.low) return "low";
        if (mmol > range.high) return "high";
        return "normal";
      }

      function loadRecords() {
        try {
          var raw = localStorage.getItem(LS_KEY);
          if (raw) records = JSON.parse(raw);
        } catch (e) {
          records = [];
        }
      }
      function saveRecords() {
        localStorage.setItem(LS_KEY, JSON.stringify(records));
      }

      function showStatus(msg, type) {
        var el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      function formatDatetime(isoStr) {
        try {
          var d = new Date(isoStr);
          var month = d.getMonth() + 1;
          var day = d.getDate();
          var hour = d.getHours();
          var min = d.getMinutes();
          return (
            d.getFullYear() +
            "-" +
            (month < 10 ? "0" + month : String(month)) +
            "-" +
            (day < 10 ? "0" + day : String(day)) +
            " " +
            (hour < 10 ? "0" + hour : String(hour)) +
            ":" +
            (min < 10 ? "0" + min : String(min))
          );
        } catch (e) {
          return isoStr;
        }
      }

      function renderTable() {
        var tbody = document.getElementById("recordsTbody");
        var table = document.getElementById("recordsTable");
        var empty = document.getElementById("emptyState");
        var countEl = document.getElementById("recordCount");

        tbody.innerHTML = "";

        if (records.length === 0) {
          table.style.display = "none";
          empty.style.display = "block";
          countEl.textContent = "";
          return;
        }
        table.style.display = "table";
        empty.style.display = "none";
        countEl.textContent = records.length + " 条";

        var sorted = records.slice().sort(function (a, b) {
          return new Date(b.datetime) - new Date(a.datetime);
        });

        sorted.forEach(function (rec) {
          var status = classifyGlucose(rec.glucose, rec.mealType);
          var tr = document.createElement("tr");

          var tdDate = document.createElement("td");
          tdDate.textContent = formatDatetime(rec.datetime);

          var tdVal = document.createElement("td");
          tdVal.textContent = displayVal(rec.glucose);
          tdVal.className =
            status === "normal"
              ? "glucose-value-normal"
              : status === "high"
                ? "glucose-value-high"
                : "glucose-value-low";

          var tdMeal = document.createElement("td");
          tdMeal.textContent = MEAL_LABELS[rec.mealType] || rec.mealType;

          var tdStatus = document.createElement("td");
          var badge = document.createElement("span");
          badge.className =
            "badge " +
            (status === "normal" ? "badge-normal" : status === "high" ? "badge-high" : "badge-low");
          badge.textContent = status === "normal" ? "正常" : status === "high" ? "偏高" : "偏低";
          tdStatus.appendChild(badge);

          var tdNote = document.createElement("td");
          tdNote.textContent = rec.note || "-";
          tdNote.style.color = "var(--color-text-secondary)";

          var tdDel = document.createElement("td");
          var delBtn = document.createElement("button");
          delBtn.className = "delete-btn";
          delBtn.textContent = "删除";
          delBtn.dataset.id = rec.id;
          delBtn.addEventListener("click", function () {
            var rid = this.dataset.id;
            records = records.filter(function (r) {
              return r.id !== rid;
            });
            saveRecords();
            render();
            showStatus("已删除记录", "");
          });
          tdDel.appendChild(delBtn);

          tr.appendChild(tdDate);
          tr.appendChild(tdVal);
          tr.appendChild(tdMeal);
          tr.appendChild(tdStatus);
          tr.appendChild(tdNote);
          tr.appendChild(tdDel);
          tbody.appendChild(tr);
        });
      }

      function renderSummary() {
        var cards = document.getElementById("summaryCards");
        if (records.length === 0) {
          cards.style.display = "none";
          return;
        }
        cards.style.display = "grid";
        var values = records.map(function (r) {
          return r.glucose;
        });
        var avg =
          values.reduce(function (a, b) {
            return a + b;
          }, 0) / values.length;
        var minV = Math.min.apply(null, values);
        var maxV = Math.max.apply(null, values);
        var inRange = records.filter(function (r) {
          return classifyGlucose(r.glucose, r.mealType) === "normal";
        }).length;
        var pct = Math.round((inRange / records.length) * 100);

        document.getElementById("sumCount").textContent = records.length;
        document.getElementById("sumAvg").textContent = useMgdl ? mmolToMgdl(avg) : avg.toFixed(1);
        document.getElementById("sumMin").textContent = useMgdl
          ? mmolToMgdl(minV)
          : minV.toFixed(1);
        document.getElementById("sumMax").textContent = useMgdl
          ? mmolToMgdl(maxV)
          : maxV.toFixed(1);
        document.getElementById("sumInRange").textContent = pct + "%";
      }

      function renderChart() {
        var section = document.getElementById("chartSection");
        if (records.length < 2) {
          section.style.display = "none";
          return;
        }
        section.style.display = "block";

        var canvas = document.getElementById("glucoseChart");
        var ctx = canvas.getContext("2d");

        var dpr = window.devicePixelRatio || 1;
        var cssWidth = canvas.parentElement.clientWidth - 32;
        var cssHeight = 220;
        canvas.width = cssWidth * dpr;
        canvas.height = cssHeight * dpr;
        canvas.style.width = cssWidth + "px";
        canvas.style.height = cssHeight + "px";
        ctx.scale(dpr, dpr);

        var W = cssWidth;
        var H = cssHeight;
        var PAD = { top: 20, right: 20, bottom: 36, left: 48 };
        var plotW = W - PAD.left - PAD.right;
        var plotH = H - PAD.top - PAD.bottom;

        var sorted = records.slice().sort(function (a, b) {
          return new Date(a.datetime) - new Date(b.datetime);
        });

        var values = sorted.map(function (r) {
          return r.glucose;
        });
        var minV = Math.min.apply(null, values);
        var maxV = Math.max.apply(null, values);
        minV = Math.min(minV, 3.5);
        maxV = Math.max(maxV, 8.5);
        var rangeV = maxV - minV || 1;

        var tStart = new Date(sorted[0].datetime).getTime();
        var tEnd = new Date(sorted[sorted.length - 1].datetime).getTime();
        var rangeT = tEnd - tStart || 1;

        function xPos(isoStr) {
          var t = new Date(isoStr).getTime();
          return PAD.left + ((t - tStart) / rangeT) * plotW;
        }
        function yPos(v) {
          return PAD.top + plotH - ((v - minV) / rangeV) * plotH;
        }

        var isDark = document.documentElement.getAttribute("data-theme") !== "light";
        var gridColor = isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)";
        var axisColor = isDark ? "#55556a" : "#999";
        var textColor = isDark ? "#8888a0" : "#666";

        ctx.clearRect(0, 0, W, H);

        ctx.strokeStyle = gridColor;
        ctx.lineWidth = 1;
        var gridSteps = 5;
        for (var i = 0; i <= gridSteps; i++) {
          var gv = minV + (rangeV * i) / gridSteps;
          var gy = yPos(gv);
          ctx.beginPath();
          ctx.moveTo(PAD.left, gy);
          ctx.lineTo(PAD.left + plotW, gy);
          ctx.stroke();
          ctx.fillStyle = textColor;
          ctx.font = "10px 'JetBrains Mono', monospace";
          ctx.textAlign = "right";
          ctx.fillText(useMgdl ? String(mmolToMgdl(gv)) : gv.toFixed(1), PAD.left - 6, gy + 4);
        }

        ctx.strokeStyle = axisColor;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(PAD.left, PAD.top);
        ctx.lineTo(PAD.left, PAD.top + plotH);
        ctx.lineTo(PAD.left + plotW, PAD.top + plotH);
        ctx.stroke();

        var refHighY = yPos(6.1);
        var refLowY = yPos(3.9);
        ctx.fillStyle = "rgba(16, 185, 129, 0.07)";
        ctx.fillRect(PAD.left, refHighY, plotW, refLowY - refHighY);

        ctx.setLineDash([5, 4]);
        ctx.strokeStyle = "#10b981";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(PAD.left, yPos(7.8));
        ctx.lineTo(PAD.left + plotW, yPos(7.8));
        ctx.stroke();

        ctx.strokeStyle = "rgba(251, 191, 36, 0.7)";
        ctx.beginPath();
        ctx.moveTo(PAD.left, yPos(3.9));
        ctx.lineTo(PAD.left + plotW, yPos(3.9));
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = isDark ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.1)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        sorted.forEach(function (rec, idx) {
          var x = xPos(rec.datetime);
          var y = yPos(rec.glucose);
          if (idx === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();

        sorted.forEach(function (rec) {
          var x = xPos(rec.datetime);
          var y = yPos(rec.glucose);
          var s = classifyGlucose(rec.glucose, rec.mealType);
          var dotColor =
            s === "high" ? "#f43f5e" : s === "low" ? "#fbbf24" : DOT_COLORS[rec.mealType];
          ctx.beginPath();
          ctx.arc(x, y, 5, 0, Math.PI * 2);
          ctx.fillStyle = dotColor;
          ctx.fill();
          ctx.strokeStyle = isDark ? "#12121a" : "#fff";
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        ctx.fillStyle = textColor;
        ctx.font = "10px 'JetBrains Mono', monospace";
        ctx.textAlign = "center";
        var maxTicks = Math.min(6, sorted.length);
        var tickStep = Math.max(1, Math.floor(sorted.length / maxTicks));
        for (var j = 0; j < sorted.length; j += tickStep) {
          var tickRec = sorted[j];
          var tx = xPos(tickRec.datetime);
          var td = new Date(tickRec.datetime);
          var tdMin = td.getMinutes();
          var label =
            td.getMonth() +
            1 +
            "/" +
            td.getDate() +
            " " +
            td.getHours() +
            ":" +
            (tdMin < 10 ? "0" + tdMin : String(tdMin));
          ctx.fillText(label, tx, H - 6);
        }
      }

      function render() {
        renderTable();
        renderSummary();
        renderChart();
      }

      function setDefaultDatetime() {
        var now = new Date();
        var offset = now.getTimezoneOffset();
        var local = new Date(now.getTime() - offset * 60000);
        document.getElementById("inputDatetime").value = local.toISOString().slice(0, 16);
      }

      document.getElementById("btnAdd").addEventListener("click", function () {
        var datetimeVal = document.getElementById("inputDatetime").value;
        var glucoseRaw = document.getElementById("inputGlucose").value.trim();
        var mealType = document.getElementById("inputMealType").value;
        var note = document.getElementById("inputNote").value.trim();

        if (!datetimeVal) {
          showStatus("请选择时间", "error");
          return;
        }
        if (!glucoseRaw || isNaN(Number(glucoseRaw))) {
          showStatus("请输入有效的血糖值", "error");
          return;
        }
        var glucoseMmol = parseFloat(glucoseRaw);
        if (useMgdl) glucoseMmol = mgdlToMmol(glucoseMmol);
        if (glucoseMmol < 1 || glucoseMmol > 40) {
          showStatus("血糖值超出合理范围 (1–40 mmol/L)", "error");
          return;
        }
        var rec = {
          id: Date.now() + "_" + Math.random().toString(36).slice(2, 7),
          datetime: datetimeVal,
          glucose: Math.round(glucoseMmol * 10) / 10,
          mealType: mealType,
          note: note
        };
        records.push(rec);
        saveRecords();
        render();
        document.getElementById("inputGlucose").value = "";
        document.getElementById("inputNote").value = "";
        var st = classifyGlucose(rec.glucose, rec.mealType);
        var statusMsg =
          st === "normal"
            ? "记录已添加，血糖正常"
            : st === "high"
              ? "记录已添加，血糖偏高，请注意！"
              : "记录已添加，血糖偏低，请注意！";
        showStatus(statusMsg, st === "normal" ? "success" : "error");
      });

      document.getElementById("btnExportCsv").addEventListener("click", function () {
        if (records.length === 0) {
          showStatus("暂无记录可导出", "error");
          return;
        }
        var header = "时间,血糖值(mmol/L),餐次,状态,备注";
        var rows = records
          .slice()
          .sort(function (a, b) {
            return new Date(a.datetime) - new Date(b.datetime);
          })
          .map(function (r) {
            var st = classifyGlucose(r.glucose, r.mealType);
            var stLabel = st === "normal" ? "正常" : st === "high" ? "偏高" : "偏低";
            return [
              formatDatetime(r.datetime),
              r.glucose.toFixed(1),
              MEAL_LABELS[r.mealType] || r.mealType,
              stLabel,
              '"' + (r.note || "").replace(/"/g, '""') + '"'
            ].join(",");
          });
        var csv = "﻿" + header + "\n" + rows.join("\n");
        var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "blood_glucose_" + new Date().toISOString().slice(0, 10) + ".csv";
        a.click();
        URL.revokeObjectURL(url);
        showStatus("CSV 已导出", "success");
      });

      document.getElementById("btnClearAll").addEventListener("click", function () {
        if (records.length === 0) {
          showStatus("暂无记录", "error");
          return;
        }
        if (!window.confirm("确定要清空所有记录吗？此操作不可撤销。")) return;
        records = [];
        saveRecords();
        render();
        showStatus("已清空全部记录", "");
      });

      document.getElementById("unitSelect").addEventListener("change", function () {
        useMgdl = this.value === "mgdl";
        render();
        var gInput = document.getElementById("inputGlucose");
        gInput.placeholder = useMgdl ? "如 100" : "如 5.6";
        document.querySelector('label[for="inputGlucose"]').textContent =
          "血糖值 (" + (useMgdl ? "mg/dL" : "mmol/L") + ")";
      });

      document.getElementById("inputGlucose").addEventListener("keydown", function (e) {
        if (e.key === "Enter") document.getElementById("btnAdd").click();
      });

      window.addEventListener("resize", function () {
        if (records.length >= 2) renderChart();
      });

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        if (records.length >= 2) renderChart();
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
      loadRecords();
      setDefaultDatetime();
      render();
    </script>
  </body>
</html>
