    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
        font-family: var(--font-mono);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .options-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-5);
        align-items: center;
        margin-bottom: var(--space-5);
        font-size: 0.875rem;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }
      .option-item select {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        padding: var(--space-2) var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .option-item select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
      }
      .option-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-primary);
        cursor: pointer;
      }
      .option-item label {
        cursor: pointer;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;

          </button>

        <!-- Live request mode -->
        <div id="panelLive" class="mode-panel active">
          <div class="cors-form">
            <div class="cors-row">
              <span class="cors-row-label">目标 URL</span>
              <input
                id="targetUrl"
                class="cors-input"
                type="url"
                placeholder="https://api.example.com/endpoint"
                autocomplete="off"
                spellcheck="false"
              />
              <select id="reqMethod" class="cors-select">
                <option value="GET">GET</option>
                <option value="POST" selected>POST</option>
                <option value="PUT">PUT</option>
                <option value="PATCH">PATCH</option>
                <option value="DELETE">DELETE</option>
              </select>
            </div>
            <div class="cors-row">
              <span class="cors-row-label">Origin</span>
              <input
                id="reqOrigin"
                class="cors-input"
                type="text"
                placeholder="https://yourapp.com（留空则不发送）"
                autocomplete="off"
                spellcheck="false"
              />
              <div></div>
            </div>
            <div class="cors-row">
              <span class="cors-row-label">请求头</span>
              <textarea
                id="reqHeaders"
                class="cors-headers-area"
                placeholder="Content-Type: application/json&#10;Authorization: Bearer token"
                spellcheck="false"
              ></textarea>
              <div></div>
            </div>
          </div>

            <div class="btn-group">

            </div>
            <div class="btn-group">
              <button id="btnClearLive" class="btn">清空</button>
            </div>
          </div>
          <div id="liveSpinner" class="loading-spinner">

          </div>

        </div>

        </p>
      </footer>
    </main>
    <script>
      // ============================================================
      // CORS Preflight Debugger Logic
      // ============================================================

      var currentMode = "live";

      // --- Tab switching ---
      document.getElementById("tabLive").onclick = function () {
        switchMode("live");
      };
      document.getElementById("tabManual").onclick = function () {
        switchMode("manual");
      };

      function switchMode(mode) {
        currentMode = mode;
        document.getElementById("tabLive").classList.toggle("active", mode === "live");
        document.getElementById("tabManual").classList.toggle("active", mode === "manual");
        document.getElementById("tabLive").setAttribute("aria-selected", String(mode === "live"));
        document
          .getElementById("tabManual")
          .setAttribute("aria-selected", String(mode === "manual"));
        document.getElementById("panelLive").classList.toggle("active", mode === "live");
        document.getElementById("panelManual").classList.toggle("active", mode === "manual");
        hideResult();
      }

      function hideResult() {
        document.getElementById("resultSection").classList.remove("show");
      }

      function showGlobalStatus(msg, type) {
        var el = document.getElementById("globalStatus");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      // --- CORS header metadata ---
      var CORS_HEADER_INFO = {
        "access-control-allow-origin": {
          label: "Access-Control-Allow-Origin",
          desc: "指定允许访问资源的源（Origin）。值为具体源（如 https://example.com）或通配符 *。",
          checkFn: function (val, ctx) {
            if (!val) return { status: "missing", msg: "缺少此头，浏览器将阻止跨域响应。" };
            if (val === "*" && ctx.hasCredentials) {
              return {
                status: "warn",
                msg: "值为 * 时不能与 credentials 一起使用（withCredentials / Cookie）。需改为具体源。"
              };
            }
            return { status: "ok", msg: "已设置，允许来自 " + val + " 的访问。" };
          }
        },
        "access-control-allow-methods": {
          label: "Access-Control-Allow-Methods",
          desc: "列出允许的 HTTP 方法，多个用逗号分隔。简单方法（GET/POST/HEAD）不需要 preflight，但仍建议明确列出。",
          checkFn: function (val, ctx) {
            if (!val) {
              if (ctx.needsPreflight) {
                return {
                  status: "missing",
                  msg: "非简单请求需要此头，缺少会导致 preflight 失败。"
                };
              }
              return { status: "info", msg: "未设置（简单请求可接受）。" };
            }
            var methods = val.split(",").map(function (m) {
              return m.trim().toUpperCase();
            });
            if (
              ctx.method &&
              !methods.includes(ctx.method.toUpperCase()) &&
              !methods.includes("*")
            ) {
              return { status: "warn", msg: "请求方法 " + ctx.method + " 未在允许列表中。" };
            }
            return { status: "ok", msg: "允许方法: " + val };
          }
        },
        "access-control-allow-headers": {
          label: "Access-Control-Allow-Headers",
          desc: "列出允许的请求头，非简单请求头（如 Authorization、Content-Type: application/json）必须在此列出。",
          checkFn: function (val, ctx) {
            if (!val) {
              if (ctx.hasCustomHeaders) {
                return {
                  status: "missing",
                  msg: "请求包含非简单头，但响应缺少此字段，preflight 将失败。"
                };
              }
              return { status: "info", msg: "未设置（无自定义请求头时可接受）。" };
            }
            return { status: "ok", msg: "允许头: " + val };
          }
        },
        "access-control-allow-credentials": {
          label: "Access-Control-Allow-Credentials",
          desc: "为 true 时允许请求携带凭证（Cookie、HTTP Auth）。需与请求端 withCredentials: true 配合，且 Allow-Origin 不能为 *。",
          checkFn: function (val) {
            if (!val) return { status: "info", msg: "未设置，不允许携带凭证（默认行为）。" };
            if (val.toLowerCase() === "true") {
              return {
                status: "ok",
                msg: "允许凭证（Cookie / Auth）。请确保 Allow-Origin 为具体源。"
              };
            }
            return { status: "warn", msg: '值应为 "true"，当前值: ' + val };
          }
        },
        "access-control-expose-headers": {
          label: "Access-Control-Expose-Headers",
          desc: "指定哪些响应头可以暴露给前端 JS（默认仅基本头可读）。",
          checkFn: function (val) {
            if (!val)
              return {
                status: "info",
                msg: "未设置，前端只能读取基本响应头（Cache-Control 等）。"
              };
            return { status: "ok", msg: "暴露头: " + val };
          }
        },
        "access-control-max-age": {
          label: "Access-Control-Max-Age",
          desc: "preflight 结果可缓存的秒数，减少重复 OPTIONS 请求。Chrome 最大 7200 秒，Firefox 最大 86400 秒。",
          checkFn: function (val) {
            if (!val) return { status: "info", msg: "未设置，浏览器不会缓存 preflight 结果。" };
            var n = parseInt(val, 10);
            if (isNaN(n) || n < 0) return { status: "warn", msg: "值应为非负整数秒数。" };
            if (n > 86400) {
              return {
                status: "warn",
                msg: "值 " + n + " 超过 Firefox 上限 86400s，实际会被截断。"
              };
            }
            return { status: "ok", msg: "缓存 " + n + " 秒。" };
          }
        },
        vary: {
          label: "Vary",
          desc: "告知缓存代理此响应因哪些请求头不同而变化。CORS 响应通常应包含 Origin，避免缓存污染。",
          checkFn: function (val) {
            if (!val)
              return {
                status: "warn",
                msg: "建议添加 Vary: Origin 避免缓存服务器错误缓存 CORS 响应。"
              };
            if (val.toLowerCase().includes("origin")) {
              return { status: "ok", msg: "已包含 Origin，缓存行为正确。" };
            }
            return {
              status: "warn",
              msg: "未包含 Origin（当前: " + val + "），建议添加以避免缓存污染。"
            };
          }
        }
      };

      // Simple CORS request headers (no preflight needed if only these)
      var SIMPLE_HEADERS = ["accept", "accept-language", "content-language", "content-type"];
      var SIMPLE_CONTENT_TYPES = [
        "application/x-www-form-urlencoded",
        "multipart/form-data",
        "text/plain"
      ];
      var SIMPLE_METHODS = ["GET", "POST", "HEAD"];

      function parseHeadersText(text) {
        var result = {};
        var lines = text.split("\n");
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line || line.startsWith("HTTP/")) continue;
          var colonIdx = line.indexOf(":");
          if (colonIdx < 0) continue;
          var key = line.slice(0, colonIdx).trim().toLowerCase();
          var val = line.slice(colonIdx + 1).trim();
          if (key) result[key] = val;
        }
        return result;
      }

      function needsPreflightCheck(method, reqHeaders) {
        var m = (method || "GET").toUpperCase();
        if (!SIMPLE_METHODS.includes(m)) return true;
        var keys = Object.keys(reqHeaders);
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i].toLowerCase();
          if (!SIMPLE_HEADERS.includes(k)) return true;
          if (k === "content-type") {
            var ct = reqHeaders[keys[i]].split(";")[0].trim().toLowerCase();
            if (!SIMPLE_CONTENT_TYPES.includes(ct)) return true;
          }
        }
        return false;
      }

      function hasCustomHeaders(reqHeaders) {
        var keys = Object.keys(reqHeaders);
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i].toLowerCase();
          if (!SIMPLE_HEADERS.includes(k)) return true;
          if (k === "content-type") {
            var ct = reqHeaders[keys[i]].split(";")[0].trim().toLowerCase();
            if (!SIMPLE_CONTENT_TYPES.includes(ct)) return true;
          }
        }
        return false;
      }

      function buildContext(method, reqHeadersObj, resHeadersObj) {
        var acao = resHeadersObj["access-control-allow-credentials"];
        return {
          method: method,
          reqHeaders: reqHeadersObj,
          needsPreflight: needsPreflightCheck(method, reqHeadersObj),
          hasCustomHeaders: hasCustomHeaders(reqHeadersObj),
          hasCredentials: acao && acao.toLowerCase() === "true"
        };
      }

      function analyzeHeaders(method, reqHeadersText, resHeadersObj, rawText) {
        var reqHeadersObj = parseHeadersText(reqHeadersText || "");
        var ctx = buildContext(method, reqHeadersObj, resHeadersObj);
        var issues = [];
        var allOk = true;
        var hasWarn = false;

        // Build header rows for all known CORS headers
        var rowsData = [];
        var corsKeys = Object.keys(CORS_HEADER_INFO);
        for (var i = 0; i < corsKeys.length; i++) {
          var key = corsKeys[i];
          var info = CORS_HEADER_INFO[key];
          var val = resHeadersObj[key] || null;
          var check = info.checkFn(val, ctx);
          rowsData.push({ key: info.label, val: val, check: check, desc: info.desc });
          if (check.status === "missing") {
            allOk = false;
            issues.push({ type: "error", msg: info.label + " — " + check.msg });
          } else if (check.status === "warn") {
            hasWarn = true;
            issues.push({ type: "warn", msg: info.label + " — " + check.msg });
          }
        }

        // Check for extra unknown CORS headers
        var resKeys = Object.keys(resHeadersObj);
        for (var j = 0; j < resKeys.length; j++) {
          var rk = resKeys[j];
          if (rk.startsWith("access-control-") && !CORS_HEADER_INFO[rk]) {
            rowsData.push({
              key: rk,
              val: resHeadersObj[rk],
              check: { status: "info", msg: "非标准 CORS 头，部分浏览器可能忽略。" },
              desc: "非标准扩展头。"
            });
          }
        }

        renderResult(rowsData, issues, allOk, hasWarn, rawText);
      }

      function renderResult(rowsData, issues, allOk, hasWarn, rawText) {
        // Summary
        var summaryEl = document.getElementById("resultSummary");
        summaryEl.className = "result-summary";
        if (!allOk) {
          summaryEl.classList.add("fail");
          summaryEl.innerHTML =
            '<span class="result-summary-icon">✗</span>' +
            '<span class="result-summary-text">CORS 配置存在错误，跨域请求将被浏览器阻止。</span>';
        } else if (hasWarn) {
          summaryEl.classList.add("warn");
          summaryEl.innerHTML =
            '<span class="result-summary-icon">⚠</span>' +
            '<span class="result-summary-text">CORS 配置有警告，部分场景可能出现问题。</span>';
        } else {
          summaryEl.classList.add("pass");
          summaryEl.innerHTML =
            '<span class="result-summary-icon">✓</span>' +
            '<span class="result-summary-text">CORS 配置正常，跨域请求应可通过。</span>';
        }

        // Issues
        var issuesSection = document.getElementById("issuesSection");
        var issuesList = document.getElementById("issuesList");
        issuesList.textContent = "";
        if (issues.length > 0) {
          issuesSection.style.display = "block";
          for (var i = 0; i < issues.length; i++) {
            var issue = issues[i];
            var div = document.createElement("div");
            div.className = "issue-item" + (issue.type === "warn" ? " issue-warn" : "");
            var iconSpan = document.createElement("span");
            iconSpan.className = "issue-icon";
            iconSpan.textContent = issue.type === "warn" ? "⚠" : "✗";
            var msgDiv = document.createElement("div");
            msgDiv.textContent = issue.msg;
            div.appendChild(iconSpan);
            div.appendChild(msgDiv);
            issuesList.appendChild(div);
          }
        } else {
          issuesSection.style.display = "none";
        }

        // Header rows
        var headerRowsEl = document.getElementById("headerRows");
        headerRowsEl.textContent = "";
        for (var j = 0; j < rowsData.length; j++) {
          var row = rowsData[j];
          var rowDiv = document.createElement("div");
          rowDiv.className = "header-row " + row.check.status;

          var keyEl = document.createElement("div");
          keyEl.className = "header-key";
          keyEl.textContent = row.key;

          var valEl = document.createElement("div");
          valEl.className = "header-val" + (row.val === null ? " missing-val" : "");
          valEl.textContent = row.val !== null ? row.val : "(未设置)";

          var descEl = document.createElement("div");
          descEl.className = "header-desc";
          descEl.innerHTML =
            row.desc + (row.check.msg ? " <strong>" + escapeHtml(row.check.msg) + "</strong>" : "");

          rowDiv.appendChild(keyEl);
          rowDiv.appendChild(valEl);
          rowDiv.appendChild(descEl);
          headerRowsEl.appendChild(rowDiv);
        }

        // Raw headers
        var rawSection = document.getElementById("rawSection");
        if (rawText) {
          rawSection.style.display = "block";
          document.getElementById("rawHeaders").value = rawText;
        } else {
          rawSection.style.display = "none";
        }

        document.getElementById("resultSection").classList.add("show");
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ---- Live request ----
      document.getElementById("btnSendPreflight").onclick = function () {
        sendRequest("OPTIONS");
      };

      document.getElementById("btnSendActual").onclick = function () {
        var method = document.getElementById("reqMethod").value;
        sendRequest(method);
      };

      document.getElementById("btnClearLive").onclick = function () {
        document.getElementById("targetUrl").value = "";
        document.getElementById("reqOrigin").value = "";
        document.getElementById("reqHeaders").value = "";
        document.getElementById("liveStatus").textContent = "";
        document.getElementById("liveStatus").className = "status";
        hideResult();
        showGlobalStatus("", "");
      };

      function setLiveStatus(msg, type) {
        var el = document.getElementById("liveStatus");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      function sendRequest(method) {
        var urlVal = document.getElementById("targetUrl").value.trim();
        if (!urlVal) {
          setLiveStatus("请输入目标 URL", "error");
          return;
        }
        var originVal = document.getElementById("reqOrigin").value.trim();
        var reqHeadersText = document.getElementById("reqHeaders").value;
        var reqHeadersObj = parseHeadersText(reqHeadersText);

        // Build fetch options
        var fetchHeaders = {};
        if (originVal) fetchHeaders["Origin"] = originVal;
        // Copy custom request headers for actual requests
        if (method !== "OPTIONS") {
          var keys = Object.keys(reqHeadersObj);
          for (var i = 0; i < keys.length; i++) {
            fetchHeaders[keys[i]] = reqHeadersObj[keys[i]];
          }
        }

        var spinner = document.getElementById("liveSpinner");
        spinner.classList.add("show");
        setLiveStatus("", "");
        hideResult();
        showGlobalStatus("正在请求…", "");

        var fetchOptions = {
          method: method,
          headers: fetchHeaders,
          mode: "cors"
        };

        fetch(urlVal, fetchOptions)
          .then(function (res) {
            spinner.classList.remove("show");
            var rawLines = [];
            rawLines.push("HTTP/1.1 " + res.status + " " + res.statusText);
            var resHeadersObj = {};
            res.headers.forEach(function (val, key) {
              rawLines.push(key + ": " + val);
              resHeadersObj[key.toLowerCase()] = val;
            });
            var rawText = rawLines.join("\n");
            var actualMethod =
              method === "OPTIONS" ? document.getElementById("reqMethod").value : method;
            analyzeHeaders(actualMethod, reqHeadersText, resHeadersObj, rawText);
            setLiveStatus(
              method + " " + res.status + " " + res.statusText,
              res.ok ? "success" : "error"
            );
            showGlobalStatus("请求完成", "success");
          })
          .catch(function (err) {
            spinner.classList.remove("show");
            var msg = err.message || String(err);
            setLiveStatus("请求失败: " + msg, "error");
            showGlobalStatus("请求失败（可能是 CORS 阻断）", "error");
            // Show analysis with all headers missing to help diagnose
            analyzeHeaders(
              method === "OPTIONS" ? document.getElementById("reqMethod").value : method,
              reqHeadersText,
              {},
              "（请求被浏览器阻断，无法读取响应头。请使用「手动粘贴响应头」模式从 DevTools 粘贴头信息。）"
            );
          });
      }

      // ---- Manual mode ----
      document.getElementById("btnAnalyze").onclick = function () {
        var resText = document.getElementById("manualResHeaders").value.trim();
        if (!resText) {
          document.getElementById("manualStatus").textContent = "请粘贴响应头";
          document.getElementById("manualStatus").className = "status error";
          return;
        }
        var resHeadersObj = parseHeadersText(resText);
        var reqHeadersText = document.getElementById("manualReqHeaders").value;
        var method = document.getElementById("manualMethod").value;
        analyzeHeaders(method, reqHeadersText, resHeadersObj, resText);
        document.getElementById("manualStatus").textContent = "分析完成";
        document.getElementById("manualStatus").className = "status success";
        showGlobalStatus("分析完成", "success");
      };

      document.getElementById("btnClearManual").onclick = function () {
        document.getElementById("manualResHeaders").value = "";
        document.getElementById("manualReqHeaders").value = "";
        document.getElementById("manualStatus").textContent = "";
        document.getElementById("manualStatus").className = "status";
        hideResult();
        showGlobalStatus("", "");
      };

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme"))
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
      });

      initTheme();
    </script>
  </body>
</html>
