        const tile = document.createElement("span");
        tile.className = "tile";
        tile.textContent = ch.toUpperCase();
        letterTilesEl.appendChild(tile);
      }
    }
  }

  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = "status " + (type || "");
  }

  function solve() {
    const raw = letterInputEl.value.replace(/[^a-zA-Z]/g, "");
    if (!raw) {
      showStatus("请输入字母", "error");
      return;
    }

    renderTiles(raw);

    const inputCnt = letterCount(raw);
    const minLen = parseInt(minLenEl.value, 10);
    const exactOnly = exactOnlyEl.checked;
    const inputLen = raw.length;

    searchingEl.classList.add("show");
    resultsCountEl.textContent = "";
    resultsGridEl.classList.remove("show");
    resultsEmptyEl.style.display = "none";

    // 使用 setTimeout 让浏览器先渲染再运算（避免阻塞）
    clearTimeout(solveTimer);
    solveTimer = setTimeout(() => {
      const found = [];
      for (const word of DICT) {
        const wl = word.length;
        if (wl < minLen) continue;
        if (exactOnly && wl !== inputLen) continue;
        if (wl > inputLen) continue;
        if (canForm(letterCount(word), inputCnt)) {
          found.push(word);
        }
      }

      searchingEl.classList.remove("show");

      if (found.length === 0) {
        resultsEmptyEl.style.display = "";
        resultsEmptyEl.innerHTML =
          '<div class="results-empty-icon">😕</div><div>未找到匹配单词，请尝试其他字母组合</div>';
        resultsGridEl.classList.remove("show");
        resultsCountEl.textContent = "";
        showStatus("未找到单词", "error");
        return;
      }

      // 排序
      const sortMode = sortModeEl.value;
      if (sortMode === "length-desc") {
        found.sort((a, b) => b.length - a.length || a.localeCompare(b));
      } else if (sortMode === "length-asc") {
        found.sort((a, b) => a.length - b.length || a.localeCompare(b));
      } else if (sortMode === "alpha") {
        found.sort((a, b) => a.localeCompare(b));
      } else {
        // count: group by length desc, within group alpha
        found.sort((a, b) => b.length - a.length || a.localeCompare(b));
      }

      // 分组（按长度）
      const groups = {};
      for (const word of found) {
        const len = word.length;
        if (!groups[len]) groups[len] = [];
        groups[len].push(word);
      }

      // 渲染
      resultsGridEl.innerHTML = "";
      const sortedLengths = Object.keys(groups)
        .map(Number)
        .sort((a, b) => (sortMode === "length-asc" ? a - b : b - a));

      for (const len of sortedLengths) {
        const words = groups[len];
        const group = document.createElement("div");
        group.className = "length-group";

        const header = document.createElement("div");
        header.className = "length-group-header";
        header.innerHTML =
          '<span class="length-badge">' +
          len +
          '</span><span class="length-label">' +
          len +
          " 字母</span>" +
          '<span class="length-word-count">' +
          words.length +
          " 个</span>" +
          '<span class="length-group-toggle">▾</span>';

        const wordList = document.createElement("div");
        wordList.className = "word-list";

        for (const word of words) {
          const chip = document.createElement("span");
          chip.className = "word-chip" + (word.length === inputLen ? " exact" : "");
          chip.textContent = word;
          chip.title = "点击复制";
          chip.addEventListener("click", () => {
            navigator.clipboard
              .writeText(word)
              .then(() => showStatus("已复制: " + word, "success"))
              .catch(() => showStatus("复制失败", "error"));
          });
          wordList.appendChild(chip);
        }

        header.addEventListener("click", () => {
          const toggle = header.querySelector(".length-group-toggle");
          wordList.classList.toggle("hidden");
          toggle.classList.toggle("collapsed");
        });

        group.appendChild(header);
        group.appendChild(wordList);
        resultsGridEl.appendChild(group);
      }

      resultsGridEl.classList.add("show");
      resultsEmptyEl.style.display = "none";
      resultsCountEl.textContent = "共 " + found.length + " 个";
      showStatus("找到 " + found.length + " 个单词", "success");

      // 保存 URL hash
      try {
        if (raw.length <= 15) {
          history.replaceState(null, "", "#" + btoa(raw.toLowerCase()));
        }
      } catch (e) {
        // ignore
      }
    }, 20);
  }

  // 绑定事件
  document.getElementById("btnSolve").onclick = solve;

  document.getElementById("btnClear").onclick = function () {
    letterInputEl.value = "";
    letterTilesEl.innerHTML = "";
    resultsGridEl.classList.remove("show");
    resultsGridEl.innerHTML = "";
    resultsEmptyEl.style.display = "";
    resultsEmptyEl.innerHTML =
      '<div class="results-empty-icon">🔤</div>' +
      "<div>输入字母后点击「求解」，找出所有可以拼出的英文单词</div>" +
      '<div style="font-size: 0.75rem; opacity: 0.7">例：LISTEN → SILENT, ENLIST, INLETS…</div>';
    resultsCountEl.textContent = "";
    statusEl.textContent = "";
    statusEl.className = "status";
    history.replaceState(null, "", location.pathname);
  };

  letterInputEl.addEventListener("input", function () {
    // 只允许字母
    this.value = this.value.replace(/[^a-zA-Z]/g, "");
    renderTiles(this.value);
    resultsGridEl.classList.remove("show");
    resultsCountEl.textContent = "";
    statusEl.textContent = "";
    statusEl.className = "status";
  });

  letterInputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      solve();
    }
  });

  // 读取 URL hash
  function loadFromUrl() {
    const hash = location.hash.slice(1);
    if (!hash) return false;
    try {
      const letters = atob(hash);
      if (/^[a-z]{1,15}$/.test(letters)) {
        letterInputEl.value = letters.toUpperCase();
        renderTiles(letters);
        return true;
      }
    } catch (e) {
      // ignore
    }
    return false;
  }

  window.toggleTheme = function () {
    const html = document.documentElement;
    const currentTheme = html.getAttribute("data-theme") || "dark";
    const newTheme = currentTheme === "light" ? "dark" : "light";
    html.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
  };
  function initTheme() {
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const theme = savedTheme || (prefersDark ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  }
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
    if (!localStorage.getItem("theme"))
      document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
  });

  initTheme();
  loadFromUrl();
</script>
